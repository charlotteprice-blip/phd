en up and down a back section in the quiet. I yeah, I just wasn't prioritizing the basic wellbeing things like I should have and I even just the floors and the, the rental. I was walking in my jandals because it was just so everything was just too gross to me and moldy bathroom. And it's surprising how much of an impact that has, because, you know, I grew up in a lovely home and I think that's yeah, for me, I've always seen home as a bit of a sanctuary. So when it wasn't that and I actually was much happier being at work. And I remember when my grandma died and I was in [another city], and I actually didn't want to take the day off to be in my awful flat. I was like, I'll just go to work.","c":4,"n":6,"i":"pay","s":43},{"id":"Mary-010400-079","p":"Mary","t":"01:04:00","q":"I'll be around my colleagues type thing. So it was kind of that sort of dynamic. Really fortunate to have really lovely, lovely colleagues to work alongside. I think I became a bit of an agony aunt for everyone else, where I was kind of not sharing how I was going as much, kind of because I'm a good listener. Everyone sort of was using that, but I don't. I didn't have the support outside of work myself, where everyone had their partners and that sort of thing. So yeah, a number of factors in there. Very fortunate, though, because I got into musical theatre when I was in [another city]. That was my real I loved it, and that's probably been the big trait of coming back to [city]. There's so many opportunities and it was just so much fun. And you. Yeah, really beautiful group of people to work alongside. And yeah, it really challenged me in so many different ways around my craft and I loved it. So it was a big loss of moving back to [city]. And I met some wonderful people through that as well, which is really cool. Great friends from it.","c":61,"n":37,"i":"relocation","s":55},{"id":"Mary-010503-080","p":"Mary","t":"01:05:03","q":"Yes. And she had, like, something to do outside of work. Get me out of the house. And, yeah, it was a great challenge, I loved it. Yeah.","c":25,"n":18,"i":"autonomy","s":71},{"id":"Mary-010532-081","p":"Mary","t":"01:05:32","q":"Yeah, it was interesting because at that time I was actually I was, I was doing shows. So I ended up flying to and from [another town] the same day for the funeral, sung at the funeral. And then I that very night I was doing a show, and so it was quite a. Yeah, I don't think I, I was, I was in this just like do doing phase. I don't think I was really thinking about it that much. I wasn't letting myself. Yeah. I think it was kind of like things were. Yeah, it was kind of a weird space anyway that I was in at that point. So I think just. Yeah, doing the show was good, but yeah, I think I was kind of holding everything in for a while and even just, you know, sing, sing at my grandma's funeral, it was kind of like I didn't really give myself too much permission to get upset. I was just like, I've got things I need to do. I need to sing properly at this. I need to show up for the show. Well, so that sort of thing. But yeah, supportive team, which helped.","c":20,"n":19,"i":"leaving","s":15},{"id":"Mary-010642-082","p":"Mary","t":"01:06:42","q":"Think I appreciated how.","c":5,"n":7,"i":"procedural","s":37},{"id":"Mary-010645-083","p":"Mary","t":"01:06:45","q":"You've got to be proactive to build things into your life to support yourself. I don't think I was doing a great job of that.","c":1,"n":4,"i":"work_content","s":80},{"id":"Mary-010721-084","p":"Mary","t":"01:07:21","q":"Yes, that's a really, really good one. I guess it's having a very clear sense of what your own personal values are, what is most important to you, and using that as an anchor for your decision making. I think looking at it also from a mindset perspective of water, things in my control and what things that are not in my control. It's a real I think it's so much harder for young people these days coming out of uni. I it just seems so much harder than it was when I came out of uni. And I think it's more about, if anything, it's leaning into those things that are going to help you feel like a fuller person. So really leaning into your wellbeing careers, they're a long journey. And I mean, you don't have we don't have jobs all the time. Like they they're not like the long term loyalty that they used to be. So no kind of prioritising your development. I think that's a really important thing of there's so many different opportunities and ways to develop yourself. So being proactive and finding out what those are, whether it's doing some volunteer work or thinking about what are the what are those transferable skills that I could draw on. So, I mean, and even in interviews, it's how do I cope under pressure? So when I was working at a bakery, I had some great examples there.","c":16,"n":2,"i":"interview_process","s":57},{"id":"Mary-010846-085","p":"Mary","t":"01:08:46","q":"So it's finding those opportunities to build out your experiences because working in an office, I mean, you build so many skills outside of that environment that are applicable for your working career. So it's finding opportunities where you can you can build on those skill sets and also being comfortable with with rejection. That's a very normal, healthy thing to experience. And it doesn't reflect on you. Sometimes there's it's funny how there'll be certain things that people look for when they are recruiting, and it might be something very, very specific. It might be something around that. They have this very unique experience that makes them the perfect fit for that role. So to remember that it's not not about them. You don't know what's going on behind those doors. And it's not something to be taken personally as a personal failure as to be treating it as a process, not something that defines you. It's okay. I've applied for this job. Cool. Move on and not. And almost keep yourself really busy doing other things. So you're not waiting on that person responding to you, because that's just exhausting. And I know with my friend who's been made redundant, she's really great at filling out her time and doing cool things, whether it's undertaking some new training or taking a class at the gym like those, just finding ways to fill your time in a way that's cup filling.","c":40,"n":15,"i":"rejection","s":71},{"id":"Mary-011013-086","p":"Mary","t":"01:10:13","q":"And I think not to just be stuck in front of a computer hoping for a job and and even thinking a bit more creatively about how you could get a job. So for me, I've been networking quite a lot recently and and not in a forced, ugly way, but more in a getting to understand people's different working experiences and what they're doing at this point in time and finding yeah, just learning. And I remember there was a uni student, she, she connected with me probably six months ago and through her research that she was doing. But she's very good at networking. And I see she's built quite a, quite an impressive group of people that go on LinkedIn with her. So she's been very active and asking people and people are really willing to, to meet with you. I think that's the other thing. People love to share their stories of what they do for work. Yeah. So I think it's just being gentle on yourself, realizing that it's not about you building yourself, controlling what's in your control and pacing yourself as best you can. Really.","c":4,"n":6,"i":"pay","s":33},{"id":"Mary-011123-087","p":"Mary","t":"01:11:23","q":"Your failure type thing, it's a reality.","c":0,"n":4,"i":"work_content","s":25},{"id":"Mary-011130-088","p":"Mary","t":"01:11:30","q":"As great as you can be, I mean, people getting made redundant to are amazing at their work, but you're a number at the end of the day and it's they're looking on a spreadsheet, your number, your salary. It's got nothing to do with the quality of what you're doing. So.","c":58,"n":36,"i":"security","s":50},{"id":"Mary-011151-089","p":"Mary","t":"01:11:51","q":"I think it's one of those things of rejection, like finding any opportunity, like meeting new people, going out and doing something different. Going to an awkward networking event like that. Stuff's hard and it's there's an element of rejection and fear in that. But I think as humans, particularly with a generation that have experienced Covid and have not been exposed to interacting with people and even asking people on a date in real life, like, no one does that now, right? No. So there's the sort of thing like, we have to we're not used to rejection. I don't think this generation is used to it. And it's","c":40,"n":15,"i":"rejection","s":64},{"id":"Mary-011235-090","p":"Mary","t":"01:12:35","q":"That's exactly.","c":9,"n":7,"i":"procedural","s":21},{"id":"Mary-011249-091","p":"Mary","t":"01:12:49","q":"I would love.","c":6,"n":7,"i":"procedural","s":35},{"id":"Mary-011303-092","p":"Mary","t":"01:13:03","q":"Because I think I saw you guys in the cafe together as a family. Which one was that? [a café].","c":3,"n":4,"i":"work_content","s":57},{"id":"Mary-011311-093","p":"Mary","t":"01:13:11","q":"Oh, I love it there because it's very close.","c":0,"n":4,"i":"work_content","s":44},{"id":"Mary-011313-094","p":"Mary","t":"01:13:13","q":"It.","c":9,"n":7,"i":"procedural","s":13},{"id":"Mary-011317-095","p":"Mary","t":"01:13:17","q":"I'd love that. Yeah. So my address is [address provided].","c":22,"n":18,"i":"autonomy","s":25},{"id":"Mary-011325-096","p":"Mary","t":"01:13:25","q":"Yes. Very close to.","c":9,"n":7,"i":"procedural","s":34},{"id":"Mary-011330-097","p":"Mary","t":"01:13:30","q":"Thank you so.","c":6,"n":7,"i":"procedural","s":70},{"id":"Mary-011331-098","p":"Mary","t":"01:13:31","q":"Oh, you're you're honey.","c":5,"n":7,"i":"procedural","s":33},{"id":"Mary-011338-099","p":"Mary","t":"01:13:38","q":"I know we're very happy. We're like, oh, this is magic. We'll be here for a very long time. Yeah, I love that.","c":38,"n":18,"i":"autonomy","s":31},{"id":"Mary-011344-100","p":"Mary","t":"01:13:44","q":"That. That's very cool.","c":9,"n":7,"i":"procedural","s":29},{"id":"Mary-011355-101","p":"Mary","t":"01:13:55","q":"Well.","c":6,"n":7,"i":"procedural","s":20},{"id":"Mary-011358-102","p":"Mary","t":"01:13:58","q":"My pleasure.","c":5,"n":7,"i":"procedural","s":30},{"id":"Mary-011409-103","p":"Mary","t":"01:14:09","q":"And I love what you're doing and you're trying to have a positive impact for people.","c":53,"n":31,"i":"purpose","s":0},{"id":"Mary-011417-104","p":"Mary","t":"01:14:17","q":"I think it's so hard for for your generation. It's so much harder than kids.","c":0,"n":4,"i":"work_content","s":66},{"id":"Mary-011514-105","p":"Mary","t":"01:15:14","q":"We were so lucky. Well, my, my age group in particular, I feel like really fortunate have had these challenges and just the global dynamics and it's just pretty scary.","c":63,"n":18,"i":"autonomy","s":100},{"id":"Mary-011536-106","p":"Mary","t":"01:15:36","q":"Love seeing you, Charlotte. Talk soon.","c":3,"n":4,"i":"work_content","s":22},{"id":"Carrie-000343-001","p":"Carrie","t":"00:03:43","q":"Yeah. I started out wanting to do politics when I went to uni. And then in first year, I was like, oh my God, I thank you because it was it was election year in 2017. And I was like got into like some of the young political groups. And I was like, no, this is not for me. Yeah. And then I actually started at [a university], didn't get into second year law because it was quite competitive. So then I moved out and finished my law degree, and it was at [another university] where I was doing all the usual papers and property was like really difficult, like I was I thought about it at the time as like math where you're like, these concepts are just so hard to understand, but then once you got them, it was like a it was like a penny drop moment where you're like, oh, now I get it.","c":40,"n":15,"i":"rejection","s":0},{"id":"Carrie-000435-002","p":"Carrie","t":"00:04:35","q":"So I had that and I think I was doing like a research paper and this name kept popping up. And at the time, everyone was applying for clerkships to all the big firms. And like, those applications are insane. You know, like the [a large national firm] and the big national firms. And like I remember, I think the [a large national firm] one was the most hectic. And I can remember that it was, you know, I was second year uni and it was asking me for my like year nine grades and I couldn't find them. And I was like, why do you even care about my grades? Like, this is crazy.","c":2,"n":4,"i":"work_content","s":54},{"id":"Carrie-000519-003","p":"Carrie","t":"00:05:19","q":"Yeah. So I was like going through that process and I was like, I don't even know if I want to work somewhere that, like, puts value on the grades that I got in year nine because I certainly don't. And yeah, so then I was researching for for a property law paper. This name kept popping up and I was like, oh, maybe I should go and work for this lady who seems to know everything about property law and writes all the articles. So I contacted her and was asking for a summer clerkship. It was like early in the year. But then they got me in and then just hired me part time as a law clerk. And that was in my second year of uni. I think maybe it was my third year.","c":2,"n":4,"i":"work_content","s":61},{"id":"Carrie-000603-004","p":"Carrie","t":"00:06:03","q":"But yeah. So I got in to like, I guess the private practice industry really early on. Yeah. And it was like quite a small, like ten lawyer kind of size boutique property law firm. So I guess over the rest of the time at uni, I just kind of slowly transitioned from, like, admin jobs and stuff to slowly taking on more. And then like before I'd even finished uni, I think. I think again, as you say, like Covid really changed things because they were she was like extremely paper dependent. So it was quite a lot paper dependent, like it was an online system for everything. But for some reason everything just got printed out and filed, even though it was already stored online.","c":77,"n":32,"i":"covid","s":0},{"id":"Carrie-000657-005","p":"Carrie","t":"00:06:57","q":"Yeah, yeah, yeah, I think so. I think a lot of lawyers are not particularly like like lawyers are traditional. It's a traditional field. And then you have a lot of older lawyers that are very they're not well educated about like cyber security. And just think, well, the best thing I can do is just print it all out.","c":0,"n":4,"i":"work_content","s":38},{"id":"Carrie-000732-006","p":"Carrie","t":"00:07:32","q":"But yeah.","c":6,"n":7,"i":"procedural","s":13},{"id":"Carrie-000734-007","p":"Carrie","t":"00:07:34","q":"And I still like, if I'm, if I'm proofreading something, I still like to print it out, but I definitely don't keep paper files and print out every email or anything like that. Yeah. So, so transition to working more. So by the by my final year of uni, I was working like probably 30 hours a week there and, and everything went online. So that meant that I could work a full day and then go home and study. Because I didn't do any online classes, I had to attend online. So they really like I would say that helped me, because that meant that when I did come into like a proper graduate role, I already had, I was already doing like what we would call author work, where you're kind of like handling a file.","c":50,"n":23,"i":"transition","s":0},{"id":"Carrie-000834-008","p":"Carrie","t":"00:08:34","q":"Yeah, yeah yeah, yeah. And then and also like starting out by doing all the administration and understanding that first whereas I think a lot of lawyers probably just go straight into. To just to do legal work. And like, particularly at bigger firms, like you just have a secretary that does everything for you. So yeah. Yeah. So then I was going to stay in [a main centre] and work there, but then I got what happened? For some reason or another, my partner and I decided to move down to [a resort town], got a job offer in [a resort town] pretty quickly and then moved down here. And I worked for a couple of different firms since I've been here. Yeah, but I literally like I still work in property. I've expanded a little bit and do some like commercial stuff which implements property nicely, but I'm pretty much just doing the same thing. So yeah. That was like kind of why I was interested when I was reading about your study. And I was like, well, I'm, you know, I think it it's just interesting how different people progress through law. And a lot of young lawyers that I talk to. I was like, oh, I really wish I'd done this, I wish I'd done this or blah blah blah, but I don't feel that way. Like, I'm like, this is what I like.","c":1,"n":4,"i":"work_content","s":24},{"id":"Carrie-000954-009","p":"Carrie","t":"00:09:54","q":"What I started doing at uni and I'm probably just going to do this forever.","c":2,"n":4,"i":"work_content","s":93},{"id":"Carrie-001101-010","p":"Carrie","t":"00:11:01","q":"I mean, it was for me, it was kind of like a process of exclusion, like I did, I knew I enjoyed property. I tried to take other papers so that I wasn't just like pigeonholing myself in property. But I knew that I had no interest in like some people, a lot of people at uni are like, I want to help save the world and like I want to like help immigrants and like do all that stuff. And I was like, that's not me. I'm not gonna like, I don't have those kind of. I'm like, I just want to help people do meaningful shit. But I probably wasn't thinking that at uni. I was just like, that doesn't interest me. I like the the more like like the less personal side of law, but didn't do employment law, didn't do family law. I only did like the basic stuff on criminal, didn't do any kind of like there were some papers that were aimed at like understanding high court rules and, you know, like that more kind of barrister route. And I was, I think probably because at that point I had the job. Yeah. That time I was like, well. This is kind of like, this is me. Yeah. Not interested in anything else.","c":35,"n":35,"i":"migration","s":0},{"id":"Carrie-001247-011","p":"Carrie","t":"00:12:47","q":"I don't think I had any idea really, what I was walking into. But it was very much like this lady is a practicing lawyer and she does academic articles, so I thought that was really cool. I thought, she's clearly very smart, successful lady. And then. I don't know what it was. It was definitely. It was like it was her name. And I guess her reputation that drew me to the firm. So I wasn't thinking too much about the fact I was actually, I was probably worried about with the big firms that kind of like that thought of like, well, if I If I go to a big firm, I'll become a cog in the machine. So I did like the. The smaller. But yeah, I didn't because there's plenty of smaller firms and there is, you know, it can vary quite a lot where it's like a one person, two person firm to the ten person firm and then say like a 30 to 40, like, you know, they do operate, you know, like they do operate very differently. But I wasn't thinking. I had no idea. I was just like, oh, this people want to interview me. Yeah, it seems really successful. I'll rock up to the interview. And then he offered me the. It was actually interesting. So she is the partner and then her husband is like the practice manager, which is kind of like a bit of a gender role reversal.","c":7,"n":0,"i":"big4","s":0},{"id":"Carrie-001430-012","p":"Carrie","t":"00:14:30","q":"He was kind of like the dad of the firm. Yeah. So he interviewed me and then offered me a job on the spot, which was cool. So I was like, great, Got a job, needed the money.","c":7,"n":0,"i":"big4","s":33},{"id":"Carrie-001510-013","p":"Carrie","t":"00:15:10","q":"Yeah. Yeah, definitely. Like I would say, compared to because I used to work but I'm back at a small firm, but I did for about three years work at a very large firm, [a large national firm], which is like in like national 200 people kind of scale. And I saw the grad grads come in and just get babysat for a long time, whereas, you know, before I was even finished uni, I was like thrown in the deep end. Like, I think the first legal work I did for for [name] as I was sitting at my desk and she was like walking out to go to a meeting somewhere, and she just handed me a document and said, can you review this for me? And just walked out the door and I was like, what is this? What do I do with it? It was a LIM report of I don't know anything about this. So I think from a introduction to the law, it was like it was hectic because I made heaps of mistakes. I didn't know what I was doing until after I'd already done it, but it was like that was so valuable because I was just like, let loose to like, work things out and had the had the space to make mistakes and then be like, oh, well, I'll know for next time. Whereas yeah, that big a firm level. I don't think that you get that because you're, you're held on a really short leash And you are? Yeah. Everything is reviewed and checked and you have a real safety net around you.","c":59,"n":23,"i":"transition","s":0},{"id":"Carrie-001657-014","p":"Carrie","t":"00:16:57","q":"No I mean other younger people in the team were really helpful in like really being toward me. But then usually I was working directly for [name], the partner who I thought was really cool lady, but like, she was I wouldn't say she was a bad teacher, but yeah, she she was kind of just like you go sort it out. She wasn't very proactive. Teacher. And then sometimes when I would get things wrong, she'd be like. She'd be, like, sitting at her desk, and she'd be like, you've done this wrong. And I'd be like, how am I supposed to know that I've done it wrong. You know, like some people, like, not everyone can cope with that. Like, definitely saw some tears. Because. Yeah. You know, when someone, when you're, when your supervisor is, like, getting angry and you're yelling at you like, can't handle this, but I was just like, yell back because I was like, what the fuck am I supposed to do, you know? So I don't think it would be the I don't think I would be like, yep, she's great. Go and learn from her because it's not for everyone. But it worked for me, I think.","c":15,"n":9,"i":"mentor_good","s":0},{"id":"Carrie-001821-015","p":"Carrie","t":"00:18:21","q":"I think I was overconfident. Like, I love it. I think that I was, like, not very detail oriented. And because I didn't fully understand what I was doing yet. I was just had the confidence to just be like, oh yeah, I'll just just do it, you know?","c":41,"n":25,"i":"confidence","s":0},{"id":"Carrie-001841-016","p":"Carrie","t":"00:18:41","q":"Which I do think I think that is a good. Yeah. Thing. I think a lot of people start at the other end of the spectrum where they're like very nervous and, and that and again, that's where, like, if someone's yelling at you and you're really nervous, that's not going to go down so well. But yeah I was like I always I used to work with someone when I was at [a large national firm] and we had a big team and I was managing people. She, she was the nervous like second guess everything question everything, get into the detail. And I always said like, we worked well together because we were at different ends of the spectrum. And then we'd meet in the middle. So I think there's a middle ground.","c":29,"n":27,"i":"mentor_bad","s":47},{"id":"Carrie-001950-017","p":"Carrie","t":"00:19:50","q":"After that, I went to a firm called [a regional firm] which is like a small but bigger, more general practice firm. And it's based in [a nearby town]. And then they've got offices in [a South Island city] and [a resort town], and I think there was one in [a South Island city], but I don't think there is anymore. So they probably would have been like, yeah, maybe 30, 35 staff.","c":3,"n":4,"i":"work_content","s":54},{"id":"Carrie-002020-018","p":"Carrie","t":"00:20:20","q":"I think it's grown a bit now.","c":60,"n":17,"i":"learning","s":0},{"id":"Carrie-002029-019","p":"Carrie","t":"00:20:29","q":"Yeah, yeah. Well, my partner was working remotely. Permanently. That was pretty much like. Right. Wherever I can get a job, we'll go there. So I applied for, like, [another town] and [a resort town] were our two contacts.","c":112,"n":5,"i":"balance","s":0},{"id":"Carrie-002047-020","p":"Carrie","t":"00:20:47","q":"Well, we were living separately.","c":0,"n":4,"i":"work_content","s":19},{"id":"Carrie-002050-021","p":"Carrie","t":"00:20:50","q":"And he was in [a North Island city]. I was in [a main centre] and I was like, I'm not moving [a North Island city] to live with you. And he was like, well, I'm not moving to [a main centre] to live with you. So we're like, we'll, we'll, we'll compromise by going somewhere completely different.","c":61,"n":37,"i":"relocation","s":27},{"id":"Carrie-002118-022","p":"Carrie","t":"00:21:18","q":"One of the I remember, like, really clearly that one of the things I really liked about [a regional firm] was they had an Instagram and they posted stuff on Instagram and I was like, yeah, that's cool. Yeah.","c":63,"n":18,"i":"autonomy","s":0},{"id":"Carrie-002137-023","p":"Carrie","t":"00:21:37","q":"Yeah. That was that. And the fact that they had a property and that they were advertising for a property lawyer I mean, the green flag once, I, once I interviewed the salary offer was really good, like, quite a lot better than what I was being offered in [a main centre]. And they seemed like nice people. Yeah. So","c":4,"n":6,"i":"pay","s":37},{"id":"Carrie-002220-024","p":"Carrie","t":"00:22:20","q":"Yeah, I told her after","c":8,"n":7,"i":"procedural","s":28},{"id":"Carrie-002225-025","p":"Carrie","t":"00:22:25","q":"Oh, yeah. They were pretty disappointed. And I think. Yeah. She said, like, if you, you know, if you're coming back to [a main centre] kind of thing like don't lose touch. Yeah. Which was really nice. So I don't think there were really any hard feelings.","c":3,"n":4,"i":"work_content","s":22},{"id":"Carrie-002250-026","p":"Carrie","t":"00:22:50","q":"Yeah, I mean, I moved around a lot as a kid. So I went to, like, eight different schools. So many houses. I can't even count between my parents. Yeah. So, like, moving your country?","c":107,"n":1,"i":"family_influence","s":100},{"id":"Carrie-002309-027","p":"Carrie","t":"00:23:09","q":"It was just like, you know, pack it all up in the car. Yeah, it went really smoothly. And then. Yeah, the transition was fine. And I really enjoyed the people that I was working with. And all the work was, like, quite similar. Definitely, like got a broader range of work. Yeah. Yeah. Which was nice.","c":12,"n":19,"i":"leaving","s":5},{"id":"Carrie-002344-028","p":"Carrie","t":"00:23:44","q":"Well I wasn't I still hadn't been admitted yet so.","c":3,"n":4,"i":"work_content","s":35},{"id":"Carrie-002349-029","p":"Carrie","t":"00:23:49","q":"Yeah. So it was like I finished uni.","c":51,"n":23,"i":"transition","s":0},{"id":"Carrie-002353-030","p":"Carrie","t":"00:23:53","q":"In November 2020. And then I moved down to the South Island in April 2021. And then.","c":0,"n":4,"i":"work_content","s":69},{"id":"Carrie-002407-031","p":"Carrie","t":"00:24:07","q":"Were. Yeah.","c":9,"n":7,"i":"procedural","s":11},{"id":"Carrie-002408-032","p":"Carrie","t":"00:24:08","q":"I might have I think I'd already started. Prof. When I was in the North Island so like sorted all that out. And then yeah, I didn't get admitted until September 2021.","c":3,"n":4,"i":"work_content","s":57},{"id":"Carrie-002435-033","p":"Carrie","t":"00:24:35","q":"Yeah. I mean, yeah, definitely similar. Like, very much like bottom of the food chain. What was the. I mean, I think that the team was smaller, so there was only like 3 or 4 of us in that sort of like property, commercial space and then legal executives. Whereas at [the boutique firm], I guess it was a smaller firm, but everyone was doing the same type of work.","c":2,"n":4,"i":"work_content","s":46},{"id":"Carrie-002520-034","p":"Carrie","t":"00:25:20","q":"No, not. Not really. Like. Not that I can recall. What I, what I did really like about it is that they were they were quite — [a regional firm] was quite sort of early in their. They'd been around for a long time, but they were investing a lot and like marketing and then like internal systems as well. So they had someone, someone who was at partner level, but not a partner who was in charge of like, legal. I think her role was like legal innovation. That was all about, you know, before we had AI, it was about like automating document drafting and all that kind of stuff. That was cool to really be part of that and like quite an early stage.","c":64,"n":8,"i":"ai_tech","s":0},{"id":"Carrie-002609-035","p":"Carrie","t":"00:26:09","q":"Yeah. And it was kind of like some of the things that I'd been sitting around thinking, oh man, it would be so good if we had this system. I could just be like, oh, what about this? And. Oh yeah. Cool. You you involved in that.","c":2,"n":4,"i":"work_content","s":50},{"id":"Carrie-002636-036","p":"Carrie","t":"00:26:36","q":"I don't know. I enjoyed working at [a regional firm]. I had a really good supervisor, so she was an in between me and the partner. And then we worked together in [a resort town], and the partner was in [a nearby town]. So no like just. Yeah. Enjoyed it. No problems. I was quite happy there. It was like very low. Not low like it was normal hours. Everyone worked 830 to 530, took an hour for lunch, walked out the door at 530 and it was like very rare, you know, like if I was, if I was till six. It was like, oh, late night, you know. You know and I was kind of like, cool. Like, maybe this is me. Like, everyone has their hobbies. People want to leave so they can, like, go skiing or go biking or kayaking or, like, everyone, you know, it was really cool. And I was like, great, this is this is work life balance.","c":18,"n":9,"i":"mentor_good","s":0},{"id":"Carrie-003416-037","p":"Carrie","t":"00:34:16","q":"And but and then my supervisor left. She got poached by [another large firm] and like, maybe two weeks after she left, I got a phone call from another firm, and I'd been dealing with a partner on a really, like, annoying, difficult transaction, and they called me up, and they're like, oh, so and so was really impressed with you in this transaction. Do you want to come and meet him? And I was like, oh, it was a bit of a dick to deal with, but I'll meet him just because I want to meet this guy. Yeah, yeah. And then [name], my supervisor, had gone. And so I had was in a bit of a limbo where someone who was quite new, senior associate, quite new, was supervising me. She was based in [a South Island city], and she was like a nice person, but terrible supervisor. I would do work and send it to her and she would just never look at it, and I'd call her up and ask her a question, and she would just always be too busy.","c":14,"n":9,"i":"mentor_good","s":16},{"id":"Carrie-002849-038","p":"Carrie","t":"00:28:49","q":"Yeah, yeah. And I think at that point I really reflected, like, I didn't think about it at the time, but I really reflected on the previous supervisor that I had who was who did always. Like I would just walk up to her desk every day and be like, hey, what about this? Yeah.","c":14,"n":9,"i":"mentor_good","s":42},{"id":"Carrie-002909-039","p":"Carrie","t":"00:29:09","q":"So I really like. Yeah, took that for granted. And then it was gone and I was like fuck. Then she contacted me around the same time. So two job offers, one to go and continue working with her. [another large firm] or to go work for someone that I thought was a dick. Who I met at [a large national firm]. And. I don't know, like, I met him in person and I was like, oh, this guy's actually, like, really cool. Like, we talked for almost two hours. And it was a really good. It was just like we clicked, you know?","c":0,"n":4,"i":"work_content","s":47},{"id":"Carrie-002951-040","p":"Carrie","t":"00:29:51","q":"So ultimately, I think I kind of, like, took the risk. They were really quick at, like, getting me an offer. Yeah. When I told them that I had another offer, they were like, right, we're going to put our offer up. Yeah, yeah. And then dealing with [another large firm], they took days I met two of the partners, not my supervisor, but two of the partners, and they were like, didn't wow me that much. So it was very much like a relationship thing. Yeah. As well as I like, you know, just how they operated in their hiring process.","c":14,"n":9,"i":"mentor_good","s":32},{"id":"Carrie-003041-041","p":"Carrie","t":"00:30:41","q":"I did sit down. I went out for coffee with my previous supervisor and she was still, she was actually on gardening leave. So it was very much like a low key thing.","c":11,"n":9,"i":"mentor_good","s":73},{"id":"Carrie-003052-042","p":"Carrie","t":"00:30:52","q":"And she said because she had worked there previously. So [a resort town] is very incestuous. Everyone has worked for everyone. So she had come to [a regional firm] from [a firm]. And then she was going to. So you know she'd moved, she'd worked there. So she told me about what it was like. And she. What she said was that there are teams and you work in your team and you do not work outside of your team. Whereas [another large firm] was like one giant team where everyone worked together on everything. And probably a slightly different client base. So like [a large national firm] was like extremely established in [a resort town], had, you know, like really long standing big [a resort town] clients, whereas [another large firm] had only been in [a resort town] for like a year at that point. So it was very new and just a different they did like property syndication, which is going very badly at the moment because nobody wants to do Property Syndicate because they don't have the spare money. Yeah. So that those were the other things that I was thinking about probably was like the type of work I would have been moving from, like, a property team into the commercial team at [a large national firm], which interested me. I was, like, keen to kind of, like, do a bit more of that.","c":4,"n":6,"i":"pay","s":0},{"id":"Carrie-003240-043","p":"Carrie","t":"00:32:40","q":"Again? Like because it was interesting. Because my supervisor got put on gardening leave, and I think that that was like that went very badly, but I wasn't there to see it. But I was told that it was like, give us your laptop and go home now kind of thing. Whereas that again, like I managed to avoid anything like that. I think probably just being junior and you know they were like, oh, she's not a, she's not a threat or something.","c":14,"n":9,"i":"mentor_good","s":63},{"id":"Carrie-003318-044","p":"Carrie","t":"00:33:18","q":"No. When I was dealing with the partner. So supervisors gone. She's on gardening leave. That went badly. And then, you know, like a month later when I resigned and I went to the partner, I think that they were just, you know, I didn't get put on gardening leave. I worked out my notice period, and they said the same thing, like, if you change your mind or because the partner in South Island and says things the partner had, like, started her like her legal career under the partner that I was going to work for at a firm in [a provincial city]. [a firm]. So he had like been, you know, like worked with her and when she was a junior and now she was older. Yeah. So she was like you weren't like you know, you know, come and talk to us if you want to come back kind of thing. Yeah.","c":14,"n":9,"i":"mentor_good","s":37},{"id":"Carrie-003423-045","p":"Carrie","t":"00:34:23","q":"Already met him. So I was like, I know what I can like.","c":2,"n":4,"i":"work_content","s":54},{"id":"Carrie-003427-046","p":"Carrie","t":"00:34:27","q":"Yeah yeah yeah yeah yeah.","c":6,"n":7,"i":"procedural","s":0},{"id":"Carrie-003430-047","p":"Carrie","t":"00:34:30","q":"And it was also kind of seemed like a bit of a challenge because he said he's got really high expectations. Yeah. Difficult to work for you know like you know. And I was kind of like cool like this is exciting. Like I want to try and step up to the plate kind of thing. And because I'd, because the workload had been so relaxed, it [a regional firm], I was like, well, the idea of kind of stepping it up the pace was also quite appealing.","c":13,"n":19,"i":"leaving","s":24},{"id":"Carrie-003514-048","p":"Carrie","t":"00:35:14","q":"Yeah, just like higher, I mean, not higher volume, but just, like doing more and being challenged more. Yeah, not just doing the same type of like taking a long. Yeah yeah.","c":25,"n":18,"i":"autonomy","s":0},{"id":"Carrie-003536-049","p":"Carrie","t":"00:35:36","q":"Yeah, I mean it was quite different. Because, yeah, all the sudden it was, you know, big firm was. Yeah, like a whole, you know, like a hundred policies to read through and like, you know, I remember the most annoying thing about it was you couldn't log into any of your personal stuff on the computer, so, like, I couldn't log into my emails or anything, and I was like, fuck, this is annoying. Anyway so that kind of stuff was quite different. You know, meeting with all the different people to do the training in the first few weeks. Oh, I thought I was going to sneeze, but I didn't. That's annoying. Yeah. So meeting with all the different people and getting the training done and. Yeah. And then that was interesting and different. And then. Yeah, working with the new partner was also very different. So he was like very hands on favorite. He couldn't he can't type because he's old. Very common with older lawyers. They can't type. So we would like sit in a meeting room and have like a screen, like a monitor up on the, on the wall. And you would be, like, typing and talking and typing and drafting and talking, and you'd be like, sometimes you'd be in there for like six hours, like, you know, and it was like you're thinking the whole time. So, I mean, I it was a really good way to learn that that was that was the probably the most valuable, like one on one learning mentoring that I had. Yeah. Up to that point. So.","c":14,"n":9,"i":"mentor_good","s":0},{"id":"Carrie-003738-050","p":"Carrie","t":"00:37:38","q":"I started off working pretty normal hours and taking lunch breaks and doing all the things that normal people do. And then as I progressed. So I went from solicitor to senior solicitor. As I started to, I guess, take on more responsibility and had junior people on the team that I was mentoring and supervising. I started to work more, and then I had the partner was really good at not kind of gatekeeping. He would allow you to, like, build relationships directly with the client. So once that became kind of almost more like, more of a person that they would come directly to or I guess I just started to, to care a lot more about, like we had one client who probably was like 80% of my workload and always doing, like, crazy, crazy shit at the last minute. But yeah, so I started to work longer and longer in the end, that was 22, 23 and then 24, like last year was insane. Like I was working. We had some when my boss went away and I was in charge And I was working like 15, 17 hours a day sometimes. Like, it was hectic. But I really enjoyed it. I was like, I was like, yes, this is what I want to do. Not the working 15 hours a day, but like having that responsibility and that.","c":18,"n":9,"i":"mentor_good","s":0},{"id":"Carrie-003915-051","p":"Carrie","t":"00:39:15","q":"Oversight and yeah, you know","c":5,"n":7,"i":"procedural","s":10},{"id":"Carrie-003926-052","p":"Carrie","t":"00:39:26","q":"Yeah. So he went away for like 5 or 6 weeks and 23. And then he did the same in 24. And both times, you know, the pressure was really on me with this particular client. And crazy stuff was happening while he was gone. And he was like in countries where he had no signal. So he was just like fully hands off. Both times. I was like the first time I got like a rash and I had like that twitch, you know, when you drink too much caffeine and you get that little twitch in your eye. I had that. I like this better, but I still enjoyed it, learned a lot from it, and I was like, for me, that really like solidified what I wanted to do. Like what career, you know, progression was going to that I was going to aim for.","c":4,"n":6,"i":"pay","s":20},{"id":"Carrie-004030-053","p":"Carrie","t":"00:40:30","q":"Yeah. So I've kind of thought that I was going to be there for a while.","c":2,"n":4,"i":"work_content","s":64},{"id":"Carrie-004034-054","p":"Carrie","t":"00:40:34","q":"I got promoted to associate in April this year. But that was after like a battle about the fact that I'd only done I only had 4.8 years experience, not five. And therefore they couldn't promote me. And I was like, well, I'm the highest performing lawyer who's not a partner at the firm. And there's like two tiers of seniority above me before you get to partner. And I was like, well, yes, I got offered another job. And I was like, oh, get off another job. What are you going to do? So kind of like, yeah, into a corner, I guess, to do that. Yeah.","c":7,"n":0,"i":"big4","s":37},{"id":"Carrie-004131-055","p":"Carrie","t":"00:41:31","q":"Yeah. So they again, something different that smaller firms don't do, as far as I can tell is publishing like billing reports every month. So, like, you do all your billing on the 31st or the 30th of the month, and then the next day up on the internet, you could go in and you could see every single broken down by team, by Location the like the number of you know how many thousands of dollars you'd build for that previous month and year to date.","c":0,"n":4,"i":"work_content","s":59},{"id":"Carrie-004203-056","p":"Carrie","t":"00:42:03","q":"And I mean, those are pretty like black and white numbers. And obviously there's other things to measure performance, but that's like a really easy one because.","c":0,"n":4,"i":"work_content","s":47},{"id":"Carrie-004228-057","p":"Carrie","t":"00:42:28","q":"Nothing. There was a lot of there was a lot of, like, culture problems, particularly in the [a resort town] office. And so there was a lot of people that were really upset about it. Oh yeah, a lot of, like, people who were not in my team, but who were at a similar age in stage, but, you know, like where it's senior solicitor and, you know. Yeah, I think probably jealousy.","c":3,"n":4,"i":"work_content","s":35},{"id":"Carrie-004306-058","p":"Carrie","t":"00:43:06","q":"Yeah. I mean, it was there was quite a big I would say there was quite a big culture difference between the team that I was in in the partner compared to other teams. Because we were a really high performing team. And we had a client who brought in heaps of work. And also the partner brought in a lot of work as well. He was one of the he may have, might have been like the second highest performing partner in the firm. Yeah. So we were yeah, we were all very happy and doing really well. But then everyone else was not doing very well. And I think on like, a lot of the other partners. It was just a real bad like. When there were issues, whether it was like, performance issues or disagreements between people or just any, any kind of thing that would come up. They weren't, like, dealt with. Like, they were just kind of ignored. And so that led early this year to like, quite a bad like lots of tensions. And it was just never discussed.","c":7,"n":0,"i":"big4","s":7},{"id":"Carrie-004430-059","p":"Carrie","t":"00:44:30","q":"And then and then my partner, he would try to deal with it and then be told to stop, you know, like, yeah.","c":3,"n":4,"i":"work_content","s":32},{"id":"Carrie-004502-060","p":"Carrie","t":"00:45:02","q":"It was end of last year. And like, I went in, I went in, like, talked to a couple of people to kind of just see I guess wanted to do like a bit of a market test on, like, salary. And, you know, there was some other firms where I was like, maybe things might be better. It was mostly just to see, like, a bit of a test, I suppose.","c":4,"n":6,"i":"pay","s":37},{"id":"Carrie-004540-061","p":"Carrie","t":"00:45:40","q":"It hadn't gotten. I was unaware of how bad it was at that point. I was kind of, like, blissfully unaware. Last year, but. Yeah, that was that was the main thing. And then I turned that role down in the end. Yeah.","c":0,"n":4,"i":"work_content","s":50},{"id":"Carrie-004610-062","p":"Carrie","t":"00:46:10","q":"Yeah. Both. Both. Yeah. Yeah.","c":6,"n":7,"i":"procedural","s":17},{"id":"Carrie-004623-063","p":"Carrie","t":"00:46:23","q":"Well, that's when I was already, like, very pissed off. Yeah, like, it was like the damage is done. Yeah. You know, like, they kind of just, like, gave it to me because they had to And I was like, this is not the context in which I want to get things, like, be awarded thing. You know, I won, I won an award which was like a young right, like rising star or something. That's what it used to be called. And they refused to acknowledge it because I had I had nominated myself and I had no idea it wasn't on the website with the policies, but they actually had like a process where they they worked out who they wanted to nominate. And then someone else did it. And I was like, well, regardless of how it was done, I still want it.","c":1,"n":4,"i":"work_content","s":16},{"id":"Carrie-004714-064","p":"Carrie","t":"00:47:14","q":"You're idiots for not recognizing it. But it was so those sort of little things were happening.","c":2,"n":4,"i":"work_content","s":64},{"id":"Carrie-004720-065","p":"Carrie","t":"00:47:20","q":"In in March, I think it was my partner had gotten fed up with the whole thing and decided to retire from the partnership.","c":1,"n":4,"i":"work_content","s":76},{"id":"Carrie-004735-066","p":"Carrie","t":"00:47:35","q":"Yeah, yeah, yeah. So I was, like, my biggest kind of supporter. The person who's bringing in all the work. The only commercial partner in [a resort town]. The client manager for the client, you know, was like, yeah, I'm out the door. Yeah.","c":2,"n":4,"i":"work_content","s":36},{"id":"Carrie-004817-067","p":"Carrie","t":"00:48:17","q":"Pretty much.","c":5,"n":7,"i":"procedural","s":23},{"id":"Carrie-004818-068","p":"Carrie","t":"00:48:18","q":"Yeah. So he went he's actually now in house for that large client. And so when I was looking my biggest like the word I can hear another fire drill going off like down the road. My biggest like box to tick was that I wanted to be able to take that client with me. So it was. Yeah. Looking for the right sort of firm where that would work. Yeah, it was difficult. I actually ended up I have a friend who's an employment lawyer. Ended up raising a personal grievance, and then, like, resigning within a week. And I didn't have another job lined up.","c":13,"n":19,"i":"leaving","s":56},{"id":"Carrie-004931-069","p":"Carrie","t":"00:49:31","q":"It's complicated, but when after the boss, because he left, he was put on gardening leave, but no one knew apart from me and a couple of other people. So he left the office and things were really weird. Everyone was like, what the fuck's going on?","c":2,"n":4,"i":"work_content","s":86},{"id":"Carrie-004947-070","p":"Carrie","t":"00:49:47","q":"And someone, my secretary made a complaint about me, like getting snappy with her. I asked her to do something for me, and then she went to someone else to ask them how to do it, and they came to me, and I was like, just. Yeah. Anyway. Yeah. So she made a complaint about me just talking to, like, one of the people in [a resort town]. And then they went to the CEO of the firm, and I was basically not allowed back in the office after then, so I worked. I know, it's crazy. It's crazy. So all of that. Yeah. So I was like, it was like suggested that I shouldn't go back to the office. And then I ended up working in the [a South Island city] office, [a South Island city] office in [a main centre] office. Like over a period of like six weeks. Different places. Yeah. So like. Yeah.","c":7,"n":0,"i":"big4","s":7},{"id":"Carrie-005050-071","p":"Carrie","t":"00:50:50","q":"It was.","c":9,"n":7,"i":"procedural","s":16},{"id":"Carrie-005053-072","p":"Carrie","t":"00:50:53","q":"Yeah, it was pretty stressful. It was probably, like, the most stressful thing I've ever dealt with. And we were dealing with, like, this massive transaction for that big client at the same time. Yeah. I remember my last day was the day after King's birthday weekend, and [name] and I worked the entire weekend. Like, I was working up in [a main centre] and I had they were paying for me to stay in [a main centre] at an apartment, like right next to the office. So I was just like weekend in the office working, which is so sad to think about. But that's how like even though I was like, I hate you, I was like, I still need to like, do you.","c":48,"n":20,"i":"somatic","s":0},{"id":"Carrie-005201-073","p":"Carrie","t":"00:52:01","q":"It was, well, I was still trying. Basically, I was still like in in the process of job hunting, but it was just taking longer.","c":3,"n":4,"i":"work_content","s":57},{"id":"Carrie-005213-074","p":"Carrie","t":"00:52:13","q":"Yeah. Yeah. So the that PG process and like when we resolved it really quickly and that included me leaving. Yeah. So yeah.","c":2,"n":4,"i":"work_content","s":39},{"id":"Carrie-005239-075","p":"Carrie","t":"00:52:39","q":"I know, I know, it's funny, like if there's anything I've learned out of the process is that it's actually that lawyers that are partners or directors or like, you know, the big bosses of law firms, some of them get there because they're good at lots of things, like managing people and relationships and stuff. But some of them get there just because they're good lawyers and they've done it for ten, 15 years. And it's just like, oh, you're a good lawyer and you've got good. You've got clients bringing money and cool will make you a partner. But a lot of these people actually have no management skills. I'm sure that's.","c":4,"n":6,"i":"pay","s":60},{"id":"Carrie-005317-076","p":"Carrie","t":"00:53:17","q":"Yeah, I'm sure that's prevalent in other industries too, but yeah. Yeah.","c":0,"n":4,"i":"work_content","s":28},{"id":"Carrie-005331-077","p":"Carrie","t":"00:53:31","q":"For now, I am at [my current firm] and the client did come across, and lots of other clients as well.","c":1,"n":4,"i":"work_content","s":84},{"id":"Carrie-005340-078","p":"Carrie","t":"00:53:40","q":"You.","c":5,"n":7,"i":"procedural","s":10},{"id":"Carrie-005341-079","p":"Carrie","t":"00:53:41","q":"I love it.","c":8,"n":7,"i":"procedural","s":36},{"id":"Carrie-005352-080","p":"Carrie","t":"00:53:52","q":"Yeah. Yeah. Yeah, definitely. Yeah. Yeah. So, I mean, I'm still at the same kind of level of seniority, and I'm just like, in the context of things, I don't really care about that as much, but I, the firm I've joined is based in [a main centre] and so I'm like setting up, I guess like the [a resort town] branch, which is quite cool. Yeah.","c":7,"n":0,"i":"big4","s":23},{"id":"Carrie-005420-081","p":"Carrie","t":"00:54:20","q":"And being more part of the business side of things, which is pretty cool.","c":1,"n":4,"i":"work_content","s":60},{"id":"Carrie-005429-082","p":"Carrie","t":"00:54:29","q":"I. Went on a little holiday.","c":0,"n":4,"i":"work_content","s":28},{"id":"Carrie-005439-083","p":"Carrie","t":"00:54:39","q":"Yeah, yeah. And then I started when I got back, which was like towards the end of June.","c":2,"n":4,"i":"work_content","s":61},{"id":"Carrie-005504-084","p":"Carrie","t":"00:55:04","q":"Nah. Not really. Because, like, throughout that whole time of stress and craziness and, like, we were still doing all this work. Yeah, but I still enjoyed doing. Yeah, but I was still doing well, so it didn't. I was able to almost like, compartmentalize all of the, like, this work.","c":48,"n":20,"i":"somatic","s":6},{"id":"Carrie-005558-085","p":"Carrie","t":"00:55:58","q":"Yeah yeah yeah. It's good. There's not 100 policies in the. It's a lot simpler to, like, do things, which is nice. And it's nice for the client as well when they're like, oh, we need to do this. Like how long is it going to take? And I'm like, it'll take 20 minutes. You know, we're it would it would have taken like ten business days. Yeah. So that side of things is like really refreshing. Yeah. Definitely a different like, I'm still working with my old boss, which I enjoy, but the new boss is very different. Sort of like adjusting to that difference, but he's quite hands off as well, so he just lets me do my own thing.","c":13,"n":19,"i":"leaving","s":16},{"id":"Carrie-005654-086","p":"Carrie","t":"00:56:54","q":"Probably filling in [a resort town]. Maybe in a bigger office with more staff. Just me at the moment, but we have we've employed one person. Yeah. So that and I like I was talking to my partner the other day about sort of looking into the process for when I say my partner, I mean my boyfriend about process for like the things that you have to do to become like a partner, Like there's all these extra training courses.","c":0,"n":4,"i":"work_content","s":56},{"id":"Carrie-005742-087","p":"Carrie","t":"00:57:42","q":"Yeah. I need to chat to my boss about it, obviously. Because you've obviously got to have the support of a firm. Yeah. But, you know, definitely in the next five years will want to have, like, completed that.","c":18,"n":9,"i":"mentor_good","s":36},{"id":"Carrie-005807-088","p":"Carrie","t":"00:58:07","q":"It's hard to. I mean.","c":1,"n":4,"i":"work_content","s":4},{"id":"Carrie-005812-089","p":"Carrie","t":"00:58:12","q":"Yeah, I mean, I often think about other You know, something comes up and I think, oh, yeah, I could probably do that. I felt like it, you know, like the idea of a career change doesn't like me because I think like it would be really cool to learn to do other things, but I love what I do.","c":4,"n":6,"i":"pay","s":60},{"id":"Carrie-005835-090","p":"Carrie","t":"00:58:35","q":"Yeah. And you know, there's obviously like it's an industry where you can make a lot of money. And I kind of like, kind of almost like the status of it. Like, I know that sounds like really superficial.","c":4,"n":6,"i":"pay","s":33},{"id":"Carrie-005909-091","p":"Carrie","t":"00:59:09","q":"Look, you.","c":8,"n":7,"i":"procedural","s":22},{"id":"Carrie-005936-092","p":"Carrie","t":"00:59:36","q":"It's it's quite like inspirational I guess. Like I would say my old boss you know, like he was, you know, very inspirational. I really, like, looked up to him. He did things quite differently. And I think that most clients really like like he had a lot of clients because they liked how he operated, which was different to the, the standard. And so I've really looked up to that and yeah. Yeah, just like don't want to do the same thing but like want to, you know, take parts of that and do it. And yeah, it's cool. It's cool to have like specialist skills I guess.","c":24,"n":19,"i":"leaving","s":41},{"id":"Carrie-010018-093","p":"Carrie","t":"01:00:18","q":"Put them to use and be like, yeah, I made that. I helped make that happen and all that type of thing. It's awesome.","c":2,"n":4,"i":"work_content","s":64},{"id":"Carrie-010045-094","p":"Carrie","t":"01:00:45","q":"No, I don't think so.","c":1,"n":4,"i":"work_content","s":4},{"id":"Carrie-010049-095","p":"Carrie","t":"01:00:49","q":"Yeah, there's a lot.","c":5,"n":7,"i":"procedural","s":27},{"id":"Carrie-010116-096","p":"Carrie","t":"01:01:16","q":"Let me check my. And [a resort town]. We have like entire housing developments that don't. Yeah. Get post.","c":42,"n":17,"i":"learning","s":53},{"id":"Carrie-010130-097","p":"Carrie","t":"01:01:30","q":"So I will just double check if you sent it to. Where my current office is, [office address provided].","c":1,"n":4,"i":"work_content","s":68},{"id":"Carrie-010414-098","p":"Carrie","t":"01:04:14","q":"[office address details provided].","c":8,"n":7,"i":"procedural","s":33},{"id":"Carrie-010231-099","p":"Carrie","t":"01:02:31","q":"So I.","c":6,"n":7,"i":"procedural","s":20},{"id":"Carrie-010233-100","p":"Carrie","t":"01:02:33","q":"I can't.","c":5,"n":7,"i":"procedural","s":23},{"id":"Carrie-010241-101","p":"Carrie","t":"01:02:41","q":"I I hope that I, you know, want to be able to, like, help other people pass on the wisdom.","c":3,"n":4,"i":"work_content","s":51},{"id":"Carrie-010251-102","p":"Carrie","t":"01:02:51","q":"Yeah, for.","c":8,"n":7,"i":"procedural","s":11},{"id":"Carrie-010314-103","p":"Carrie","t":"01:03:14","q":"That's good to hear. Yeah, totally. I'd be I'd be keen to do something like that. Like you know, it's been highs and lows. And, you know, I think that, you know, you just have no it like there's a lawsuit like this, have no idea what you're getting into. Like the practice of law is so different to university. And, you know, there's not much that you can that can prepare you for it, but hopefully what you're doing.","c":1,"n":4,"i":"work_content","s":24},{"id":"Carrie-010414-104","p":"Carrie","t":"01:04:14","q":"Thanks, thanks. Yeah, hopefully talk soon.","c":8,"n":7,"i":"procedural","s":56},{"id":"Carrie-010419-105","p":"Carrie","t":"01:04:19","q":"See ya.","c":9,"n":7,"i":"procedural","s":24},{"id":"Judy-000426-001","p":"Judy","t":"00:04:26","q":"Yeah. So I started working as a law clerk first in November last year because of the law school. You have to do like the profs. And then once you have the profs, it takes like months to get, like the certificates of character and certificate of. I don't even remember anymore like all this, all this references. And then I got admitted in February this year. So thanks. So I'm like like a solicitor and barrister now. And yeah, I just was still in like the first two years are always a bit over, like a training period where you kind of learn the ropes before you get put on by yourself. So I've just been doing lots of conveyancing, like, so property and land and all that stuff. Selling and buying and wills and powers of attorneys and some agreements and contracts. So like mainly commercial and conveyancing. Yeah, a little bit of family, but mainly just like contracting out agreements and like separation. Yeah.","c":4,"n":6,"i":"pay","s":7},{"id":"Judy-000532-002","p":"Judy","t":"00:05:32","q":"Yes. Yeah, I'm working in a firm. Probably would say it's a medium sized firm. Like it's not a massive one like you hear, I don't know, [large national firms]. It's not something like that. But it's still has a few offices spread out like I think it has. It has four offices. Now, even though some offices only have like four people, it's still like a little bit. It's trying to get bigger. So yeah, it's.","c":1,"n":4,"i":"work_content","s":44},{"id":"Judy-000557-003","p":"Judy","t":"00:05:57","q":"A decent size, big enough to learn but not too small to the point where you feel like you're like stuck, you know? Yeah.","c":4,"n":6,"i":"pay","s":50},{"id":"Judy-000615-004","p":"Judy","t":"00:06:15","q":"It was.","c":9,"n":7,"i":"procedural","s":16},{"id":"Judy-000618-005","p":"Judy","t":"00:06:18","q":"In its start of November.","c":1,"n":4,"i":"work_content","s":12},{"id":"Judy-000621-006","p":"Judy","t":"00:06:21","q":"Cool. Yeah. Just because of the break. The. Yeah. Only has one, like, barely any admissions because it's so unpopular. So it had to wait till there was an admission date that was available, which was February the year after.","c":0,"n":4,"i":"work_content","s":50},{"id":"Judy-000641-007","p":"Judy","t":"00:06:41","q":"Yeah, it's like it's it's wholesome and easy. But at my age or our age, I feel.","c":2,"n":4,"i":"work_content","s":71},{"id":"Judy-000647-008","p":"Judy","t":"00:06:47","q":"It's missing that little bit of social factor, like just something to feel like you're actually living and not just, like, settling.","c":0,"n":4,"i":"work_content","s":56},{"id":"Judy-000717-009","p":"Judy","t":"00:07:17","q":"Yeah. You mean just like the admission or like the whole. Like at the very beginning, studying.","c":2,"n":4,"i":"work_content","s":43},{"id":"Judy-000726-010","p":"Judy","t":"00:07:26","q":"So I actually, well, after high school, I took a few gap years, and I started dentistry. And so I wanted to get into the sciences and but I always liked the idea of, like, like the movies having, like, a coffee and walking around in, like, a fancy suit in, like, New York City kind of vibe. And but I because I'm not like, I didn't grow up in New Zealand, I feel like my English was never good enough to like, I just didn't think I was smart enough to to be a lawyer because of all the English and all that stuff.","c":83,"n":35,"i":"migration","s":100},{"id":"Judy-000803-011","p":"Judy","t":"00:08:03","q":"Germany. I'm German. Yeah. So. But my English is like. It's good, like. But it's just. I thought I was gonna. It's. I never really appealed to me because none of my family members are in law or anything like that, so it never really was something I would even think about. And then I after I went back to New Zealand and studied first year health science after coming back from Germany. And then I realized that, oh, I don't really think science is my thing. Like it's not it's interesting, but it's too unrealistic in the sense that I can't see everything. Like it's just tiny atoms and stuff and like, like I need something that I can I can see and make, like, something practical. Something real realistic. I mean.","c":83,"n":35,"i":"migration","s":80},{"id":"Judy-000852-012","p":"Judy","t":"00:08:52","q":"Yeah, yeah. And it make for me to make sense. I need to be able to like, see how it functions. So I attempted first year law and I made it. And because I liked the like everything in life runs on like laws. I mean, society is kind of like the reason society functions is because it's made, even though it doesn't always benefit everyone. It's just the fact that we have laws helps us function. So it's it's kind of fascinating how the law shapes everything. And like politics and policies and all that stuff is like so central to his life. So that was really interesting that I could understand how society is structured and how things evolve. So yeah, that's kind of, I guess what made me like it. Yeah. Yeah. Like real case scenarios, I guess.","c":22,"n":18,"i":"autonomy","s":0},{"id":"Judy-000947-013","p":"Judy","t":"00:09:47","q":"Like I try.","c":9,"n":7,"i":"procedural","s":24},{"id":"Judy-000951-014","p":"Judy","t":"00:09:51","q":"Yeah. It's interesting. People interactions are super interesting and people personality and like their reactions and stuff. I'm not an expert, unfortunately, but it is interesting to see how people react to certain things and how yeah like yeah like that.","c":109,"n":14,"i":"privilege","s":0},{"id":"Judy-001012-015","p":"Judy","t":"00:10:12","q":"It was 2019. Yeah. Because I, I graduated high school in 2015. So I did two years, did some, and then I did first year outside 2018. So that 2019 was my first year law. Yeah.","c":50,"n":23,"i":"transition","s":12},{"id":"Judy-001032-016","p":"Judy","t":"00:10:32","q":"If you do it full time, it's four years. I did two different degrees. I did Bachelor of Arts, majoring in Spanish as my other one. So I took an extra year. And I also did an exchange for a semester. So I think I added on another semester because I couldn't do law on exchange. So I definitely took my time. But yeah, I think I don't even know, probably all lab, especially since I did like first year outside. It felt like a longer time.","c":1,"n":4,"i":"work_content","s":96},{"id":"Judy-001107-017","p":"Judy","t":"00:11:07","q":"But I, I liked being a student because, I mean, I didn't have to do the 9 to 5, and. Yeah, I was enjoying my freedom. Yeah, yeah.","c":17,"n":5,"i":"balance","s":5},{"id":"Judy-001118-018","p":"Judy","t":"00:11:18","q":"So I guess because you're at our like, I guess maybe this generation or this like this time of day, you don't want to rush into working because once you work, you kind of just lose that freedom a little bit.","c":135,"n":39,"i":"generation","s":50},{"id":"Judy-001130-019","p":"Judy","t":"00:11:30","q":"Yeah, definitely enjoying it.","c":6,"n":7,"i":"procedural","s":33},{"id":"Judy-001141-020","p":"Judy","t":"00:11:41","q":"Yeah, I think I struggled a lot. I'm not going to lie, it was very difficult. I felt like an imposter most of the time because I just. The legal language is so different to, like, everyday English. And on top of not being, like, very good English. And it's like old English, I really didn't understand law half the time. Like, it just didn't make sense to me the way it was worded and things. But I think over the years I learned to just kind of study better and not study. I studied a lot, but I didn't feel like I studied efficiently. So over the years I got a bit more relaxed about it and more confident, which meant I was able to enjoy uni a bit more because I was just a bit more confident in how I studied and the content and things. So yeah, it was difficult, especially the first few years.","c":72,"n":15,"i":"rejection","s":57},{"id":"Judy-001235-021","p":"Judy","t":"00:12:35","q":"But like yeah, I think it's just the I didn't read much as a kid either. So I think that if someone reads a lot as a kid, especially in English, it would help a lot because you have a lot of reading. So yeah, it was difficult, but I think it was enjoyable once I found like my friend group and my like my routine and had like a part time job next to uni, which really helped kind of balance out that just studying and for sure.","c":59,"n":23,"i":"transition","s":10},{"id":"Judy-001303-022","p":"Judy","t":"00:13:03","q":"So it definitely grew on me, the experience. I didn't enjoy it at first, but it was definitely getting better.","c":3,"n":4,"i":"work_content","s":59},{"id":"Judy-001320-023","p":"Judy","t":"00:13:20","q":"Yes. It didn't help me. I haven't, I haven't like followed that pathway to that course. But I think like law and medicine and law on immigration was very interesting because it was because I have I was interested in science a lot and like medicine when I first like like during high school and stuff. So I feel like I could it was more understandable to me. How law is involved in medicine and how actually important of a role it is, but also how divided like those two fields are, because from a someone who doesn't have any medicine experience being like making decisions on legal things, it's actually such a divide. Like it's so that was really like something that was interesting and also law and immigration because I guess I am an immigrant essentially. So it was interesting that how the process works and how the laws change and international like how immigration works around the world as well, because there was some international law too. Yeah. So there was I thought that was interesting, but I haven't I think there will be more into policies rather than actually working in a law firm. So I haven't there might be something for the future, but not something at the beginning where I want to know the ropes of the basic bread and butter of lawyers, basically.","c":35,"n":35,"i":"migration","s":50},{"id":"Judy-001448-024","p":"Judy","t":"00:14:48","q":"I think I was in my third year. I applied to, like, everywhere, like I tried all, all the [city] firms, all the [another city] firms and I don't I think I tried some and I didn't want to go back to [provincial city], but my parents were there, so it would have been really easy living situation. I wouldn't have to worry about accommodation. Yeah. And I got declined basically everything because I was only third year and I didn't have any connections. And law is very connection space. I found out later everyone seemed to have an uncle, or even a parent or a sister who was working in a law firm who owned a law firm, so they all had that connection. But I didn't, but [provincial city], there was one firm that asked me for an interview because I was from [provincial city], so maybe they they had heard of my name from like, I don't know, whatnot. So I did get a clerkship with them. It wasn't much of clerking. It was more like admin stuff and like scanning and organising like the, the staff events. But it was still exposure to some degree. I was still like in the environment. And I got a.","c":90,"n":3,"i":"networks","s":70},{"id":"Judy-001602-025","p":"Judy","t":"00:16:02","q":"Yeah. And it got my foot in the door because that's the firm I actually am working at now because, yeah, they they wanted me back for a second summer so I could kind of they could get to know me and they were confident that I would fit into the team kind of thing. So yeah.","c":7,"n":0,"i":"big4","s":33},{"id":"Judy-001619-026","p":"Judy","t":"00:16:19","q":"So I guess, yeah, I wouldn't if people don't have connections, it's kind of hard to get. At least you're an A+ student. Probably. That would be like a whole different thing. But I wasn't an A+ student and not many people are, I think, in law.","c":88,"n":3,"i":"networks","s":36},{"id":"Judy-001643-027","p":"Judy","t":"00:16:43","q":"You.","c":5,"n":7,"i":"procedural","s":10},{"id":"Judy-001646-028","p":"Judy","t":"00:16:46","q":"I think every, every field has had its own difficulties. Like no one's harder than the other. It's just their own hard.","c":2,"n":4,"i":"work_content","s":75},{"id":"Judy-001717-029","p":"Judy","t":"00:17:17","q":"You mean? Oh, the initial interview for The Firm.","c":7,"n":0,"i":"big4","s":23},{"id":"Judy-001843-030","p":"Judy","t":"00:18:43","q":"It was daunting. I had no experience of interviews at all. The good thing is it's [provincial city] and everyone's a little bit more relaxed and. Yeah. And it turned out that the, the the person who was taking my interview, she was actually a mother of a guy I went to school with. I didn't know the guy well, but it was kind of like.","c":19,"n":2,"i":"interview_process","s":100},{"id":"Judy-001741-031","p":"Judy","t":"00:17:41","q":"My son went to school with you. And I was like, oh gosh, here we go. But I had a good reputation at school, so that was helpful.","c":67,"n":11,"i":"status","s":94},{"id":"Judy-001748-032","p":"Judy","t":"00:17:48","q":"Liked it, but it.","c":6,"n":7,"i":"procedural","s":33},{"id":"Judy-001749-033","p":"Judy","t":"00:17:49","q":"It was all about, I don't know if they cared about my grades as much. I think they cared more about how I presented myself. So, like, I shook their hand and I felt and I came across professional and eager and also confident, but not too cocky or anything, like I just I just really wanted to learn and impress them. And I think that kind of worked well with them. Yeah, yeah. I think also they want to know that you can stay with them. So I, I had to like I didn't I didn't lie in the sense I said, oh, I would love to stay with you and build my career at your firm. I just said, like, I'm open to anything. Like, I just want to get in and learn. Yeah.","c":4,"n":6,"i":"pay","s":57},{"id":"Judy-001837-034","p":"Judy","t":"00:18:37","q":"So I was trying to be honest, but not, like, blow everything up and say, yeah, like.","c":0,"n":4,"i":"work_content","s":41},{"id":"Judy-001854-035","p":"Judy","t":"00:18:54","q":"Did I feel like I had confidence because it's a smaller firm and they need they needed I guess new lawyers to come through. So because the there was like the older the partners were all like older people who were like retiring eventually. So I think they were really looking and it helped that I guess I was like polite and like professional because some people, I think they come into a job and think like, oh no, I got this. I just, I can just be cool and casual and like, you know, and then they're too confident. And I think that kind of throws them off because they want someone who actually cares and not takes it for granted. I don't know, I'm just speculating, but I assume that's what helped.","c":41,"n":25,"i":"confidence","s":29},{"id":"Judy-001957-036","p":"Judy","t":"00:19:57","q":"Well, only I only had that because the interview was like in the middle of the year during like I was down in [provincial city] to visit my parents, and then I would have started like at the end of the year after the semester ended. So I, I think I'm pretty sure I just, I took it straight away because I was it was a good chance to be in [provincial city], I guess that year. And I didn't have I like, decided to focus on my career rather than use it holiday to travel or something, because I had done that the year prior. So yeah, I didn't have much thinking. I think I just because I, I already thought that if I, I wanted to do a summer class, I already thought about it when I applied for it. So when I did the interview, I didn't have much weighing to do. I just wanted the job.","c":21,"n":2,"i":"interview_process","s":33},{"id":"Judy-002051-037","p":"Judy","t":"00:20:51","q":"Not like I had any options. There's only one option. So yeah.","c":1,"n":4,"i":"work_content","s":36},{"id":"Judy-002105-038","p":"Judy","t":"00:21:05","q":"And I didn't I in my first year, I didn't really I had one one friend because I, like, I didn't go to a hall at all. And so I kind of think I lost that connection. I didn't get that connection to people. And I just happened to meet this person because she was my age and she had studied something else prior as well, so we kind of connected on that. She ended up not passing the first year twice, so she ended up moving to [another city]. So when I got to the third year, I had made some new friends, but I didn't have that much of a connection with them because there were a lot younger. And they had it was just like a different there were different mindsets because I, I mean because, I don't know, I feel like when you get older and you've done the gap years, like you look at life differently and I think there were some things that we just I couldn't connect with them, but I did have some them to I could ask them questions about law and like some legal stuff eventually. And we grew closer towards the end. But in my third year I think it was still I didn't feel comfortable asking them about jobs because of the competitiveness and stuff.","c":72,"n":15,"i":"rejection","s":29},{"id":"Judy-002217-039","p":"Judy","t":"00:22:17","q":"So no, I didn't have anyone I could ask about that. I heard about people like getting clerkships and all that stuff. And I was like, how did they get that? But yeah, I didn't have anyone to, like, ask and compare and like, give me insights or anything. Yeah.","c":3,"n":4,"i":"work_content","s":22},{"id":"Judy-002241-040","p":"Judy","t":"00:22:41","q":"I think it's unnecessarily competitive. Like, I get that people are in the first year. I understand because, like, it's like a, you know an average like the top 200 get in. So you have to get a good grade. But I feel like the like after that, people still had that competitive mindset. And it's sad because we all just kind of trying to get through. So it would make a lot more sense if people like helped each other out. But I think there was still this like I guess the the typical lawyer as well is quite a competitive person because they want to be the best. So I think that some people just like had that attitude and it was kind of like, you know, you couldn't really ask questions. People were like gatekeeping things. So I think they're kind of in the third year was still quite prominent. Maybe it died out in fourth year, but because people were like focusing on other things as well, not just law, but yeah, I think they played a big role as well.","c":47,"n":15,"i":"rejection","s":0},{"id":"Judy-002351-041","p":"Judy","t":"00:23:51","q":"I asked, like my parents look at my CV and my siblings, and I don't know if I had my partner at the time I had him look, he was like Kiwi. So his English was better. So I was like obviously ask him for help, but I guess most of them haven't done a professional interview in such a long time, especially in the legal field. That was kind of like they couldn't give me pointers about the interview. More like more just the CV and stuff. But I'm pretty sure actually I did like go to like a workshop where they like a law firm, some, some of the, like, bigger law firms would come to law school and like advertise, I guess. And they would do like a introduction session. So I would just go to them and sit down and hear them talk about first year like at the firm and stuff like that. So I think they kind of helped a little bit as well, just like hearing what the recruit people maybe are looking for in people. Yeah. And all that stuff. But yeah, maybe that's where I got some, some confidence or some advice from as well. Yeah. I just remember that now. Yeah.","c":23,"n":30,"i":"ethnicity","s":0},{"id":"Judy-002520-042","p":"Judy","t":"00:25:20","q":"That's a good question. I feel like I know the answer to this, but now I'm kind of, like, unsure. I feel like I did look at the future because I just knew I didn't want to be in a job I didn't enjoy. So for me, it didn't matter if I was like, making lots of money, I wanted to enjoy the job. So I think when I was listening to those talks, I subconsciously always thought, okay, is this something I can maintain? Is this going to make me happy? Or is this just like people trying to climb the ladder and they are going to neglect their, like, balance their social life or their like themselves to get there? Because that is kind of the expectation of the big firms that you work till like 10 p.m.. Because you, you want this job, you know, and your aim is to be partner. So I kind of was aware of like, I don't want to get in the wrong I don't want to start wrong and then can't get out of it. So I was aware of that, I think. Yeah. But I also was know that I just needed a few years of experience and then I can kind of choose for myself as well.","c":4,"n":6,"i":"pay","s":27},{"id":"Judy-002643-043","p":"Judy","t":"00:26:43","q":"I think it was just professional talks. I didn't I wasn't following like any Instagram influencers doing law, like working in law. Not that I know of. Or there was actually one YouTuber who ended up quitting law and becoming a content creator, but the fact that she was even like YouTubing, like doing YouTube while doing law kind of already meant that she wasn't like the kind of person who would do like, the typical legal career. But yeah, it was mainly the professional talks that I got that I guess because people like people. I wonder if people, like, had parents and stuff. They were in law who would say that. But yeah. Many professional talks and like, just you just kind of got that, that you heard it over the years that.","c":12,"n":19,"i":"leaving","s":0},{"id":"Judy-002729-044","p":"Judy","t":"00:27:29","q":"You have to work hard. You have to prove yourself. No, you know, like, you just kind of have to give up your life, basically. Like, there wasn't much focus on your health. Like, they kind of did say, like, focus on your mental health, but they kind of mean that you shouldn't be working that hard. That means you can't climb the ladder, basically. Like if you want to focus on your on your health and, you know, it's still very like hierarchical and patriarchal system of like, you know, like if you're if you're a female, for example, and you get pregnant you're more, less likely to like, be able to climb the l
