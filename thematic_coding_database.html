 be 90% of the way through and just fucked it up. And now they are at a point of maturity where they know what I'm going to tell them. They know what they need to consider. And now they're just calling me for a sense check.","c":30,"n":17,"i":"learning","s":33},{"id":"Eliza-003831-072","p":"Eliza","t":"00:38:31","q":"Which is amazing. But I'm kind of... I was feeling a little bit like. I was like, I'm kind of feeling like I've done myself a bit out of a job. But it was good for this year because it made me able to focus on other things, focus on the course and kind of get through it. Then we got restructured and basically they decentralized a company in two weeks. And we're now in that space.","c":82,"n":36,"i":"security","s":100},{"id":"Eliza-003909-073","p":"Eliza","t":"00:39:09","q":"On a Friday in June. So this is mid-June. Friday we got an email to say that we'd moved into another division in [company]. So I don't know if you know much about [company], but it's a beast.","c":45,"n":36,"i":"security","s":88},{"id":"Eliza-003927-074","p":"Eliza","t":"00:39:27","q":"So you've got [company] Corporate and then underneath that you've got divisions. So you had concrete division, Building Products Australia division. And there was another division as well. Within those divisions, sit the businesses. So within building products you'd have [brands], blah blah, blah blah blah.","c":0,"n":4,"i":"work_content","s":66},{"id":"Eliza-003953-075","p":"Eliza","t":"00:39:53","q":"So on the Friday, an announcement came out and they basically said, we're reshuffling the divisions so we won't have an [international] division because we're going to move them into one of the other divisions, and we're just going to change the names. So rather than building products, we've got heavy building products and we've got light building products which are still, you know, certain heavy. And we kind of went okay, same, just a different [country office]","c":3,"n":4,"i":"work_content","s":54},{"id":"Eliza-004020-076","p":"Eliza","t":"00:40:20","q":"Right. So that was Friday. Will I call. And we just have a different South African we report to literally.","c":3,"n":4,"i":"work_content","s":65},{"id":"Eliza-004027-077","p":"Eliza","t":"00:40:27","q":"[the next week] Tuesday we got an invite to a restructure meeting. Wednesday we got told that as of July 1st there would be no [current division]. [brand divisions listed]. And they said each of those will be a business unit rather than a brand. Everyone all of the support functions who sit in [division]. So health and safety PMP finance will be reallocated into the brands. And also we're selling CSP.","c":58,"n":36,"i":"security","s":100},{"id":"Eliza-004107-078","p":"Eliza","t":"00:41:07","q":"They gave the bare minimum time for feedback. They got the feedback and from the feedback... And to show how well they understood the business, we had people in my meeting who were no longer in the business. So they had invites and they were like, oh, it bounced. And we're like, yeah, they left the business six months ago. So they really took their time, this new division, to get to know the business [sarcasm].","c":3,"n":4,"i":"work_content","s":54},{"id":"Eliza-004133-079","p":"Eliza","t":"00:41:33","q":"So yeah, they listen to us somewhat because we were like health and safety. Geography is the big thing. Like I said, I went from South Island and my range is now increased. Yeah. So we're meant to be cutting costs, but now I have more travel. Which is not something I wanted if I'm potentially looking at having kids.","c":1,"n":4,"i":"work_content","s":56},{"id":"Eliza-004156-080","p":"Eliza","t":"00:41:56","q":"Yeah. So, yeah, they did all that. They changed some of the roles and some of the titles. So they brought in health and safety managers into the brand rather than just having business partners. But that's the only change they made. And then as of July 1st, they went, we're done. And we're still dealing with the fact that we have things that were booked in June before this happened. Now being invoiced, we've got no one to pay the invoices. The cost centres don't exist. We've had to actually separate like the systems that this cuts. So they have literally gone by the end of. I think I found out what brand I sat in on the 29th of June. So 29th of doing this was official as of 1st of July. This is supposedly what's happened.","c":32,"n":11,"i":"status","s":73},{"id":"Eliza-004254-081","p":"Eliza","t":"00:42:54","q":"And I have no one to... I don't even have people to hand over to. Like there's no one else that sits in the South Island for health and safety. So it's not my job, but it is my job.","c":1,"n":4,"i":"work_content","s":76},{"id":"Eliza-004316-082","p":"Eliza","t":"00:43:16","q":"And was [double workload] for all of July. I've now drawn a bit of a line in the sand and kind of gone if you're not [division], like good luck, I'll refer you to someone else. But yeah, it's a completely different world, and it feels like we have gone back to square one. All of the work that we were doing, and all the systems and processes we built are no longer sustainable.","c":26,"n":16,"i":"values_fit","s":50},{"id":"Eliza-004409-083","p":"Eliza","t":"00:44:09","q":"It's been huge. Like I've had I got my jaw surgery to stop my migraines. I have not had a migraine since the surgery until this restructure. So, like, physically, I've spent... I spent two days in bed with a migraine. Couldn't get out of my, like can get out of bed. Was in too much pain. And I'd be like, that's because of the restructure. Just motivation. So low.","c":43,"n":36,"i":"security","s":100},{"id":"Eliza-004449-084","p":"Eliza","t":"00:44:49","q":"Gone. Yeah. And so much of the tasks. Because the other thing as well is I'm, I'm at a senior ish level role. There's no one below me in my brand anymore.","c":3,"n":4,"i":"work_content","s":65},{"id":"Eliza-004509-085","p":"Eliza","t":"00:45:09","q":"And the junior admin role. So I've eaten up that admin role. And when you have no strategy, you end up doing the menial admin tasks because that's the only immediate value you can add. We couldn't plan more than a day out, so I've spent a lot of it going right. I'll book the training. I'll send the invoice. I'll... All of the things that I hated. So I'd say I've regressed to where I was when I very first started.","c":0,"n":4,"i":"work_content","s":94},{"id":"Eliza-004608-086","p":"Eliza","t":"00:46:08","q":"I was probably when the restructure happened, that was probably me going, I'm pretty done. That was like, I'm pretty done point. But I was very trapped. Because I've been paying for my course, I couldn't voluntarily Literally life. So I was like, okay, I just need to make it out of this with a job to finish this course. So it was just it was about making it to the end of the year. And I was like, once I make it to the end of the year, push that slightly... Getting married in February, basically get past the wedding and then I'll make a decision. So it's just survival mode. But knowing that this was not what I wanted anymore.","c":58,"n":36,"i":"security","s":90},{"id":"Eliza-004647-087","p":"Eliza","t":"00:46:47","q":"And then it was. It was... I was just going to say it was when we had the Defence Force come into course, then I was like, oh, that door's wide open again.","c":2,"n":4,"i":"work_content","s":75},{"id":"Eliza-004716-088","p":"Eliza","t":"00:47:16","q":"Being probably being very vocal, is the main thing. So my poor boss is probably getting like she. She was deeply concerned and tried to refer me. She was really worried about my mood. I said it's not. I said, it's not my mood, it's the situation I then.","c":1,"n":4,"i":"work_content","s":76},{"id":"Eliza-004747-089","p":"Eliza","t":"00:47:47","q":"Well I was like I guess I am. Because I think it was, it was the first time in a very long time I had expressed I am not happy, I do not like this, I do not want to come to work. And she was kind of like, oh, maybe we should get you to go see someone. And I said, it's actually not what I need. Yeah. I said, because I can't change the situation. And I said, I can reframe. I said, look, I could, I could try reframing. I could go see a clinical psychologist. I could look at reframing this and reinterpreting the way and seeing the world. I, I said. But it's not actually affecting me in any way outside of I do not like my work. I'm letting you know I don't like my work.","c":1,"n":4,"i":"work_content","s":48},{"id":"Eliza-004828-090","p":"Eliza","t":"00:48:28","q":"It's not a helpful exercise as like, if I dip from this, then sure, there will look at that. But it wasn't stopping me going to the gym. It wasn't stopping me doing the things that I wanted to do. I guess. Yeah. Realistically, it's just been planning a lot of planning going. Right. What do I need to do for the course? And how do I make work fit into the course on those days when I've had literally nothing to do, I've gone right. Today's a day to do some coursework, then... which was never something I would ever have done before. Like I was very much into weekend when I write my assignments, weekends when I do this. And I was like, actually, you know what? I'm not doing anything of value [at work].","c":3,"n":4,"i":"work_content","s":68},{"id":"Eliza-004954-091","p":"Eliza","t":"00:49:54","q":"And yeah, it's a little bit of everything. Like, I think one thing I'm doing is I've always been really lucky in having a very flexible boss. So I've probably found my work life. We don't talk work life balance anymore. We talk about work life integration. My integration levels are through the roof.","c":17,"n":5,"i":"balance","s":100},{"id":"Eliza-005018-092","p":"Eliza","t":"00:50:18","q":"So I will... Now I'm kind of tracking my hours, which isn't something I would normally do. I'd just be like, oh, I've had a really big week. I'll just finish a bit early. I'm tracking my hours and they're all over the place, so I just plan my week as a week. If I got Monday to Sunday, and within that time I've got 40 hours of work related stuff, or if I can make my course and my work stuff beautifully aligned, then that. That's the goal. So how do I take a task or make it relevant for both? But yeah, like I was doing assignments on Saturday morning and then Saturday, Monday I was doing some work stuff.","c":1,"n":4,"i":"work_content","s":56},{"id":"Eliza-005059-093","p":"Eliza","t":"00:50:59","q":"And then like, I've just found an order for me to not hate what I'm doing. I need a lot more flexibility. And when I do things so I will not be in the office between 4 and 5, because that is when I need to go to the gym for me. So if you want me, you can reach me after five. Or you can hit me up the rest of the day. But yeah, I've just had to plan my week to fit everything in and not go right. Because normally I'd work eight till 4 or 730 till 330, but I'd kind of do my block of hours in one go, and now I've just thrown them all over the place.","c":17,"n":5,"i":"balance","s":59},{"id":"Eliza-005156-094","p":"Eliza","t":"00:51:56","q":"And everything's very last minute. So I've like the, the meeting, this meeting that I had to reschedule. I normally have my travel booked two months out. So you could ask me now literally you could ask me now what I'm doing between now and Christmas, when I'm in Christchurch, when I'm not. And I could tell you. Yeah. And I can't do that currently because of this restructure.","c":43,"n":36,"i":"security","s":100},{"id":"Eliza-005219-095","p":"Eliza","t":"00:52:19","q":"Yeah, it's very different. And it's the last minute ness of it that I hate. But in order to kind of make that work more for me, that's what I found I have to do is I need to look at it actually for more of a week perspective so that I can take a big chunk off by say, oh, we need you in Nelson tomorrow and I can. Yeah, yeah, throw something else away.","c":0,"n":4,"i":"work_content","s":75},{"id":"Eliza-005305-096","p":"Eliza","t":"00:53:05","q":"I guess my clarification question is what I leave behind or what I'm going to?","c":8,"n":7,"i":"procedural","s":92},{"id":"Eliza-005318-097","p":"Eliza","t":"00:53:18","q":"No, no, it's all good. I don't think I have a specific. 'I want this role'. The defence force is still. I mean, if I, if I was going to say a role, it would be going into the defence force. That's still something that I would like. But again, it's timing. When do I do it? What does next year look like? What does it bring? Are there other opportunities? I guess something that doesn't feel doesn't feel like a step backwards or like a huge step backwards. Like a little setback to go forward is fine. But I think just something that is going to keep me interested. So I need something that I do not know all of. I [don't want] I was like, oh, that puts me up as a great candidate. I basically need a role that I can do 60% of and no more when I apply for it. I need just enough to get me over the line and then go, oh, she can maybe do it. But if I if I look like a great candidate, I'll probably be bored out of my mind.","c":38,"n":18,"i":"autonomy","s":0},{"id":"Eliza-005450-098","p":"Eliza","t":"00:54:50","q":"I think somewhat, probably less so. I think... It's weird. I thought it was maybe before I adopted my science mindset, it was probably very like whimsical and oh, every so and so years it changes. I have a good few years at school and then I have a bad few years at school. It's not, that it is. Primary school fitted me better because you had the opportunities to seek things out. Whereas high school, not so much. So I found, high school didn't work for me. I don't think I thought things out, and I think I was just getting through.","c":16,"n":2,"i":"interview_process","s":100},{"id":"Eliza-005538-099","p":"Eliza","t":"00:55:38","q":"Like NCEA I did not work for me.","c":0,"n":4,"i":"work_content","s":25},{"id":"Eliza-005556-100","p":"Eliza","t":"00:55:56","q":"And then got to university thinking I was going to do terribly because I was like, well, high school, like, I wasn't awful at high school, but I was like, middle of the road.","c":3,"n":4,"i":"work_content","s":49},{"id":"Eliza-005610-101","p":"Eliza","t":"00:56:10","q":"Yeah. And then went to uni and I was like, oh that's sweet. And I like that. And that's works for me. So I think like that is definitely a problem in our schooling system. There's not that it doesn't set you up well for it. So I think it was probably only uni. And beyond that I identified that as a, as a thing for me because high school definitely did not help me know who I was or what kind of learner I was, or what I needed or what I wanted at all. I just got good advice to stay broad because I wanted to drop math. Like really wanted to drop math, like I do not like this. And my dad was just like, math is everywhere. Don't do that to yourself. Pick which, pick which type you hate the least and keep it. But you can't just drop it. Yeah.","c":4,"n":6,"i":"pay","s":37},{"id":"Eliza-005716-102","p":"Eliza","t":"00:57:16","q":"Across the board, I think.","c":3,"n":4,"i":"work_content","s":14},{"id":"Eliza-005724-103","p":"Eliza","t":"00:57:24","q":"We had a hybrid course, so we had stats and calc. I think I did stats and then I did stats and calc or stats and calc and then I did stats.","c":112,"n":5,"i":"balance","s":100},{"id":"Eliza-005837-104","p":"Eliza","t":"00:58:37","q":"I think it's just one of those like just concerns like that. But you've just got to do it... Like I was like oh I went up like this and like I've tried to think of all the plans and everything, but at the end of the day, the problem we have is you have no idea when you're going to get pregnant and you have no idea what your pregnancy is going to look like, and you have no idea what your birth is going to look like, and you have no idea what your kid is going to look like.","c":0,"n":4,"i":"work_content","s":44},{"id":"Eliza-005905-105","p":"Eliza","t":"00:59:05","q":"And so I've kind of just gone. It'll be what it'll be. And I've chatted to a lot of I think that. Yeah, the best thing that's helped is chatting to other women and seeing what they've done.","c":1,"n":4,"i":"work_content","s":60},{"id":"Eliza-005942-106","p":"Eliza","t":"00:59:42","q":"Because she needed to keep a bit of her and a bit of her career with that. And she said she had a good pregnancy, she had a good birth, and she was in a position she could do that. Yeah. But she said the decision to do that happened the day she got home from the hospital.","c":84,"n":10,"i":"decision","s":79},{"id":"Eliza-010002-107","p":"Eliza","t":"01:00:02","q":"But I was like, I think there was so much of that. Like, I've always joked that when I'm on maternity leave, that's when I'm going to get my PT qualification.","c":94,"n":38,"i":"family_planning","s":60},{"id":"Eliza-010013-108","p":"Eliza","t":"01:00:13","q":"But I think, yes, I think for me it's flexibility. Yeah, it's building a job that is flexible enough that I can continue to do my slotting everything in. Like I had four jobs when I was at uni before I... And that seems to be what works for me is just having a little bit of everything.","c":17,"n":5,"i":"balance","s":64},{"id":"Eliza-010032-109","p":"Eliza","t":"01:00:32","q":"So I think trying to keep it.","c":1,"n":4,"i":"work_content","s":8},{"id":"Eliza-010037-110","p":"Eliza","t":"01:00:37","q":"Yeah, yeah. But yeah, you just can't you can't pick when it will happen. And I'm like, my partner's a bit older so I doubt he wants to just keep waiting. And I've now definitely seen you're never going to get to the perfect point. There's always going to be always going to be hard.","c":3,"n":4,"i":"work_content","s":51},{"id":"Eliza-010057-111","p":"Eliza","t":"01:00:57","q":"Yeah, even I was like, I had genuinely set myself up where I was like, if I finished this course, we could have a kid and works great. And then work just changed.","c":3,"n":4,"i":"work_content","s":49},{"id":"Eliza-010111-112","p":"Eliza","t":"01:01:11","q":"And then everything for us is we're really lucky and that he's got a huge, huge family. So like, there's always going to be people who can help, a lot of support.","c":3,"n":4,"i":"work_content","s":59},{"id":"Eliza-010222-113","p":"Eliza","t":"01:02:22","q":"And like you, you might have the best laid plans. And you try and it takes years. Like, yeah my friend thought she was going to have a terrible time first. First. And she had PCOS and everything. Like, they were like, we need to start trying now.","c":3,"n":4,"i":"work_content","s":30},{"id":"Eliza-010244-114","p":"Eliza","t":"01:02:44","q":"Yeah. So although I love my plans, I think actually I just need to wait and see what situation I end up and, and then plan from there.","c":3,"n":4,"i":"work_content","s":89},{"id":"Eliza-010300-115","p":"Eliza","t":"01:03:00","q":"I was going to say, I hope it's. Yeah. I hope.","c":3,"n":4,"i":"work_content","s":43},{"id":"Eliza-010358-116","p":"Eliza","t":"01:03:58","q":"Don't study for it. so if I'm looking, if I'm looking from the health and safety lens problem with health and safety, right. There's no good there's no good career pathway into it. There's no good training. I've got a colleague who did a master's in health and safety because apparently that's the thing I didn't know. And she's now gone through to the year younger than me. So in the four years she's now been to four different companies. So she is really struggling. And I think a lot of it is for how she was set up in that course. So she seems to think that people are rational and that if you tell them something, they'll go, oh my goodness, that's the best idea. I've never thought of that before. And they'll just go do the thing.","c":1,"n":4,"i":"work_content","s":76},{"id":"Eliza-010452-117","p":"Eliza","t":"01:04:52","q":"And so she's constantly pushing it uphill and like really struggles because she's like but I'm telling people to look after their own health and safety. Like why are people not doing it? So I think it would be if you want to get into health and safety, why? What is your driver would be my first thing I'd like? Find out what your why is, that's super important because if you were trying to change hearts and minds, you need to be very clear yourself about why this is important. And if you're not actually passionate about it or you're not going to be authentic, you won't shift anything. So if you're doing it because you think you'll get a good pay check, think again. Just find another job.","c":73,"n":31,"i":"purpose","s":80},{"id":"Eliza-010604-118","p":"Eliza","t":"01:06:04","q":"There's no protection in the industry. So that would be my health and safety advice. My org psych advice would be fairly similar. Chat to people who do the role to determine if you want to have a good understanding of the pathway and what that looks like. Because I think that's where we are really heard as people go through their entire career going, I want to do psychology, I want to work with people. And then they go, oh shit, I don't know if I want to do clinical or I'm going to get into clinical or I didn't get into clinical. And then they go, what else? And then they look at apsy, then they don't understand and they think that they will get the cookie cutter job.","c":39,"n":28,"i":"advice","s":91},{"id":"Eliza-010651-119","p":"Eliza","t":"01:06:51","q":"Yeah. And it's not the cookie cutter job at all. No. No one understands what we do.","c":2,"n":4,"i":"work_content","s":71},{"id":"Edie-000056-001","p":"Edie","t":"00:00:56","q":"So I actually work at the university at the moment. I work in the communications and events and our marketing team. And for me, my, I guess general day to day is working on how do I explain this so I look after you might know this about the university, but we have a strategic vision that runs the whole university and that has chapters in it, and that's made up of like 5/6 chapters. And in comms, I look after the strategic part of the people in the organisational efficacy chapters. So a lot of my work is at the strategic level in terms of public relations. So how we appear in the public, how we appear internally as well and how we appear during a crisis, and then also how we talk about money, when we talk about money, what we talk about when we talk about money and then things like anything to do with major staff announcements, major student announcements anything around And like, what else do I do? I do a lot of writing, so taking research and turning that into media releases for the public or turning it into like articles or conversation, like helping with people with conversation. But most of my job now is at the strategic level. And I also do like operational communications for major events. So like, we just had graduation and all of the communications that came out for that were led through me. And yeah, does that give a good enough picture?","c":4,"n":6,"i":"pay","s":23},{"id":"Edie-000235-002","p":"Edie","t":"00:02:35","q":"So yeah, it's a big role. It's definitely busy. But yeah it's cool.","c":2,"n":4,"i":"work_content","s":46},{"id":"Edie-000246-003","p":"Edie","t":"00:02:46","q":"Like so. So I've technically been in the same role like job name wise for two and a half years. But the strategic element of that only came in about eight months ago. So the role I.","c":1,"n":4,"i":"work_content","s":68},{"id":"Edie-000301-004","p":"Edie","t":"00:03:01","q":"Is a little bit, but I technically still have the same title.","c":98,"n":11,"i":"status","s":0},{"id":"Edie-000428-005","p":"Edie","t":"00:04:28","q":"Yeah, it was the first one. So before [the university], I was working in the North Island at a council. And I was there also for two and a half years. And then I when I came back to [city], the first job I got was this one at [the university].","c":59,"n":23,"i":"transition","s":100},{"id":"Edie-000334-006","p":"Edie","t":"00:03:34","q":"Yeah. So to an extent, like I said, we had a much smaller team. So there was only like five of us in that team and we. So we had to do everything. And I would say it wasn't a traditional comms role. So you have, I guess, in the industry comms, you have kind of more traditional roles and less traditional. And that role was everything from like writing the content to also going out and like I had my drone license so I could go collect drone, create content.","c":2,"n":4,"i":"work_content","s":68},{"id":"Edie-000404-007","p":"Edie","t":"00:04:04","q":"I would be presenting to iwi as well, and also sitting at the strategic table, and then also being the person that hit send on like an email, which now I don't do any of that. Like in our role now it's very traditional. Like I don't do any of the like the admin stuff because I get basically whereas at the council, because there's only five of us, you did absolutely everything.","c":23,"n":30,"i":"ethnicity","s":70},{"id":"Edie-000428-008","p":"Edie","t":"00:04:28","q":"It was very much like being thrown in the deep end, which was great. Love that.","c":59,"n":23,"i":"transition","s":50},{"id":"Edie-000512-009","p":"Edie","t":"00:05:12","q":"So I vividly remember year 12 and 13 there being like only one session about not going to university. And I was always like, I don't want to go to university. I want to at some point, but I have no idea what I want to do. I'm so confused, like what's going on? At that point, I was going, I'm going to study psychology and go to [the university]. And that's kind of what I do, because that was the only thing I really had an interest in. And then I got to the end of high school and I was like, honestly, going to uni feels really easy. Like it just felt like all my friends were doing that. I didn't really want to do that. I didn't really want to pay money. So I booked a one way ticket to England?","c":4,"n":6,"i":"pay","s":57},{"id":"Edie-000555-010","p":"Edie","t":"00:05:55","q":"And when I was in England a friend of mine got me a job working at a homeless hostel, and I probably too quickly became a manager there, and I was working, I think originally, like 24 hour shifts. And I started lecturing at university. It was wild. And I was like, literally trauma informed care because we were all trained in trauma informed, all that kind of stuff. And so I started working in that and was like, you know, working with people who were overdosing. I think in my first shift there, someone committed suicide, like on my very first shift, like it was intense. And I was you.","c":3,"n":4,"i":"work_content","s":41},{"id":"Edie-000633-011","p":"Edie","t":"00:06:33","q":"I was so young. I was a baby. But like, looking back, the naivety of being young saved me from. Yeah.","c":1,"n":4,"i":"work_content","s":60},{"id":"Edie-000642-012","p":"Edie","t":"00:06:42","q":"You still think, oh, my God, everyone has so much potential and hope here. And to be fair, a lot of them actually did. And a lot of them have done really well. But a lot of people died. And.","c":3,"n":4,"i":"work_content","s":68},{"id":"Edie-000651-013","p":"Edie","t":"00:06:51","q":"And we're you know heavily abused as children. And you know the research coming out about the realities of being abused under the age of three and then what that means, you know, life, all of that was kind of coming out at that time. But I remember vividly thinking like what is the problem here that is stopping people from understanding homelessness? Because there was a really big mis, I guess, like misinterpretation of kind of the facts. And I realized that it was all down to what I thought at the time because I didn't know what comms was, was marketing. And so when I came back to New Zealand at the end of my visa, I very quickly was like, I'm going to go to university, because now I know what I want to do. That's marketing, because I think marketing is the way to tell people about problems. And so they understand what they are. And I wanted to go back overseas. So I went and studied at [a university] because they were the only accredited international school for marketing at that. So I think within two weeks I had moved back to New Zealand and then moved to the North Island. And that was like a very quick turnaround. And then. Yeah, like in my first semester, no first or second semester, I remember having a lecturer who told me all about how if you wanted to be a marketer, it meant that you had to accept you were going to be given, like if you wanted to do international, especially, that you were going to end up in situations where you'd have to like sleep with people you didn't want to sleep with. And so I. Oh my.","c":83,"n":35,"i":"migration","s":0},{"id":"Edie-000821-014","p":"Edie","t":"00:08:21","q":"Yeah. I argued with him a lot. He was the one lecturer who I consistently would argue with, which was hilarious because then at the end of the course, he was like, oh my God, you're my favourite student. You should come back. I think he just wanted to fuck me, honestly. Like, I think that's terrible, but I think he just like, I think he was flirting with me.","c":0,"n":4,"i":"work_content","s":66},{"id":"Edie-000838-015","p":"Edie","t":"00:08:38","q":"He's so chaotic. And so he made me go, oh my God, marketing is the worst thing ever. Why would I want to be in marketing? And at the same time, who was in comms? And she was amazing. And she was, like, one of the coolest people ever. And she also had the coolest fashion sense.","c":1,"n":4,"i":"work_content","s":92},{"id":"Edie-000902-016","p":"Edie","t":"00:09:02","q":"I was like, I love what she's wearing. And I kind of started to realize that comms was more of a path for me because more about subliminal, subliminal subliminal influence through, like, the written word. And that was really cool. And I thought that was, like, a much more strategic place to be at, whereas marketing was much more about selling people things you know, PR and all of that, as long as you can work for the right company is about how you be honest and.","c":3,"n":4,"i":"work_content","s":81},{"id":"Edie-000932-017","p":"Edie","t":"00:09:32","q":"Best way possible. And that was really interesting to me because a lot of it was more strategic and it was more media based. And then I was lucky enough to do a capstone course that was an internship, and I had two offers. One was with a magazine and one was with the council. And I, my God, who would want to work for a council? That's the most boring job ever. But then that the magazine one, I was like, oh, I don't really want to work for a magazine. And then by the time I kind of went, oh, I'll do the magazine, that internship was gone. And so I ended up and ended up, ended up being amazing. And they hired me after I finished my internship. And I was, like, so lucky to have gotten that job, but I was the only there was only one of two of us from our internships who actually got jobs because it was I think we were in like a bit of a recession because this was at the end of Covid.","c":44,"n":32,"i":"covid","s":68},{"id":"Edie-001027-018","p":"Edie","t":"00:10:27","q":"No one was getting employed. Like, yeah, the unemployment rate was really high. And normally the internship was like at 100% success rate. And at this time it was like a 2% success rate. So I was really lucky to get that job, and they really were amazing. Like, my boss just really let me kind of go and let me everything. And I got to flourish really quickly and I got to move up really quickly. And that was kind of. Yeah, that's I guess, the long story of how I ended up.","c":14,"n":9,"i":"mentor_good","s":63},{"id":"Edie-001116-019","p":"Edie","t":"00:11:16","q":"Yeah. So for the magazine, I was like, it, it was a rural. It was [a rural magazine]. I don't know if you've ever heard of that. No magazine. It's done really, really well since, like, it's it's really gone gangbusters kind of thing. It was in its inception then. And because it was so new, I didn't trust that I'd be able to get a job with them. And there was certainly no, no promise of that. And I just thought it was really niche, and I didn't really want to specialise that quickly. I wanted to be a generalist because I was fresh out of uni. I didn't really know what I wanted or what I was doing. I didn't even know if comms was the right career for me. And, I mean, I still feel that way, but I, I just thought working for a council was going to expose me to a lot more. And also, there was only it was only a team of like, three, I want to say, at the magazine, whereas the council, small council, it was still 350 staff. So I just knew I'd have more exposure and mentorship. And that I would just get to see more. Really?","c":11,"n":9,"i":"mentor_good","s":40},{"id":"Edie-001252-020","p":"Edie","t":"00:12:52","q":"Yeah. So council was like, hectic. We were so understaffed. So we were always just like, you were busy from the moment you walked into the door to, like, the moment you left sort of thing. And a lot of what I did was I so my main thing, I got hired to work on a fresh water campaign that was coming out and it was all about how, you know, fresh water was going to be governed at the regional level, and it was iwi and all of that. And so I got hired mainly for that task. And so a lot of my work was around writing content for that, like for the website, building websites building social media content, building print content talking to like public groups, running public forums running workshops, that kind of Stuff. And then also emergency management was a huge part of the job. So all councils are also civil defence. So in my civil defence role it was basically flooded flooding management. So anytime there was major flooding we would be working in terms of getting, you know, press releases out or key information out to stakeholders. We were kind of that conduit. And if we had to send an emergency you know, those emergency alerts you get on your phone?","c":23,"n":30,"i":"ethnicity","s":30},{"id":"Edie-001408-021","p":"Edie","t":"00:14:08","q":"Yeah, yeah. So we would also if we had to send those out, our team was responsible for drafting that and then pressing send. I feel.","c":0,"n":4,"i":"work_content","s":72},{"id":"Edie-001418-022","p":"Edie","t":"00:14:18","q":"I was, like.","c":5,"n":7,"i":"procedural","s":10},{"id":"Edie-001423-023","p":"Edie","t":"00:14:23","q":"Oh, honestly.","c":6,"n":7,"i":"procedural","s":35},{"id":"Edie-001444-024","p":"Edie","t":"00:14:44","q":"That back. Whoops. So yeah that.","c":0,"n":4,"i":"work_content","s":6},{"id":"Edie-001448-025","p":"Edie","t":"00:14:48","q":"But it was it was awesome. Like I really got again exposed to so much and I just, I really appreciated how much they trusted me and threw me into the deep end and really let me kind of figure shit out. And that was also the CE of that council was of such a big believer in people kind of doing that to we got to film this massive campaign for all of the, like, regional councils. There was this huge meeting that happens like every five years with all regional councils and mayors and chairs and everyone. And we got to film the promo video for it, which looking back now, I'm like, why did you trust us with that? I mean, thank you. So, you know, we really got to do a lot of really cool stuff. And also we were genuinely helping the community. Like, even though people hate councils the work that [a regional council] did, like It impacted the community. The a lot of the money that we gave out was all for improvements in fresh water and enhancements on farms to make catchments better. And then we would we'd be allowed to go out and do that work. So we'd volunteer our time to farms to then like help with those.","c":4,"n":6,"i":"pay","s":20},{"id":"Edie-001556-026","p":"Edie","t":"00:15:56","q":"So it felt like there was a, like a genuine impact there.","c":34,"n":31,"i":"purpose","s":0},{"id":"Edie-001600-027","p":"Edie","t":"00:16:00","q":"And that was really cool. I loved that job, and I'd probably still would I still be in it maybe. I'm not sure, but I pretty much I didn't leave because I didn't like it. I left because I, my brother had a child and I wanted.","c":25,"n":18,"i":"autonomy","s":86},{"id":"Edie-001616-028","p":"Edie","t":"00:16:16","q":"Be closer to home to be near her. And he's now had two children, so it's kind of worked out well. But yeah, I want to. I hadn't been I hadn't lived near my family for seven years by that point. And so I was like, okay, it's time to go home. So very quickly, I kind of I got to a point where I was just like, I'm too homesick now. And I think within a month I'd kind of made the decision to leave. And so I started looking and there was two opportunities that I wanted to accept. Well, I went I got put up for one was the new district council, and then one was a new district council, one they actually paid to fly me down for the interview, which was really.","c":4,"n":6,"i":"pay","s":53},{"id":"Edie-001657-029","p":"Edie","t":"00:16:57","q":"Lovely. And they were lovely. And I would have fit in very well there. But I chose [the university] because I hadn't worked for a large organisation before.","c":0,"n":4,"i":"work_content","s":78},{"id":"Edie-001712-030","p":"Edie","t":"00:17:12","q":"I wanted that experience of working for a massive organisation to see what it was like. I also wanted more mentoring because I.","c":11,"n":9,"i":"mentor_good","s":77},{"id":"Edie-001720-031","p":"Edie","t":"00:17:20","q":"In a team of five to a team of 20. So I really wanted to have the opportunity to get more mentoring and have someone kind of, you know, point out those gaps and help me kind of grow in that as well. So I even though the [the university] job didn't feel like it ethically fit fully with me where the council job would have because they again, were quite a good council with their direct impact to me. I chose career growth and effectively salary like potential, even though the council was going to match my salary with you see, the salary potential wasn't the same as what it is at [the university]. And then I would I also wanted to be closer to the city because I wanted to do music. And I knew that being out in, you know, one of the outer towns or wherever, I just wouldn't have the same access to those things. And so it would almost be an excuse not to do it. So, yeah, those were kind of the main reasons, I guess that went into picking it.","c":26,"n":16,"i":"values_fit","s":7},{"id":"Edie-001852-032","p":"Edie","t":"00:18:52","q":"So that was like a fairly consistent conversation. So the cool thing with our chief exec is he would meet with staff twice a year and have those discussions. You could ask him whatever you wanted. I even asked him before I made the decision to leave, like what he thought and what choices he made early. And we we talked through all of that. But I how [a regional council] was structured is that you had six month reviews and on that they would give you a scoring. So my boss would sit down with me and do my six month review. She would give me a score against everything in my like PD. I would do the same. We would look at the gaps between those scores or if there was no gap and she actually had rated me higher than I rated myself, then, you know, that was great. And then based on how you scored on that, you would get a pay rise. But I went from being like an officer to an advisor really quickly because the chief exec had a direct line to my boss, and they both were like, we want to keep her. This is how we'll keep made the decision pretty quickly to put me up to that role. And they were really big on, like, protecting staff that were important to them. Especially in those like, younger years. I think it's maybe different when you get to the senior level because there's not as far as you can go. But in saying that, my former boss, she also just got promoted to general manager because the CEO believed in her and believes that she's capable of it. And she's like 32, you know? So he really was a big influence on people staying. And very encouraging.","c":14,"n":9,"i":"mentor_good","s":37},{"id":"Edie-002028-033","p":"Edie","t":"00:20:28","q":"Very open. Like would drop in for conversations all the time and Yeah, just a very open person.","c":2,"n":4,"i":"work_content","s":61},{"id":"Edie-002045-034","p":"Edie","t":"00:20:45","q":"I went this is great that I'm able to have this so quickly, but I also had no comparison point because I didn't know what any of my university friends like where they were at in their careers. So I kind of I felt like I was at the point where I deserved that promotion because of how much I was doing. But I had I had no idea what that meant for my career because I almost went, does this feel too easy that I've gotten it this quickly? And is that devaluing the worth of my career? Does this mean my potential earning salary is actually lower because this career actually isn't highly valued? Rather than looking at myself and going no, I have high value. I was worried about that, that impact and also worried that maybe I hadn't had enough time doing the foundational skills to.","c":4,"n":6,"i":"pay","s":73},{"id":"Edie-002135-035","p":"Edie","t":"00:21:35","q":"Really good in that role and do it how I wanted. But that also I was excited to be getting paid more.","c":4,"n":6,"i":"pay","s":93},{"id":"Edie-002204-036","p":"Edie","t":"00:22:04","q":"Yeah, I mean there was a few. I, I was at the two and a half year mark when I was there, so I really wasn't that worried. And also, I was moving to a bigger city, so I knew that there would be more opportunities. Yeah, I was kind of probably not so worried about that part of it, really. I was more worried about, like, Racism.","c":113,"n":30,"i":"ethnicity","s":0},{"id":"Edie-002236-037","p":"Edie","t":"00:22:36","q":"Honestly, just like the South Island having it so in the North Island in my job, they also put me through like a two day courses. So I was, you know, using a lot of te reo when I've come back to the North Island, like no one uses any at all. And I've been really interesting. Yeah. And so it's like I've lost everything I learned because it's just not part of what people do here. And there's just like a general sense of Maori are like other down here in the North Island there is that to an extent, but there's just also, like so many more Maori that it's kind of like normal to not have white people everywhere. So honestly, I was more worried about, like, losing that and losing my like because coming back to this life here, I think like, Cake. There's sort of the expectation that women almost behave more like men in the South Island. Like there's less of that openness to. There's more sexism, basically. Yeah. Yeah.","c":95,"n":30,"i":"ethnicity","s":0},{"id":"Edie-002351-038","p":"Edie","t":"00:23:51","q":"It was something I'd I had noticed every time I would visit. And growing up, I was also very cognizant of it and the way people talked. And also the fact that I went to a high school where I could tell you the names of all of the students who were there because there were so few. And we had more like I was in [a rural town], so there was more Filipinos than there was anyone else, and there was more Filipinos because they were hired on the farms because they were cheap labor. And that's.","c":30,"n":17,"i":"learning","s":76},{"id":"Edie-002423-039","p":"Edie","t":"00:24:23","q":"Theme in [the region]. You hire Samoans and Filipinos because they're cheaper. Whereas not to say that it doesn't happen in the North Island, but there's so much more like a multi ownership of things in the North Island. I think like [the South Island iwi] in the South Island is basically a westernised business. It's not really like if you talk to people who work for [the South Island iwi], there isn't a whole lot of culture in that space. Particularly at the, at the leadership level. So kind of westernized themselves to make the best profit and maybe have lost their kind of point in the North Island, that hasn't quite happened yet. It's kind of going that way, though, and like, like [a North Island city] and places like that, it's sort of going that way. But yeah, I just, I just could see the significant difference in the language that was being used between the South and the North Island particularly, and where things like te reo would pop up and where they wouldn't pop up, and how big the debate was about getting rid of te reo in the South Island compared to North Island.","c":95,"n":30,"i":"ethnicity","s":60},{"id":"Edie-002549-040","p":"Edie","t":"00:25:49","q":"Yeah. So actually when I was making my career choice, part of the reason I chose [the university] was because I thought they would be more progressive, because academic institutes tend to be more progressive in that space.","c":3,"n":4,"i":"work_content","s":62},{"id":"Edie-002602-041","p":"Edie","t":"00:26:02","q":"I feel like maybe I was wrong, but I don't know. Sometimes I think it's still there, but it's hard to tell because there's in-general less of it in the South Island. But that it does kind of consistently come up for me. You know, really simple examples of when I'm reviewing content people put essays onto like te reo or words because they don't know that you can't pluralize using English. And so it's like that's really common. Like people just do that because no one's ever like told them all that information because they're not doing it enough. Like the amount of time I see, see like aotearoa's like you can't do that. So that's common when I'm like, reviewing edits, I will copy. So yeah, I would say that every week there is some example where I'm like, oh, okay, there's a gap here. Not that really. I have barely any knowledge, but, you know, there's small things that you just kind of pick up on things like that.","c":95,"n":30,"i":"ethnicity","s":100},{"id":"Edie-002733-042","p":"Edie","t":"00:27:33","q":"Yeah, it's kind of it's almost just like not surprising at this point. In the beginning I was like, oh, that is really disappointing. But now I'm I'm like, oh, okay. People just people just don't know. They really don't know. And they, they don't know enough people who are Maori for it to care for them, to care about it, I guess.","c":23,"n":30,"i":"ethnicity","s":43},{"id":"Edie-002815-043","p":"Edie","t":"00:28:15","q":"Yeah. So I, I think I actually started with trademe jobs because.","c":1,"n":4,"i":"work_content","s":52},{"id":"Edie-002821-044","p":"Edie","t":"00:28:21","q":"Like the main platform for a while. I just jumped on I so I had been thinking about it for about a year by that point, and then it kind of all of it all of a sudden, I think it was coming into December and I was thinking about Christmas, and I was like, oh my God, I just want to be home. And that obviously heightened things. And so then, yeah, I started first on Trade Me and then seek. And actually the only reason I even applied for the job at [the university], actually, I wouldn't have if I had known it was the university, because I did see the job advert for the university for the role, and I actually flicked past it and I was like, I'm not interested. But then I saw another job advert that didn't have the name of the company on it, and instead just had what the role was and what the team was like. And I was like, that sounds really cool. And it was through a recruitment agency and like [a recruitment agency]. And she called me and talked to me about the job and like, convinced me basically that I should go for it and told me about the team and what they were like. And it was her having that conversation with me that convinced me to go for it. Otherwise I wouldn't have. It just didn't align with me. I didn't feel like it aligned ethically in terms of how I felt, as though working for a university was work helping privileged people to get more privileged. A little bit, especially because a lot of it's about recruitment, retention, numbers, business.","c":26,"n":16,"i":"values_fit","s":50},{"id":"Edie-002946-045","p":"Edie","t":"00:29:46","q":"And yeah, but I mean, now working the really cool thing now is obviously the research element and all of that. But which I so I actually also I applied for another role with [a research institute] and in [a nearby town]. And I really wanted that role because a lot of what I did at council was also research. So we would we did a lot of biosecurity and biodiversity, and biosecurity was one of my favorite aspects of the job. Because we were releasing, you know, insects and fungi to battle other things, I was like, that's really cool. That's like direct impact. And so I applied also for a role at [a research institute]. But, I mean, they were looking for someone more senior than me, basically, which was, you know, fine. And so I didn't get that. And then I was like, oh, I don't really want these other roles, like, I'm not. They're fine, they're good, but they're not exactly what I'm looking for. Because of the direct impact is enough. But I also got to a point where I was like, I just want to move. And this is the, like, the easiest way to do it. And it's in the city. And if I want to study, then I can, you know, study for free all that kind of stuff. And they paid well. And it was like job security. And it was a bigger team and a bigger organisation that I hadn't done before, I hadn't experienced. So it would be a brand new experience.","c":82,"n":36,"i":"security","s":0},{"id":"Edie-003120-046","p":"Edie","t":"00:31:20","q":"The thing she said was about the team. So the team culture that was definitely the biggest aspect for me and the diversity of the work. So also that I would still get to do emergency communications because I was worried that by going to university, I would lose that that element of my job. And I loved doing emergency comms. I really enjoyed crisis comms and that kind of fast paced environment. So it was, yeah, team culture, team fit, and then the diversity of the role and then the salary too.","c":4,"n":6,"i":"pay","s":83},{"id":"Edie-003221-047","p":"Edie","t":"00:32:21","q":"So how I thought about it in line with my career was that more mentoring opportunities. So more opportunity to learn more, to see more, to get told where my gaps are and to have unbiased opinions about how I could improve. Also reputation of the university. I was like, well, once you've worked for a large corporate type company and you've done emergency external internal comms, career wise, it's a much better boost on your CV than going to like a council where you're probably going to be doing the same things you've done at other council. I also was like, it's an academic institute. It has a good name, a good reputation. There seems to be a strong desire for people to work at the university, from what I can see. And what the kind of job market suggests as well. And what was the other thing? It was. Yeah, I definitely I think the top thing for me was that there would be mentoring, which would give me the biggest boost in my career. And I'd be working in a bigger team. So I would be like almost forced to learn how to collaborate better and collaborate with a much wider variety of people. And so therefore communicate better and be better at my job.","c":11,"n":9,"i":"mentor_good","s":33},{"id":"Edie-003405-048","p":"Edie","t":"00:34:05","q":"So it's it's probably something. It's something I've always felt, but it has become more prominent. So my concern with comms is that it didn't have enough of a direct impact that it was more about telling the story of impact rather than being the people doing the impact. And kind of almost putting myself in a box of like, well, maybe that's not my story. Like, maybe I am the person who tells the story, not does the impact. But the more I work for like the university and the more I'm kind of feel like I'm just helping people who are already privileged, the more I'm like, yeah, I don't know if this is comms is for me. And like, I am always looking, to be honest, I actually applied for to study law two years ago. And I got into second year, and that was, like, fully teed up. And then by doing that, I was like, okay, law is not the right thing for me. I had wanted to be a lawyer for a really long time, and I chose not to go down that path because I had a teacher tell me it was boring. That was like the only reason I didn't do it.","c":34,"n":31,"i":"purpose","s":47},{"id":"Edie-003505-049","p":"Edie","t":"00:35:05","q":"And I also didn't know if I'd actually be capable of it. Like, I genuinely was like, I am I really capable of that? And I didn't have any role models in my life to show me that. That I was, you know, one of the first people apart from my sister to go to university. And my sister at the time had done she was working in a kindergarten. She's now a software engineer, so she's completely changed her career. But she she was working in a kindergarten, and I was like, oh, but that that's not really what I want to do, so I didn't for me, it was like I didn't have a role model to be like, you could reach for this or do this. Like, these are the careers that are available to you. And there's the pathway. And I've always had a huge issue with this being a problem is that universities go to schools and they tell you that you can do these degrees and they never tell you the pathways. And it's like, I really don't like that, because then a bunch of people come out with degrees that they don't understand how to use.","c":0,"n":4,"i":"work_content","s":22},{"id":"Edie-003603-050","p":"Edie","t":"00:36:03","q":"And don't haven't done like enough minors in something else or a double degree to mean they can actually get there","c":3,"n":4,"i":"work_content","s":41},{"id":"Edie-003613-051","p":"Edie","t":"00:36:13","q":"Yeah. Anything. They haven't had someone push them in the right direction. So. Yeah, so I can I've considered honestly going for, like, counselling or doing the psychology stuff. So yeah, in terms of that impact. But the having worked in the homeless hostel, I'm also conscious of how much impact it can have on yourself, doing those kinds of jobs and working with people who are intensely impacted or trauma or trauma or anything like that. So it's kind of something that's just there for me. And also, like, music is something I'm pursuing quite intensely right now. So I do, I do, I spend 20 hours a week outside of this doing a music course and doing like artist development and releasing and all that kind of stuff. So for me, it's like the job is kind of just funding my, like, I, I don't, I almost don't even want to work like I don't. I want to just do my things that I enjoy. And so I'm using this job as a means to build equity through like investing and through like looking to buy a house at the moment. And the whole purpose of buying a house is just to build equity to be financially free. I don't see this job as my career. It is. It is my career, for all intents and purposes.","c":4,"n":6,"i":"pay","s":17},{"id":"Edie-003733-052","p":"Edie","t":"00:37:33","q":"But it's certainly not where I think I'm going to stay my whole life unless I end up working for you know, I applied for a job at [an NGO], and I was like, yeah, that would have more impact. But now I know the person who got the job, and it actually doesn't sound like that's the case. So even then I'm like, so even if you work for these, you know, companies who are really doing good stuff at the level I'm at, it's almost it's a bit like people in culture, you know, we're there to protect the business. We're not necessarily about anything else. And that's kind of the reality that I'm seeing is it's all about protecting the business. But there's that cognitive dissonance of, like, I want to make money and have a set future, but I also want to do something with my life that I really enjoy, and that is not. I love parts of the job. I absolutely love parts of the job. But I honestly like weekly look at other jobs and like, I'm constantly looking at other degrees and like, what could I do? What could I study? Where could I take this? Where could I go? Yeah, it's not for me for the future.","c":4,"n":6,"i":"pay","s":33},{"id":"Edie-003901-053","p":"Edie","t":"00:39:01","q":"Is what I've kind of come to realize is that music is part of that. But I don't ever want one thing to be all of it. So for me, music would be like, you know, 20 hours a week, or we were able to tour and gig and everything, and then things like emceeing and running, like doing weddings, that kind of stuff. That's what I would want to fill other times with, like speaking gigs doing that sort of stuff and then generally just helping people to like, enjoy themselves and whether that is through, like making their wedding really nice in terms of celebratory or where I can have that impact through speaking or through whatever it is like. For me, the ultimate goal is how I can add to other people's happiness rather than like fucking just pushing paper sometimes.","c":34,"n":31,"i":"purpose","s":40},{"id":"Edie-004012-054","p":"Edie","t":"00:40:12","q":"So I think that my values are misaligned with my career. So my values are like people first. And I don't necessarily think that's misaligned with my career. It's misaligned with the company I work for. But I yeah, people first. Definitely like that is my biggest thing is I believe like, there is nothing so important or so great in this world that you need to make others suffer to get what you want. And that includes being demanding in the workplace and yelling at people and, like, you know, being outrageously difficult. I just don't. I'm like, why? Why can't people just be team players? Like, why do we have to feel? And I think that comes from a place of not doing, not aligning yourself with your values because you become bitter. And so yeah, definitely people first. And then after that it would be like the impact of the work and the importance of the work and value all of that. And then third would be salary for me. And at the moment, salary is kind of sitting above the other two things really. And people are like my colleagues, which are great and really awesome. And I have some really, really amazing colleagues. But yeah, those would be my like top three values.","c":87,"n":16,"i":"values_fit","s":30},{"id":"Edie-004144-055","p":"Edie","t":"00:41:44","q":"Yeah, there is definitely like so my job is incredibly high pressure. And it's it was crazy because, like, we're literally not responsible for the lives of anyone. But com seems to be this really no matter where you are, it's a very high pressured environment. And getting something wrong is a big issue because you can lose the company money. So therefore it's a problem. But yes, the environment I'm in is extremely high pressured and there is yelling and there is there is a lot of short sappiness high expectations, you know, the expectation of, like, reading people's minds, knowing what they want, predicting what they want before they've even told you getting everything right, like not making mistakes. And yeah, and there's a big element of if you're the favourite, then you're fine. If you're not that liked, then you're going to get yelled at more.","c":29,"n":27,"i":"mentor_bad","s":53},{"id":"Edie-004258-056","p":"Edie","t":"00:42:58","q":"It's definitely personalities based. But that's certainly never The personalities are never attacked or anything like that. It's purely work based. Yeah.","c":1,"n":4,"i":"work_content","s":52},{"id":"Edie-004323-057","p":"Edie","t":"00:43:23","q":"So I used to probably more last year when I didn't have the level I have now. But no, there is really not much. And I've worked a lot of mornings and evenings and weekends and like, yeah, there's a, there's a much higher workload now. And because I'm early in my career, I'm okay with that. I'm okay with going the extra mile because that's helpful for my career. That's helpful for me. Like, it's really actually quite a selfish act doing that. I don't really have to. I could have boundaries and be really firm and say no, but it's actually a disadvantage to me to turn down opportunities, to turn down more work, because then you get then the next time they don't think of you for that next piece of work, or they can't rely on you for an emergency, for example. So I'm reliant, I get called on to lead emergencies. So for me right now, my like boundaries in terms of my time are kind of less important than going the extra mile and doing the extra bit because I'm like, if I want to work for myself or if I want to change careers, any of that, I need to have shown enough of myself in this career and done well enough that I can take those skills and really apply them somewhere else.","c":85,"n":5,"i":"balance","s":0},{"id":"Edie-004448-058","p":"Edie","t":"00:44:48","q":"Yeah, it can do. So I got I have this like prolific issue where I just work really hard and then get sick for like two months. But it's kind of a I, I definitely am consistently busy. Like, I think I'm one of those people that doesn't know how to not be busy or have lots going on. And so. Yeah. And so then you just add more, right? Like you just keep adding.","c":0,"n":4,"i":"work_content","s":62},{"id":"Edie-004514-059","p":"Edie","t":"00:45:14","q":"You say yes. And you're. I feel like we're young enough that we just keep wanting to do that. And it's like, I'll learn boundaries later. I'll learn this later. I'll do this later. So I there are times where I get really frustrated with it and I'm like, this is too much of an impact. And I'll step back. And actually, my boss is actually really good at when you say no and putting in say, this is too much. She's she is really responsive to that.","c":11,"n":9,"i":"mentor_good","s":93},{"id":"Edie-004539-060","p":"Edie","t":"00:45:39","q":"And that's the I think that's the hard thing with her as much as she does yell and like does is is very has very high expectations, which she admits herself that she does have the highest expectations of anyone kind of in the portfolio that we work in. She also has your back. She also is your biggest supporter externally. You know, in meetings or anything like that? She would never throw any of us under the bus. She believes us. She trusts us like there is. That trust is probably a. I don't know if she always trusts us, but she she, you know, like, trusts us enough that she believes we're all capable of the work. And I think that is her. She's not a boomer, but she has the boomer trait of, like, when you believe someone has potential, you push them really, really hard like that. So like she once she could see that I was at capacity with my work, she, like, high fived me and was like, I finally reached the point where you find things hard. I'm so proud of myself.","c":29,"n":27,"i":"mentor_bad","s":0},{"id":"Edie-004641-061","p":"Edie","t":"00:46:41","q":"Honestly, fair enough. I was like, yeah, that's that's fair. So, yeah, so it's it's a hard thing because she's actually also a great boss. So you do go the extra mile for she's kind of she's so like swings inside of the pendulum, you know, like she's got the yin yang going on all the time. And you just don't know which version you're going to get, but it's like you kind of come back for more because she also is really great. It's so confusing.","c":11,"n":9,"i":"mentor_good","s":37},{"id":"Edie-004717-062","p":"Edie","t":"00:47:17","q":"Yeah. So she's super. She's the first person in our team to go, hey, have you guys all seen the jobs that are up? Like, you know, because she's she to me was like, don't bother applying for any other advisor jobs. Like, you should only be going for senior roles now. She's like, it's a waste of your time doing anything that isn't senior. And she'll talk to us. We have one on ones like monthly, one on ones. And in the one on one form is what? What's your next career step? Actually, she's just changed the question from where do you see yourself in five years to what's keeping you here? So.","c":114,"n":21,"i":"aspiration","s":0},{"id":"Edie-004750-063","p":"Edie","t":"00:47:50","q":"The reason she gave me the stuff I have now is because I told her I was bored. And so she's like, well, I don't want you to leave. And I actually had a job offer with it was actually another team at the university, but I had a job offer, and I took it to her and I said, this is what they're offering me. And she said, what can I do to keep you? And she just gave me what I wanted, so.","c":22,"n":18,"i":"autonomy","s":95},{"id":"Edie-004822-064","p":"Edie","t":"00:48:22","q":"I said, I want you to match the salary that they're offering me because they were offering a higher salary, and I want more responsibility. I want to be working at the senior level more often. And she went, okay, well, I'll match the salary. She said, I'll go above salary. And I'll find you something. And she did.","c":4,"n":6,"i":"pay","s":83},{"id":"Edie-004850-065","p":"Edie","t":"00:48:50","q":"No, I was actually headhunted. It was someone. It was in the engineering department for a research team. And it was a researcher I've worked with a lot who I really admire. He's probably like one of my favorite researchers. And he reached out to me and said, we've got this job coming up. And it was really enticing to me because it was based. It was a research role.","c":2,"n":4,"i":"work_content","s":96},{"id":"Edie-004913-066","p":"Edie","t":"00:49:13","q":"Like, you know, it was everything I wanted, basically. And I interviewed and I got it. And the only reason I didn't accept it, there was a few reasons. One was obviously she gave me that offer, but really the true reason was because, one, I don't hear many good things out of the engineering department about how they treat females. And the other thing was, I would have been a solo comms person. And at this point in my career, that's really tough. And I didn't I kind of had no interest in being that isolated.","c":93,"n":33,"i":"gender","s":100},{"id":"Edie-004946-067","p":"Edie","t":"00:49:46","q":"Like heaps of work. Yeah. And.","c":8,"n":7,"i":"procedural","s":25},{"id":"Edie-004950-068","p":"Edie","t":"00:49:50","q":"Mean, a lot of administration work, which I was like, I don't want to. I want to do that. And it would have been with a bunch of males in a research.","c":1,"n":4,"i":"work_content","s":76},{"id":"Edie-004959-069","p":"Edie","t":"00:49:59","q":"That would have been isolating. And even though he's great, I don't know if the others are. And I'm a young female who's not an academic, you know.","c":111,"n":33,"i":"gender","s":100},{"id":"Edie-005027-070","p":"Edie","t":"00:50:27","q":"So for me, it's like I'm in the process of, you know, looking to buy a house at the moment. So I won't be changing jobs until we buy a house.","c":1,"n":4,"i":"work_content","s":60},{"id":"Edie-005044-071","p":"Edie","t":"00:50:44","q":"Exactly, exactly. So I but I want out, like, I want to try something new, whether that's the new comms role or something a little bit different. So I've been looking at engagement roles as well, but I think within the next five years my career will look completely different. It'll either be that I'm working for myself, or I'm working a part time job with other things on the side, but I don't see myself continuing in like a 9 to 5 out of my 20s. You know, I think it will look different or I think opportunities will kind of come and I'll I'm planning to like, you know, start growing in that speaking space as well. And seeing like I have emceed a few gigs now. And so it's like, okay, more more of that. And just building my, yeah, my own stuff. But yeah, certainly not not going anywhere to the house because my partner is self-employed. So we need me.","c":17,"n":5,"i":"balance","s":9},{"id":"Edie-005219-072","p":"Edie","t":"00:52:19","q":"So I would say, first of all, university won't prepare you for the career because they don't focus on writing and it's a real universities. I would say use AI, make it your best friend, and make sure you know it better than anyone else in your industry. Make sure you know how to utilize it. And but get really good at foundational writing skills and being able to write quickly and take complex information like practice taking complex information and turning it into something digestible that makes sense for the general public. And make sure you get workplace experience. So do an internship. If you can do try and do that in your third year or your capstone so that you can get like a job out of it. And when it comes to actually deciding whether you even think you should, like, go to university or not you don't like, have to. That's certainly not a a choice you need to make. But if you feel that university is right for you, there's no reason you can't take a break first or anything like that.","c":42,"n":17,"i":"learning","s":37},{"id":"Edie-005326-073","p":"Edie","t":"00:53:26","q":"So.","c":9,"n":7,"i":"procedural","s":8},{"id":"Edie-005332-074","p":"Edie","t":"00:53:32","q":"Yeah. So I, I would be like, you don't. It's not the path for everyone. And it's certainly not the right path for a lot of people. So don't don't feel that you have to do it straight out just because your friends are doing it. Yeah, that would be the main thing. And then getting practical experience in a business will supplement your degree, but you need to have a degree to get into comms, or you won't even be considered at that level unless your parent, like, unless it's nepotism kind of thing.","c":39,"n":28,"i":"advice","s":36},{"id":"Edie-005424-075","p":"Edie","t":"00:54:24","q":"Yeah. It's really like. No, truly, no day is ever the same. And that it is, in most spaces, really fast paced, but also extremely slow at the same time. And that a lot of what you will do is people management and expectation management and project management the actual comms hard skills of like writing and preparing campaigns and all of that is like 5% of the whole job. Most of the job is patient management project management. It's like a huge part of it in managing deadlines. Yeah, that's probably what. And like taking initiative is probably a really big, big part.","c":27,"n":17,"i":"learning","s":52},{"id":"Edie-005516-076","p":"Edie","t":"00:55:16","q":"So we didn't do any project management when I was at uni. Yeah, none of that. We also did. No, the thing that was the most helpful was we did comms plans, like how to build comms plan and what you, what you do, which is generic pretty much. But yeah, we had no like deadline management project management stuff. How you format it, how you kind of like keep yourself accountable and organised. There was certainly no like organisation stuff. And also the thing that like, they didn't even talk about at university was the reality of working with senior leadership. And the fact that person will have to learn how to navigate senior leadership and that you might want to take a psychology paper because it'll be really helpful. Like, I took psychology papers and they were extremely helpful for me to manage like people. And that's a it's a huge part of the job.","c":18,"n":9,"i":"mentor_good","s":16},{"id":"Edie-005625-077","p":"Edie","t":"00:56:25","q":"I think we've covered so much.","c":3,"n":4,"i":"work_content","s":19},{"id":"Jimmy-000537-001","p":"Jimmy","t":"00:05:37","q":"Yeah, a little bit about me. I'm. I'm a so studied at [university] between 2013 and sort of like early 2016. I decided to do a accounting and taxation. So like commerce. And that was mainly because I didn't know what I wanted to do. But then moving on from [university], I ended up in accounting and finance at ten years there and then moved into this role off the back of some of the, I guess, some of the things you're talking about with your experience at HR and legal. Yeah, that was also prevalent and values conflicting, let's say and I think with us, it's my wife's also an accountant.","c":55,"n":21,"i":"aspiration","s":29},{"id":"Jimmy-000635-002","p":"Jimmy","t":"00:06:35","q":"Your mum and your partner. And then we, we sort of got married. We recently had our first child. He's just turned one. Just. Thank you. It's it's been a sleepless year, let's say.","c":2,"n":4,"i":"work_content","s":86},{"id":"Jimmy-000651-003","p":"Jimmy","t":"00:06:51","q":"But other than that, things are things are going good. And then. Yeah, from a big family always been into sport and always been extroverted. Yeah. That's a little bit about me. Yeah.","c":3,"n":4,"i":"work_content","s":41},{"id":"Jimmy-000710-004","p":"Jimmy","t":"00:07:10","q":"Initially, no. Initially, Spud was very jealous that the attention was shifting. Because he was the baby for, like, two years. He was like, what is this creature? Why is it screaming? And then why is the attention waning from me? So initially, he wasn't very happy. But he's come to love him ever since he started eating solids.","c":0,"n":4,"i":"work_content","s":78},{"id":"Jimmy-000735-005","p":"Jimmy","t":"00:07:35","q":"From six months onwards, he'll scratch the baby gate to try and get through. Because he wants to get to, like, below the highchair where he can catch anything that drops. Every day when Spud gets home, he will run to the high chair to see if there's anything that's left.","c":96,"n":25,"i":"confidence","s":100},{"id":"Jimmy-000752-006","p":"Jimmy","t":"00:07:52","q":"And then when we take baby out of the highchair, he'll then climb up in it and, like, try and clean the whole thing. He's really audacious. He just does what he wants. But the only reason he likes him now is because his added benefits.","c":2,"n":4,"i":"work_content","s":75},{"id":"Jimmy-000808-007","p":"Jimmy","t":"00:08:08","q":"But we do drop him off every day. He's either dropped off to our in-laws. So my wife's parents are semi-retired so they can walk him twice. He gets really companion.","c":1,"n":4,"i":"work_content","s":72},{"id":"Jimmy-000821-008","p":"Jimmy","t":"00:08:21","q":"Yeah. And then also he gets dropped at daycare. So he's a really when I was growing up our dogs would like stay at home. You'd go to work at school you'd come back and they're all good in the backyard or doing whatever. This particular dog, it's like it's almost like he's a human. He's like.","c":27,"n":17,"i":"learning","s":52},{"id":"Jimmy-000850-009","p":"Jimmy","t":"00:08:50","q":"So so. So your partner's an accountant, did you? Yeah.","c":3,"n":4,"i":"work_content","s":19},{"id":"Jimmy-001107-010","p":"Jimmy","t":"00:11:07","q":"And that's how it'll work.","c":3,"n":4,"i":"work_content","s":16},{"id":"Jimmy-001112-011","p":"Jimmy","t":"00:11:12","q":"Because because if you were in HR consulting, isn't that a big like.","c":0,"n":4,"i":"work_content","s":44},{"id":"Jimmy-001145-012","p":"Jimmy","t":"00:11:45","q":"I do like I do like though, that the story is so much more traditional than most of the stories these days. It's such a wholesome.","c":129,"n":39,"i":"generation","s":50},{"id":"Jimmy-001153-013","p":"Jimmy","t":"00:11:53","q":"Yeah. Yeah. It's so wholesome compared to these days. It's like, well, which app was it? And you're just like, so I do like that. It's it's so much more random.","c":130,"n":39,"i":"generation","s":50},{"id":"Jimmy-001205-014","p":"Jimmy","t":"00:12:05","q":"We actually met at work. So really, like standard boring story. It wasn't as exciting as that. I was literally just trying to focus on my spreadsheets. She was a year above. Abuse of power, I say. And now she's. Now she went to [university]. She's always a year ahead. And yeah, it was one of those things where you're not you're not looking, but it kind of just happened.","c":25,"n":18,"i":"autonomy","s":100},{"id":"Jimmy-001233-015","p":"Jimmy","t":"00:12:33","q":"But now she's awesome. She's very introverted. So opposite to me. She's very. She uses me as a human shield, and she'll just hold me up like Captain America's shield and just nice. Yeah. We balance out really well. She's good at the things I'm. I'm weak at, and vice versa, so it's quite.","c":12,"n":19,"i":"leaving","s":62},{"id":"Jimmy-001326-016","p":"Jimmy","t":"00:13:26","q":"Sure. In general, I oversee design, build and deliver a comprehensive careers coaching program for scholarship students.","c":0,"n":4,"i":"work_content","s":72},{"id":"Jimmy-001340-017","p":"Jimmy","t":"00:13:40","q":"Mainly equity cohorts initially, and then it's expanded to about six scholarships, a combination of merit based and equity based.","c":24,"n":19,"i":"leaving","s":100},{"id":"Jimmy-001351-018","p":"Jimmy","t":"00:13:51","q":"And all year groups maybe between 700 and 1000 students. And yeah it's quite busy. 40% of my role sits in three arms and then 60% of my role sits in one arm. The three arms I'm talking about on the 40% are termly workshops. So I run workshops focusing in on the skills and behaviours that I believe are critical in the workforce. Research believes that they're critical in the workforce, but they're maybe not directly touched on in your theoretical degree program. So for an example, some of the workshop content for the first years is in the first term we're doing finding a Why. So it's an interactive workshop on working through your values, passion, purpose and getting quite deep in some of that space.","c":53,"n":31,"i":"purpose","s":100},{"id":"Jimmy-001451-019","p":"Jimmy","t":"00:14:51","q":"And then the second term is like an interactive, fun competitive games workshop where it's around being intentional, but mostly it's around skills that matter. And say there's 12 stations like Sudoku. Easy, hard. There might be like word builders, some physical egg and spoon race a whole lot of different activities. The students get lumped into a team. They don't know anybody in the team. It's very quick. They get given a sheet and it's pretty much. Here's the activities. You've got about 15 minutes. The point allocations are based on difficulty. Go. And it's a teaming exercise where they're force pretty quickly into a team of people they don't know. To go and pretty much battle the rest of the class or workshop in this activity. And off the back of it, you get them to reflect. They talk about what was it? What were the skills that were most critical for their success or failure? Like what was missing in caused them to fail. And 99% of the things they list are human skills or soft skills.","c":72,"n":15,"i":"rejection","s":0},{"id":"Jimmy-001607-020","p":"Jimmy","t":"00:16:07","q":"Yeah. So they end up coming out with that, and then you roll into some of the statistics around how important it is to actually be able to operate in those environments, how you work with people. There's a stat out of, I believe it's Stanford and Carnegie Tech that they did a study in the US around how important soft skills are for career success. And they found that there was about 85%. And if you imagine.","c":42,"n":17,"i":"learning","s":95},{"id":"Jimmy-001640-021","p":"Jimmy","t":"00:16:40","q":"Not really, I know it, I know it enough, but not as not as much as others would know. But essentially I know it by experience. And that when you get out into the workforce, right, you could be A-plus, A-plus technically. But if you can't wield those skills and convey it and work with other people, then where do people actually perceive you at? Where are you at effectively? So I've seen people who were C students outperform people who were A students purely because they could do that other side better. And saying that your technical skills are important, that your base that the things you're selling out in
