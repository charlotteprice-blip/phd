adder because you're missing out on that that work. So I think there was like, yeah, definitely something I learned from the professional talks, I think. And some yeah, some people were had some honest opinions. I think some of the student leaders like some of the student committees and stuff.","c":11,"n":9,"i":"mentor_good","s":0},{"id":"Judy-002830-045","p":"Judy","t":"00:28:30","q":"Yeah. They were closer, they were already closer to, to the legal career and they were saying how like they changed their mind in like fifth year, that they actually don't want to be a lawyer and stuff. So they kind of opened my eyes saying, oh actually I don't have to do law if I don't want to, you know, I can do like policy or whatever.","c":0,"n":4,"i":"work_content","s":47},{"id":"Judy-002856-046","p":"Judy","t":"00:28:56","q":"Yeah. It's been like it's been stressful because there's so much like when you leave uni and you start working, you don't know anything like it's you probably heard this before, but everything they teach you at uni is like theory and you get taught like how to find information. But all the the administrative paperwork and like what, what documents to file and what process you go to, you just don't know anything. So when you start work, you just feel like, what's the point of even going to uni? Like, you don't even you learn everything on the job and there is like some there's lots of pressure to know things because you're a law student, but also you don't know things. So it is kind of like it's exciting to learn things. You're like, oh, that's how it works. Or like, now I know why I learned this. And when you learn things, it's exciting, but it's daunting to know how much there is to learn after you just spend like six years or five years studying and then you still, like, realise that you don't actually know anything.","c":4,"n":6,"i":"pay","s":23},{"id":"Judy-003011-047","p":"Judy","t":"00:30:11","q":"And you spend so much time on the computer just like, like filling out forms and like. Like things that you're like, why did it like, this is not what I'm doing, but I studied. I'm not reading legal cases and writing opinions. I'm literally just filling out forms and filling in gaps and like, I guess you are still problem solving and you will do more of that when you're like more experienced. But at the beginning you're just kind of learning the ropes and it's very kind of humbling.","c":4,"n":6,"i":"pay","s":27},{"id":"Judy-003039-048","p":"Judy","t":"00:30:39","q":"And especially since you're I don't know every firm is different, but my firm has a lot of legal administrators like law clerks. I don't know how you call them. And everyone's like legal executives. And they do like all the, all the work like basically and then the, the partners and the lawyers do all the like the thinking and delegating and stuff. So you kind of come into this, this firm and you realize what's going on. Like, I don't know, like I'm, I know less than a legal executive, but the legal executive expects you to know more because you're a lawyer. You know, like you've.","c":2,"n":4,"i":"work_content","s":43},{"id":"Judy-003112-049","p":"Judy","t":"00:31:12","q":"The stuff and but you don't have that years of experience as the partners do. And with the times changing. It's interesting because the partners, they became partners after like one year of working at the law firm, and they just kind of got thrown into that because back in the days, I don't know, probably different as well. You just kind of like that's how it worked. But now you spend like ten years working as a lawyer until you become a partner. So it's a completely different.","c":50,"n":23,"i":"transition","s":38},{"id":"Judy-003143-050","p":"Judy","t":"00:31:43","q":"Like and things.","c":5,"n":7,"i":"procedural","s":7},{"id":"Judy-003145-051","p":"Judy","t":"00:31:45","q":"Yeah. And the partners are even because they're all like older white men. They're even admitting as well. Like it was so much easier like back in the days, like they didn't have all this paper stuff and because there wasn't electronics, they everything was easier. But now everything is more complicated. There's so more many more details and so many more rules that people need to know on top of the law that it's a lot like it's. I don't know if the law school caught up to that yet. Like the what the law school is teaching has caught up to what law is actually, you know, like, now it'll be interesting what AI has to do as well, because they'll probably have a huge impact on the legal field, too.","c":56,"n":8,"i":"ai_tech","s":59},{"id":"Judy-003231-052","p":"Judy","t":"00:32:31","q":"Answer your.","c":5,"n":7,"i":"procedural","s":37},{"id":"Judy-003324-053","p":"Judy","t":"00:33:24","q":"That's interesting question because I feel like when you do the profs like you're, it's automatic that you're going to get admitted because that's why you do. The profs and I did profs before I started working. So when I started working I kind of was basically already working as a lawyer, but I just couldn't call myself a lawyer and I couldn't do certain things because I didn't have the, the I couldn't certify documents and things. So for me, it wasn't even a question to get admitted or not. It was like, well, I just spent all this time studying and my goal is to be a lawyer. So I'm of course I'm going to get admitted. But when that admission happened, Nothing really changed. Like I was still. I still knew the same things. I didn't know anymore. I was expected to know more, though, which is interesting. Like from one day to the next. And the what changed the most is that clients and like other lawyers who you were dealing with, like communication on emails and stuff, they treated you with a lot like they took you more seriously.","c":92,"n":8,"i":"ai_tech","s":20},{"id":"Judy-003427-054","p":"Judy","t":"00:34:27","q":"Like all of a sudden you now have solicitor written under your email signature, so you're taking more seriously or your opinion is more valued. And yeah, it's really interesting, especially down [the region] where it's still very like old school and conservative. We have lots of old clients, like older clients and stuff, and they're very still traditional in that sense. So they they take you a lot more seriously when you have solicitor written, especially if you're female, you know, like if you're just, you know, it's like you have a lot more, no matter how much you know or how little you know your solicitor now. So like Yeah, it's very interesting. And of course they automatically because you have like a an hourly charge out rate to the clients. Not that I do that yet because I'm still in training, but it jumped very high as soon as I hit the title solicitor, even though I didn't know much more. So it's very interesting how just that title makes a difference, not how much, you know, I guess. Yeah.","c":57,"n":8,"i":"ai_tech","s":0},{"id":"Judy-003529-055","p":"Judy","t":"00:35:29","q":"It's a little bit the system, a little bit messed up in the sense, but I like, I think it's hard to measure you know it's hard to measure people climbing the ladder becoming in some firms people become senior solicitor in like a year. Some people take like three years and it depends on the firm, depends on maybe the person's like just really social and maybe they're not actually good lawyers, but they come across as good lawyers. Like, it's just there's no there's no measurement of you now solicitor it things change. It's kind of it's very interesting. It's kind of it.","c":7,"n":0,"i":"big4","s":33},{"id":"Judy-003613-056","p":"Judy","t":"00:36:13","q":"There too. And how much they're paying attention and what kind of person it is. And because it's, it's super fascinating to like because you can't really compare any firm or any person like, oh, you're already a solicitor. Like, that doesn't mean anything. Like it doesn't mean that you're no more, you're smarter. It just means you have done the admission sooner than other.","c":63,"n":18,"i":"autonomy","s":25},{"id":"Judy-003649-057","p":"Judy","t":"00:36:49","q":"I have a few friends that I, I kind of keep in touch with. They graduated earlier because I did that extra.","c":59,"n":23,"i":"transition","s":20},{"id":"Judy-003658-058","p":"Judy","t":"00:36:58","q":"That exchange. Yeah. So I do keep up. I don't ask them really how it is, but it's kind of seems like a similar vibe. You know, like, you just you all of a sudden have that title, so you kind of feel like you have to know more, but you don't. And I do think that people just aren't honest about it too, like I or they act really confident and then you kind of like, wait, that's like, it just depends how you present yourself a lot.","c":108,"n":11,"i":"status","s":0},{"id":"Judy-003727-059","p":"Judy","t":"00:37:27","q":"But I guess it's the reality of life. But it's kind of sad.","c":2,"n":4,"i":"work_content","s":43},{"id":"Judy-003748-060","p":"Judy","t":"00:37:48","q":"Definitely. And you like I mean I did I do follow some of like the there's some there were some really smart students at the law school like everyone every year, has like this one top person who's like incredibly talented and just knows everything. And I do follow them on LinkedIn and like, they like publishing these articles and like doing this and this. I'm just like, wow, that's really impressive. And I think those kind of people, they really get the law. But I think if I'm comparing myself to like what the status is like, oh, they're solicitor, they're senior solicitor, it's like a bad way to compare because really.","c":46,"n":3,"i":"networks","s":21},{"id":"Judy-003825-061","p":"Judy","t":"00:38:25","q":"It's pointless because like, you don't really know like it just depends on the firm and the people.","c":7,"n":0,"i":"big4","s":43},{"id":"Judy-003903-062","p":"Judy","t":"00:39:03","q":"You just gotta. You gotta start somewhere. Yeah.","c":5,"n":7,"i":"procedural","s":47},{"id":"Judy-003918-063","p":"Judy","t":"00:39:18","q":"I know that. Well, I say that now, but you know, circumstances change, I know that I don't, I don't want to stay in [provincial city] forever. If it means I go to another one of the cities that the firm has an office in. But I also don't see myself, like, if I, if I, if I get the job going and I understand everything, I don't want to spend kind of just, like the same routine. I want to, like, evolve, I guess. I mean, you always evolve, always having new clients and new cases and stuff, but I because I knew that I, I like medicine and law and or immigration and law and stuff like that. I've always I've, I'm hoping that maybe I get the chance to dabble in that field a little.","c":7,"n":0,"i":"big4","s":30},{"id":"Judy-004004-064","p":"Judy","t":"00:40:04","q":"Even though it sounds daunting because it's super difficult and I probably have to learn on the job as well. I don't want to wait until I'm like 30 years in the career to get there.","c":4,"n":6,"i":"pay","s":80},{"id":"Judy-004015-065","p":"Judy","t":"00:40:15","q":"I think the five year plan, if there is a plan, is to definitely keep my options open and not be like set on staying with this firm to become partner. Even though it's kind of scary to leave a firm because they put money in hoping you'd stay. But I would maybe at least three years. Maybe and then have the option and see, do I want to carry on another city? And that's all it takes? Or will I want a whole nother job, a whole nother field, you know, like, am I daring to try something that I haven't done before with the experience I have. Yeah. If I can handle it, if I, if I am like, if someone gives me that chance. So I definitely am not stuck to become like, this is my firm to become a partner because I could if I wanted to. I think this is a firm to you can grow to become a partner if I wanted to be, but that's not my goal. Like I don't want to. I can see how the partners are living and I don't want to become that.","c":4,"n":6,"i":"pay","s":27},{"id":"Judy-004124-066","p":"Judy","t":"00:41:24","q":"No no no, it's fine. Like it's a good question. They, they they're stressed. Okay. They they work a lot of hours, which is fine. But it's not like. But they kind of just they, they take the work home. Maybe it's my supervising boss as well. He's like a very stressful person. Some some other, some people are probably less. But also seeing it's like the older males, like all their all their wives don't work, or they work like a little bit or they, you know, maybe they're like in, in boards or something, like directors of some kind of boards or committees or something like that. And it seems like a very like they work all the time, constantly stressed. And when they do have a holiday, they don't really get a full holiday, like they always have to be available because they if the if something goes wrong like it's their like they.","c":10,"n":13,"i":"wellbeing","s":26},{"id":"Judy-004216-067","p":"Judy","t":"00:42:16","q":"The firm. So it sounds very like just so much responsibility and stress for. Is it worth it if is it worth that money. That they get if you constantly like scared that you know, because you're holding so much responsibility of all your employees, you know, like if something goes wrong that's on them, even if the employee did something wrong, that's their firm that goes down. I just I just don't know if that's something I'm passionate about. If it's if it's something I really enjoy and I love the work, that's different. But if it's like means I like you just care about the job more than the actual work itself, then it kind of becomes like it's crossing that line of not really being fulfilling in life.","c":7,"n":0,"i":"big4","s":37},{"id":"Judy-004329-068","p":"Judy","t":"00:43:29","q":"Yeah it is, it is like everyone's different. Like yeah. Some people I think also we or maybe because I've, I've, I care so much about having a life and wanting to enjoy life because life is just so short. And maybe some people don't even think about it. Some people are just like, Do it. And maybe I think too much, but I'm like, it's my life. I want to do what I want with it.","c":1,"n":4,"i":"work_content","s":60},{"id":"Judy-004353-069","p":"Judy","t":"00:43:53","q":"I don't have to. I have to work. But I don't want work to be my life kind of thing. Yeah, yeah.","c":2,"n":4,"i":"work_content","s":68},{"id":"Judy-004401-070","p":"Judy","t":"00:44:01","q":"We have the privilege nowadays, so. Yeah.","c":6,"n":7,"i":"procedural","s":41},{"id":"Judy-004412-071","p":"Judy","t":"00:44:12","q":"It looks like that I can I can still continue traveling.","c":0,"n":4,"i":"work_content","s":41},{"id":"Judy-004417-072","p":"Judy","t":"00:44:17","q":"And also enjoy the traveling, like, get that time out and come home from work and be able to, like, take care of myself, like physically as well and mentally without having to stress about like some kind of thing going at work. But that also means it's also a mindset thing. Like I need to train myself not to stress, obviously. That's something that is depends on the person too. But yeah, it just means that, Said I can I can enjoy going to work. And I actually look forward to getting up every day and going to work and not dreading it. And I'm still challenged, but still have time to check in on myself, you know, just like, have the energy to go to work, have the energy to eat healthy. And because that, like, you know, I guess when studying as well, you kind of notice sometimes you have like those slumps where you just stressing and you're not sleeping and eating right. And I feel like when you get older, it just takes such a toll on your body and like it's more noticeable. And when I'm stressing, I'm like, oh, no, like, this is gonna, you know, I'm going to get gray hair and wrinkles, you know, like all that stuff. But it's kind of like I'm hyper aware of that. And I don't want that to happen. Not everyone's, like, cares about it, but I care about it, so I, I just yeah, I don't want to end up being stressed and not looking back on life and going, like, why did I care so much about this job? Is I have enough money to live comfortably. I don't need to buy a jet plane or something, you know? I just need to be able to have enough money to go traveling and, you know.","c":4,"n":6,"i":"pay","s":17},{"id":"Judy-004611-073","p":"Judy","t":"00:46:11","q":"Different at the moment. It's obviously the like not knowing what I'm doing and feeling a little bit like, oh, I should know this. And the pressure of feeling like, I need to know this because people are watching me like, you know, I need to progress so I can I still want to get the promotion so I can get more money, obviously. Because I'm still end up doing the same work, but for. Yeah. And yeah, it also stresses me is the the work politics like the, like colleagues and stuff and the different personalities. And it's like I'm it's super because I mean, it's also maybe because I am German or maybe I've just grown up differently. We have more direct communication, and it's easy because you can just say, hey, I didn't like this. Can you please fix it? But I find that maybe in [the region] more than, like, it's hard to get that feedback, and then all of a sudden you realize someone's a little bit off or like the the energy, the vibe, if I call it like it's a little bit off and you're just like, wondering what is wrong. Like what happened. But it doesn't get cleared up. And that stresses me out personally because I'd probably take it too personal. And I'm just like wondering if I did a mistake in this case. I would like to know. And people don't really communicate. They just kind of like get annoyed or something, you know? And it also it shows as well about like the level of maturity that the different colleagues are like what their background is like, what they if they studied, if they if they didn't study, if like if they've had other jobs and stuff. You can just tell their their attitude towards the job and towards people and how they the emotional intelligence. And that's a big thing for me because I'm hyper aware and I feel like it's so unnecessary for people to be like, rude or mean or like, you know, I just feel like it's so much easier just to be like, you know, like","c":35,"n":35,"i":"migration","s":38},{"id":"Judy-004820-074","p":"Judy","t":"00:48:20","q":"Yeah. And everyone has their different, like, personalities, which is fine as long as you just let them be, you know, and don't like, like, it's very interesting how people talk about other people in the firm, and it kind of stresses, it stresses me out because it's like, I don't want to get involved in this, but it's more like most likely that they will talk about that to about everyone, including myself. And I don't want to be perceived in that way by other people.","c":7,"n":0,"i":"big4","s":33},{"id":"Judy-004846-075","p":"Judy","t":"00:48:46","q":"So that's kind of like a, like a psychological part that stresses me out about work because of the different opinions. And some people have a very loud personality. And if you like do something a little bit that doesn't, they don't like, you know, it's kind of it's difficult to navigate. And yeah, and the not knowing what I'm doing and being scared to ask all the time because people might think I should know this. And yeah. So that kind of those two things are the main stress factors. At the moment.","c":10,"n":13,"i":"wellbeing","s":58},{"id":"Judy-004930-076","p":"Judy","t":"00:49:30","q":"I talk to myself in my head, like I just tell myself, like, well, I don't like I don't think I actually verbally talked to myself. I just kind of say that like it's, you know, don't take it personally. Like, you know what you did? If they have a problem, it might be like a personal, like what's it called? Like a projection? But I also own up to, like, okay, I should probably know more about this, and, like, I'm honest to myself about it. And I just like research to make sure I understand it and ask the right people that I would. The people who know, like, for example, I ask my, like, the one who sits next to me. She's also a lawyer and she's my age, but she started like a few years earlier, so she knows the kind of process that I'm in. So if I ask her a question, she's like a lot more understanding because she's been there too. Whereas if I ask like a legal executive who's been working there for like, I don't know, ten years, never been through the process and believes that because you're a lawyer, you should know everything. They might get pissed off at someone who gets who's a higher ranking than them. I had to ask them questions, you know, like, they kind of thing. I just tried to, like, kind of feel my way.","c":69,"n":21,"i":"aspiration","s":0},{"id":"Judy-005049-077","p":"Judy","t":"00:50:49","q":"But it's upsetting because the whole point is to lift each other up. But it's just the nature of things. And I don't have any other new, new lawyers around me to ask the same questions, so I don't really know how. Yeah. And yeah.","c":1,"n":4,"i":"work_content","s":64},{"id":"Judy-005110-078","p":"Judy","t":"00:51:10","q":"Yeah. Yeah. And it's, it's refreshing because like after a while you start to doubt yourself. It's like oh my God you're right. I should know more. But then I'm thinking, wait a second. Like how how is someone supposed to know more if they don't get taught it? And yeah, like you can only Google so much, like there's only so much you can Google. So I think that that helps a lot. And talking to my friends and family, just like.","c":1,"n":4,"i":"work_content","s":44},{"id":"Judy-005129-079","p":"Judy","t":"00:51:29","q":"Telling them the situation and then then hearing their point of view and like I guess Germans.","c":35,"n":35,"i":"migration","s":62},{"id":"Judy-005135-080","p":"Judy","t":"00:51:35","q":"Like, just try not to take things home. Like, just go home and be like. You know what I did what I could like. I'm just gonna enjoy and, like, be grateful, like, practice gratefulness and stuff. Yeah. My goodness. Yeah. So that's kind of how I manage the stress.","c":10,"n":13,"i":"wellbeing","s":52},{"id":"Judy-005156-081","p":"Judy","t":"00:51:56","q":"Yeah. I'm learning. Still learning.","c":9,"n":7,"i":"procedural","s":29},{"id":"Judy-005213-082","p":"Judy","t":"00:52:13","q":"Thank you.","c":8,"n":7,"i":"procedural","s":36},{"id":"Judy-005230-083","p":"Judy","t":"00:52:30","q":"Definitely. I guess yeah. Like, I think I did a good job at preparing for my career. Like, I I had my rebellious phase, but then, you know, I kind of still, like, focused. I think definitely.","c":2,"n":4,"i":"work_content","s":39},{"id":"Judy-005249-084","p":"Judy","t":"00:52:49","q":"Like, listen to. Oh, wait, what was I going to say? I was going to say. I lost my I lost I was like, thinking of my train of thought somewhere else. To not get, like, influenced too much about people. You don't want to be like, I, I'm still kind of reminding myself of that now. Like, if someone is hating on you or someone giving you an opinion or someone is doing something in life that you don't actually like or like, then why would you listen to their opinion or why would you compare yourself to them.","c":2,"n":4,"i":"work_content","s":64},{"id":"Judy-005323-085","p":"Judy","t":"00:53:23","q":"Like it's like a simple example. It's like if someone is I don't know his, his purple shoes. And you hate purple shoes. And then that person says that my shoes are ugly. Like, why would I take that?","c":3,"n":4,"i":"work_content","s":43},{"id":"Judy-005337-086","p":"Judy","t":"00:53:37","q":"Want.","c":6,"n":7,"i":"procedural","s":22},{"id":"Judy-005339-087","p":"Judy","t":"00:53:39","q":"Don't like it's different. Different. I'm not going to hate on them. Like they just have different opinion. But like, I'm not going to like be upset about it. So they kind of think like if, if someone like, makes like gives you advice or makes you feel bad or like discourages you from something, have a think and be like, is this the person I want to take advice from because I want to be that person, or is that person just someone speaking like trying to push you down? You know, like if if you want to be a lawyer, then maybe you should follow lawyers on social media or something and see if this is someone I want to become. I want to listen to their advice. Like, I guess that I think that's a good advice.","c":39,"n":28,"i":"advice","s":0},{"id":"Judy-005427-088","p":"Judy","t":"00:54:27","q":"Who to listen to. Because some people might be, like, really powerful, but it's like. Like, yeah, they're really powerful. But like, is it like a power that you actually admire? Like, yeah. So don't take like it be as from people that they don't really deserve it, you know. You don't know how.","c":3,"n":4,"i":"work_content","s":22},{"id":"Judy-005449-089","p":"Judy","t":"00:54:49","q":"But that's that's my advice, I think, for. Getting to the career and just be kind to people because you don't know what they're going through, like. Just don't. I mean, I'm still learning, but if people are mean, don't take it personally, but still be kind and understanding that there's a reason they're being mean. Just, you know, protect yourself, I guess.","c":4,"n":6,"i":"pay","s":60},{"id":"Judy-005515-090","p":"Judy","t":"00:55:15","q":"Thank you.","c":8,"n":7,"i":"procedural","s":36},{"id":"Judy-005538-091","p":"Judy","t":"00:55:38","q":"So thank you.","c":6,"n":7,"i":"procedural","s":65},{"id":"Judy-005550-092","p":"Judy","t":"00:55:50","q":"I think yeah, I think we oh sorry. Battery. Just battery low battery I think we have I think yeah because we the focus on career. But I guess it's you have to like part of the career progress is also like your life process like partners like housing kids like hat that I had a better overview of those actual masters, and actually the was it a masters of business MBA, but a master? Yeah, I was like reading that. I was like, that would have been actually probably more enjoyable.","c":77,"n":32,"i":"covid","s":27},{"id":"Ian-001819-057","p":"Ian","t":"00:18:19","q":"So [name] reached out to her? Yeah. Then she reached out to me.","c":2,"n":4,"i":"work_content","s":54},{"id":"Ian-001836-058","p":"Ian","t":"00:18:36","q":"Yeah, more kind of just the she she asked about how the degree went. Why you were interested in HR and obviously my background then. And then she was like, hey, you know we got some we're doing some work here, and there's one with some project work coming up. And and it was more, I guess. Yeah, based around that project and what it looks like in the everyday.","c":1,"n":4,"i":"work_content","s":52},{"id":"Ian-001929-059","p":"Ian","t":"00:19:29","q":"Yeah. It was again, I guess because of the unique situation. What didn't actually feel massive, mainly because it just, you know, it's here. Been studying here for how long? It was almost like, okay, now you're starting at eight for your, your social, you know, scenario type thing.","c":3,"n":4,"i":"work_content","s":59},{"id":"Ian-001947-060","p":"Ian","t":"00:19:47","q":"And now you finish four.","c":0,"n":4,"i":"work_content","s":12},{"id":"Ian-001952-061","p":"Ian","t":"00:19:52","q":"Yeah. It was all quite structured getting into it.","c":13,"n":19,"i":"leaving","s":0},{"id":"Ian-002009-062","p":"Ian","t":"00:20:09","q":"The team over there were really good and quite sociable.","c":12,"n":19,"i":"leaving","s":10},{"id":"Ian-002028-063","p":"Ian","t":"00:20:28","q":"Yeah. So the like day to day stuff admin role was We had a inbox that we looked after. So that's, you know, general HR enquiries, payroll stuff, recruitment stuff, all the quite basic ones that. We also did all like casual and fixed term. Fixed term like less than 12 months offers. Yeah. So we dealt with a lot of approving those checking that are okay to go and then helping send those out.","c":12,"n":19,"i":"leaving","s":48},{"id":"Ian-002101-064","p":"Ian","t":"00:21:01","q":"In terms of like so that was a lot of the BA stuff. There's stuff expanded over time. We started picking up a little more things here and there.","c":0,"n":4,"i":"work_content","s":69},{"id":"Ian-002112-065","p":"Ian","t":"00:21:12","q":"And then the big first big project work was they were doing academic promotions.","c":0,"n":4,"i":"work_content","s":59},{"id":"Ian-002121-066","p":"Ian","t":"00:21:21","q":"And they were reviewing how they like, structured academic promotions and that just got a whole bunch of feedback. And part of my project was summarizing that feedback into key points.","c":0,"n":4,"i":"work_content","s":59},{"id":"Ian-002150-067","p":"Ian","t":"00:21:50","q":"Yeah, it was good. So like, I'd been in the admin role because I'd started an admin role in August and been in a when were we looking? Probably March by that point. And I was kind of like the admin role isn't. It was designed there to be a grad role. So you get in and you're not meant to be in that role permanently. It's just get your stuff under you and start branching out to your areas. And there was the role that it directly went into was called HR coordinator. Business coordinator. But a lot of the people who'd gone into that role had either had previous experience or been in the admin.","c":1,"n":4,"i":"work_content","s":68},{"id":"Ian-002238-068","p":"Ian","t":"00:22:38","q":"For quite a lot longer.","c":20,"n":19,"i":"leaving","s":0},{"id":"Ian-002240-069","p":"Ian","t":"00:22:40","q":"And I was kind of over the admin role at that point.","c":0,"n":4,"i":"work_content","s":41},{"id":"Ian-002251-070","p":"Ian","t":"00:22:51","q":"And that was when I saw the recruitment role pop up.","c":21,"n":2,"i":"interview_process","s":28},{"id":"Ian-002257-071","p":"Ian","t":"00:22:57","q":"And we were already doing base level recruitment stuff. Part of that role. And you could give it a go expand out from there. Yeah. Obviously we went through a recruitment process for that. Yeah. Saw what the job kind of was more about, you know, the interviews and advertising and it was like kind of done that little bit in the degree of our management course.","c":62,"n":2,"i":"interview_process","s":0},{"id":"Ian-002321-072","p":"Ian","t":"00:23:21","q":"And then Yeah. Got the job and moved into that space from there.","c":0,"n":4,"i":"work_content","s":44},{"id":"Ian-002334-073","p":"Ian","t":"00:23:34","q":"Heavy that it was so. The descent because I started in August and I had another admin with me for about a month, a month and a half. Then it was just me. And we were getting into that period of the year where workload was just going up. So I was getting busy. It was doing some like it was just every day sitting down, replying to email, reply to email, replying email, 150 odd emails every morning to go through. We got like another admin to come who would be part time to help, but they didn't get access until like mid December. So it was they were doing what they could, but I was still doing the bulk of it.","c":0,"n":4,"i":"work_content","s":69},{"id":"Ian-002425-074","p":"Ian","t":"00:24:25","q":"And then come January we started a had a new system called ServiceNow, and it was like a you go to it and you submit tickets. It's kind of like the it.","c":2,"n":4,"i":"work_content","s":46},{"id":"Ian-002437-075","p":"Ian","t":"00:24:37","q":"And that was meant to take place of the inbox, but it was going to be a phase I see. And obviously when it started heat tickets started getting more and more and more and the inbox only went down a little bit. So now it was looking after both and I was like.","c":3,"n":4,"i":"work_content","s":62},{"id":"Ian-002508-076","p":"Ian","t":"00:25:08","q":"So that whole role was a lot about and I did kind of change over time, but initially preparing adverts, advertising roles providing advice on interviews. That was kind of a lot of the bulk of it at the start, like declining applicants who didn't move to, like, shortlisting.","c":61,"n":37,"i":"relocation","s":0},{"id":"Ian-002540-077","p":"Ian","t":"00:25:40","q":"Stuff like that. So that was kind of the initial start point of the role.","c":1,"n":4,"i":"work_content","s":64},{"id":"Ian-002545-078","p":"Ian","t":"00:25:45","q":"And after a couple of months, we kind of getting more confident and understanding the systems start to get added, like start sitting in on interviews and actually being a member of the panel.","c":96,"n":25,"i":"confidence","s":0},{"id":"Ian-002600-079","p":"Ian","t":"00:26:00","q":"And then actually sitting down with the hiring.","c":16,"n":2,"i":"interview_process","s":14},{"id":"Ian-002608-080","p":"Ian","t":"00:26:08","q":"And providing them with advice and stuff on how they should be advertising what they should be asking the questions, how it can be a good process.","c":71,"n":28,"i":"advice","s":0},{"id":"Ian-002646-081","p":"Ian","t":"00:26:46","q":"So it was probably towards the end of that year where I'd been in kind of the HR space for over a year and a half. By that point and kind of realized I'd gotten like quite a lot, you know, fitness outside exercise and hiking and all that. Yeah. And like, kind of being active.","c":12,"n":19,"i":"leaving","s":5},{"id":"Ian-002714-082","p":"Ian","t":"00:27:14","q":"And it was I can kind of remember it was like, just like one evening where I was like, at home talking with dad. I was like, so how's work? Oh, you know, good. But stuck behind the desk every day, five days a week, week on week end.","c":0,"n":4,"i":"work_content","s":34},{"id":"Ian-002731-083","p":"Ian","t":"00:27:31","q":"And I was like, you know, want something a bit more physical, a bit more hands on. And he jokingly said come join me. And I wasn't. And I was like ha. Laughed it off. And then it was kind of over the next week just thinking about it.","c":22,"n":18,"i":"autonomy","s":40},{"id":"Ian-002747-084","p":"Ian","t":"00:27:47","q":"Kind of looking at it in more. And that was kind of the catalyst.","c":6,"n":7,"i":"procedural","s":57},{"id":"Ian-002755-085","p":"Ian","t":"00:27:55","q":"Sorry 23.","c":6,"n":7,"i":"procedural","s":39},{"id":"Ian-002757-086","p":"Ian","t":"00:27:57","q":"Nice. I applied twice for the fire brigade.","c":2,"n":4,"i":"work_content","s":39},{"id":"Ian-002801-087","p":"Ian","t":"00:28:01","q":"Didn't get in the first time and got in the second time.","c":0,"n":4,"i":"work_content","s":56},{"id":"Ian-002810-088","p":"Ian","t":"00:28:10","q":"Probably talking to dad.","c":5,"n":7,"i":"procedural","s":37},{"id":"Ian-002813-089","p":"Ian","t":"00:28:13","q":"Getting more the insight on what you actually do in the job and you know, kind of hearing get more hands on the stuff is really rewarding as a career and profession.","c":22,"n":18,"i":"autonomy","s":50},{"id":"Ian-002837-090","p":"Ian","t":"00:28:37","q":"I didn't have any actual lists I wrote down, but it was definitely just being understanding that there's a lot more. You know, how do you say it? Yes. Physical. In terms of you're not just behind a desk.","c":2,"n":4,"i":"work_content","s":82},{"id":"Ian-002857-091","p":"Ian","t":"00:28:57","q":"And engage and.","c":9,"n":7,"i":"procedural","s":29},{"id":"Ian-002859-092","p":"Ian","t":"00:28:59","q":"And just.","c":6,"n":7,"i":"procedural","s":17},{"id":"Ian-002917-093","p":"Ian","t":"00:29:17","q":"And that was like in that recruitment role. Every chance I could take to actually go have a meeting with someone in person, or go out and sit on an interview panel.","c":21,"n":2,"i":"interview_process","s":100},{"id":"Ian-002932-094","p":"Ian","t":"00:29:32","q":"And yeah. And kind of just realizing that because of what obviously the job requires mentally and, you know, growing up in [city] being for the earthquakes.","c":27,"n":17,"i":"learning","s":38},{" ey they were horrible.","c":5,"n":7,"i":"procedural","s":33},{"id":"Ian-003202-107","p":"Ian","t":"00:32:02","q":"A bit disheartening.","c":5,"n":7,"i":"procedural","s":33},{"id":"Ian-003204-108","p":"Ian","t":"00:32:04","q":"It was also, I guess probably what could have added to it as more was working in the recruitment space, you knew how to provide good feedback and what obviously we got and try to make it candidate focused recruitment here at [the university].","c":19,"n":2,"i":"interview_process","s":79},{"id":"Ian-003219-109","p":"Ian","t":"00:32:19","q":"So kind of seeing how to communicate.","c":6,"n":7,"i":"procedural","s":33},{"id":"Ian-003222-110","p":"Ian","t":"00:32:22","q":"It was like damn.","c":6,"n":7,"i":"procedural","s":28},{"id":"Ian-003224-111","p":"Ian","t":"00:32:24","q":"Great.","c":8,"n":7,"i":"procedural","s":19},{"id":"Ian-003241-112","p":"Ian","t":"00:32:41","q":"Did you so there was probably like a month in the downs where you're like, oh, maybe it isn't for me. And then it was obviously still doing the work and the recruitment job. I didn't I didn't hate it, didn't love it, but it was enjoyable. Yeah. And","c":21,"n":2,"i":"interview_process","s":56},{"id":"Ian-003307-113","p":"Ian","t":"00:33:07","q":"The people side of the job was what kept me in it for that long. Yeah, but like the ones you work with and being able to actually go out interact with hiring managers and candidates.","c":19,"n":2,"i":"interview_process","s":58},{"id":"Ian-003319-114","p":"Ian","t":"00:33:19","q":"And then like after a month I was like no I still want to drive.","c":0,"n":4,"i":"work_content","s":50},{"id":"Ian-003325-115","p":"Ian","t":"00:33:25","q":"So I applied for the following round which was the December of 2024.","c":0,"n":4,"i":"work_content","s":53},{"id":"Ian-003405-116","p":"Ian","t":"00:34:05","q":"And like a sob story which happened in the interim of all that? Yeah. Was there were do you see us moving to a new HR system called workday? So all of the recruitment stuff would be moving to that. And a position came up for working on the project to help move to the workday.","c":138,"n":37,"i":"relocation","s":50},{"id":"Ian-003430-117","p":"Ian","t":"00:34:30","q":"And that was probably my big moment of, oh, this is where I have to be confident in my decision, because it was I could apply and be in that position, and that would have given me really great experience to kind of move into any HR role. Yeah, because you've already behind the scenes and HR systems, you know, all the background stuff.","c":52,"n":25,"i":"confidence","s":90},{"id":"Ian-003452-118","p":"Ian","t":"00:34:52","q":"Talking to my manager, it looks really good on your CV for anything in.","c":11,"n":9,"i":"mentor_good","s":80},{"id":"Ian-003457-119","p":"Ian","t":"00:34:57","q":"But then I was like obviously, you know, the fire.","c":3,"n":4,"i":"work_content","s":14},{"id":"Ian-003501-120","p":"Ian","t":"00:35:01","q":"So I thought about it, looked it over, was still confident and fire.","c":52,"n":25,"i":"confidence","s":0},{"id":"Ian-003507-121","p":"Ian","t":"00:35:07","q":"And then it was talking to dad about hey this option for this role that I can do in the interim. What will be more beneficial for me moving into this fire fighter role, besides staying the role in which is very people focused, you know, communications or the project role, not as much people focused, but more project management.","c":1,"n":4,"i":"work_content","s":68},{"id":"Ian-003530-122","p":"Ian","t":"00:35:30","q":"Working on projects and people.","c":2,"n":4,"i":"work_content","s":29},{"id":"Ian-003534-123","p":"Ian","t":"00:35:34","q":"Focus helps.","c":5,"n":7,"i":"procedural","s":27},{"id":"Ian-003605-124","p":"Ian","t":"00:36:05","q":"That was she didn't know about fire at that stage, but that was purely for that project.","c":0,"n":4,"i":"work_content","s":59},{"id":"Ian-003625-125","p":"Ian","t":"00:36:25","q":"She said it. It looks it's great on the CV that And it definitely opens up a lot of doors and bazaars and recruitment. That opens a lot in the actual generalist HR space.","c":19,"n":2,"i":"interview_process","s":84},{"id":"Ian-003640-126","p":"Ian","t":"00:36:40","q":"I see a lot of the back end functions by that point.","c":0,"n":4,"i":"work_content","s":56},{"id":"Ian-003643-127","p":"Ian","t":"00:36:43","q":"Yeah, definitely. Everything.","c":6,"n":7,"i":"procedural","s":30},{"id":"Ian-003646-128","p":"Ian","t":"00:36:46","q":"Definitely helps. Like I would have without a doubt. Got me getting into the coordinator business support coordinator.","c":3,"n":4,"i":"work_content","s":57},{"id":"Ian-003654-129","p":"Ian","t":"00:36:54","q":"And would have definitely could have helped going down a business partner route as well.","c":0,"n":4,"i":"work_content","s":66},{"id":"Ian-003712-130","p":"Ian","t":"00:37:12","q":"Yeah, it was kind of like a weighing up because.","c":84,"n":10,"i":"decision","s":0},{"id":"Ian-003717-131","p":"Ian","t":"00:37:17","q":"Fire because of the role itself. Business partner like. Yeah. It's kind of cool to stuff you could do, but it was probably more financial esque.","c":4,"n":6,"i":"pay","s":60},{"id":"Ian-003758-132","p":"Ian","t":"00:37:58","q":"I think it was a couple weeks because there was a deadline for that project role.","c":1,"n":4,"i":"work_content","s":76},{"id":"Ian-003815-133","p":"Ian","t":"00:38:15","q":"Probably. Most likely.","c":8,"n":7,"i":"procedural","s":33},{"id":"Ian-003833-134","p":"Ian","t":"00:38:33","q":"Yeah, a couple mates just talking it through.","c":6,"n":7,"i":"procedural","s":41},{"id":"Ian-003836-135","p":"Ian","t":"00:38:36","q":"Nice. And the idea of, you know, HSPs or firefighter. Yeah. And they were all for firefighters.","c":2,"n":4,"i":"work_content","s":61},{"id":"Ian-003854-136","p":"Ian","t":"00:38:54","q":"They're both nurses. Oh yeah. Both in that kind.","c":0,"n":4,"i":"work_content","s":25},{"id":"Ian-003900-137","p":"Ian","t":"00:39:00","q":"And yeah.","c":6,"n":7,"i":"procedural","s":13},{"id":"Ian-003915-138","p":"Ian","t":"00:39:15","q":"Not really.","c":9,"n":7,"i":"procedural","s":16},{"id":"Ian-003951-139","p":"Ian","t":"00:39:51","q":"More kind of just doing my own research.","c":0,"n":4,"i":"work_content","s":25},{"id":"Ian-003953-140","p":"Ian","t":"00:39:53","q":"Online and just talking to dad more.","c":0,"n":4,"i":"work_content","s":28},{"id":"Ian-003956-141","p":"Ian","t":"00:39:56","q":"What the calls are. What, the day to day stuff.","c":2,"n":4,"i":"work_content","s":46},{"id":"Ian-004016-142","p":"Ian","t":"00:40:16","q":"I've just I said I'd catch up with one of the guys here afterwards, so.","c":9,"n":7,"i":"procedural","s":100},{"id":"Ian-004022-143","p":"Ian","t":"00:40:22","q":"Won't.","c":8,"n":7,"i":"procedural","s":22},{"id":"Ian-004051-144","p":"Ian","t":"00:40:51","q":"So, yeah. So that second round made it to the interview stage?","c":19,"n":2,"i":"interview_process","s":26},{"id":"Ian-004057-145","p":"Ian","t":"00:40:57","q":"And obviously finished the interview. Got the call, got offered the Office job.","c":16,"n":2,"i":"interview_process","s":38},{"id":"Ian-004104-146","p":"Ian","t":"00:41:04","q":"Awesome. And I'd heard through dad already that that next phase is very drawn out. Yes. So I'd kind of already had a good idea that I'm now in it for the long game.","c":0,"n":4,"i":"work_content","s":72},{"id":"Ian-004120-147","p":"Ian","t":"00:41:20","q":"And it was a bit, a little bit iffy because obviously interview got done, got called up and said you've got the job. And they did it a little bit different order than what we do it. And then they asked for references.","c":62,"n":2,"i":"interview_process","s":60},{"id":"Ian-004136-148","p":"Ian","t":"00:41:36","q":"So I got the job but got asked for references. So at that stage sat down, told the boss. Yeah. And this was all in April.","c":1,"n":4,"i":"work_content","s":60},{"id":"Ian-004200-149","p":"Ian","t":"00:42:00","q":"I had told. Yeah, I told a couple.","c":8,"n":7,"i":"procedural","s":47},{"id":"Ian-004206-150","p":"Ian","t":"00:42:06","q":"And that I was in the process. Yeah. I'd gotten to the interview stage this time.","c":62,"n":2,"i":"interview_process","s":7},{"id":"Ian-004212-151","p":"Ian","t":"00:42:12","q":"Are they all fairly cool?","c":1,"n":4,"i":"work_content","s":4},{"id":"Ian-004214-152","p":"Ian","t":"00:42:14","q":"Sad that I'd be leaving because I was key part of the team.","c":2,"n":4,"i":"work_content","s":79},{"id":"Ian-004232-153","p":"Ian","t":"00:42:32","q":"So the next stage was all of the pre-employment checks, which was references hearing tests, breathing tests, health tests.","c":3,"n":4,"i":"work_content","s":51},{"id":"Ian-004252-154","p":"Ian","t":"00:42:52","q":"And that was literally over the span of April through August.","c":1,"n":4,"i":"work_content","s":36},{"id":"Ian-004306-155","p":"Ian","t":"00:43:06","q":"Just testing for that stuff?","c":0,"n":4,"i":"work_content","s":16},{"id":"Ian-004308-156","p":"Ian","t":"00:43:08","q":"The actual training bit is from September to December.","c":3,"n":4,"i":"work_content","s":30},{"id":"Ian-004321-157","p":"Ian","t":"00:43:21","q":"Good. A shock to her.","c":1,"n":4,"i":"work_content","s":8},{"id":"Ian-004324-158","p":"Ian","t":"00:43:24","q":"But she she was happy that it wasn't an HR job.","c":2,"n":4,"i":"work_content","s":57},{"id":"Ian-004332-159","p":"Ian","t":"00:43:32","q":"She said she would have been upset if it was another HR role. Like, you know, that something they hadn't been doing it well enough or saying that space that made me want to leave. But because it was a complete career shift with the background of dads being on, I wanted to get into that space. She was real happy for me.","c":0,"n":4,"i":"work_content","s":81},{"id":"Ian-004358-160","p":"Ian","t":"00:43:58","q":"So interest based change rather than actual.","c":0,"n":4,"i":"work_content","s":19},{"id":"Ian-004409-161","p":"Ian","t":"00:44:09","q":"Because I was seeing in terms of the months. Yeah, I was still working at [the university] until September.","c":2,"n":4,"i":"work_content","s":75},{"id":"Ian-004421-162","p":"Ian","t":"00:44:21","q":"I gave her a heads up saying, hey it's a long process now.","c":3,"n":4,"i":"work_content","s":51},{"id":"Ian-004427-163","p":"Ian","t":"00:44:27","q":"And obviously, I'm not handing in my notice right now.","c":3,"n":4,"i":"work_content","s":32},{"id":"Ian-004430-164","p":"Ian","t":"00:44:30","q":"I still need to have some form of job until.","c":0,"n":4,"i":"work_content","s":47},{"id":"Ian-004443-165","p":"Ian","t":"00:44:43","q":"No. Yeah, I it was kind of the opposite. It was I'd been quite fundamental in terms of a lot of the new systems.","c":12,"n":19,"i":"leaving","s":48},{"id":"Ian-004452-166","p":"Ian","t":"00:44:52","q":"And understanding it. So up until I left, I was doing heaps of projects where.","c":10,"n":13,"i":"wellbeing","s":61},{"id":"Ian-004501-167","p":"Ian","t":"00:45:01","q":"You know how to guides input on your systems?","c":1,"n":4,"i":"work_content","s":16},{"id":"Ian-004507-168","p":"Ian","t":"00:45:07","q":"Training the new recruits. Recruitment coordinators that were coming in. So pretty much you're quite actually really kind of picked up in terms of that sense.","c":13,"n":19,"i":"leaving","s":56},{"id":"Ian-004539-169","p":"Ian","t":"00:45:39","q":"So yeah, obviously I told her that I would hand in my notice once because the employment was conditional on.","c":0,"n":4,"i":"work_content","s":62},{"id":"Ian-004549-170","p":"Ian","t":"00:45:49","q":"We didn't find out. I said I'd hand in my notice once. I've obviously.","c":3,"n":4,"i":"work_content","s":62},{"id":"Ian-004557-171","p":"Ian","t":"00:45:57","q":"Was there a downside it took until start of August? Yeah.","c":1,"n":4,"i":"work_content","s":40},{"id":"Ian-004603-172","p":"Ian","t":"00:46:03","q":"So obviously yeah. The second I got that done and I noticed officially, which meant then they were able to start advertising for a replacement.","c":2,"n":4,"i":"work_content","s":71},{"id":"Ian-004616-173","p":"Ian","t":"00:46:16","q":"It was sad because it was like, obviously the role was enjoyable. That's just what the people asked.","c":0,"n":4,"i":"work_content","s":69},{"id":"Ian-004639-174","p":"Ian","t":"00:46:39","q":"It was. It was really the definitely.","c":1,"n":4,"i":"work_content","s":16},{"id":"Ian-004709-175","p":"Ian","t":"00:47:09","q":"So the whole training aspect was I got flown up to [another city] and I lived in [another city] from September through to December. Nice. Monday to Friday. Training.","c":79,"n":37,"i":"relocation","s":0},{"id":"Ian-004734-176","p":"Ian","t":"00:47:34","q":"It was awesome. It was He really, obviously practical. Hands on.","c":25,"n":18,"i":"autonomy","s":24},{"id":"Ian-004739-177","p":"Ian","t":"00:47:39","q":"Assessment stuff throughout it. And, you know, you're trained from everything on your whole skills to medical first aid to search and rescue. Obviously, we did live fire training.","c":30,"n":17,"i":"learning","s":43},{"id":"Ian-004753-178","p":"Ian","t":"00:47:53","q":"MVA car crashes. Yeah. Urban search and rescue.","c":9,"n":7,"i":"procedural","s":58},{"id":"Ian-004804-179","p":"Ian","t":"00:48:04","q":"That was covered in a short time. And our instructors told us, like, in an ideal world training would be like 16, 20 weeks.","c":2,"n":4,"i":"work_content","s":57},{"id":"Ian-004813-180","p":"Ian","t":"00:48:13","q":"But they only get three months.","c":2,"n":4,"i":"work_content","s":25},{"id":"Ian-004826-181","p":"Ian","t":"00:48:26","q":"You we got put in a hotel.","c":3,"n":4,"i":"work_content","s":19},{"id":"Ian-004838-182","p":"Ian","t":"00:48:38","q":"There are definitely aspects probably halfway through training which were the biggest weeks, which were BA weeks. Apparatus is what it's called. And live fire just because it's a heavy physical mode.","c":2,"n":4,"i":"work_content","s":89},{"id":"Ian-004903-183","p":"Ian","t":"00:49:03","q":"Yeah. And obviously all of that stuff.","c":8,"n":7,"i":"procedural","s":31},{"id":"Ian-004906-184","p":"Ian","t":"00:49:06","q":"All that stuff's being assessed.","c":0,"n":4,"i":"work_content","s":16},{"id":"Ian-004909-185","p":"Ian","t":"00:49:09","q":"And the.","c":5,"n":7,"i":"procedural","s":7},{"id":"Ian-004912-186","p":"Ian","t":"00:49:12","q":"The assessment side of it was probably a bit daunting and.","c":3,"n":4,"i":"work_content","s":38},{"id":"Ian-004918-187","p":"Ian","t":"00:49:18","q":"Archaic is. They had like a kind of a traffic light system. So when you start the course you're in green.","c":1,"n":4,"i":"work_content","s":52},{"id":"Ian-004927-188","p":"Ian","t":"00:49:27","q":"Which is fine if you fail one of the compulsory parts of the course, which give you example, in week two we did knots and there were 20 knots that we had to learn and do them in a certain amount of time on assessment day. If you failed one of those 20 knots, it was an instant fail for it and then you moved move from green into amber, which is just a warning.","c":4,"n":6,"i":"pay","s":70},{"id":"Ian-004956-189","p":"Ian","t":"00:49:56","q":"You're now in amber for the rest of the course. So there are people who did that in week two who now in amber for the remaining ten weeks. If you fail something else, you move to red one, which was verbal warning and then fail again. Written warning. And then it was like justification for dismissal at that point.","c":61,"n":37,"i":"relocation","s":100},{"id":"Ian-005031-190","p":"Ian","t":"00:50:31","q":"Yeah. We had like, the big motivation killer was week two. About half of them failed some of their knots. So it was like half the course already in amber one. And we're only in week two.","c":3,"n":4,"i":"work_content","s":46},{"id":"Ian-005045-191","p":"Ian","t":"00:50:45","q":"And like one of the guys who failed it at that point was already like looking at you. So, you know, one of the key team players like ex-Navy diver type stuff. Big stuff.","c":1,"n":4,"i":"work_content","s":32},{"id":"Ian-005100-192","p":"Ian","t":"00:51:00","q":"So yeah, that that was obviously quite demotivating at.","c":20,"n":19,"i":"leaving","s":4},{"id":"Ian-005105-193","p":"Ian","t":"00:51:05","q":"Stage. Yeah. Like just going luckily I hadn't I passed the knots. Thank goodness.","c":1,"n":4,"i":"work_content","s":52},{"id":"Ian-005122-194","p":"Ian","t":"00:51:22","q":"Oh, the upside was when I left uni they said come back in any time.","c":20,"n":19,"i":"leaving","s":70},{"id":"Ian-005132-195","p":"Ian","t":"00:51:32","q":"I had a pretty good safety net.","c":2,"n":4,"i":"work_content","s":32},{"id":"Ian-005150-196","p":"Ian","t":"00:51:50","q":"Yes, it's the same kind of. Yeah, yeah. You're you start at the bottom of the barrel.","c":1,"n":4,"i":"work_content","s":44},{"id":"Ian-005156-197","p":"Ian","t":"00:51:56","q":"And the the ideal position that everyone gets to is senior firefighter.","c":2,"n":4,"i":"work_content","s":54},{"id":"Ian-005202-198","p":"Ian","t":"00:52:02","q":"Which is just quite active. Yeah, but for example, dad's a senior station officer, which is a bit more hands off physically.","c":12,"n":19,"i":"leaving","s":48},{"id":"Ian-005219-199","p":"Ian","t":"00:52:19","q":"Size this up type thing?","c":0,"n":4,"i":"work_content","s":19},{"id":"Ian-005221-200","p":"Ian","t":"00:52:21","q":"So long term, something in that space.","c":78,"n":24,"i":"health_change","s":0},{"id":"Ian-005236-201","p":"Ian","t":"00:52:36","q":"Even the aspect of having a bit of a, you know, contribution to their recruitment.","c":19,"n":2,"i":"interview_process","s":63},{"id":"Ian-005243-202","p":"Ian","t":"00:52:43","q":"In the future.","c":8,"n":7,"i":"procedural","s":31},{"id":"Ian-005248-203","p":"Ian","t":"00:52:48","q":"And knowing my dad had worked as part of their recruitment in the past, knew further down the track that'd be something cool that I'd like to, you know, help out with. Yeah, yeah.","c":16,"n":2,"i":"interview_process","s":33},{"id":"Ian-005337-204","p":"Ian","t":"00:53:37","q":"They even told us through course that you can branch out.","c":1,"n":4,"i":"work_content","s":48},{"id":"Ian-005342-205","p":"Ian","t":"00:53:42","q":"Find a specialist areas and stuff.","c":3,"n":4,"i":"work_content","s":14},{"id":"Ian-005344-206","p":"Ian","t":"00:53:44","q":"While Maintaining being on the trucks. Yeah, yeah.","c":8,"n":7,"i":"procedural","s":39},{"id":"Ian-005356-207","p":"Ian","t":"00:53:56","q":"Had ten days off.","c":6,"n":7,"i":"procedural","s":35},{"id":"Ian-005358-208","p":"Ian","t":"00:53:58","q":"And then first day shift was Christmas Eve day. So Christmas Eve day Christmas day. Boxing day night. The night after night.","c":0,"n":4,"i":"work_content","s":62},{"id":"Ian-005414-209","p":"Ian","t":"00:54:14","q":"City station? No, I’m at [a central station].","c":1,"n":4,"i":"work_content","s":20},{"id":"Ian-005417-210","p":"Ian","t":"00:54:17","q":"So it was cool hearing that the plants I'm on. Yeah, it's called [a callsign].","c":3,"n":4,"i":"work_content","s":46},{"id":"Ian-005422-211","p":"Ian","t":"00:54:22","q":"Which is a pump rescue tender. And it's like, the second busiest in the country.","c":0,"n":4,"i":"work_content","s":53},{"id":"Ian-005428-212","p":"Ian","t":"00:54:28","q":"So awesome hearing that.","c":5,"n":7,"i":"procedural","s":30},{"id":"Ian-005435-213","p":"Ian","t":"00:54:35","q":"Last week of training, we found out our watches because no one watches.","c":2,"n":4,"i":"work_content","s":79},{"id":"Ian-005440-214","p":"Ian","t":"00:54:40","q":"The days and stations.","c":8,"n":7,"i":"procedural","s":36},{"id":"Ian-005448-215","p":"Ian","t":"00:54:48","q":"Yep. But it's early in the recruitment stage where you're applying for a role in a city.","c":21,"n":2,"i":"interview_process","s":72},{"id":"Ian-005500-216","p":"Ian","t":"00:55:00","q":"Like I wanted to work in [city], but I couldn't be in any station.","c":3,"n":4,"i":"work_content","s":51},{"id":"Ian-005539-217","p":"Ian","t":"00:55:39","q":"Yeah. Because like, by the time you've done your 12 weeks, You know, you've now learned everything. You've done everything hundreds of times in a training scenario. All you want to do is just do it for real.","c":4,"n":6,"i":"pay","s":47},{"id":"Ian-005558-218","p":"Ian","t":"00:55:58","q":"I've done four. Four sets.","c":3,"n":4,"i":"work_content","s":19},{"id":"Ian-005601-219","p":"Ian","t":"00:56:01","q":"It's great. However, I'm four sets in, and my most intense job so far have been a bonfire. Collapsed tree, and probably a couple car crashes where they were already out of the car.","c":0,"n":4,"i":"work_content","s":78},{"id":"Ian-005636-220","p":"Ian","t":"00:56:36","q":"Obviously, the type of work it is, you can't predict it.","c":0,"n":4,"i":"work_content","s":50},{"id":"Ian-005639-221","p":"Ian","t":"00:56:39","q":"So some people get by going there first. It could be structure house fires with fatalities in their first set versus.","c":1,"n":4,"i":"work_content","s":68},{"id":"Ian-005650-222","p":"Ian","t":"00:56:50","q":"Some people have been told six months with nothing. Yes. Really.","c":0,"n":4,"i":"work_content","s":50},{"id":"Ian-005731-223","p":"Ian","t":"00:57:31","q":"The change from the Monday to Friday to shift work. I actually enjoy it so much more.","c":1,"n":4,"i":"work_content","s":80},{"id":"Ian-005738-224","p":"Ian","t":"00:57:38","q":"Just because of with the shift calendars.","c":1,"n":4,"i":"work_content","s":16},{"id":"Ian-005742-225","p":"Ian","t":"00:57:42","q":"You obviously I can. I know what days I'm working all the way from. Yeah, yeah, yeah. Obviously keep the option. Have weekdays off now.","c":2,"n":4,"i":"work_content","s":68},{"id":"Ian-005754-226","p":"Ian","t":"00:57:54","q":"And if you don't take any overtime, you've got four days off after you reset.","c":1,"n":4,"i":"work_content","s":68},{"id":"Ian-005806-227","p":"Ian","t":"00:58:06","q":"Like with the watch you've got, there's ten people on your watch at your station and for city. So a lot of them are there every watch, sometimes, you know, often you've got over timers and stuff.","c":2,"n":4,"i":"work_content","s":64},{"id":"Ian-005819-228","p":"Ian","t":"00:58:19","q":"So it's learning them obviously because it's like a you're the rookie.","c":4,"n":6,"i":"pay","s":40},{"id":"Ian-005826-229","p":"Ian","t":"00:58:26","q":"You're you're cleaning. You're always expected to be doing something.","c":1,"n":4,"i":"work_content","s":40},{"id":"Ian-005831-230","p":"Ian","t":"00:58:31","q":"You don't touch the Lazy Boys for two years.","c":0,"n":4,"i":"work_content","s":34},{"id":"Ian-005847-231","p":"Ian","t":"00:58:47","q":"All prepped for what we were getting into.","c":3,"n":4,"i":"work_content","s":46},{"id":"Ian-005902-232","p":"Ian","t":"00:59:02","q":"After it was kind of like a week start. A week 11 was where everyone was just like.","c":2,"n":4,"i":"work_content","s":57},{"id":"Ian-005913-233","p":"Ian","t":"00:59:13","q":"We're in the home straight now.","c":2,"n":4,"i":"work_content","s":32},{"id":"Ian-005915-234","p":"Ian","t":"00:59:15","q":"So, like, the week 11 was just scenarios. Yeah. It was just running through. It was cool. It was just everything we could go to. They just did a training.","c":3,"n":4,"i":"work_content","s":43},{"id":"Ian-005925-235","p":"Ian","t":"00:59:25","q":"And and like, we've done all the heavy stuff with USAR.","c":2,"n":4,"i":"work_content","s":39},{"id":"Ian-005929-236","p":"Ian","t":"00:59:29","q":"Which.","c":8,"n":7,"i":"procedural","s":17},{"id":"Ian-005933-237","p":"Ian","t":"00:59:33","q":"Three days of carrying the stretchers that had like 150 kilos and 30 degree river for like 13km, over hills and through muddy trails and rivers and everything.","c":2,"n":4,"i":"work_content","s":61},{"id":"Ian-010005-238","p":"Ian","t":"01:00:05","q":"So the like the five years is by then ideally you'd be a senior.","c":55,"n":21,"i":"aspiration","s":0},{"id":"Ian-010011-239","p":"Ian","t":"01:00:11","q":"Yeah. Because at the moment I'm working through my qualified firefighter books and assessments, which take about a year and a half.","c":2,"n":4,"i":"work_content","s":86},{"id":"Ian-010019-240","p":"Ian","t":"01:00:19","q":"And then it's another year, year and a half to go through the senior firefighter books.","c":2,"n":4,"i":"work_content","s":79},{"id":"Ian-010035-241","p":"Ian","t":"01:00:35","q":"Obviously To you kind of want to stay in that senior.","c":1,"n":4,"i":"work_content","s":32},{"id":"Ian-010039-242","p":"Ian","t":"01:00:39","q":"As long.","c":5,"n":7,"i":"procedural","s":20},{"id":"Ian-010043-243","p":"Ian","t":"01:00:43","q":"So stay in that role. But at that stage you can start branching out with.","c":1,"n":4,"i":"work_content","s":72},{"id":"Ian-010050-244","p":"Ian","t":"01:00:50","q":"Getting trained on different appliances. Yeah. Ladder trucks. Specialist with USAR.","c":2,"n":4,"i":"work_content","s":43},{"id":"Ian-010114-245","p":"Ian","t":"01:01:14","q":"Probably do more research. But again, you know, it was it took actually obviously coming to uni.","c":0,"n":4,"i":"work_content","s":69},{"id":"Ian-010123-246","p":"Ian","t":"01:01:23","q":"And doing even the degree.","c":3,"n":4,"i":"work_content","s":14},{"id":"Ian-010127-247","p":"Ian","t":"01:01:27","q":"Those early semesters to learn kind of what I was really wanted. Yeah.","c":4,"n":6,"i":"pay","s":50},{"id":"Ian-010140-248","p":"Ian","t":"01:01:40","q":"I don't think.","c":8,"n":7,"i":"procedural","s":22},{"id":"Ian-010143-249","p":"Ian","t":"01:01:43","q":"And I don't think I'd be in the fire brigade if I didn't go to uni.","c":2,"n":4,"i":"work_content","s":82},{"id":"Ian-010148-250","p":"Ian","t":"01:01:48","q":"Yeah, because it took going through there to get the appreciation of working with people.","c":1,"n":4,"i":"work_content","s":68},{"id":"Ian-010206-251","p":"Ian","t":"01:02:06","q":"I should do more doing more research about masters, but","c":2,"n":4,"i":"work_content","s":39},{"id":"Ian-010220-252","p":"Ian","t":"01:02:20","q":"And I guess probably. Yeah. At that stage, start looking at what are kind of the entry roles and what roles in HR actually look like.","c":1,"n":4,"i":"work_content","s":44},{"id":"Ian-010236-253","p":"Ian","t":"01:02:36","q":"Yeah, yeah. Big time.","c":6,"n":7,"i":"procedural","s":22},{"id":"Ian-010254-254","p":"Ian","t":"01:02:54","q":"Yeah, I guess it's, you know, it happens to everyone. Yeah. It's not like you're the only person that's going through. Like I found out for the last recruitment round, there were 1100 applicants. And out of those 1100 applicants, 400 were for [city]. And they only accepted two. So. So yeah.","c":16,"n":2,"i":"interview_process","s":29},{"id":"Ian-010327-255","p":"Ian","t":"01:03:27","q":"When you're going for those and like actually even working in recruitment understanding that there's a lot of the time it's not because of you.","c":16,"n":2,"i":"interview_process","s":76},{"id":"Ian-010338-256","p":"Ian","t":"01:03:38","q":"A you're.","c":6,"n":7,"i":"procedural","s":22},{"id":"Ian-010339-257","p":"Ian","t":"01:03:39","q":"Because of you. You're declined because someone else just has these more texts.","c":2,"n":4,"i":"work_content","s":57},{"id":"Ian-010424-258","p":"Ian","t":"01:04:24","q":"Or.","c":9,"n":7,"i":"procedural","s":13},{"id":"Ian-010426-259","p":"Ian","t":"01:04:26","q":"That was all kind of the the big parts of it?","c":1,"n":4,"i":"work_content","s":20},{"id":"Ian-010429-260","p":"Ian","t":"01:04:29","q":"And yeah, it was like, obviously even the transition from training to operations is completely different. Kettle of fish again.","c":2,"n":4,"i":"work_content","s":61},{"id":"Ian-010440-261","p":"Ian","t":"01:04:40","q":"The actual the training side of it, I mean operation side of it, it's just it's great. It's fun. Obviously you do your drills and trainings throughout the day, but at the same time you're on a truck with three other people.","c":2,"n":4,"i":"work_content","s":82},{"id":"Ian-010453-262","p":"Ian","t":"01:04:53","q":"Which is, you know, you're, like, getting along, having fun, joking and all that.","c":1,"n":4,"i":"work_content","s":40},{"id":"Ian-010503-263","p":"Ian","t":"01:05:03","q":"And obviously knowing at any point you could go to a call where you're kind of going into kind of the thick of it, but the guy next to you has got your back.","c":1,"n":4,"i":"work_content","s":44},{"id":"Ian-010512-264","p":"Ian","t":"01:05:12","q":"So. Yeah.","c":6,"n":7,"i":"procedural","s":13},{"id":"Ian-010535-265","p":"Ian","t":"01:05:35","q":"It's like pro and con. Summer has been awful because it's just rained. But the pro of that is those [the local hills] fires.","c":0,"n":4,"i":"work_content","s":66},{"id":"Ian-010543-266","p":"Ian","t":"01:05:43","q":"As dry as they used to be.","c":3,"n":4,"i":"work_content","s":19}],"notes":["I noticed that the Big Four / professional-services stint is repeatedly framed as a formative rite of passage and portable badge. I need to interrogate whether this class- and credential-bound assumption is shared by me and several participants and thereby reproduced in my coding rather than questioned, and to note who gets to treat it as a springboard rather than a trap.","I noticed how easily I read family and parental influence approvingly as support or inheritance. I need to interrogate the class and cultural assumptions in that reading: parental capital, self-employment role models and 'push' operate very differently across backgrounds, and my own family context may make certain influences feel natural rather than resourced.","I noticed that I read accounts of recruitment and interviews for 'green flags' and warmth, a frame I actively supplied. I need to interrogate how my prompts shaped which features participants reported as decisive, and how warmth, informality and 'being yourself' are culturally and class-specific signals that advantage some candidates.","I noticed that I often coded networking and connections as neutral savvy. I need to interrogate the meritocracy-plus-networks discourse: who is structurally excluded from the 'right people', and does treating this as skill obscure the class, ethnicity and gender patterning of access that some participants (e.g. migrants) name as exclusion?","I noticed that I treated descriptions of role and daily tasks as neutral context, although selection and phrasing still involve interpretation. I need to interrogate what I foreground as analytically relevant in a task description, and whether my reading of a role as 'varied and interesting' versus 'monotonous' imports my own valuation of different kinds of work.","I noticed that I coded work-life balance, boundaries and flexibility through the wellbeing-positive lens I bring as a clinician-in-training. I need to interrogate whether I valorise boundary-setting and read overwork as a problem to be solved, and to remember that remote and flexible work are classed and gendered privileges, not neutral goods.","I noticed that pay and financial security recur as legitimate drivers, which cuts against a romantic 'follow your passion' script. I need to interrogate whether I code money as pragmatic maturity for some participants and as compromise for others, and how class background shapes who can treat salary as decisive without apology.","I noticed that this segment is rapport, logistics or backchannel rather than analytic content. I need to interrogate my decision to retain interviewer talk and filler as codable units: it inflates the corpus and can smuggle my framing into 'the data'. I should ask why the segmentation kept it, and whether rapport of this kind (pets, vouchers, shared jokes) shaped what participants later disclosed.","I noticed that technological and AI change in the field is topical and that I bring my own stance to it. I need to interrogate whether my view of AI (as tool, threat or aid) colours how I code participants' ambivalence, and whether my coding respects craft- and ethics-based objections rather than treating adoption as inevitable.","I noticed that I coded a supportive manager here as the decisive career resource, a reading my data and my own good supervisory experience both favour. I need to interrogate the great-manager narrative: it individualises structural conditions (workload, security, autonomy) into the luck of one relationship, and can obscure how support is unevenly distributed.","I noticed that explicit weighing of options and pros and cons is exactly what my study seeks, so I may attend most to segments that fit a rational-decision frame. I need to interrogate whether this over-selects deliberative accounts and under-codes drift, emotion and constraint as equally valid modes of 'deciding'.","I noticed that I sometimes rescued participants from self-judgement when they admitted status motives ('that's not superficial'). I need to interrogate this reflexive rescuing: it reshapes the data by signalling which motives I deem acceptable, and encodes my assumption about which desires are respectable to voice.","I noticed that billable-hours and performed-busyness critiques felt intuitively legible to me as a young professional and that I rarely probed them. I need to interrogate whether shared generational positioning made the critique feel self-evident, and whether I examined 'busyness as status' as a system or simply endorsed it as the villain.","I noticed that this is a sensitive segment and that my clinical training may incline me to code distress as an individual state (low self-esteem, cognitive distortion) rather than a situated, proportionate response to conditions. I need to interrogate that individualising pull, hold the account with care, and avoid pathologising language the participant did not use.","I noticed that statements of being 'lucky', 'fortunate' or 'an outlier' present advantage as chance. I need to interrogate the meritocratic luck-narrative: what unnamed capital (family, class, education, networks, timing) is being recoded as good fortune, and whether my own comparable position makes it easy for me to accept 'luck' rather than probe the structure beneath it.","I noticed that I read rejection, competitiveness and imposter feelings through the current labour market, which risks either normalising precarity or, through my clinical lens, coding a market response as an internal deficit. I need to interrogate which frame I default to and whether I distinguish situational discouragement from trait self-doubt.","I noticed that 'values' is a keyword of my discipline and that I cue it and reward it. I need to interrogate whether I hear values-fit talk because I carry that framework, and whether participants offer it partly because they read me as an org-psych audience. I should ask what a non-psychological vocabulary would make of the same account.","I noticed that a learning-orientation or growth-mindset reading is congenial to my discipline and that I may apply it more readily than the participant's own terms. I need to interrogate whether I translate ordinary trial-and-error into a psychological construct, and whether 'growth mindset' language flattens class- and context-specific ways of learning at work.","I noticed that I coded a stated need for challenge, variety and autonomy approvingly, which may reflect my own disposition and that of a self-selected, articulate sample. I need to interrogate whether I treat 'needs stimulation' as a neutral trait rather than a classed expectation of work as self-actualisation.","I noticed that the emotional intensity of leaving (grief, 'divorce', delayed recognition) invites over-interpretation of affect. I need to interrogate the managerial-ideal assumption embedded in some accounts (that recognition should have come earlier) and resist letting vivid metaphor drive the analytic weight I assign the moment.","I noticed that physical symptoms attributed to work invite a mind-body reading I find congenial. I need to interrogate the causal certainty in my coding (the participant and I both attribute the symptoms to stress) and whether I apply a psychosomatic frame more readily than a medical or environmental one.","I noticed that future aspirations are elicited by my standard 'five years' prompt and are performed accounts of an imagined self. I need to interrogate the assumption of the planful, upward-projecting subject built into my question, and how I read participants who resist a fixed plan (as adrift, or as wisely open?).","I noticed that I may read a non-linear or accidental entry as a coherent story of 'finding fit', a narrative smoothing that hindsight and my career-sustainability frame both encourage. I need to interrogate whether I am imposing retrospective coherence on what was contingent, and whose careers I allow to be narrated as exploratory rather than precarious.","I noticed that the shock of the fixed, full-time working day after study is a strong shared narrative. I need to interrogate whether my insider familiarity (same programmes, same lecturers, same city) produces candour but also shared, unexamined assumptions about what 'the transition' means, and what it means for participants without that flexibility to lose.","I noticed that a stated change in health, capacity or sustainability over time is central to my construct and so may be something I actively seek. I need to interrogate whether the career-sustainability lens leads me to read ordinary fluctuation as evidence of (un)sustainability, and to privilege accounts that fit the framework I am testing.","I noticed that I coded confidence and 'backing yourself' as admirable disposition. I need to interrogate how such confidence is enabled by circumstance (safety nets, class, prior success), and how a gendered and classed reading might treat the same self-assurance as arrogance in a different speaker.","I noticed that the recurring 'university didn't prepare me' line may be partly an artefact of my closing prompts and the study's guide-for-employers aim, which cue advice-giving. I need to interrogate whether the apparent consensus reflects my question design as much as independent experience, and whether the code treats a produced script as a spontaneous finding.","I noticed that I have a single-narrator, unverifiable account and that my sympathy (often warranted) shapes the coding. I need to practise reflexive humility about hearing only one side, attend to the age and seniority dynamics named in the account, and resist coding a relational and structural problem as simply a 'bad person'.","I noticed that advice-to-younger-self and advice-to-students is directly elicited by my protocol and aimed at a resource for schools. I need to interrogate that these are performed for an imagined audience, not neutral reflection, and that they converge partly because my question invites a genre of tidy, transferable lessons.","I noticed that ethical, environmental or political critique of an industry (e.g. consumption, marketing, extraction) is a values stance I may share. I need to interrogate whether alignment with the participant's politics makes the critique feel self-evidently right and reduces my probing, and whether I code it as principled where a different politics might code it as idealism.","I noticed that I am a Pakeha researcher interpreting racialised and cultural experience. I need to interrogate the limits of my standpoint and whether my sympathy reframes a more layered account, notice softening ('not racism, ignorance') that may be calibrated for me, and resist letting a psychological vocabulary (e.g. masking) rename a colonial and racialised experience that Maori and Pacific scholarship would frame differently.","I noticed that I coded purpose, impact and 'meaningful work' warmly and that they align with my own orientation. I need to interrogate the neoliberal expectation that paid work should deliver self-actualisation and meaning, and whether coding for 'purpose' privileges a particular, class-inflected relationship to work over more instrumental ones.","I noticed that I coded Covid as a career shock, consistent with my supervisors' framing. I need to interrogate whether that lens makes me read Covid as uniformly formative, and whether it flattens very different pandemic experiences (industry losses, remote privilege, health) into a single 'shock' narrative.","I noticed that, as a young woman, I often co-construct gendered accounts through strong affirmation. I need to interrogate whether shared gender identity leads me to supply agreement not fully stated, whether I code 'too soft/too nice' as inherently gendered, and whose femininity (Pakeha, middle-class, professional) is my unspoken norm.","I noticed how easily I coded declining the partner/management ladder as authenticity or health. I need to interrogate that values-positive reading: a secure, confident, often majority-group participant can narrate refusal as wisdom, where the same account from a less-secure participant might read as risk or lack of ambition. Whose refusal do I admire?","I noticed that migrant status and language surface a structural disadvantage the participant names. I need to interrogate whether my reassurance (e.g. praising their English) minimised that account, and whether my monolingual, NZ-raised assumptions lead me to under- or over-weight 'connections' and language as barriers.","I noticed that job insecurity, restructures and redundancy appear as structural forces, close to my supervisors' career-shock framing. I need to interrogate whether that theoretical priming makes me especially attentive to shock narratives, and whether I distinguish a genuine structural account from a normalised acceptance of precarity as 'just the market'.","I noticed that I coded relocation for lifestyle, partner or family as choice. I need to interrogate the resources that make mobility possible (savings, partners, family homes to return to), and whether 'moving for lifestyle' is narrated as freedom in ways that assume a security not all participants share.","I noticed that maternity and family planning were strongly co-constructed between two young women and may be foregrounded because we both orient to them. I need to interrogate the heteronormative, biologically-essentialist framing (the 'clock') being treated as fact, and whether this theme is over-represented relative to participants for whom it never arose.","I noticed that commentary on 'young people today' (rejection-avoidant, online, socially deskilled) is co-produced and often generalising. I need to interrogate the generational stereotype the participants and I trade in, its lack of an evidence base in the data, and how it positions the interview itself as diagnosing a cohort."],"participants":["Carrie","Clara","Edie","Eliza","Ellis","Greta","Ian","Jimmy","Judy","Mary","Mitchell","Theo","Tilda","Willa"]};

const DEFS = {

"pay":"Pay, salary and financial security operating as legitimate drivers of career decisions, including financial freedom as a motivation in its own right rather than a compromise.",

"big4":"The Big Four or professional-services stint framed as a rite of passage: formative, credentialing, and a portable badge, with leaving the firm itself a milestone.",
"interview_process":"How fit is read and performed during hiring: warmth versus formality, green flags, and the felt experience of recruitment.",
