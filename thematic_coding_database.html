the workforce. But what happens in the promotion cycle or the success site, it goes up like this and then it plateaus. Once it plateaus. Everyone who goes further on the difference. Maker of the soft skills.","c":27,"n":17,"i":"learning","s":100},{"id":"Jimmy-001820-022","p":"Jimmy","t":"00:18:20","q":"And then they. So the whole idea of that workshop is to have them think you work through it. They do the activity, they reflect on it. They understand. Oh, well, these are the skills we were using to do well, the things we things would that might have been missing. And then you walk through with the research or the statistics that actually back your point and then following that have them take a key, like, what are you going to do to develop whatever it is you need to skill wise? Think of the top ten sought after skills in your industry. What are you doing now to develop those? And you're trying to push them to be more intentional and more aware really growth mindset based. And I think a lot of that stuff will help. I've had students in the the bracket with a very good technically, but they might not appreciate the importance of the people skills yet. They might think I don't need that. I'm A-plus, A-plus, but it's not the reality in the working world. So a lot of the stuff I work on, I try to make sure it's relevant to what will help them. It's universal. So across the faculties and degree programs especially for that first year. And then so that's a little bit of a taste of some of the workshop content. And in.","c":27,"n":17,"i":"learning","s":48},{"id":"Jimmy-001939-023","p":"Jimmy","t":"00:19:39","q":"Yeah. Thank you. The 1 to 1 space. So we have open calendar bookings for 1 to 1 coaching. And the career center have a dedicated careers counseling service or career consultants where they work across hard skills. So CVs some of the job applications interview prep they've got a lot of resource there as well as some of the the discovery stuff. So what I work on with students is mainly around that discovery piece. So what would make today look successful for you? What would be valuable? It's pretty much moving from the accounting mindset of advisory to coaching, which is very nuanced. You have to really tell your brain not to problem solve after ten years of problem solving.","c":10,"n":13,"i":"wellbeing","s":65},{"id":"Jimmy-002034-024","p":"Jimmy","t":"00:20:34","q":"Yeah. So it's all about.","c":0,"n":4,"i":"work_content","s":3},{"id":"Jimmy-002037-025","p":"Jimmy","t":"00:20:37","q":"Yeah. So that default, you have to manage that and you have to make sure that you're coming from a place of almost neutrality. You take away your preconceived ideas or problem solving or I know the answer and you ask open ended questions to really dig it out from them. And the solutions tend to come from them. And in that process is where the growth is for them. So a lot of it comes down to understanding, well, why did you come and see me today? Sometimes they don't even know. And you then start to just discover on that and you end up getting around from the explore phase through to the. Okay, so what are some actions you can take? We've had a look. We've understood what you're trying to get out of today or our sessions. What are the next steps? And then the third arm was actually supporting the wider enrichment program. So we run we have success coaches. We have coordinators for different scholarship programs. We have events across all of these scholarships and programs. And I'm generally a support that goes along to many of those. And then the that's the 40% on this side. So very much terminally based 1 to 1 coaching is more ad hoc and the supporting events is event based on the other side. 60% of my role has been standing up in alumni mentoring program. So essentially this the ethos of this is career clarity, career confidence and building self-efficacy. How do we get students understanding what the real world is like in the fields that are aspiring to not that the university loved this approach, but I went in guns blazing anyway.","c":11,"n":9,"i":"mentor_good","s":63},{"id":"Jimmy-002233-026","p":"Jimmy","t":"00:22:33","q":"Oh yeah, I'm on orientation. I went in and I said to the students, dream big. Tell me who it is you want. Be specific. No criteria is too much. And it's my job to go and find it. So some of them are really challenging me on that. Asking for forensic scientists who've worked overseas who have also authored books. And I'm just like, okay, that third one got me a little bit, but I, you know, turns out there's one in New Zealand. And turns out they were happy to do it. So it's some of the really unique experiences that have come out of this program have been really special. But it is a lot of work.","c":22,"n":18,"i":"autonomy","s":95},{"id":"Jimmy-002322-027","p":"Jimmy","t":"00:23:22","q":"Okay. A lot of LinkedIn stalking. There's a lot of working with alumni relations to yeah, they have the big list out to all our alumni, but it's also a lot of managing your fielding aspirations of their students. You're trying to get them to get the right sort of information from the right sort of people that will work well with them. Match quality is really important. And essentially, once you get the right person and you put it in front of the student and say, hey, look, I think I found someone who would be great. What do you think they'll say, yes or no? This year we've had 100% of yes, very happy. So that's been really good. And some of the opportunities that have come out have been awesome. So one example is we had eight students looking for aerospace engineers. Not the easiest.","c":88,"n":3,"i":"networks","s":100},{"id":"Jimmy-002420-028","p":"Jimmy","t":"00:24:20","q":"Thing to find.","c":8,"n":7,"i":"procedural","s":33},{"id":"Jimmy-002423-029","p":"Jimmy","t":"00:24:23","q":"Managed to nab one of the co-founders at [an aerospace company].","c":0,"n":4,"i":"work_content","s":47},{"id":"Jimmy-002431-030","p":"Jimmy","t":"00:24:31","q":"Yeah, he very busy obviously like co-founder globally scaling business.","c":2,"n":4,"i":"work_content","s":29},{"id":"Jimmy-002437-031","p":"Jimmy","t":"00:24:37","q":"And he said he will take all eight. Yeah. So some of these, some of these opportunities that come out are really huge. And the students I'm very tactful in how I approach it in terms of because I know how important relationships and people are, especially in the working world. I also tend to try my best where possible and where it works with the student to go towards decision makers.","c":81,"n":10,"i":"decision","s":100},{"id":"Jimmy-002506-032","p":"Jimmy","t":"00:25:06","q":"And from that internships and other job opportunities have popped up. So and, and that's.","c":1,"n":4,"i":"work_content","s":64},{"id":"Jimmy-002514-033","p":"Jimmy","t":"00:25:14","q":"Yeah. So I'm.","c":6,"n":7,"i":"procedural","s":20},{"id":"Jimmy-002516-034","p":"Jimmy","t":"00:25:16","q":"Have I had to boil it down into one sentence. My job is max impact. Max next opportunity for any student that comes in front of me. Really?","c":73,"n":31,"i":"purpose","s":80},{"id":"Jimmy-002526-035","p":"Jimmy","t":"00:25:26","q":"And I think that alumni mentoring space is really special because it means I'm covering. We had our last event. We covered every faculty. We had 35 of our external professionals there that night. We had about 70 total. And we had every faculty represented. And it's not often that you have a program that has a historian sitting next to a global leader in product design, sitting next to a biologist sitting next to, you know what I mean? So I get to hear all these cool stories. That's why I just love that part of my job.","c":11,"n":9,"i":"mentor_good","s":83},{"id":"Jimmy-002604-036","p":"Jimmy","t":"00:26:04","q":"Yeah. So mainly they brought me on to stand up this careers coaching program in support of [the scholarship namesake]. Initially program funded by [a philanthropic foundation] and the [university]’s anniversary, they kind of crossed over and made the scholarship grow. It now to this job is still the same. It's just scaled up. And the work streams I work across are careers workshops, 1 to 1 coaching, supporting enrichment programs and alumni mentoring.","c":11,"n":9,"i":"mentor_good","s":80},{"id":"Jimmy-002648-037","p":"Jimmy","t":"00:26:48","q":"Quite busy. Yeah, I've, I've moved down to four days so I can spend a day with my my son and then and support there. But the workload hasn't changed, let's say.","c":12,"n":19,"i":"leaving","s":71},{"id":"Jimmy-002707-038","p":"Jimmy","t":"00:27:07","q":"Been in this role since January 2024. So nearly two years by the end of this year?","c":3,"n":4,"i":"work_content","s":59},{"id":"Jimmy-002720-039","p":"Jimmy","t":"00:27:20","q":"I found the role online and only by luck I was coming to the end of a contract that I was in. And rather than extending with that contract there wasn't much growth left in that role. So I looked online and nothing in accounting was speaking to me. So I said, why don't I just expand this bracket and have a look? And all of a sudden this role was there, and it was a role that meant I wouldn't take a huge I would take a pay cut, but not one that was like starting again. So I didn't want to I didn't want to waste all that investment and start right from the bottom. Initially they were looking for someone with 5 to 7 years of coaching experience. Formal, I had none.","c":60,"n":17,"i":"learning","s":100},{"id":"Jimmy-002814-040","p":"Jimmy","t":"00:28:14","q":"So it was. I knew it was going to be a long shot when I applied, but the thing that resonated was this role is all about helping equity scholars or people from generally from tough to hard to reach backgrounds. And I thought all of my social impact stuff that I do voluntarily. So I did mentoring with [a community charity]. I've worked.","c":15,"n":9,"i":"mentor_good","s":100},{"id":"Jimmy-002844-041","p":"Jimmy","t":"00:28:44","q":"Yeah. So I did that.","c":0,"n":4,"i":"work_content","s":6},{"id":"Jimmy-002847-042","p":"Jimmy","t":"00:28:47","q":"And then I did I've, I've worked with I did three months in a school in [city] working with a hard to reach student. He, they, I don't know if this is ethical, but they rank their students by difficulty. He was number one. Yeah.","c":26,"n":16,"i":"values_fit","s":57},{"id":"Jimmy-002904-043","p":"Jimmy","t":"00:29:04","q":"That was a it was informal, I think. But they ranked him number one. And I was brought on almost. My wife calls it Charity. She goes, I go on these little charity runs where I go out of accounting and take big pay cuts to go and help some people. Yeah.","c":0,"n":4,"i":"work_content","s":75},{"id":"Jimmy-002922-044","p":"Jimmy","t":"00:29:22","q":"And then yeah. So that's I found it online and I found it by because nothing in accounting was speaking to me. And then a lot of it aligned with my values. And I knew the skills that I have naturally are probably better suited to the sort of relational work than sitting behind a spreadsheet.","c":26,"n":16,"i":"values_fit","s":86},{"id":"Jimmy-002946-045","p":"Jimmy","t":"00:29:46","q":"So I think that's interesting. Yeah, it was, it was it was all luck. I don't usually change the filters if I'm looking online like that.","c":0,"n":4,"i":"work_content","s":53},{"id":"Jimmy-003019-046","p":"Jimmy","t":"00:30:19","q":"Sure. And I.","c":5,"n":7,"i":"procedural","s":27},{"id":"Jimmy-003021-047","p":"Jimmy","t":"00:30:21","q":"No, I think it's important to to answer that question. Well, I think it's important to talk to accounting in general. I, I and why I guess I got into it.","c":1,"n":4,"i":"work_content","s":80},{"id":"Jimmy-003036-048","p":"Jimmy","t":"00:30:36","q":"So why wasn't it speaking to me? I think simply it was because I realized I wasn't I wasn't doing these roles out of love for the content. I was always just doing what I knew. And initially when I went into accounting, I didn't love the content. I loved the challenge. I knew it could provide for my family. And I love people. People's my favorite thing of all. And every job I'd go through, I always felt like there were everyone around me, loved the content. I just was there for the the sort of like I was there and I was doing it. Love the challenge. But I was never naturally gifted in accounting. I was never one to love reading accounting standards. I was always someone who was just like, well, I'm here, let's achieve CA or chartered accounting.","c":7,"n":0,"i":"big4","s":47},{"id":"Jimmy-003129-049","p":"Jimmy","t":"00:31:29","q":"Okay. Now that I've done that, let's move into managing a team and so on. I got to this point where I looked online and I knew after doing so many roles that it takes six months for me to get across a river, to get across it in its entirety and then get bored because it becomes monotonous.","c":38,"n":18,"i":"autonomy","s":100},{"id":"Jimmy-003204-050","p":"Jimmy","t":"00:32:04","q":"I'm bored. There's no growth and development. The opportunities are like are not there to, to get more. You're kind of in this lane. And I just kind of found from there. Do I just keep doing six months and getting bored, or do I go try something that's far more on my natural skill set? There are far better technical accountants who love the content, and they naturally, they all they all get it right away. My wife's one of them. And or do I go towards something where I know my natural affinity for people and interaction will really? Because since the start of my accounting career, I've always been like, top of the top of the class when it came to relationship building, networking. And in my previous role at [a previous employer], I knew, like, I'll know everybody in the entire building and get to know who they are, what makes them tick and what interests them, what they care about, what's important to them and remember those things. And I remember one, one example of this, the difference between accounting and this relational work. I had a workshop recently where 40 students who appeared with mentors were all together and they were answering one question, what what has been going well lately with mentoring? Like, tell me more about what's been going well. And they're in groups. And I was walking around the room talking to each individual, and by the end of it, they were all asking me well, one person put their hand up and asked hey, how do you know all of our names, what we're studying and all of our mentors, what they do, but also what they're interested in because I was able to go deeper than they could on their mentors. And generally I'll catch up with each mentor once and I could talk to them ten months later and remember exactly what we spoke about.","c":11,"n":9,"i":"mentor_good","s":73},{"id":"Jimmy-003421-051","p":"Jimmy","t":"00:34:21","q":"Yeah. So my active recall. Yeah, my active recall is mainly really good for people. So, like, now that you've told me you have three, three cats, right? And Kenzo, you've got the little, the little one who ate the wool. You've also you've also got ragdoll that you got initially and brought home when you moved home. You met your partner who's an accountant, but let's say through friends and family.","c":0,"n":4,"i":"work_content","s":72},{"id":"Jimmy-003453-052","p":"Jimmy","t":"00:34:53","q":"Based on an appointment where your sister became friends with her and your mum became LinkedIn there, Russell was also involved there as well. Those little details I won't forget.","c":46,"n":3,"i":"networks","s":100},{"id":"Jimmy-003516-053","p":"Jimmy","t":"00:35:16","q":"Yeah. And I think that's important because when you get to talking to them again and you can make sure that you talk to those things that you spoke about, a lot of people in that moment feel seen and heard, and they I think it's.","c":1,"n":4,"i":"work_content","s":92},{"id":"Jimmy-003538-054","p":"Jimmy","t":"00:35:38","q":"Yeah. And actually my wife says it's not just connecting with people. She said one of the well, I think she's biased though, but she says one of the special things that I can do is get people to drop their walls.","c":0,"n":4,"i":"work_content","s":72},{"id":"Jimmy-003554-055","p":"Jimmy","t":"00:35:54","q":"It really helps with my work with students or mentors, if I can get really deep to a point where they're sharing things that are they get really comfortable. So I think it's about building psychological safety as well.","c":14,"n":9,"i":"mentor_good","s":100},{"id":"Jimmy-003632-056","p":"Jimmy","t":"00:36:32","q":"Sure. So I'll just run through the trajectory and then you can.","c":2,"n":4,"i":"work_content","s":64},{"id":"Jimmy-003639-057","p":"Jimmy","t":"00:36:39","q":"Cool. So I initially started out at [city]. I achieved a scholarship through [the chartered accountants’ body] and [the national Māori accountancy network]. I was I managed to go in as an intern for the summer of 2015 or 2014, actually for the internship. And then 2015, early 2016 was kind of my last year at uni. I decided during uni about July 2015 that I wanted to make some money for this trip that Russell was running. I love it. So so I so I sent my manager a message and said, can I just start full time in July? And they said, yeah, fine. So University kind of took a back seat and I just would show up to things I needed to.","c":23,"n":30,"i":"ethnicity","s":77},{"id":"Jimmy-003737-058","p":"Jimmy","t":"00:37:37","q":"Like I thought so, yeah. I thought the next thing people are going to care about now that I've got the graduate role secured after my 2014 internship, they offered me the role for early 2016. I thought the next thing people are going to care about is whether I'm a CA or not. So from there, my my grades at uni had served its purpose already. I got the job I then started in July 2015 through to 2016, and then went to China for that break and then started back at [big 4] in 2016 when I returned. I spent three years from that July 20th. So I think through to July 2018 right through until when I got my chartered accounting qualification and had met all the requirements, essentially. And that was working in the private client services team preparing a lot of it's all compliance. So tax returns, financial statements covering all tax types and all entity types. And a lot of the work you'll do in that role was preparing for somebody to review, cover off their review points, and then it would ship off and send final product to client. It's very much a learning phase as well. You're just learning and building your technical base. And then I got to this point where I realized there are many things going on with [big 4] in particular, but one big thing I also wanted when I left was more interaction with people. It was very. You were sitting there with headphones on, just bashing away at your work. So an opportunity came up at [a mid-tier firm] 2018. And that would have been about well, after July, so early August, maybe where I had the opportunity to go and work with a client base of my own, maybe 120 clients, but different types of clients. So [big 4] is really big in corporate [a mid-tier firm] was more like, you had some midsize businesses, but then you also had mum and dads, which was the mum and dad. Businesses aren't that common at the big four. So a big corporate through to more like SMEs and then with that small to medium client base, the issues or the challenges were different.","c":65,"n":0,"i":"big4","s":83},{"id":"Jimmy-004015-059","p":"Jimmy","t":"00:40:15","q":"Yeah. The challenges were more like technical. You're working with other accountants that speak your language. And [a mid-tier firm]. You had clients who didn't know much about accounting or finance at all. So a lot of your work was volume based queries based on understanding or knowledge of financial literacy. A lot more answering questions that you wouldn't need to answer in a big corporate space. But part of it, a big part of that was also relationship management.","c":4,"n":6,"i":"pay","s":80},{"id":"Jimmy-004055-060","p":"Jimmy","t":"00:40:55","q":"I got a lot more. I got a lot more from those Engagements. I got a lot more reward out of the seeing the impact of your work as well. And seeing those relationships build. And then after that. So after about a year and a half there it was late 2019, when I finished up there, we decided that we were going to go and do some travel in Asia and then also.","c":34,"n":31,"i":"purpose","s":100},{"id":"Jimmy-004122-061","p":"Jimmy","t":"00:41:22","q":"Yeah, it was fun. And then also moved to [city]. So OE and it would have been early 2020 when we arrived in [city], and we had ten recruiter interviews in the first ten days and then had jobs within like two weeks pretty much.","c":61,"n":37,"i":"relocation","s":73},{"id":"Jimmy-004144-062","p":"Jimmy","t":"00:41:44","q":"Yeah. Really sought after over there. And really the work was big scale. All the big names you can think of it in [city] and we my first job was with [a shopping centre]. So think shopping centre, but kind of on steroids.","c":104,"n":23,"i":"transition","s":0},{"id":"Jimmy-004212-063","p":"Jimmy","t":"00:42:12","q":"Oh, oh, so you were in [shopping centre]?","c":1,"n":4,"i":"work_content","s":16},{"id":"Jimmy-004219-064","p":"Jimmy","t":"00:42:19","q":"Because there's one and there's, there's one in [a suburb], which is like [shopping centre].","c":0,"n":4,"i":"work_content","s":59},{"id":"Jimmy-004226-065","p":"Jimmy","t":"00:42:26","q":"Yeah. And that. Yeah. But cool that you got to go to [city].","c":0,"n":4,"i":"work_content","s":41},{"id":"Jimmy-004239-066","p":"Jimmy","t":"00:42:39","q":"And it's nice to a.","c":2,"n":4,"i":"work_content","s":11},{"id":"Jimmy-004248-067","p":"Jimmy","t":"00:42:48","q":"So. Yeah. So we went to I worked at [a shopping centre] and the operational finance team, so this was my first job going out of public practice. So [a mid-tier firm] are both accounting firms full of accountants? I was now going and working for like a business or in house. Yeah yeah yeah, yeah. So I was moving in-house for the first time and busy operations finance team for the, I think by foot traffic. It's the second busiest in the world. [shopping centre] only second to Dubai at the time. And that was a really interesting role. First introduction to monthly cycles. I also was a big a big part of that role for me was rates mitigation. So. Essentially they have laws over there that mean the landlord has to cover rates for vacant units. After a certain amount of time, you get a rates relief period after a tenant moves out of like 30 days where you're not paying anything, and then after that you're paying like millions in rates. What I would do there is working with like, retail delivery. So the people who do the fit outs and the units legal operations facilities. I work in finance. I worked across most teams in the, in the unit to build this tracker that worked for everybody. And essentially that tracker would let you know what the vacancy status was of of units, really. And the reason that was important was so that we could manage storage leases.","c":57,"n":8,"i":"ai_tech","s":86},{"id":"Jimmy-004434-068","p":"Jimmy","t":"00:44:34","q":"Into into these vacant units. And you would have those storage in for three months, and then you would get 30 days off of rates after the storage comes out. So it was a cheeky way to get around this law.","c":2,"n":4,"i":"work_content","s":86},{"id":"Jimmy-004449-069","p":"Jimmy","t":"00:44:49","q":"Yeah. So there were just moving the storage around the unit and it might be a huge [a large retailer] unit. They've got this little bit stored in the middle of the photo is a bit cheeky, but what it meant was you're saving millions in rates a year.","c":0,"n":4,"i":"work_content","s":66},{"id":"Jimmy-004503-070","p":"Jimmy","t":"00:45:03","q":"And it's awesome. So it was my first taste of like, in-house. It was really interesting. Really exciting. And during this was during Covid. So it kicked.","c":54,"n":32,"i":"covid","s":95},{"id":"Jimmy-004517-071","p":"Jimmy","t":"00:45:17","q":"It was it was tough about a year almost indoors.","c":0,"n":4,"i":"work_content","s":44},{"id":"Jimmy-004523-072","p":"Jimmy","t":"00:45:23","q":"But it was it was good too, because it also meant that challenges we'd never seen before in accounting finance were there, too. Especially for [shopping centre].","c":22,"n":18,"i":"autonomy","s":65},{"id":"Jimmy-004536-073","p":"Jimmy","t":"00:45:36","q":"So. So all the tenants were like, well, why we can't pay rent? No one's coming.","c":2,"n":4,"i":"work_content","s":68},{"id":"Jimmy-004542-074","p":"Jimmy","t":"00:45:42","q":"So that if you imagine what that would have flowed on to.","c":1,"n":4,"i":"work_content","s":40},{"id":"Jimmy-004546-075","p":"Jimmy","t":"00:45:46","q":"With [shopping centre] going. Well, if you're not paying rent. Well. Like what? So there's a lot, a lot of work going on there to support the tenants through it. And then following that, I took three months off accounting, and this was the first like for me, it was the first time I was like, am I happy in accounting?","c":3,"n":4,"i":"work_content","s":84},{"id":"Jimmy-004608-076","p":"Jimmy","t":"00:46:08","q":"The question kind of arose for the first time. I went offered tried this three month contract at a school. So again, not a teacher, but interviewed well enough that they trusted my ability with people. And they are linked me up with one student who was one of the most difficult, wasn't engaging in work, was naughty, trying to stand over other kids. Very like, I'm tough and I'm cool and I'm gangster and all this stuff. There's about 14 already, you know, living at home, all that sort of stuff. And anyway, I managed to get his engagement up to about 80%.","c":19,"n":2,"i":"interview_process","s":79},{"id":"Jimmy-004655-077","p":"Jimmy","t":"00:46:55","q":"Yeah. So the approach they were taking was very like, stick like. And I think the first thing you needed to do was win is trust.","c":0,"n":4,"i":"work_content","s":44},{"id":"Jimmy-004706-078","p":"Jimmy","t":"00:47:06","q":"And once I got that, everything became easy. I would let them. I would reward them when they had done good work, and I would help teach them and all of that stuff. And when I needed to turn the tone on, it would work only because I had built that relationship.","c":0,"n":4,"i":"work_content","s":78},{"id":"Jimmy-004732-079","p":"Jimmy","t":"00:47:32","q":"So that was like, they were wondering what I you know what what.","c":0,"n":4,"i":"work_content","s":34},{"id":"Jimmy-004738-080","p":"Jimmy","t":"00:47:38","q":"Yeah. What have you done? But I think it is harder for them when they have to deal with 29 other students in the class. So it's hard when you've got 30 and there's one really detracting. I was specialized 1 to 1 because I was doing a good job there. They actually gave me another 13 like him. And I like him, I mean, with different challenges of their own. I had one student who was autistic, ADHD and dyslexic. So a lot of that was challenging going from 1 to 14. And then I got to this point after about three months where we, my wife and I kind of pre agreed that I'd go back to accounting based on financial difference. So as I was coming to an end on that I ended up looking out the market and going in house for [a media company] and asked if you know who they are.","c":4,"n":6,"i":"pay","s":60},{"id":"Jimmy-004837-081","p":"Jimmy","t":"00:48:37","q":"So they own the brands like [major magazine titles].","c":67,"n":11,"i":"status","s":0},{"id":"Jimmy-004842-082","p":"Jimmy","t":"00:48:42","q":"Yeah. So they owned all the magazines and the brands for heaps of those big designer labels, a big media company. I worked in the central finance team there. Similar to. I think this was the first time I took on multi country like India Company as well. So I went as part of my routine work. I was looking after the campaigns across countries from a financial perspective. And then the rest of it was quite routine monthly management accounting. And then that contract was about maybe over a year. They wanted to extend, but the market was too good pay wise that yeah, they couldn't match what others were offering. So I ended up going into a transformation like digital transformation business as a senior management accountant there. And that was they were called [a digital agency]. Essentially, they go on e-commerce platforms, all of that sort of stuff. And enhance the customer experience.","c":4,"n":6,"i":"pay","s":63},{"id":"Jimmy-004954-083","p":"Jimmy","t":"00:49:54","q":"A lot of it's kind of like the more clicks that it takes to get to pay, like sort it out. Often you'll lose customers in that process if you're too clunky. So a lot of the work they did was actually enhancing those for some of their clients. And I was a senior management accountant there overlooking the, the accounts payable initially. So I had management responsibility there. And then after about 3 or 4 months, they ended up promoting me into the finance manager role. But I also didn't replace my old role. So I was kind of.","c":49,"n":22,"i":"drift","s":82},{"id":"Jimmy-005037-084","p":"Jimmy","t":"00:50:37","q":"Yeah, that's that's the reality of it. So I was the finance manager now looking after the entire finance and an ops team, which was probably more like maybe five people. Really interesting role, really. They just transitioned off a system into a new one. I was working across countries again. [city]'s very like [city] and Europe is very connected. So I got a lot out of that role and then finished it up sort of at a pre-agreed finish date based on our travel plans to come home. So did some travel for like six, seven weeks. Our last bit across Europe to get over the line wanted to travel to over 30 countries by 30. We got there.","c":22,"n":18,"i":"autonomy","s":65},{"id":"Jimmy-005122-085","p":"Jimmy","t":"00:51:22","q":"Europe's a cheat code for that.","c":2,"n":4,"i":"work_content","s":21},{"id":"Jimmy-005136-086","p":"Jimmy","t":"00:51:36","q":"That's exactly it. And we were one year we were in Prague for Christmas. It was really nice.","c":0,"n":4,"i":"work_content","s":72},{"id":"Jimmy-005144-087","p":"Jimmy","t":"00:51:44","q":"And then mulled wine was all very cool. And then I when we traveled, we kind of did the last, last bit came home and I started with [an industrial tech company]. So they're a manufacturer of like industrial.","c":2,"n":4,"i":"work_content","s":68},{"id":"Jimmy-005206-088","p":"Jimmy","t":"00:52:06","q":"So they're they're like an industrial tech company who builds noses that monitor air quality all the way down to, like, a organic compound level.","c":1,"n":4,"i":"work_content","s":44},{"id":"Jimmy-005220-089","p":"Jimmy","t":"00:52:20","q":"So, so it's very much like an application of this would be one of their big customers is [a major electronics manufacturer]. So, you know, like semiconductors and phones and laptops to produce those without them faulting or breaking requires a really strict air quality.","c":3,"n":4,"i":"work_content","s":32},{"id":"Jimmy-005241-090","p":"Jimmy","t":"00:52:41","q":"So they use the machine in the production process to make sure that they can react quick enough before they start losing stock.","c":2,"n":4,"i":"work_content","s":75},{"id":"Jimmy-005250-091","p":"Jimmy","t":"00:52:50","q":"So you might.","c":6,"n":7,"i":"procedural","s":20},{"id":"Jimmy-005252-092","p":"Jimmy","t":"00:52:52","q":"Yeah. You might spend a million on one of these machines. But it'll save you 4 million in product loss. So it's very much that was the one of the key applications of their first client base. This role was group financial accountant, essentially a finance manager role pretty much where you manage the day to day finance across New Zealand, Taiwan, Singapore, Korea US Germany.","c":35,"n":35,"i":"migration","s":100},{"id":"Jimmy-005322-093","p":"Jimmy","t":"00:53:22","q":"So we had two I had two direct reports in New Zealand and three across the regions, one covering Southeast Asia, one in US and one in Germany. And those three weren't necessarily direct reports, but for all intents and purposes, they were like I was working with them, doing all, you know what I mean? It was very much like you're managing five people plus some members on the HR side of things, and then like payroll, that sort of stuff. A lot of that work was really interesting and varied because of the complexity of being across so many countries. Tax law across US is.","c":35,"n":35,"i":"migration","s":71},{"id":"Jimmy-005403-094","p":"Jimmy","t":"00:54:03","q":"Very.","c":6,"n":7,"i":"procedural","s":20},{"id":"Jimmy-005404-095","p":"Jimmy","t":"00:54:04","q":"Yeah. So a lot of the work you did was actually working in with service providers in those countries to make sure compliance was upheld as well as New Zealand and making sure the numbers and reporting were set up for our finance manager. That was further up our group finance manager and our CFO. So it was very very busy work, very, very tough. And then eventually I got to this crossroad where I had to make a call. I couldn't manage that. The expectations of that role as well as a family event. So my my wife was diagnosed with MS..","c":0,"n":4,"i":"work_content","s":78},{"id":"Jimmy-005446-096","p":"Jimmy","t":"00:54:46","q":"And it was.","c":9,"n":7,"i":"procedural","s":13},{"id":"Jimmy-005448-097","p":"Jimmy","t":"00:54:48","q":"Yeah, I think it was it was tough. But I found myself in such a busy role and a big thing going on at home. I was I was being almost average at both because of it.","c":2,"n":4,"i":"work_content","s":86},{"id":"Jimmy-005501-098","p":"Jimmy","t":"00:55:01","q":"So I had to make a call on. Hey, I can't uphold both of these. Well, I went with the home and sort of had to just which was a shame because there was a lot of growth still to be had in that role that was so varied, so busy. And then we went off and things got better. She came to terms with things and managed to work out what sort of work she could do and manage. And then I went off that to we went and got married. And off the back of that I got a phone call about another role at [an iwi holdings company], it was a contract role. They wanted someone to come and support their point of sale system implementation they were doing for their tourism business units. So if you think of like [a tourism venture].","c":23,"n":30,"i":"ethnicity","s":57},{"id":"Jimmy-005851-099","p":"Jimmy","t":"00:58:51","q":"[a tourism venture].","c":5,"n":7,"i":"procedural","s":23},{"id":"Jimmy-005925-100","p":"Jimmy","t":"00:59:25","q":"[various tourism ventures]. They do quite a lot of they have a lot of tourism ventures under their portfolio. I was in there with that team helping their new rollout of a new point of sale system. So the system that people like you go buy your ticket, it's the thing that records all of that.","c":12,"n":19,"i":"leaving","s":48},{"id":"Jimmy-005624-101","p":"Jimmy","t":"00:56:24","q":"And then essentially making sure it helped work through into the finance side and the reporting side. And on top of that, I also was supporting the group reporting team on the like the consolidated financial statements. So there's like 102 entities attached to that. So we were doing a lot of work to set up all of those and do the work to get those accounts signed off. And then off the back of this contract, this was the contract where I first culturally, other than [city] and the diversity there, it's probably the first time I felt quite comfortable. Mainly because it had that it was less corporate, it had more elements of what I'm more used to growing up is Maori and Samoan myself. So there was a lot of familiarity and values alignment, let's say where I didn't have to wear this a lot of the time through my career, I felt like I've worn this invisible armor culturally, where I've had to kind of walk through these spaces that aren't necessarily built for for me or like, I didn't really necessarily feel like I belonged. I more conformed out of necessity.","c":115,"n":30,"i":"ethnicity","s":0},{"id":"Jimmy-005748-102","p":"Jimmy","t":"00:57:48","q":"But to be able to go into a space like that, and that's where I felt like I could just be me fully was.","c":2,"n":4,"i":"work_content","s":71},{"id":"Jimmy-005758-103","p":"Jimmy","t":"00:57:58","q":"It was, it was quite liberating. But it also made me realize, why am I compromising so much in these environments just to I don't know. Is it the money? Is it what is it? And that's what also helped me question when I was leaving that role, do I want to go into another organization once I've already been and seen this where it's so much more comfortable?","c":4,"n":6,"i":"pay","s":90},{"id":"Jimmy-005821-104","p":"Jimmy","t":"00:58:21","q":"Or do I want to go and find something that might have more of the environment I'm looking for.","c":3,"n":4,"i":"work_content","s":65},{"id":"Jimmy-005826-105","p":"Jimmy","t":"00:58:26","q":"And that's, that's what led me to expanding the filter.","c":2,"n":4,"i":"work_content","s":43},{"id":"Jimmy-005831-106","p":"Jimmy","t":"00:58:31","q":"And Funny story, they they didn't. Initially, my CV and cover letter went into the no pile because my skills were all accounting.","c":62,"n":2,"i":"interview_process","s":33},{"id":"Jimmy-005844-107","p":"Jimmy","t":"00:58:44","q":"But they took one off the no pile as a wild card. And that was me based on my cover letter.","c":16,"n":2,"i":"interview_process","s":76},{"id":"Jimmy-005852-108","p":"Jimmy","t":"00:58:52","q":"So I got lucky. And then as I got to [university] I was interviewed by four people Dragon's Den style Tuesday night. They said to me, hey, can we interview you on Thursday? And granted, I had work on Wednesday. And I said, sure. And they said, oh, now that you've now that you've committed, make sure you bring a seven minute concise presentation on your coaching philosophy. And I was just like, what? And I was like, okay, it's not an interview. It's also a presentation.","c":62,"n":2,"i":"interview_process","s":100},{"id":"Jimmy-005925-109","p":"Jimmy","t":"00:59:25","q":"So on the Wednesday night after work, I had to, like, do a lot of thinking and research into what I believe my philosophy to be. Yeah.","c":3,"n":4,"i":"work_content","s":68},{"id":"Jimmy-005939-110","p":"Jimmy","t":"00:59:39","q":"Wonder, I wonder if they expected a coach for 5 to 7 years to have one in their back.","c":1,"n":4,"i":"work_content","s":76},{"id":"Jimmy-005944-111","p":"Jimmy","t":"00:59:44","q":"So and I do think the other, from what I heard, some did. They just had it there already.","c":1,"n":4,"i":"work_content","s":76},{"id":"Jimmy-010002-112","p":"Jimmy","t":"01:00:02","q":"I think it was initially it was like, oh, wow. But then, because I was quite confident in my ability that I knew I could become a good coach, I didn't need to have been one.","c":41,"n":25,"i":"confidence","s":100},{"id":"Jimmy-010031-113","p":"Jimmy","t":"01:00:31","q":"You're right, you're right. And I think I had like done my prep and had certain examples ready for certain questions that might come up and that was there ready. The [city] schools experience for one example. But the question never came up.","c":0,"n":4,"i":"work_content","s":75},{"id":"Jimmy-010045-114","p":"Jimmy","t":"01:00:45","q":"Not to mention it. But I remember doing the presentation I settled on my coaching philosophy, being around building effective relationships and psychological safety, like the length of the air that's needed. Because without those things, you can't move the dial, you can't get the outcomes you need. You can't connect, you can't. You can't get anywhere without that. And I think I kind of I never practiced it. I just did it once off once I got there, sort of just asked if they could move around so they could see the whiteboard. Haven't written on a whiteboard in years. So it was so messy. But my point got across. I then sat through the interview. Three of them were really pushing me. Well, one stared at me like I could feel them staring.","c":21,"n":2,"i":"interview_process","s":83},{"id":"Jimmy-010133-115","p":"Jimmy","t":"01:01:33","q":"I was like, good cop, bad cop. There's, like, three good cops in a bad cop. And I was I was like, wow. This is the first time I've been interviewed by four people.","c":16,"n":2,"i":"interview_process","s":62},{"id":"Jimmy-010142-116","p":"Jimmy","t":"01:01:42","q":"I was able to show the interview. I was able to demonstrate my skill with people. My active listening, those sorts of qualities that you kind of need for coaching. My disposition is generally quite easygoing and soft. So I think in the end of the day, they were deciding between a few candidates. Despite not having the coaching experience, I think they trusted my ability to pick up the technical aspect and went for the skills that are harder to develop the soft skills.","c":12,"n":19,"i":"leaving","s":95},{"id":"Jimmy-010223-117","p":"Jimmy","t":"01:02:23","q":"So I think that was that was good. And I think I also did have a lot of like experience in the working world. So I had a lot of understanding of what the market is after in many spaces.","c":1,"n":4,"i":"work_content","s":76},{"id":"Jimmy-010244-118","p":"Jimmy","t":"01:02:44","q":"Yeah, it was lucky. And I think I got lucky I got offered the role was it was a pay cut. But when I was wanting to take for the risk of an environment that was more me and granted, my wife's an accountant, so she can keep doing the things she loves. Yeah, that's kind of the journey.","c":2,"n":4,"i":"work_content","s":71},{"id":"Jimmy-010453-119","p":"Jimmy","t":"01:04:53","q":"So like I can talk more broadly on the things that made accounting difficult, I guess for me.","c":1,"n":4,"i":"work_content","s":56},{"id":"Jimmy-010504-120","p":"Jimmy","t":"01:05:04","q":"So like, I think I had a really, really difficult first experience. It was really difficult on many fronts. I think I was the only Maori Pacific in the entire office.","c":23,"n":30,"i":"ethnicity","s":70},{"id":"Jimmy-010520-121","p":"Jimmy","t":"01:05:20","q":"Yeah, yeah. So quite often there were comments. There were assumptions. There were a lot of things that were marginalizing, let's say.","c":13,"n":19,"i":"leaving","s":40},{"id":"Jimmy-010531-122","p":"Jimmy","t":"01:05:31","q":"And I think so that was part of the reason you needed to wear armor because of.","c":2,"n":4,"i":"work_content","s":75},{"id":"Jimmy-010535-123","p":"Jimmy","t":"01:05:35","q":"Not necessarily racism, but more ignorance, I think. And I think, yeah, I think there was a lot of it. And I think when I'm surrounded, I'm in a place I come from a working class family myself, but I'm surrounded by value sets of I guess mainly like private school and wealthy families and all of this very different value sets. But I'm very because I'm good with people like a chameleon as I needed to, but it never felt natural. And so carrying that alongside a few other things where I felt so there's a lot of corporate politics as well. And values wise, I'm very honest and very upfront. And the corporate politics you have to navigate there's a lot of disingenuous behavior. There's a lot of people fighting over big money seats. So it just could be working together for ten years, and you can actively see them stabbing each other in the back to try and get this policy. So like, it's kind of like, hey, cool, you got the big money seat, you're getting paid hundreds of thousands or whatever, but are you okay with how you got there? So a lot of those moral conflicts for me were really visible. And then on top of that, I felt it was my very first learning of what was valued. And people skills weren't necessarily valued early on. So most of my strengths were almost kind of like moot in a way.","c":113,"n":30,"i":"ethnicity","s":100},{"id":"Jimmy-010725-124","p":"Jimmy","t":"01:07:25","q":"Yeah. So so so what they valued early on was your your love or your ability with the content, your speed. The faster you can do something and the more accurately you can do it, the more money they're going to make. So in those early years where you're not client facing your ability with people mattered very little.","c":4,"n":6,"i":"pay","s":80},{"id":"Jimmy-010746-125","p":"Jimmy","t":"01:07:46","q":"So a lot of my natural things I was naturally good at, I was okay at the accounting side of things, but I wasn't, I was like middle of the pack. But in doing so I, there was a, there were a lot of moments where I had clashes with like managers or partners on a moral sort of compass, and it meant that I sort of, like, lost trust for them. So I went through that, most of that experience feeling like I had no one in my corner either. And professionally, I should say. My parents and everyone was very supportive. But when you're in an environment where you can see people being favored or all of those things valued, whatever it is, and you've also got the compound of different values, completely different values, you very openly start to feel on the outer.","c":131,"n":1,"i":"family_influence","s":50},{"id":"Jimmy-010843-126","p":"Jimmy","t":"01:08:43","q":"So regardless of my ability, I didn't feel like I actually belonged. And so that was from like the end of year one maybe. So I spent two years in this space feeling like I didn't belong. It was corrosive, but I needed to get my chartered accountant qualification. So I sat through. It wasn't the best experience, and it wasn't great for confidence either. Yeah. So it really smashed confidence to a point where you're questioning, I was great at university I was getting. I was competing as good as anyone else here. Why am I not, you know, excelling to the point that everyone else might be or some others might be. And those questions were constantly swirling, and they get at your confidence. And I think eventually I got to the point where the difference between university and that experience was that I didn't have anyone who trusted me in the same way.","c":7,"n":0,"i":"big4","s":43},{"id":"Jimmy-010943-127","p":"Jimmy","t":"01:09:43","q":"Whereas I felt far less and that pressure of not being trusted and then being like, okay, I've got to prove them wrong.","c":2,"n":4,"i":"work_content","s":82},{"id":"Jimmy-010957-128","p":"Jimmy","t":"01:09:57","q":"It's not it's not making you question. So when you're when you're confident you don't question or second guess. When you're not confident you start second guessing and then you spend too long on it. And that's a bad thing as well. So they'll come back and say, hey, you spent way too long on it. And it's like, well, yeah, I'm trying not to get it wrong because you know what I mean? So that's the cycle. It's not great for your confidence. It's not great for your output. And that was a really bad start to my accounting career. And it kind of set me up for not the best springboard, but I managed to recover. So off the back of it, once I left, I felt this big weight drop off. Yeah.","c":74,"n":20,"i":"somatic","s":64},{"id":"Jimmy-011036-129","p":"Jimmy","t":"01:10:36","q":"Yeah, it was huge. The new The new once I left the the new firm, I went to [a mid-tier firm]. Although there wasn't diversity was still similar. I was still the only one who was multi Pacific. I was in an environment that was far more down to earth, though, so that down to Earthness almost brought me to a point where I could be comfortable, whereas I wasn't very down to earth at all. It was very I don't know what the opposite of down to earth is, but.","c":23,"n":30,"i":"ethnicity","s":93},{"id":"Jimmy-011124-130","p":"Jimmy","t":"01:11:24","q":"Problem is, I've never been good at playing the game. Yeah.","c":2,"n":4,"i":"work_content","s":46},{"id":"Jimmy-011129-131","p":"Jimmy","t":"01:11:29","q":"I'm way too honest. And I'll just say it how it is. And then yeah. So moving on from that was hard. I rebuilt confidence at [a mid-tier firm] and then from there was able to go on into roles and actually build confidence. But I think that initial experience was quite damaging in that if it were a positive experience, I'd probably be in a very different place about accounting in general, because I wonder if, was it that I didn't like the content, or was it that experience dampened my view of. Yeah.","c":70,"n":25,"i":"confidence","s":100},{"id":"Jimmy-011213-132","p":"Jimmy","t":"01:12:13","q":"And I think that if things were different, if it was a positive experience and I was able to grow at the same grow at the pace that I believe I would have I think it might have been very different. And my love for the content might have actually been far, like possibly it could have been greater than it was. And I think it just set me up in a bad way, which means I didn't love the content. I always attached the content to the experience.","c":60,"n":17,"i":"learning","s":96},{"id":"Jimmy-011242-133","p":"Jimmy","t":"01:12:42","q":"And since then I kind of just been doing it to make sure I'm interested in people. I'm interested in growth and development. And that's kind of why why that I mentioned the armor piece around my taha is because first I found [a mid-tier firm], which was down to earth, even if it wasn't fully diverse culturally. And then I found [city], which was super diverse culturally. No matter what job I was in, you heard different languages. Different. So I didn't notice the same feeling I did at [big 4].","c":115,"n":30,"i":"ethnicity","s":100},{"id":"Jimmy-011502-134","p":"Jimmy","t":"01:15:02","q":"And then I went on to What's it called? I went on to [an iwi holdings company] and then completely felt a familiarity, comfort culturally. And then from there, I kind of decided I'm not going into an organization that doesn't have at least some diversity or something that can make me feel at least a bit more comfortable. It's too hard to go back.","c":23,"n":30,"i":"ethnicity","s":100},{"id":"Jimmy-011412-135","p":"Jimmy","t":"01:14:12","q":"Yeah, exactly. You're right. And that's exactly how I put it. It was really healing and. Yeah I, I think of my initial experience with more like that down to earth more like me, who I am as a person. Things might have been a lot more different for me from that trajectory wise. Yeah. But yeah, my wife is still she's at [big 4] now, and she's a senior manager there. Loves the type of work. She's she's more used to or culturally used to it. She's a, she's middle class New Zealand European herself. So I think for her, it works for me. I just need to make sure I find spaces where I feel a bit more like I can just be me.","c":23,"n":30,"i":"ethnicity","s":63},{"id":"Jimmy-011514-136","p":"Jimmy","t":"01:15:14","q":"And it's it's it's nice that you actually notice that because I don't think it's everyone would understand that aspect. Like you're putting energy into something that no one else has to necessarily worry about.","c":78,"n":24,"i":"health_change","s":52},{"id":"Jimmy-011607-137","p":"Jimmy","t":"01:16:07","q":"And","c":9,"n":7,"i":"procedural","s":0},{"id":"Jimmy-011609-138","p":"Jimmy","t":"01:16:09","q":"The other tough part is my wife. She's she's always trying to push me. She always says that she feels like I give up. She tries to diagnose me. She's always like, have you searched up all the ADHD tendencies? She goes, it's you. And it's like she goes, it's pretty much your name. And I'm like, what? And so I was like, search it up. And I'm like, oh, okay. A lot of these fit. And she goes, maybe these also played into some of it. And I said, maybe, but I only know what I know. Right. And.","c":0,"n":4,"i":"work_content","s":62},{"id":"Jimmy-011730-139","p":"Jimmy","t":"01:17:30","q":"Yeah, exactly. I think that's that's the big piece of it. I think growing up in a family where you're we were like in this schooling, but in a family that was like we had family in almost poverty or gangs, and we had family that was not we were going to schools where most students there were middle class. We were exposed to a lot growing up, and I think that helped to be able to level with anybody from any walk of life. It's the whole like if you've heard the saying, you treat the CEO the same as you would the cleaner like or vice versa. I can't remember how it said, but the whole idea is just that respect piece is big, regardless of what role they might do or who they might be, as kind of just affording respect to everybody in equal measure. I don't know, but yeah.","c":33,"n":6,"i":"pay","s":67},{"id":"Jimmy-011834-140","p":"Jimmy","t":"01:18:34","q":"But I do think you're right, I think I think it's the important context is how poor my initial experience was, despite the brilliance of these people in terms of their technical ability, their they had I had to learn from these people because they were great people to learn from. About the craft. But the other side of that experience was really, really shaping for me. And I think that's what led to coming out to this other end of like, okay, I'm going to just make the jump and try it. And who knows. Before long my wife could say hey we financially we don't know how we can you know I might have to go. But so far this experience at [university] has been really rewarding. It's been yeah. Really really it's been good.","c":4,"n":6,"i":"pay","s":53},{"id":"Jimmy-011953-141","p":"Jimmy","t":"01:19:53","q":"Great question.","c":9,"n":7,"i":"procedural","s":26},{"id":"Jimmy-012000-142","p":"Jimmy","t":"01:20:00","q":"A few things have to be present. Not sure of the ultimate destination, let's say. But in terms of environment, there needs to be that element of down to earth. There needs to be that there needs to be challenge and growth. There needs to be some level of people focus. I can't I'm not the type to sit behind a computer all day. So in terms of 5 to 10 years, whether it's in this setting, if it was in this setting, it would be having built a alumni mentoring program that's now part of the [city] fabric that's thriving, that's servicing more students than it can currently. And and kind of pushing that forward, I think making it BAU would be awesome. It's currently deemed project if it was an accounting and finance, it would be. For, for, for similar reasons. So I want to help people at [university]. I want to help students and I want to help especially those students who will be walking into places they might not feel like they belong. I've got a real big how do you make a space welcoming for everybody so they can all operate comfortably? I would probably look at doing work, coaching organizations and trying to help work there where they could not just lip service. I mean, kind of how do you how do you go about your day so that no matter who's in the building, they all feel good?","c":11,"n":9,"i":"mentor_good","s":60},{"id":"Jimmy-012148-143","p":"Jimmy","t":"01:21:48","q":"Yeah, actually actually live it, actually do it. Create some interactive sort of experiential learning and workshop that through especially through leadership and then see if we can impact cultures that way. But I think if you can't change the big systems, then you need to prepare the individuals. So a lot of my work would be around working on resilience with our students. Not sugarcoating the realities for especially for students who might be seeing whatever level of if they're a minority in any sense, it's likely they're going to face some friction and prepare for that. And actually like, build your tool set, let's say. So a lot of it would come down to belonging and trying to work that through. The only other angle I can see in accounting and finance for that is if I went back into accounting and finance, my goal would be to get to the top. And the reason, the reason for that is if you can see it, you can be it. And I would want other Maori and Pacific to see that regardless of whether or not you're a minority, you can still get there. And I would always for me, it would be like facilitating and opening a pathway for others to follow. Really travelling.","c":132,"n":30,"i":"ethnicity","s":50},{"id":"Jimmy-012324-144","p":"Jimmy","t":"01:23:24","q":"An.","c":9,"n":7,"i":"procedural","s":13},{"id":"Jimmy-012325-145","p":"Jimmy","t":"01:23:25","q":"That's really that's a really good point. You can't influence a culture to the level you would need to until you're a decision maker up at the top. So that's another thing. Yeah, I would I would work on the culture within the business, but I'd also look at being visible in the industry as Maori and Pacific in a role that's traditionally not you know, held by Maori or Pacific. So those are, those are the angles I see myself going, whether it's finance. It's all about belonging and trying to help others through because that's where I get my reward from.","c":23,"n":30,"i":"ethnicity","s":90},{"id":"Jimmy-012402-146","p":"Jimmy","t":"01:24:02","q":"Whether the vehicles, accounting or finance or careers coaching, you know, I feel like my scope to help is just different in different ways. But it'll be helping people.","c":1,"n":4,"i":"work_content","s":100},{"id":"Jimmy-012435-147","p":"Jimmy","t":"01:24:35","q":"You're a really strong active listener. I could tell through that you were able to weave things from all parts of the conversation. So I think that's going to serve you well. Are you planning to go into clinical psychology?","c":2,"n":4,"i":"work_content","s":86},{"id":"Jimmy-012550-148","p":"Jimmy","t":"01:25:50","q":"You'd be amazing at that. You're a you're an awesome.","c":1,"n":4,"i":"work_content","s":44},{"id":"Jimmy-012555-149","p":"Jimmy","t":"01:25:55","q":"You've got a really Like, I guess you're a really approachable demeanor as well. You're really warm and outgoing, and I think those things will definitely comfort anybody from any of those realms. So. So thank.","c":3,"n":4,"i":"work_content","s":49},{"id":"Jimmy-012627-150","p":"Jimmy","t":"01:26:27","q":"Or what would you prefer? Yeah. Just let me know anytime you're on campus. I'm. I'm generally quite free for a coffee or anything like that.","c":5,"n":7,"i":"procedural","s":100},{"id":"Jimmy-012639-151","p":"Jimmy","t":"01:26:39","q":"Catch up and talk more. But I also know how busy you must be. With how many people you must be working.","c":9,"n":7,"i":"procedural","s":95},{"id":"Jimmy-012720-152","p":"Jimmy","t":"01:27:20","q":"That sounds really, really good. Yeah. Anything in my calendar that works for you and we'll try and find a time. And other than that, good luck for your eye surgery, I'm sure.","c":2,"n":4,"i":"work_content","s":75},{"id":"Jimmy-012736-153","p":"Jimmy","t":"01:27:36","q":"No worries. Well Thank you so much. Sorry for going over time. And we will catch you.","c":6,"n":7,"i":"procedural","s":100},{"id":"Mitchell-000022-001","p":"Mitchell","t":"00:00:22","q":"Yeah. Cool. So I'm the technology manager for a financial services firm in [city] called [current firm]. So [current firm] do financial advice and investment management. They look after people's money and provide investment strategies and financial planning for them. So our typical clients are people looking to retire or maybe who have already retired with a not insignificant amount of, of disposable funds. So often these people have sold a business or a farm, or downsize their home or have just had like a long professional career and accumulated funds, and they want to be able to retire or know that they can retire easily. So as the technology manager, I look after everything that's related to technology. I work with all our vendors and partners namely our cyber security and our technology support partner. I do project work based on the roadmap that the business develops. So every year they work out where they want to go in the next year. And then I support a wide range of initiatives, from technical delivery of technical projects to more generic kind of business analyst and just general project work because I'm kind of the main dedicated resource for project work. So often I'll end up doing stuff like process design automation enhancements, workshops, facilitations stuff that's not really related to technology, but because I'm kind of the only dedicated project resource, I pick it up. And so yeah, my role is a range from BA work to deeply technical cybersecurity meetings to the printer's stopped working. So why is the printer not working?","c":56,"n":8,"i":"ai_tech","s":93},{"id":"Mitchell-000216-002","p":"Mitchell","t":"00:02:16","q":"I love that we use a Microsoft version called Power Automate. Yeah.","c":64,"n":8,"i":"ai_tech","s":30},{"id":"Mitchell-000230-003","p":"Mitchell","t":"00:02:30","q":"Anything. Anything too advanced. We pull in a consultant for it or off to one of our partners. But yeah, a lot of basic stuff. Like perfect example of that is one of our, the head of our advice team wanted to track how many like, business development activities people were doing, assign a weighting to it. So I built a form that plugs it into an Excel spreadsheet that then sends him an email that then gets a power BI visualization over the top of it. So super easy. Low cost. You know, the same thing to develop a web app or something like that would have been ten grand, but we could do that with Power Automate in ten minutes. It's not fancy, but you know, it should be outcome. Yeah.","c":57,"n":8,"i":"ai_tech","s":100},{"id":"Mitchell-000316-004","p":"Mitchell","t":"00:03:16","q":"Yeah. So about three. 3 to 4 people in the operations team, depending on how you classify it. Yeah.","c":2,"n":4,"i":"work_content","s":64},{"id":"Mitchell-000326-005","p":"Mitchell","t":"00:03:26","q":"It's 30 people.","c":9,"n":7,"i":"procedural","s":32},{"id":"Mitchell-000334-006","p":"Mitchell","t":"00:03:34","q":"Yeah. So I studied at [polytechnic]. I studied the Bachelor of Information and Communication Technology. And that degree is structured with kind of three pathways. You can go into programming networking or what they call business systems. I think it's got a new name now, but information technology is kind of the term. And that's kind of all about how you can support businesses using it so that you do business analyst papers, you do project management papers, you do system methodology. And then you kind of tie it in with some technical skills. So that's what I studied. I initially thought I was going to be a network engineer. I did one networking paper and went, nope, this is not for me. And I did the business paper and I thought, wow, this is really interesting. And so that kind of was the pathway. I went down while I was studying good old [colleague] was doing some really basic IT work at a company called [prior org], and they had an opportunity to work in their what they called the Digital Systems team just a few hours a week, part time. And so I applied and got that job. And so that was kind of managing internal intranets supporting with Microsoft SharePoint and the like. And so I did that for about 15 months, 16 months. And while I was there, Covid hit. And [prior org] is reliant on airline revenue. And that stopped coming in and they announced a pretty major restructure that axed about 200 people's jobs. And they made the really financially backward decision to get rid of their two minimum wage interns from [polytechnic] and bring in a consultancy from [consultancy] at $400 an hour.","c":82,"n":36,"i":"security","s":69},{"id":"Mitchell-000526-007","p":"Mitchell","t":"00:05:26","q":"To save money.","c":8,"n":7,"i":"procedural","s":33},{"id":"Mitchell-000528-008","p":"Mitchell","t":"00:05:28","q":"And so I had to look for a project. I planned on doing my what they call my capstone project, which is a kind of four month project in your final year with [prior org]. [prior org] had said that they could do that. And then they said, your role is being disestablished, but if you want, you can still do your project. And I thought, well, not really. A lot of people get hired straight out of their projects. So I kind of thought that if I did it with [prior org], it would lead to a permanent position. And then obviously with them disestablishing my role, I thought maybe not. So I started looking for projects and through a friend of a friend heard that [current firm] was looking for someone to deploy an intranet, a SharePoint based intranet. So I interviewed for the job and then got a got got basically a fixed term contract to do my project with them. They had no one internal who came from a technology background. They had two advisors who one was like a operations manager, and then the other was just the youngest advisor who had a little bit of technology skills. And they were they were kind of running the show and they, they brought me in, were really happy with the project that I delivered and then offered me a permanent position. So that's how I ended up there. And then I've done anything and everything there for the last five years, pretty much.","c":58,"n":36,"i":"security","s":25},{"id":"Mitchell-000655-009","p":"Mitchell","t":"00:06:55","q":"No. I've gone through a few different hats. So initially I was a SharePoint consultant and then I was a technology specialist, and then I became IT manager. And then when I started becoming a bit more involved in the roadmap side of things and interacting more with the leadership team, I became the technology manager.","c":11,"n":9,"i":"mentor_good","s":100},{"id":"Mitchell-000751-010","p":"Mitchell","t":"00:07:51","q":"Yeah, essentially, I was realizing it was a lot more technical than I thought it was going to be. And a lot less hands on than I had envisioned. And I really enjoyed the hands-on aspect of configuring computers, plugging stuff in, playing with the hardware. And then I realized that actually, it's just a lot of like programming this and that and the other, and it just really didn't interest me at all. And so I kind of went through a stage of going, damn, I picked this degree because it had a strong networking presence. I'm really not enjoying what networking is. Yeah. What am I going to do? I was taking programming papers at the time, and I wasn't loving them. I didn't mind them, but I it wasn't really my vibe either. And so, yeah, it was a it was in that first semester, I also had my business intro to business network Business Systems. And the first assignment on that was like a research paper on essentially a specific business system and like what it had done for a business. And I just found it really interesting. I had a good. Yeah it was kind of more English based rather than like maths based which appealed to me. Lots of reading, lots of technical analysis, that kind of thing. And that all just really appealed. And then so I took kind of the, the second tier to that and the second semester and again really enjoyed it. Had to do the networking, had to do the programming, didn't love them. They were okay but didn't love them. So then it was kind of a no brainer to to to focus on my second and third years in that pathway.","c":133,"n":3,"i":"networks","s":50},{"id":"Mitchell-000938-011","p":"Mitchell","t":"00:09:38","q":"Yeah, it was pretty varied. So one of the tutors that I spoke to basically said, every business needs people who can talk to a business and that they can talk to technology. And you see they're really rare. You have great programmers who can talk tech, but they can't relate to a business. They have no idea about business goals. And you've got people who are excellent at running business but don't understand technology. And so he said, like, if you can bridge that gap and sit in the middle, you can go anywhere in any industry, for any company. They all need you and there's not enough of them. And so that really was like, oh, cool. You know, that's flexibility, that's freedom. And that's like a really interesting career as well, because it's not like you're tied into a specific industry like you would be with programming. You could go.","c":17,"n":5,"i":"balance","s":14},{"id":"Mitchell-001023-012","p":"Mitchell","t":"00:10:23","q":"Yeah, yeah. So I never thought I'd be working for financial services, but yeah, I was aware that basically every industry needed it and that it would give me a lot of flexibility. The one thing that I heard, as well as kind of a word of warning, was make sure I don't forget my technical skills because there's lots of people who go down there kind of bridging pathway, and they don't have any technical know how they leave behind the programming or the networking or the web development or whatever else, and then they get to a point where they have all this project management skills, but no technical depth. And that means that when they are interacting with developers or networkers or whatever, they're really going to struggle to talk that. So you had to I had to take some of those papers that I didn't love in order to have a level of knowledge so that I could transfer between two.","c":4,"n":6,"i":"pay","s":67},{"id":"Mitchell-001121-013","p":"Mitchell","t":"00:11:21","q":"Yeah. So I had I had great tutors at [polytechnic], particularly in the business systems pathway. I had a guy called [name] who had a career as a business analyst and was now teaching at [polytechnic]. He was great. And when I was in my final year of [school] final two years of [school], the IT teacher retired and they actually brought [polytechnic] in to run our technology Digital technologies program. And so they picked they picked this guy called [tutor] to run it. And he was fantastic. He was a tutor at [polytechnic], but he had a real passion for learning and teaching and he was fantastic. And in the second year [university] got involved and dropped the ball. And we went along to a lecture class from 2 to 5 on a Friday that was not at all fit for the NCEA curriculum. And so we learnt basically first year computer science, which was directly not related to the assignments that we were learning. And I got a pretty clear understanding that actually the lecture style didn't suit me. I wanted the hands on ness of [polytechnic]. And so yeah, people I talk to was was [tutor] because he'd also done the, the information systems pathway and then [name] because he'd worked as a business analyst in it. So those two guys gave me a lot of really good advice.","c":4,"n":6,"i":"pay","s":43},{"id":"Mitchell-001304-014","p":"Mitchell","t":"00:13:04","q":"Yeah. So basically what happened is [colleague] and I were both working there. I forget exactly when it was Covid was like March. It was like June. They announced this like restructure. Everyone in the department said, this is just a terrible idea. Like, we're going to be paying so much more for relatively similar outcomes, and we're going to lose the ability to grow someone into a role for when we need it. But the restructure was going ahead regardless of the feedback. And so [colleague] said right okay. And he found a new job. He got a new job that he could do his project for. And he started. He gave us like one week notice and left and they were like, oh, oh, okay. And then I was like, they were like, oh, well, [name], you don't have to leave. Like, you know, you're not being disestablished till December. You know, you could do your project and you could do some work, like you don't have to leave tomorrow. And but I was like, realistically, you're paying me minimum wage. I think I was on $16 an hour, you know, for technical work, doing technical stuff. It was just ridiculous.","c":45,"n":36,"i":"security","s":0},{"id":"Mitchell-001409-015","p":"Mitchell","t":"00:14:09","q":"And we'd gone from having a great manager who had hired [colleague] and I, who was very clear that she wanted to develop us, that she wanted to progress young people to someone who just, like, clearly did not want that responsibility. Hence the disestablishment. And so I was pretty convinced that even if I did my project, I was going to be stuck without a role long term. So I just immediately started looking for another project. I had always in my back pocket I knew that I could do my project there. But I started looking for other options and a few came up that I interviewed for through [polytechnic]. They go out to a lot of local business. They you know, can collect projects that you can then interview for. And I'd interviewed for another one which I wasn't real excited for. There would definitely be a role afterwards. There'd be an element of SharePoint work, but that would just be on the side. My actual project would be writing documentation for a CRM migration. Which they made it clear there was a long term role, but it wasn't really what I wanted to be in.","c":43,"n":36,"i":"security","s":20},{"id":"Mitchell-001514-016","p":"Mitchell","t":"00:15:14","q":"So and then I interviewed for a third one, which was just to do with basically a large project, again, pretty similar, an ERP system that they were implementing. And I would be basically just doing the documentation for that as well. And there was no role after that. It was a fixed term project, and I was like, okay, well, that's not an option. I'm basically down to [prior org] and no role afterwards. This other project, which is not really what I want to do, but it probably a role afterwards, plus a little bit of SharePoint work on the side. And then [current firm] was paid project. Definitely a role available afterwards in the space. So I thought let's go for it. But the issue was the deadline was like a Wednesday and my interview at [current firm] was a Thursday. So I had to go to my academic supervisor and be like, hey, I've definitely got a project in one of these other two. I'm shooting for this better one. Can I extend? And they said, yeah, sure. So that's good, that's good.","c":18,"n":9,"i":"mentor_good","s":20},{"id":"Mitchell-001633-017","p":"Mitchell","t":"00:16:33","q":"Yeah, look, to be honest, I was just stoked that I'd landed a full time role. Comparatively well paid at a at a business that was very clearly tech deficient. Like there were so many opportunities to do stuff. And I had a really good meeting with the CEO, who's a guy called [CEO], and he was basically like, look, we have a list a mile long. We've never had someone internal to do this stuff. There's all sorts of options, and we're very open to bringing in outside expertise when we need to. So this is kind of what we think we want to do. You'll probably have some ideas. These are kind of the priorities, and we'd love it if you could just start ticking them off. And if you get stuck, let us know and we'll bring in an external consultant.","c":4,"n":6,"i":"pay","s":57},{"id":"Mitchell-001721-018","p":"Mitchell","t":"00:17:21","q":"We're super benefit like super fortunate that they were super supportive, that they were aware that I was a graduate and wouldn't know everything, but they were also very aware they didn't have anyone internal to skill me up, but they were willing to bring in external as needed. So it was a bit daunting knowing that there was not really anyone else that I could mentor off or grow off. But equally, there was a ton of opportunity to do all sorts of things. So. Yeah.","c":18,"n":9,"i":"mentor_good","s":100},{"id":"Mitchell-001758-019","p":"Mitchell","t":"00:17:58","q":"Yeah, a little stressful. Like a little, you know, I, I'd come out of this highly theoretical studies and, like, less, less theoretical than, like a university, for example. The other classes were a bit more practical, but compared to [prior org], where I was part of a team of four directly reporting to a manager, part of a larger department of like 15, you know, to going to basically a manager. And I would say, hey, I think we should do this. It will cost this much. It will take me this long. And they went, yep. Cool. Was was a bit intimidating and a bit challenging, but I'd already done my SharePoint project and that went pretty well. And I'd run that according to the project methodology that I'd learned at [polytechnic]. And so I just thought, cool, I'll just apply that same methodology to each project that I run going forward, and we'll just scale it up or down, depending on the size of the project. And so yeah, it went well. And after a few few smaller projects, I kind of settled into the rhythm. I had a lot of BAU tech support stuff that I took on and that kind of through that, I got awareness of who was who and how systems worked and process and that kind of stuff, which all then informed the the actual project work that I would be doing. So, yeah, I don't know, it kind of naturally evolved. I was pretty intimidated at the start. But given that I'd run one project with, you had an academic supervisor and a industry supervisor. And so like, I had some support throughout that. [colleague] was also on a similar role at a similar business doing similar stuff. So I lean pretty heavily on his experience there. And so yeah, just kind of evolved.","c":15,"n":9,"i":"mentor_good","s":37},{"id":"Mitchell-002007-020","p":"Mitchell","t":"00:20:07","q":"Yeah, it was an adjustment. I definitely wasn't like the craziest uni student, you know, by by year three, I'd kind of settled into the swing of things. But yeah, there wasn't heaps of young people when I started that did end up changing. Basically everyone they've hired since me has been under 40. So like it definitely. The age average definitely came down. But at the start there was only one other person who was a receptionist. Who was. He was a couple years ahead of me. Yeah. It was it was an adjustment. I celebrated my 21st at [current firm], and so like, that was kind of interesting because then I went away and had like a big 21st. But then I was coming back on Monday to like a corporate job and professional services where I wore a collared suit or not, a collared suit, a collared shirt. And, you know, it was it was a little weird kind of context switching. I saw one of my coworkers at [a bar], which was a real head spin. I was like, I've never seen you outside of a professional environment, but it was a small firm that liked to play hard. So, you know, there were several, like, work functions that got pretty rowdy. And it kind of was like, oh, you know, there's always a Friday drinks and like that kind of integration into the team. And the team culture was pretty good. So it wasn't crazy crazy, but it was a definitely a jump. Yeah.","c":10,"n":13,"i":"wellbeing","s":13},{"id":"Mitchell-002131-021","p":"Mitchell","t":"00:21:31","q":"I'd say probably stressful was just not necessarily having anyone to mentor or to turn to, and like, I was the guy. So something goes wrong. It's wrong, and everyone's waiting for me to fix it, so I it stays broken until I fix it kind of thing. And there were several things like that which were just really stressful because something was broken and I had no idea why. And I had to spend like three days trying to work out why. And every day someone's coming up to me and going, hey, why isn't this working? And I'm going, I don't freaking know. Like, I'm working on it. And then it would get there and I'd go, okay, all right, got that? You know, no ChatGPT back in those days, it was crawling through web articles. It was trying, like knowledge.","c":92,"n":8,"i":"ai_tech","s":100},{"id":"Mitchell-002211-022","p":"Mitchell","t":"00:22:11","q":"Libraries and.","c":8,"n":7,"i":"procedural","s":31},{"id":"Mitchell-002213-023","p":"Mitchell","t":"00:22:13","q":"That kind of thing. But, like, it's just problem sol
