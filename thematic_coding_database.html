"covid":"Covid as career context or shock: the pandemic reshaping the field, post-Covid labour conditions and the origins of remote work.",
"rejection":"Rejection and the competitive job market: application fatigue, discouragement, self-doubt and imposter feelings amplified by market conditions rather than internal deficit.",
"confidence":"Self-belief and backing yourself in decisions, including where security enables risk-taking. Note what circumstances make confidence possible.",

"status":"Status, prestige, title and recognition as motivators, including how a title changes how one is treated.",

"values_fit":"Alignment or misalignment between personal values and the organisation or its culture.",

"networks":"Networks and social capital as the mechanism of opportunity: word-of-mouth entry, relationships and access. Keep the exclusion question live.",

"advice":"Advice to a younger self, students or an imagined audience; prescriptive reflection elicited by the protocol.",
"relocation":"Moving city, or place shaping career: mobility for partner, family or lifestyle. Attend to the resources that make mobility possible.",
"drift":"Non-linear or accidental entry into the field, discovered through exposure, with contingency retrospectively framed as fit.",
"mentor_bad":"Poor, disengaged or mistreating management as a career force, including the manager as reason for leaving. Single-narrator accounts; hold lightly.",
"family_planning":"Maternity, family planning and the gendered career-family tension, including biological-clock framing and maternity equity as a value.",
"gender":"Gendered expectations, barriers and the experience of being a young woman in the profession.",
"family_influence":"Family shaping career: parental push, role models including self-employment, and occupational inheritance, operating as differently resourced capital.",
"privilege":"Advantage narrated as luck: being fortunate or an outlier, with unnamed capital behind the luck story.",
"health_change":"Change in health, energy or capacity over time and the sustainability or longevity of the career. Core to the construct; guard against over-reading.",
"ethics_industry":"Ethical, environmental or political critique of the industry, including consumption and sustainability tensions and politics shaping fit.",
"reject_ladder":"Refusing the partner or management ladder and the ideal-worker trajectory. Note who can afford to narrate refusal as wisdom.",
"generation":"Generational commentary and cohort effects narrated as fact, often co-produced. Treat as discourse rather than evidence.",
"uni_gap":"The perceived university-to-work skills gap: learning on the job versus in study. Partly an artefact of the closing prompts."

let nodes = [], nodeKey = {}, selected = null, alpha = 0, pendingFit = false;

function issueR(c){ return Math.min(46, 12 + Math.sqrt(c)*1.35); }
function codeR(c){ return Math.min(26, 6 + Math.sqrt(c)*1.6); }
function wrapLabel(s, maxc){
  const words=s.split(' '); const lines=[]; let cur='';
  words.forEach(w=>{
    if((cur+' '+w).trim().length>maxc && cur){ lines.push(cur); cur=w; } else cur=(cur?cur+' ':'')+w;
  });
  if(cur) lines.push(cur);
  return lines.slice(0,3);
}

const svg = document.getElementById('map');
const NS = 'http://www.w3.org/2000/svg';
let gRoot = document.createElementNS(NS,'g'); svg.appendChild(gRoot);
let gEdges = document.createElementNS(NS,'g'); gRoot.appendChild(gEdges);
let gNodes = document.createElementNS(NS,'g'); gRoot.appendChild(gNodes);
let view = {x:0,y:0,k:1};
function applyView(){ gRoot.setAttribute('transform',`translate(${view.x},${view.y}) scale(${view.k})`); }
function W(){ return svg.clientWidth||900; } function H(){ return svg.clientHeight||650; }

function addNode(kind, idx, nearX, nearY){
  const key = kind[0]+idx;
  if(nodeKey[key]) return nodeKey[key];
  const cnt = kind==='issue' ? issues[idx].count : codes[idx].count;
  const label = kind==='issue' ? issues[idx].name : codes[idx].name;
  const lines = wrapLabel(label, 18);
  const fpx = kind==='issue' ? 11.5 : 9.5;
  const lw = Math.max(...lines.map(l=>l.length)) * fpx * 0.56;
  const n = {kind, idx, key, lines, lw,
    x:(nearX??W()/2)+(Math.random()-.5)*90, y:(nearY??H()/2)+(Math.random()-.5)*90,
    vx:0, vy:0, r: kind==='issue'?issueR(cnt):codeR(cnt), expanded:false};
  nodes.push(n); nodeKey[key]=n; return n;
}

function initGraph(){
  nodes=[]; nodeKey={}; selected=null;
  const cx=W()/2, cy=H()/2, R=Math.min(cx,cy)*0.85;
  issues.forEach((s,i)=>{
    const a = (i/issues.length)*Math.PI*2 - Math.PI/2;
    const n = addNode('issue', i);
    n.x = cx + Math.cos(a)*R*(0.55+0.45*Math.random());
    n.y = cy + Math.sin(a)*R*(0.55+0.45*Math.random());
  });
  pendingFit=true; reheat(); render(); showOverview();
}

function expandIssue(ii){
  const hub = nodeKey['i'+ii]; if(!hub) return;
  hub.expanded = true;
  issues[ii].codes.forEach(cn=>{
    const ci = codeIdxByName[cn];
    if(codes[ci].issue === issues[ii].name) addNode('code', ci, hub.x, hub.y);
  });
  pendingFit=true; reheat();
}
function collapseIssue(ii){
  const name = issues[ii].name;
  nodes = nodes.filter(n=>{
    if(n.kind!=='code') return true;
    if(codes[n.idx].issue!==name) return true;
    if(selected && selected.kind==='code'){
      if(selected.idx===n.idx) return true;
      if(adj[selected.idx].some(l=>l.o===n.idx)) return true;
    }
    return false;
  });
  nodeKey={}; nodes.forEach(n=>nodeKey[n.key]=n);
  const hub = nodeKey['i'+ii]; if(hub) hub.expanded=false;
  pendingFit=true; reheat();
}
function expandCode(ci){
  const me = nodeKey['c'+ci] || addNode('code', ci);
  adj[ci].slice(0,12).forEach(l=> addNode('code', l.o, me.x, me.y));
  pendingFit=true; reheat();
}

/* ---------- force simulation ---------- */
function reheat(){ const was=alpha; alpha=0.95; if(was<=0.02) requestAnimationFrame(tick); }
function tick(){
  step();
  if(alpha>0.02) requestAnimationFrame(tick);
}
function edgeList(){
  const out=[];
  nodes.forEach(n=>{
    if(n.kind!=='code') return;
    const hub = nodeKey['i'+issueIdxByName[codes[n.idx].issue]];
    if(hub) out.push({a:hub,b:n,type:'hub',w:1,len:hub.r+n.r+95});
  });
  DATA.links.forEach(([a,b,w])=>{
    const na=nodeKey['c'+a], nb=nodeKey['c'+b];
    if(na&&nb) out.push({a:na,b:nb,type:'link',w,len:na.r+nb.r+120});
  });
  nodes.forEach(n=>{
    if(n.kind!=='code') return;
    const c=codes[n.idx];
    for(const iss in c.issues){
      if(iss===c.issue) continue;
      const hub=nodeKey['i'+issueIdxByName[iss]];
      if(hub) out.push({a:hub,b:n,type:'rel',w:c.issues[iss],len:hub.r+n.r+150});
    }
  });
  return out;
}
let edges=[];
function effR(n){ return Math.max(n.r, n.lw*0.5); }
function step(){
  edges = edgeList();
  const cx=W()/2, cy=H()/2;
  for(let i=0;i<nodes.length;i++){
    const a=nodes[i];
    for(let j=i+1;j<nodes.length;j++){
      const b=nodes[j];
      let dx=b.x-a.x, dy=b.y-a.y; let d2=dx*dx+dy*dy;
      if(d2<1){dx=Math.random()-.5;dy=Math.random()-.5;d2=1;}
      const d=Math.sqrt(d2);
      const min=effR(a)+effR(b)+22;
      let f = 2600/d2;
      if(d<min) f += (min-d)*0.32;
      const fx=dx/d*f, fy=dy/d*f;
      a.vx-=fx; a.vy-=fy; b.vx+=fx; b.vy+=fy;
    }
    a.vx += (cx-a.x)*0.002; a.vy += (cy-a.y)*0.002;
  }
  edges.forEach(e=>{
    const k = e.type==='link'?0.025:(e.type==='hub'?0.045:0.005);
    let dx=e.b.x-e.a.x, dy=e.b.y-e.a.y;
    const d=Math.sqrt(dx*dx+dy*dy)||1;
    const f=(d-e.len)*k;
    const fx=dx/d*f, fy=dy/d*f;
    e.a.vx+=fx; e.a.vy+=fy; e.b.vx-=fx; e.b.vy-=fy;
  });
  nodes.forEach(n=>{
    if(n.fx!=null){ n.x=n.fx; n.y=n.fy; n.vx=0; n.vy=0; return; }
    n.vx*=0.6; n.vy*=0.6;
    n.x+=n.vx*alpha; n.y+=n.vy*alpha;
  });
  alpha*=0.985;
  if(pendingFit && alpha<0.12){ pendingFit=false; fitView(); }
  render();
}

function fitView(){
  if(!nodes.length) return;
  let x0=1e9,y0=1e9,x1=-1e9,y1=-1e9;
  nodes.forEach(n=>{
    const rx=Math.max(n.r, n.lw*0.5)+14;
    x0=Math.min(x0,n.x-rx); x1=Math.max(x1,n.x+rx);
    y0=Math.min(y0,n.y-n.r-14); y1=Math.max(y1,n.y+n.r+n.lines.length*13+22);
  });
  const bw=x1-x0, bh=y1-y0, w=W(), h=H();
  const k=Math.max(0.3, Math.min(w/bw, h/bh, 1.5))*0.94;
  view.k=k;
  view.x=(w-(x0+x1)*k)/2; view.y=(h-(y0+y1)*k)/2;
  applyView();
}

/* ---------- rendering ---------- */
function render(){
  gEdges.textContent='';
  const selCode = selected&&selected.kind==='code'?selected.idx:null;
  const selIssue = selected&&selected.kind==='issue'?issues[selected.idx].name:null;
  edges.forEach(e=>{
    const ln=document.createElementNS(NS,'line');
    ln.setAttribute('x1',e.a.x); ln.setAttribute('y1',e.a.y);
    ln.setAttribute('x2',e.b.x); ln.setAttribute('y2',e.b.y);
    let cls, wpx, op;
    if(e.type==='link'){ cls='edge-link'; wpx=1+3.5*(e.w/maxLinkW); op=.5; }
    else if(e.type==='hub'){ cls='edge-hub'; wpx=1; op=.16; }
    else { cls='edge-rel'; wpx=1.4; op=.45; }
    if(selCode!=null){
      const touches = (e.a.kind==='code'&&e.a.idx===selCode)||(e.b.kind==='code'&&e.b.idx===selCode);
      if(e.type==='link') op = touches? .95 : .12;
      else op = touches? op : op*0.35;
      if(touches&&e.type==='link') wpx=Math.max(wpx,2);
    } else if(selIssue){
      const rel = (e.a.kind==='issue'&&issues[e.a.idx].name===selIssue)||(e.b.kind==='issue'&&issues[e.b.idx].name===selIssue)
        ||(e.a.kind==='code'&&codes[e.a.idx].issue===selIssue)||(e.b.kind==='code'&&codes[e.b.idx].issue===selIssue);
      op = rel? op : op*0.3;
    }
    ln.setAttribute('class',cls); ln.setAttribute('stroke-width',wpx); ln.setAttribute('opacity',op);
    gEdges.appendChild(ln);
  });
  gNodes.textContent='';
  nodes.forEach(n=>{
    const g=document.createElementNS(NS,'g');
    g.setAttribute('class','node');
    g.setAttribute('transform',`translate(${n.x},${n.y})`);
    let dim=false;
    if(selected){
      if(selected.kind==='code'){
        const linked = n.kind==='code' && (n.idx===selected.idx || adj[selected.idx].some(l=>l.o===n.idx));
        const isHome = n.kind==='issue' && codes[selected.idx].issues[issues[n.idx].name];
        dim = !(linked||isHome);
      } else {
        const nm = issues[selected.idx].name;
        dim = !((n.kind==='issue'&&n.idx===selected.idx)||(n.kind==='code'&&codes[n.idx].issues[nm]));
      }
    }
    if(selected && ((selected.kind==='code'&&n.kind==='code'&&n.idx===selected.idx)||(selected.kind==='issue'&&n.kind==='issue'&&n.idx===selected.idx))){
      const ring=document.createElementNS(NS,'circle');
      ring.setAttribute('r',n.r+5); ring.setAttribute('fill','none');
      ring.setAttribute('stroke','#1E3A5F'); ring.setAttribute('stroke-width',2);
      g.appendChild(ring);
    }
    const c=document.createElementNS(NS,'circle');
    c.setAttribute('r',n.r);
    if(n.kind==='issue'){
      const p=issuePal(n.idx);
      c.setAttribute('fill', n.expanded? p.fill : '#1E3A5F');
      c.setAttribute('stroke','#1E3A5F'); c.setAttribute('stroke-width',1.5);
    } else {
      const p=issuePal(issueIdxByName[codes[n.idx].issue]);
      c.setAttribute('fill',p.acc);
      c.setAttribute('stroke','#1E3A5F'); c.setAttribute('stroke-width',1);
    }
    g.setAttribute('opacity', dim? 0.22 : 1);
    g.appendChild(c);
    const fpx = n.kind==='issue'? 11.5 : 9.5;
    n.lines.forEach((line,li)=>{
      const t=document.createElementNS(NS,'text');
      t.textContent = line;
      t.setAttribute('text-anchor','middle');
      t.setAttribute('y', n.r + 13 + li*(fpx+2));
      t.setAttribute('font-size', fpx);
      t.setAttribute('font-weight', n.kind==='issue'? 600 : 400);
      t.setAttribute('fill', n.kind==='issue'? '#1E3A5F' : '#37221F');
      t.setAttribute('paint-order','stroke'); t.setAttribute('stroke','#FFFBF4'); t.setAttribute('stroke-width',3);
      g.appendChild(t);
    });
    if(n.kind==='issue' && !n.expanded){
      const t2=document.createElementNS(NS,'text');
      t2.textContent = issues[n.idx].codes.length;
      t2.setAttribute('text-anchor','middle'); t2.setAttribute('dy','0.35em');
      t2.setAttribute('font-size',Math.max(9,n.r*0.55)); t2.setAttribute('font-weight',600); t2.setAttribute('fill','#fff');
      g.appendChild(t2);
    }
    g.addEventListener('pointerdown', ev=>startDrag(ev,n));
    gNodes.appendChild(g);
  });
}

/* ---------- interactions ---------- */
let drag=null;
function toLocal(ev){
  const r=svg.getBoundingClientRect();
  return {x:(ev.clientX-r.left-view.x)/view.k, y:(ev.clientY-r.top-view.y)/view.k};
}
function startDrag(ev,n){
  ev.stopPropagation();
  const p=toLocal(ev);
  drag={n, moved:false, ox:p.x-n.x, oy:p.y-n.y};
  svg.setPointerCapture(ev.pointerId);
}
svg.addEventListener('pointermove', ev=>{
  if(drag&&drag.n){
    const p=toLocal(ev);
    const nx=p.x-drag.ox, ny=p.y-drag.oy;
    if(Math.abs(nx-drag.n.x)>2||Math.abs(ny-drag.n.y)>2) drag.moved=true;
    drag.n.fx=nx; drag.n.fy=ny; reheat();
  } else if(drag&&drag.pan){
    if(Math.abs(ev.clientX-drag.sx)>3||Math.abs(ev.clientY-drag.sy)>3) drag.moved=true;
    view.x=drag.vx+(ev.clientX-drag.sx); view.y=drag.vy+(ev.clientY-drag.sy); applyView();
  }
});
svg.addEventListener('pointerup', ev=>{
  if(drag&&drag.n){
    const n=drag.n; n.fx=null; n.fy=null;
    if(!drag.moved) clickNode(n);
  } else if(drag&&drag.pan){
    svg.classList.remove('dragging');
    if(!drag.moved) resetMap();   /* click on empty space resets */
  }
  drag=null;
});
svg.addEventListener('pointerdown', ev=>{
  drag={pan:true,moved:false,sx:ev.clientX,sy:ev.clientY,vx:view.x,vy:view.y};
  svg.classList.add('dragging');
  svg.setPointerCapture(ev.pointerId);
});
svg.addEventListener('wheel', ev=>{
  ev.preventDefault();
  const r=svg.getBoundingClientRect();
  const mx=ev.clientX-r.left, my=ev.clientY-r.top;
  const k2=Math.max(.2,Math.min(3,view.k*(ev.deltaY<0?1.12:0.89)));
  view.x = mx-(mx-view.x)*(k2/view.k); view.y = my-(my-view.y)*(k2/view.k); view.k=k2;
  applyView();
},{passive:false});
document.getElementById('zin').onclick=()=>{view.k=Math.min(3,view.k*1.2);applyView();};
document.getElementById('zout').onclick=()=>{view.k=Math.max(.2,view.k/1.2);applyView();};
document.getElementById('zfit').onclick=()=>fitView();
function resetMap(){ view={x:0,y:0,k:1}; applyView(); initGraph(); }
document.getElementById('reset').onclick=resetMap;

function clickNode(n){
  if(n.kind==='issue'){
    if(n.expanded && selected && selected.kind==='issue' && selected.idx===n.idx){
      collapseIssue(n.idx); selected=null; showOverview();
    } else {
      if(!n.expanded) expandIssue(n.idx);
      selectIssue(n.idx);
    }
  } else {
    selectCode(n.idx);
  }
  render();
}

/* ---------- quote ordering (illustrativeness) ----------
   Quotes carry a machine score (q.s, 0-100 within each code) built on the
   quotation-selection literature: illustrative fit to the code (lexical
   similarity to the code's own segments and the code label), succinctness
   (readable length, low filler), self-containedness, and modest vividness
   (Lingard 2019; Eldh, Årestedt & Berterö 2020; Roller 2017; Which
   Quotations to Use?, 2025). At display time a spread across participants
   is enforced so one articulate voice does not dominate the top of the list. */
function orderQuotes(list){
  const pool=list.slice().sort((a,b)=>quotes[b].s-quotes[a].s);
  const out=[]; const used={};
  while(pool.length){
    let bi=0, bs=-1e9;
    const lim=Math.min(pool.length,40);
    for(let i=0;i<lim;i++){
      const q=quotes[pool[i]];
      const sc=q.s - 9*(used[q.p]||0);
      if(sc>bs){bs=sc;bi=i;}
    }
    const qi=pool.splice(bi,1)[0];
    const p=quotes[qi].p; used[p]=(used[p]||0)+1;
    out.push(qi);
  }
  return out;
}

/* ---------- right-hand panel ---------- */
const ph=document.getElementById('panelhead');
const pb=document.getElementById('panelbody');
const rb=document.getElementById('relbox');
const db=document.getElementById('defbox');
let quoteList=[], quoteShown=0, pFilter=null;
const CHUNK=40;

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;'); }

function showDef(kind,name){
  db.style.display='block';
  db.innerHTML='<h3>'+(kind==='i'?'Working definition':'Working notes')+
    (kind==='i'?'<span id="defrestore">restore original</span>':'')+'</h3>';
  const ta=document.createElement('textarea'); ta.id='defta';
  ta.value=defFor(kind,name);
  ta.placeholder='Loose notes on what this means so far…';
  const autosize=()=>{ ta.style.height='auto'; ta.style.height=Math.min(170,ta.scrollHeight+2)+'px'; };
  ta.addEventListener('input',()=>{
    setDef(kind,name,ta.value);
    autosize();
  });
  db.appendChild(ta); autosize();
  const rest=document.getElementById('defrestore');
  if(rest) rest.onclick=()=>{
    clearDef(kind,name); ta.value=defFor(kind,name);
    autosize();
  };
}

function setChips(parts, onChange){
  const box=document.getElementById('chips'); box.textContent='';
  const entries=Object.entries(parts).sort((a,b)=>b[1]-a[1]);
  if(entries.length<2){ return; }
  entries.forEach(([p,n])=>{
    const el=document.createElement('span');
    el.className='chip'+(pFilter===p?' active':'');
    el.innerHTML=esc(p)+'<span class="n">'+n+'</span>';
    el.onclick=()=>{ pFilter = (pFilter===p? null : p);
      el.parentNode.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));
      if(pFilter===p) el.classList.add('active');
      onChange(); };
    box.appendChild(el);
  });
}

function illDots(s){
  const on=Math.max(1,Math.round(s/25));
  let h='<span class="qill" title="Illustrativeness: fit to the code, succinctness, self-containedness.">';
  for(let i=0;i<4;i++) h+='<i'+(i<on?' class="on"':'')+'></i>';
  return h+'</span>';
}

function renderQuotes(reset){
  if(reset){ pb.textContent=''; quoteShown=0; }
  const list = pFilter? quoteList.filter(qi=>quotes[qi].p===pFilter) : quoteList;
  const old=document.getElementById('loadmore'); if(old) old.remove();
  const end=Math.min(list.length, quoteShown+CHUNK);
  for(let i=quoteShown;i<end;i++){
    const q=quotes[list[i]];
    const card=document.createElement('div'); card.className='qcard';
    card.innerHTML =
      '<div class="qmeta"><span class="qid">'+esc(q.id)+'</span>'+
      '<span class="pchip" style="background:'+pcol[q.p]+'">'+esc(q.p)+'</span>'+
      '<span class="qts">'+esc(q.t)+'</span>'+illDots(q.s)+
      '<span class="qcode" data-c="'+q.c+'">'+esc(codes[q.c].name)+'</span></div>'+
      '<div class="qtext">'+esc(q.q)+'</div>'+
      '<details class="qnote"><summary>Reflexive note · '+esc(q.i)+'</summary><p>'+esc(notes[q.n])+'</p></details>';
    card.querySelector('.qcode').onclick=ev=>{ selectCode(+ev.target.dataset.c); render(); };
    pb.appendChild(card);
  }
  quoteShown=end;
  if(end<list.length){
    const btn=document.createElement('button'); btn.id='loadmore';
    btn.textContent='Show more ('+(list.length-end)+' remaining)';
    btn.onclick=()=>renderQuotes(false);
    pb.appendChild(btn);
  }
  if(list.length===0){
    const d=document.createElement('div'); d.className='empty'; d.textContent='No quotes for this filter.'; pb.appendChild(d);
  }
}

function showOverview(){
  selected=null; pFilter=null; rb.style.display='none'; db.style.display='none';
  ph.querySelector('h2').textContent='Open coding map';
  document.getElementById('panelsub').textContent = quotes.length+' quoted segments · '+codes.length+' initial codes · '+issues.length+' interpretive issues · '+DATA.participants.length+' participants';
  document.getElementById('chips').textContent='';
  pb.innerHTML='<div class="empty">Each navy circle is an <b>interpretive issue</b>; the number inside is how many initial codes sit beneath it. Click an issue to unfold its codes, and click a code to bring in its linked codes and read the most illustrative quotes here. Every issue carries an editable working definition; edits save in this browser, so export them now and then as a backup. Click empty space on the map to reset.</div>';
  quoteList=[];
}

function selectIssue(ii){
  selected={kind:'issue', idx:ii}; pFilter=null;
  const s=issues[ii];
  ph.querySelector('h2').textContent = s.name;
  const parts={};
  (quotesByIssue[s.name]||[]).forEach(qi=>{const p=quotes[qi].p; parts[p]=(parts[p]||0)+1;});
  document.getElementById('panelsub').textContent = 'Interpretive issue · '+s.count+' segments · '+s.codes.length+' codes · '+Object.keys(parts).length+' participants';
  setChips(parts, ()=>{ renderQuotes(true); });
  showDef('i', s.name);
  rb.style.display='block';
  rb.innerHTML='<h3>Codes under this issue</h3>';
  s.codes.forEach(cn=>{
    const ci=codeIdxByName[cn];
    const row=document.createElement('div'); row.className='rel';
    const p=issuePal(issueIdxByName[codes[ci].issue]);
    row.innerHTML='<span class="dot" style="background:'+p.acc+';border:1px solid #1E3A5F"></span><span style="flex:1">'+esc(cn)+'</span><span class="w rel2">'+codes[ci].count+'</span>';
    row.onclick=()=>{ selectCode(ci); render(); };
    rb.appendChild(row);
  });
  quoteList = orderQuotes(quotesByIssue[s.name]||[]);
  renderQuotes(true);
}

function selectCode(ci){
  if(!nodeKey['c'+ci]){
    const homeIssue = issueIdxByName[codes[ci].issue];
    const hub=nodeKey['i'+homeIssue];
    if(hub && !hub.expanded) expandIssue(homeIssue);
    if(!nodeKey['c'+ci]) addNode('code', ci, hub?hub.x:null, hub?hub.y:null);
  }
  expandCode(ci);
  selected={kind:'code', idx:ci}; pFilter=null;
  const c=codes[ci];
  ph.querySelector('h2').textContent = c.name;
  document.getElementById('panelsub').textContent = 'Initial code · '+c.count+' segments · issue: '+c.issue;
  setChips(c.parts, ()=>{ renderQuotes(true); });
  showDef('c', c.name);
  rb.style.display='block';
  rb.innerHTML='<h3>Linked codes (co-occurrence strength)</h3>';
  if(adj[ci].length===0) rb.innerHTML+='<div class="empty" style="padding:2px 0">No co-occurring codes above threshold.</div>';
  adj[ci].forEach(l=>{
    const row=document.createElement('div'); row.className='rel';
    const p=issuePal(issueIdxByName[codes[l.o].issue]);
    row.innerHTML='<span class="dot" style="background:'+p.acc+';border:1px solid #1E3A5F"></span><span style="flex:1">'+esc(codes[l.o].name)+'</span><span class="w">'+l.w+'</span>';
    row.onclick=()=>{ selectCode(l.o); render(); };
    rb.appendChild(row);
  });
  const secs=Object.keys(c.issues).filter(x=>x!==c.issue);
  if(secs.length){
    const h=document.createElement('h3'); h.style.marginTop='8px'; h.textContent='Also appears under';
    rb.appendChild(h);
    secs.forEach(sn=>{
      const row=document.createElement('div'); row.className='rel';
      row.innerHTML='<span class="dot" style="background:#1E3A5F"></span><span style="flex:1">'+esc(sn)+'</span><span class="w rel2">'+c.issues[sn]+'</span>';
      row.onclick=()=>{ const iix=issueIdxByName[sn]; if(!nodeKey['i'+iix].expanded) expandIssue(iix); selectIssue(iix); render(); };
      rb.appendChild(row);
    });
  }
  quoteList = orderQuotes(quotesByCode[ci]);
  renderQuotes(true);
}

/* ---------- export / import definitions ---------- */
document.getElementById('exportdefs').onclick=()=>{
  const out={exported:new Date().toISOString(), issues:{}, codes:{}};
  issues.forEach(s=>{ out.issues[s.name]={definition:defFor('i',s.name), edited:isEdited('i',s.name)}; });
  codes.forEach(c=>{ const v=defFor('c',c.name); if(v) out.codes[c.name]={notes:v}; });
  const blob=new Blob([JSON.stringify(out,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='working_definitions_'+new Date().toISOString().slice(0,10)+'.json'; a.click();
};
document.getElementById('importdefs').onclick=()=>document.getElementById('importfile').click();
document.getElementById('importfile').addEventListener('change',ev=>{
  const f=ev.target.files[0]; if(!f) return;
  const rd=new FileReader();
  rd.onload=()=>{
    try{
      const o=JSON.parse(rd.result);
      if(o.issues) for(const n in o.issues){ const v=o.issues[n].definition??o.issues[n]; if(typeof v==='string' && v!==(DEFS[n]||'')) setDef('i',n,v); }
      if(o.codes) for(const n in o.codes){ const v=o.codes[n].notes??o.codes[n]; if(typeof v==='string' && v) setDef('c',n,v); }
      if(selected){ if(selected.kind==='issue') showDef('i',issues[selected.idx].name); else showDef('c',codes[selected.idx].name); }
      alert('Definitions imported.');
    }catch(e){ alert('Could not read that file: '+e.message); }
    ev.target.value='';
  };
  rd.readAsText(f);
});

/* ---------- search ---------- */
const searchEl=document.getElementById('search');
const resEl=document.getElementById('searchresults');
searchEl.addEventListener('input',()=>{
  const v=searchEl.value.trim().toLowerCase();
  if(!v){ resEl.style.display='none'; return; }
  const hits=[];
  issues.forEach((s,i)=>{ if(s.name.toLowerCase().includes(v)) hits.push({kind:'issue',idx:i,label:s.name,n:s.count}); });
  codes.forEach((c,i)=>{ if(c.name.toLowerCase().includes(v)) hits.push({kind:'code',idx:i,label:c.name,n:c.count}); });
  resEl.textContent='';
  hits.slice(0,20).forEach(h=>{
    const d=document.createElement('div');
    d.innerHTML='<span>'+esc(h.label)+' <span style="opacity:.5">('+h.n+')</span></span><span class="kind">'+h.kind+'</span>';
    d.onclick=()=>{
      resEl.style.display='none'; searchEl.value='';
      if(h.kind==='issue'){ if(!nodeKey['i'+h.idx].expanded) expandIssue(h.idx); selectIssue(h.idx); }
      else selectCode(h.idx);
      render();
    };
    resEl.appendChild(d);
  });
  if(!hits.length){ const d=document.createElement('div'); d.textContent='No matches.'; resEl.appendChild(d); }
  resEl.style.display='block';
});
document.addEventListener('click',ev=>{ if(!ev.target.closest('#searchwrap')) resEl.style.display='none'; });

/* ---------- boot ---------- */
document.getElementById('stats').textContent = quotes.length+' segments · '+codes.length+' codes · '+issues.length+' issues';
window.addEventListener('resize',()=>{reheat();});
initGraph();
</script>
