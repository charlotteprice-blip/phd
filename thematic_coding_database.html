113","p":"Ellis","t":"00:50:46","q":"There was an element of that actually. I still remember on I joined the the... As a coordinator. So a lot of things was like setting up meetings and stuff like that, and I didn't even know how to use scheduling assistant on outlook.","c":0,"n":4,"i":"work_content","s":62},{"id":"Ellis-005118-114","p":"Ellis","t":"00:51:18","q":"Not too much, I think. But you're right. There's I look back on that and I sort of remembering not knowing how to use the scheduling assistant, but I've... Outlookm and it's like these assumed skills that you don't actually know or I don't actually, I didn't actually know the core roles of comms, versus finance versus people and culture and how businesses worked and how a budget worked and all that sort of stuff. Like this.... It's almost like you need some like core.","c":27,"n":17,"i":"learning","s":71},{"id":"Ellis-005145-115","p":"Ellis","t":"00:51:45","q":"Well, you almost do. You know, lawyers do proofs. You almost need like a six week. But this is what it's like to work in a business.","c":0,"n":4,"i":"work_content","s":50},{"id":"Ellis-005158-116","p":"Ellis","t":"00:51:58","q":"They learn how to know their bit. But in people of culture, to be good, you need to understand, what is health and safety do, OD, what's the difference between people and culture Advisor and a business partner?","c":4,"n":6,"i":"pay","s":83},{"id":"Ellis-005218-117","p":"Ellis","t":"00:52:18","q":"It's a bit of that. And that's why I sort of go back to learning how to learn.","c":4,"n":6,"i":"pay","s":87},{"id":"Ellis-005224-118","p":"Ellis","t":"00:52:24","q":"Yeah. And it's knowing how to learn is different to a growth mindset though like growth mindset. Like I love to say I've got a growth mindset, but I probably don't do... i don't because I don't embrace failure.","c":4,"n":6,"i":"pay","s":73},{"id":"Ellis-005236-119","p":"Ellis","t":"00:52:36","q":"So yeah, I try to avoid failure.","c":0,"n":4,"i":"work_content","s":12},{"id":"Ellis-005243-120","p":"Ellis","t":"00:52:43","q":"And learn from it.","c":8,"n":7,"i":"procedural","s":25},{"id":"Ellis-005248-121","p":"Ellis","t":"00:52:48","q":"It's funny, I think the... But I also don't think there's much value in looking to fail. Yeah, unless you're like trying to start something from your garage.","c":1,"n":4,"i":"work_content","s":68},{"id":"Ellis-005321-122","p":"Ellis","t":"00:53:21","q":"No, no, I'm just trying to think, Year 12. I still think it's... Don't worry about the subjects you do, do the subjects that you're most passionate about. Yeah. Because if you wanted to work in HR and you love chemistry, go and do chemistry, because then you might end up working in a science organization, and you could then you can empathize with some of the scientists.","c":53,"n":31,"i":"purpose","s":54},{"id":"Ellis-005358-123","p":"Ellis","t":"00:53:58","q":"I think I think understanding how like, I wish I knew... I honestly think this might be a weird answer, I honestly think there's nothing wrong with developing contrasting skill sets like me me moving into this [executive level role (HR)] while I'm not trying to learn more about HR, i'm trying to learn more about finance. because I think to be a great [EXECUTIVE LEVEL ROLE (HR)] HR and have another string to my bow, if I can understand the commercial drivers of a business, I can give better HR advice.","c":4,"n":6,"i":"pay","s":80},{"id":"Ellis-005444-124","p":"Ellis","t":"00:54:44","q":"But I think the finances and the business, and this is what is lacking probably in APSY is as the context. The context in a budget and stuff. It sometimes provides you with constraints or factors you need to bring into account if you're going to do a piece of work","c":0,"n":4,"i":"work_content","s":59},{"id":"Ellis-005500-125","p":"Ellis","t":"00:55:00","q":"Of not doing it, there's always the option to not do stuff right. How broken is it, truly? Anyway. But I think to be a great HR person, I think some sort of understanding of how business works and how you fit into that. But I think you can learn on the job. The more... I think critical thinking because, yes, you can learn the knowledge of best practice that you need. You need the critical thinking and problem solving skills to take parts of that and apply it to your situation. And then the third bit is the interpersonal and relationship building skills. You need to understand how you can build relationships and leverage those relationships tactically to get buy-in to your things. Right? Because if you're trying to... If I, if you simplify a piece of work to the quality of the solutions or the design of it and the buy into the solution, so you need the knowledge to get the quality and the critical thinking to get it to the best fit standard for the organization. And then you need the understanding of people and the relationships.","c":4,"n":6,"i":"pay","s":33},{"id":"Ellis-005558-126","p":"Ellis","t":"00:55:58","q":"Yeah, facilitate the buy and keep it alive. Yeah, that's how I describe it.","c":2,"n":4,"i":"work_content","s":54},{"id":"Ellis-005630-127","p":"Ellis","t":"00:56:30","q":"Knowledge is the easiest thing to gain. So thinking about those soft and business skills and how you can develop them, like you. Like you, I could send you on a six week course right now, and you'd learn just about everything you need to know about HR, right? Well, you wouldn't remember it all, but, like, probably not in the details that you know, around the, the actual nerdy structure and the how to structure interview questions and all that sort of stuff. But sorry, not nerdy, but no.","c":4,"n":6,"i":"pay","s":57},{"id":"Ellis-005659-128","p":"Ellis","t":"00:56:59","q":"But you'd you'd gain a baseline knowledge. It's the understanding of how to take that knowledge off that piece of paper and apply it.","c":1,"n":4,"i":"work_content","s":68},{"id":"Ellis-005708-129","p":"Ellis","t":"00:57:08","q":"Yeah, yeah, because we learn an apsy, see how to design stuff from scratch with no constraints. Here in a business, you're very rarely designing something from scratch. You're usually making trying to make something 10% better.","c":4,"n":6,"i":"pay","s":63},{"id":"Ellis-005733-130","p":"Ellis","t":"00:57:33","q":"Ah no, no, I probably waffled a lot, like good luck, haha!","c":3,"n":4,"i":"work_content","s":41},{"id":"Ellis-005755-131","p":"Ellis","t":"00:57:55","q":"Not really. I think it's that intersection for me of that cricket and work thing was really important.","c":3,"n":4,"i":"work_content","s":57},{"id":"Ellis-005808-132","p":"Ellis","t":"00:58:08","q":"Yeah, yeah. I, I while like, everyone looks at years of experience and I'm, I don't think there'd be many people in the world that are at a [EXECUTIVE LEVEL ROLE (HR)] level eight years after they were coordinator. So I'm pretty, I'm incredibly fortunate, and it won't last forever. Like my next role might not be at a [EXECUTIVE LEVEL ROLE (HR)] level. I might be to a bigger organization at a head of level or something like that.","c":109,"n":14,"i":"privilege","s":100},{"id":"Ellis-005831-133","p":"Ellis","t":"00:58:31","q":"No, I'm happy here. I've been here for coming up for years. I'd say if I can get another year, 18 months out of the place. But the reality is within [city], because the job market here and the amount of businesses and you get to, dare I say, the pointy end of organizations and there would be 20 organisations in [city] I'd maybe consider working for. and those roles. There might be 1 or 2 roles a year come up.","c":0,"n":4,"i":"work_content","s":100},{"id":"Ellis-005904-134","p":"Ellis","t":"00:59:04","q":"Well, I'd consider it. Because I there's always questions over the future of [org]. Like do will the [external] want to sell us that sort of thing, like. And job security with my stage of life is really important.","c":43,"n":36,"i":"security","s":0},{"id":"Ellis-005930-135","p":"Ellis","t":"00:59:30","q":"Yeah, I think the practical elements is I'd have to go somewhere else to get paid. Maybe slightly more, likely the same. I'd have to work a lot harder. I think my challenge for myself is finding that balance between. How much am I giving to my family? Which is ultimately why I'm here, and also taking this opportunity I've got at a [EXECUTIVE LEVEL ROLE (HR)] level and it's like, okay, can I pick up another business unit? So I'm stretching outside of people and culture.","c":4,"n":6,"i":"pay","s":83},{"id":"Ellis-005956-136","p":"Ellis","t":"00:59:56","q":"Could I look after asset management? Could I look after internal comms? Could I look after those sort of things? So I want to be at the point where I'm an executive around a table that I meant to fill in with the chief operating officer away, like with the chief legal officer away.","c":3,"n":4,"i":"work_content","s":57},{"id":"Ellis-010012-137","p":"Ellis","t":"01:00:12","q":"Yeah, but I think the question for me is how much do I want to put in more to my effort in career right now. Yeah, yeah. Whereas how much do I like being able to...","c":0,"n":4,"i":"work_content","s":53},{"id":"Ellis-010031-138","p":"Ellis","t":"01:00:31","q":"Yeah. And that's ultimately.","c":5,"n":7,"i":"procedural","s":23},{"id":"Tilda-001231-001","p":"Tilda","t":"00:12:31","q":"Cool. So, yeah, my role at the moment, I'm a marketing coordinator I work for like a they are an accountancy firm. They're called PCF, and they are international, so they're global across the world. And in New Zealand we have, I think, maybe 13 offices across the North and South Island. So we're not one of the big four, the big you know, we've got I'm trying to think, who have we got?","c":7,"n":0,"i":"big4","s":63},{"id":"Tilda-001324-002","p":"Tilda","t":"00:13:24","q":"[we list big 4].","c":5,"n":7,"i":"procedural","s":23},{"id":"Tilda-001336-003","p":"Tilda","t":"00:13:36","q":"So we're not quite that, like, really corporate level, but we you know, our difference is that we're not trying to be. We're really trying to keep that kind of localized brand. So I work for the national team, but I kind of liaise with all of the different firms across New Zealand to help them with their marketing. And I think I've nearly been here. Must be coming into my fifth month now. Yeah.","c":24,"n":19,"i":"leaving","s":82},{"id":"Tilda-001422-004","p":"Tilda","t":"00:14:22","q":"That's a really good question.","c":3,"n":4,"i":"work_content","s":8},{"id":"Tilda-001424-005","p":"Tilda","t":"00:14:24","q":"so I finished uni at the end of 2019. And I did a Bachelor of Comms, communications at Waikato Uni. And yeah, I think I was the last class to graduate before lockdown.","c":76,"n":32,"i":"covid","s":0},{"id":"Tilda-001442-006","p":"Tilda","t":"00:14:42","q":"Yes, I know that was very lucky to be able to graduate in person at the uni. Yeah. And then while I had been studying, [00:14:50] I had been working part time and I worked as a junior reporter for a local paper. So kind of tying into that comms. Yeah, getting a bit of experience while I studied and got my degree. [00:15:04] I majored in marketing and PR, so it was a kind of a good balance across, like, comms, marketing and the public relations. And I'm really glad that I did that to give me a good background.","c":50,"n":23,"i":"transition","s":88},{"id":"Tilda-001523-007","p":"Tilda","t":"00:15:23","q":"Yeah, yeah. And so then obviously I graduated in a couple of months later, we went into lockdown. I was still working at the paper, so we had to totally change how we were able to put news out. We were weekly and we thought, oh my gosh, how are we ever going to get around? So yeah, it was an interesting time. [00:15:46] At the same time, I had kind of dabbled in freelancing and so that was doing marketing for like small businesses or self-employed people entrepreneurs. [00:15:57] So, yeah, I was doing a little bit of that.","c":44,"n":32,"i":"covid","s":76},{"id":"Tilda-001611-008","p":"Tilda","t":"00:16:11","q":"Yeah, no. So my parents definitely pushed me, you know, to look into that. I was interested always quite interested in having my own business or working for myself. My parents have both worked for themselves, My dad is like, He's a chemical engineer. So he's always like, you know, freelance or contracted to clients. So he encouraged me just to kind of go and, you know, set myself up and to give it a go. So that's how I got started. Yeah.","c":24,"n":19,"i":"leaving","s":77},{"id":"Tilda-001656-009","p":"Tilda","t":"00:16:56","q":"Totally. Totally. It was really cool and Yeah, so kind of like, from around 2020, I was working part time at the newspaper and then I would have maybe, you know, a handful of freelance clients I'd be helping. Yeah. Things for like social media management you know, copywriting for people if they wanted website blogs, things like that. Yeah. And then... And then! And then while we're in the middle of lockdown, I thought, well, I, you know, [00:17:33] maybe should look into going back to study while we can't really do much. So I went and studied a graphic design certificate online. [00:17:42]","c":44,"n":32,"i":"covid","s":48},{"id":"Tilda-001801-010","p":"Tilda","t":"00:18:01","q":"I enjoyed it, like, it was really well done. It was with the Wellington School of Design, I think, at Yoobee?","c":1,"n":4,"i":"work_content","s":64},{"id":"Tilda-001811-011","p":"Tilda","t":"00:18:11","q":"That was really well done. I think they had always done like an online course, but they definitely stepped it up for during Covid.","c":77,"n":32,"i":"covid","s":36},{"id":"Tilda-001824-012","p":"Tilda","t":"00:18:24","q":"Totally, totally. And yeah, being at the end of my study, like I would not have so many classes in person. I'd be doing a lot of online lectures, you know, and freelancing.","c":0,"n":4,"i":"work_content","s":59},{"id":"Tilda-001900-013","p":"Tilda","t":"00:19:00","q":"Yeah, totally. So I, I finished up at the newspaper at the end of 2020. And that's mainly because we had such a loss of, you know, work of articles from Covid. So I finished up there and I kind of dove into that freelancing world to try and make it as a full time thing. And that was quite good because I would have like, I had a mix of different clients I'd work with. So like, I had an agency and I was doing probably 20 hours a week with them. they were up in Auckland, but they had a lot of remote people. And I think they really had stepped that up during Covid because they still had all these people who wanted to advertise all these clients.","c":54,"n":32,"i":"covid","s":85},{"id":"Tilda-002002-014","p":"Tilda","t":"00:20:02","q":"Yeah and like marketers, you know, we you'd have so many I mean, it was... It wasn't a good thing, but it was like there was definitely a lot of work.","c":3,"n":4,"i":"work_content","s":30},{"id":"Tilda-002012-015","p":"Tilda","t":"00:20:12","q":"Yeah, there was work. And lots of businesses who hadn't been online previously, you know, they maybe just had a physical store. They had to get online really quickly. Yeah.","c":0,"n":4,"i":"work_content","s":50},{"id":"Tilda-002032-016","p":"Tilda","t":"00:20:32","q":"Yeah, totally. And through doing my design study, I really took an interest in brand design. So that ties really well into marketing. So I probably did that... I want to say until about mid 2022. I was flatting in Hamilton. So I would kind of manage multiple like clients. I had 1 or 2 agencies and then a couple of small businesses. Yeah, just through networking. And, you know, those online jobs were pretty good because a lot of people were looking for kind of flexible working people.","c":17,"n":5,"i":"balance","s":45},{"id":"Tilda-002135-017","p":"Tilda","t":"00:21:35","q":"So 2022, I pretty much like, [00:21:41] I wrapped up doing it full time at the end of the year because I wanted to actually do a lot of traveling with my partner. And I just thought, well, you know, I do kind of want that regular income. Even though I really enjoyed the type of work that freelancing brings and the schedules, I wanted to save and very quickly to go overseas. [00:22:03] So yeah.","c":4,"n":6,"i":"pay","s":53},{"id":"Tilda-002210-018","p":"Tilda","t":"00:22:10","q":"Yeah, totally. So in 2023, I started working full time in a comms role. And that was for the Hamilton City Council. So I kind of went from [00:22:20] freelancing with businesses to going into a like a public organization. [00:22:26] And then I was there until... I was there for a contract. So just over one year or just under one year. And then [00:22:38] I went off on my OE when I finished that contract. [00:22:42] Yeah.","c":0,"n":4,"i":"work_content","s":66},{"id":"Tilda-002257-019","p":"Tilda","t":"00:22:57","q":"Oh, I definitely was feeling it. And the after effects of Covid, I think too, like we were kind of getting back to normal around that end of 22 beginning of 23, return to the workplace. And I was... [00:23:14] You know, you kind of don't realize the toll that it takes on you. [00:23:18]","c":76,"n":32,"i":"covid","s":20},{"id":"Tilda-002321-020","p":"Tilda","t":"00:23:21","q":"[00:23:21]Yeah, yeah. And constantly feeling like you need to pivot. That's the classic word. And like, you know, just to be prepared in case something else happens. [00:23:30]","c":44,"n":32,"i":"covid","s":0},{"id":"Tilda-002335-021","p":"Tilda","t":"00:23:35","q":"[00:23:35]Yeah. And for me, you know, I thought, well, I would really like to have a go working in a public organization. You know, I'm in my mid 20s, like, let's give this a go. And then that job came available at the council, and I thought, yeah, this sounds like me. And I'd love to learn more about the kind of government structure. [00:23:54]","c":4,"n":6,"i":"pay","s":23},{"id":"Tilda-002413-022","p":"Tilda","t":"00:24:13","q":"It was on Seek. Yeah. So Seek definitely, I would definitely refresh Seek most mornings. Just to have a look at what was going. But also, you know, platforms like LinkedIn. You know, just through word of mouth, knowing quite a few freelancers around. And, you know, you talk to your networks. I've had a lot to do with the, like, the women in business networks here in Hamilton. So just people saying, hey, this is, you know, this sounds like something you've been talking about. It could be a good opportunity for you to go for.","c":91,"n":33,"i":"gender","s":79},{"id":"Tilda-002457-023","p":"Tilda","t":"00:24:57","q":"You know, at the time, I remember feeling confident. There seemed to be quite a lot of jobs going. Yeah. And I, probably because I had such a, you know, like a varied background.","c":70,"n":25,"i":"confidence","s":0},{"id":"Tilda-002514-024","p":"Tilda","t":"00:25:14","q":"Yeah, yeah, I. Not to toot my own horn...","c":1,"n":4,"i":"work_content","s":8},{"id":"Tilda-002523-025","p":"Tilda","t":"00:25:23","q":"I felt like when I had gone for these jobs with these, like, freelance roles, normally, you know, I would apply and I would be... You know, I would get an interview, you know, 99% of the time, which was cool. And so going for the council role, I did feel quite confident. Yeah.","c":41,"n":25,"i":"confidence","s":57},{"id":"Tilda-002551-026","p":"Tilda","t":"00:25:51","q":"So we went for seven months.","c":0,"n":4,"i":"work_content","s":22},{"id":"Tilda-002606-027","p":"Tilda","t":"00:26:06","q":"I definitely, I debated if I would do any freelancing while I was overseas. Because I had that flexibility. I could kind of take my laptop and work wherever. But then I thought, well, I actually haven't had a good, proper holiday, probably in years.","c":17,"n":5,"i":"balance","s":64},{"id":"Tilda-002629-028","p":"Tilda","t":"00:26:29","q":"Yeah, yeah. So I thought, let's just have a nice big trip and focus on, you know, the adventure of it. And so that's what we did.","c":1,"n":4,"i":"work_content","s":48},{"id":"Tilda-002640-029","p":"Tilda","t":"00:26:40","q":"And I don't regret any of that. It was so worth it. So then we kind of got maybe we had like a month and a half until we got home and I was getting back into that kind of, [00:26:54] I've got to have something lined up when I get home because I've got to make some more money. I've spent nearly all my money on the trip. S [00:27:01]o I was starting to apply for jobs again and yeah, looking for those kind of like employed, full time roles just to get back into things.","c":4,"n":6,"i":"pay","s":43},{"id":"Tilda-002727-030","p":"Tilda","t":"00:27:27","q":"[00:27:27]I was definitely looking for something that I would maybe stay in for a few years because I thought, well, you know, I've had that freelance experience, the small business experience. I've done a little bit of you know, public organization. Let's try out like a corporate role or private role. Just to see what, what that's like. And if it's something I can grow and make into a career. [00:27:54]","c":30,"n":17,"i":"learning","s":0},{"id":"Tilda-002804-031","p":"Tilda","t":"00:28:04","q":"Well, from the, from the get go, actually, I knew that the job market in New Zealand was starting to kind of be on the downturn. Hence why I started applying early, or so I thought.","c":1,"n":4,"i":"work_content","s":80},{"id":"Tilda-002821-032","p":"Tilda","t":"00:28:21","q":"Yeah. [00:28:22] So I started applying a little earlier. But it definitely was really surprising, like how competitive it had become. In saying that, the green flags, I found a lot of companies were open to remote roles, like, they were very flexible, you know, for marketing and comms that, 'yes, you can do this', you know, totally remote or, you know, a couple of days home a week. And I'm not sure if it's something that's just, you know, for, like, my industry or my age group, maybe my generation? That is very appealing to me to not have to commute every day. [00:29:04]","c":86,"n":15,"i":"rejection","s":0},{"id":"Tilda-002904-033","p":"Tilda","t":"00:29:04","q":"Yeah. Do you think it's appealing because it's financially helpful, or is it like, more about your work life balance? What is it that makes you go, 'ooo!'.","c":4,"n":6,"i":"pay","s":53},{"id":"Tilda-002916-034","p":"Tilda","t":"00:29:16","q":"[00:29:16]Yeah, definitely that work like life balance. And having more time as well. I had been going when I was working at the council, I would go in, I think three days a week and they let us through two days from home and I... It was, it was like this level of trust, you know, that you could do the job, you know, it wasn't micromanaged. So I really appreciated that. [00:29:44]","c":29,"n":27,"i":"mentor_bad","s":0},{"id":"Tilda-002951-035","p":"Tilda","t":"00:29:51","q":"Definitely. Definitely. Not the fact of you must be in the office five days a week and you must work 9 to 5 and... yeah.","c":17,"n":5,"i":"balance","s":36},{"id":"Tilda-003032-036","p":"Tilda","t":"00:30:32","q":"So I think I had one interview online when I was still overseas, which was cool. And that, you know, that was a really good confidence boost to think, okay, that situation's not that good. But obviously, you know, I've got this one. But then, of course, we were coming back in early November, kind of that time where jobs, you know, it starts to quieten down a little bit towards Christmas in the New Year. When we got home, I was still applying. I started doing a little bit of freelancing again, just reaching out to some old contacts and saying, hey, I'm back in the country. If you've got any bits or pieces you would like help with before Christmas holidays... So that was that was really cool. Just to do a bit of that.","c":41,"n":25,"i":"confidence","s":57},{"id":"Tilda-003128-037","p":"Tilda","t":"00:31:28","q":"Yeah, totally. And we moved back... And we moved back in with my with my parents. And then we would go between my partner as parents as well. Thanks, mum and dad!","c":97,"n":1,"i":"family_influence","s":0},{"id":"Tilda-003140-038","p":"Tilda","t":"00:31:40","q":"So good. Just until we could find something. But I didn't find... So I still hadn't found a job by the end of the year. So I went on jobseeker's just because I needed to have that consistent income.","c":47,"n":15,"i":"rejection","s":88},{"id":"Tilda-003238-039","p":"Tilda","t":"00:32:38","q":"Yeah, totally. And it's just I mean, it's the reality, right? When you've got bills to pay. In New Zealand, if you've got a car to get around, which most people do, it's all about that.","c":33,"n":6,"i":"pay","s":67},{"id":"Tilda-003250-040","p":"Tilda","t":"00:32:50","q":"Oh, totally. Oh, yeah. Totally.","c":9,"n":7,"i":"procedural","s":34},{"id":"Tilda-003303-041","p":"Tilda","t":"00:33:03","q":"Yeah. So it would have been... It was very quick, which was good. Like it was a very quick process. It was about mid-March.","c":2,"n":4,"i":"work_content","s":64},{"id":"Tilda-003313-042","p":"Tilda","t":"00:33:13","q":"So I yeah, I had seen the job/role come up and it was part time, so 25 hours a week, which was great because I thought, oh, I could still do a bit of freelancing on the side, and then, yeah, had an interview and probably within a week they came back and said, we're really keen to have you on board, yeah. And so I was there from. Yeah. About that last week of March, I think I started.","c":19,"n":2,"i":"interview_process","s":68},{"id":"Tilda-003412-043","p":"Tilda","t":"00:34:12","q":"Yeah, I definitely, I definitely was feeling a bit of that pressure To settle. And my partner had started a role probably the end of January. He was very lucky. His old boss was looking for more staff and, you know, said, hey, apply. And he got a role which was cool.","c":125,"n":14,"i":"privilege","s":50},{"id":"Tilda-003434-044","p":"Tilda","t":"00:34:34","q":"Really, really cool. So he was happy with that. But I definitely wanted to find something. But, you know, when you... It's very hard when you interview just to tell, you know, if it's going to be good or not. But we had two interviews and one thing for me that stood out as a green flag is that I was interviewed by women, so I had two women, and yeah, probably from my experience, I've always had... I've had fantastic women as bosses or, you know, contacts for me. Yeah. So I just had a really good vibe from them. They were kind of leaders in their company and in the company. And. Yeah, so I thought fantastic. This was really cool. [00:35:21] Like, for myself and my own career progression I could see it turning out quite well to have the guidance and support. [00:35:29]","c":15,"n":9,"i":"mentor_good","s":32},{"id":"Tilda-003554-045","p":"Tilda","t":"00:35:54","q":"You know what I'd probably say with a corporate, no. Not personally. I've always wanted to, you know, have my own small business. And whether that's, you know, working for myself full time again or employing someone else under me. yeah, that's definitely where I feel I'm heading. Yeah.","c":69,"n":21,"i":"aspiration","s":100},{"id":"Tilda-003622-046","p":"Tilda","t":"00:36:22","q":"No, no, that's all good.","c":0,"n":4,"i":"work_content","s":22},{"id":"Tilda-003650-047","p":"Tilda","t":"00:36:50","q":"I was very excited. Yeah, I was very excited because it was like, you know, [00:36:55] a new opportunity for me to sink my teeth into. [00:36:57] Yeah. And a new kind of corporate world that I hadn't been in before. Also in the last year, probably, I've been a lot more in tune with my own kind of financial management and thinking, you know, with my own goals. So while marketing for accountants is maybe not the sexiest thing as a marketer, you, you do need to have, I believe you have to have some kind of connection with, you know, the work that you're trying to market.","c":4,"n":6,"i":"pay","s":70},{"id":"Tilda-003730-048","p":"Tilda","t":"00:37:30","q":"Yeah. So I thought this could be, you know, good learning for me as well. To learn how an accounting [firm] actually works internally. Yeah, yeah.","c":4,"n":6,"i":"pay","s":57},{"id":"Tilda-003753-049","p":"Tilda","t":"00:37:53","q":"[00:37:53]Yeah, totally. So yes, I was really excited about it. Yeah. And you know, the job. The job description seemed really you know, on point to suit my skills. Like a very generous role. Also, you know, the opportunities for like, professional development seemed really good as well. [00:38:13]","c":16,"n":2,"i":"interview_process","s":0},{"id":"Tilda-003816-050","p":"Tilda","t":"00:38:16","q":"So they have memberships with different marketing organizations in New Zealand. So, like you've got the marketing of the New Zealand Marketing Association as one. A lot of like partnerships with, like, training providers.","c":1,"n":4,"i":"work_content","s":40},{"id":"Tilda-003833-051","p":"Tilda","t":"00:38:33","q":"So if I wanted to upskill in things like, you know, my Google ads or... Yeah, any kind of those marketing qualifications they had the budget there to pay for me, which is cool. Yeah.","c":42,"n":17,"i":"learning","s":0},{"id":"Tilda-003852-052","p":"Tilda","t":"00:38:52","q":"No I haven't yet. Yeah.","c":9,"n":7,"i":"procedural","s":34},{"id":"Tilda-003859-053","p":"Tilda","t":"00:38:59","q":"Very under the pump? Yeah. And that's. Yeah, that's the whole other kettle of fish.","c":2,"n":4,"i":"work_content","s":61},{"id":"Tilda-003907-054","p":"Tilda","t":"00:39:07","q":"Yeah, totally. I'd love to talk about that.","c":9,"n":7,"i":"procedural","s":61},{"id":"Tilda-003921-055","p":"Tilda","t":"00:39:21","q":"Yeah. So probably the first month or so is a lot of that onboarding and learning and meeting, you know, your different stakeholders and learning how they operate. So that was fine learning the ropes. I have kind of realized very quickly... And maybe it's, you know, from experience, sometimes clients don't have an understanding of how deep like, and how vast the marketing industry is. And that's fine, because obviously not everyone is a marketer, but there's definitely... Yeah, I think there's an expectation that because if you, you know, you are in marketing, you are an expert across all the different facets of marketing.","c":4,"n":6,"i":"pay","s":47},{"id":"Tilda-004012-056","p":"Tilda","t":"00:40:12","q":"Yeah. [00:40:12] And it's definitely an expectation I've seen from an older generation. I would say maybe from about 45 years plus, that you are an expert across all the different features and different, you know, campaigns, everything in marketing. [00:40:31] So I think there was just at the moment I'm working... So I do 25 hours a week, which is cool. But there's definitely an expectation that I can do everything from, like the strategy. So like, yearlong strategies for firms and then implement this. So across all of your different channels, adverts, copywriting you know, SEO, website development, website design, graphic design. Yeah.","c":55,"n":21,"i":"aspiration","s":36},{"id":"Tilda-004119-057","p":"Tilda","t":"00:41:19","q":"[00:41:20]Well, coordinating with firms across New Zealand, it's just me. So you can imagine in a week if I have 25 hours and I have about, you know, a dozen firms who need support, I have really, a really small amount of time that I can help them. so that's probably the, you know, that biggest issue I've seen. [00:41:42]","c":2,"n":4,"i":"work_content","s":46},{"id":"Tilda-004144-058","p":"Tilda","t":"00:41:44","q":"My team is quite small. So my boss is like, she's on the executive level. She has a marketing background, which is fantastic.","c":15,"n":9,"i":"mentor_good","s":89},{"id":"Tilda-004154-059","p":"Tilda","t":"00:41:54","q":"Yeah. Really helpful. So Yeah, but it's just about getting some structures in place or getting some extra resources in. Because [00:42:05] I believe it's a job that's too big for just one person and part time as well. [00:42:10]","c":0,"n":4,"i":"work_content","s":47},{"id":"Tilda-004224-060","p":"Tilda","t":"00:42:24","q":"Well, I'm trying to have really clear boundaries with myself just to have some kind of plan in the day, because it's really easy to get caught up in those little tasks.","c":85,"n":5,"i":"balance","s":57},{"id":"Tilda-004242-061","p":"Tilda","t":"00:42:42","q":"Yeah, totally. So yeah, in the morning, it's just having a bit of planning and thinking, what are the, you know, the top tasks that I need to do today. And then I'll generally have a handful of meetings across the day or with different firms to catch up about their marketing, or with like my boss, if she needs to talk through any projects with me. So, but then it's a lot of the doing. So in one day I could be doing anything from like creating an email newsletter that goes out to a certain firm's contacts; I could be updating, like, blogs on a website; I could be, like, starting and monitoring a paid, like, Facebook ad campaign. it's very different. [00:43:32] And you have to be very organized just to make sure that you're not getting overwhelmed. And I've definitely felt overwhelmed the past month. [00:43:44]but, yeah, it's just it's always important that your boss is, you know, hearing you out and supporting you. So we are working through some changes, which is cool.","c":14,"n":9,"i":"mentor_good","s":21},{"id":"Tilda-004358-062","p":"Tilda","t":"00:43:58","q":"Yeah, yeah, but I definitely yeah, this is definitely an issue that I see come up with other marketers, as well as the fact that sometimes you're seen as you can do everything when you start to break it down, it's... Each different role. Like for example, if you're in doing like marketing ads, if you're doing digital ads, there is a whole career in itself that is a whole specialization.","c":1,"n":4,"i":"work_content","s":60},{"id":"Tilda-004501-063","p":"Tilda","t":"00:45:01","q":"Yeah, totally. It's really good. I think if businesses are very clear. You know, where you kind of fit or what area you own. Yeah. And I do think those generalist roles could maybe work in, like, a smaller business, maybe if you're just working with one. Even though we are a franchise it's definitely, you know, people want to keep their like, local essence as well, which means they want to have their own, like, separate plan, and they want to have their own different marketing activities. They do. So yeah.","c":2,"n":4,"i":"work_content","s":54},{"id":"Tilda-004547-064","p":"Tilda","t":"00:45:47","q":"Yeah, totally. [00:45:51]I don't know if there's a clear way out, to be honest. It definitely has me questioning whether marketing is the right industry for me to stay in. [00:46:00]","c":3,"n":4,"i":"work_content","s":46},{"id":"Tilda-004603-065","p":"Tilda","t":"00:46:03","q":"Yeah, yeah. No, totally. I think it's that... [00:46:08] Well, personally, the last couple of years have been very, you know, go, go, go kind of try to keep, keep ahead of Covid and keep going. Yeah. But marketing itself is becoming a bit of a... It's kind of an endless loop, if that makes sense. It's very good if you like a different challenge every day. And if you like to have, you know, you like to have a lot of variety in your job. And I do enjoy that. But I constantly feel like there's this push for more and more and more. You know, we did this great campaign, But now we want to, you know we want it. Let's do another one and do better. Straight away. Yeah. So there's never really any.... I don't get the resolution that I really need out of jobs. And that just makes me think, you know, is this the right career choice for me at this time when I've been working in the industry? Probably at 7 or 8 years now? [00:47:08]","c":54,"n":32,"i":"covid","s":0},{"id":"Tilda-004719-066","p":"Tilda","t":"00:47:19","q":"Yeah, totally. And personally as well I see myself as more of like a minimalist and you know, I have kind of those strong, you know, environmental and ethical beliefs and like modern day marketing I do feel is a lot about consumption, and buying more and doing more, and you have to be more and be better. And when I was younger, you know, maybe I could, I could tie that to... Okay, you know, like, I'm helping small, you know, a small business, you know, this is their livelihood and this is how they survive. But as I work with these bigger organizations, whether you know, public or private, I think, you know, [00:48:04] it just feels a bit of a hamster wheel. [00:48:08] That might be an analogy to use.","c":102,"n":29,"i":"ethics_industry","s":100},{"id":"Tilda-004831-067","p":"Tilda","t":"00:48:31","q":"Yeah, totally. And it's you know, especially when you have a lot of those topical issues like we have Palestine. We have the overseas, you know, the world, the climate change.","c":110,"n":29,"i":"ethics_industry","s":0},{"id":"Tilda-004842-068","p":"Tilda","t":"00:48:42","q":"All that AI stuff as well.","c":56,"n":8,"i":"ai_tech","s":0},{"id":"Tilda-004844-069","p":"Tilda","t":"00:48:44","q":"Like, yeah. And that's a very big part of my role right now is that there's this expectation of learning how to use AI and from like a creative point of view, like a craft point of view, especially when, you know, I've been in journalism, I've been writing, putting some words into a machine is something that I think, wow, this is... This is a bit ridiculous. You know?","c":56,"n":8,"i":"ai_tech","s":100},{"id":"Tilda-004928-070","p":"Tilda","t":"00:49:28","q":"I'm just... You know, in a way, I'm quite glad that I finished university before AI was so widespread, because I just can't imagine the challenges students would have, you know, to work in with, you know that... And even finding information and researching. How do you know the information you are trying to use in your own research is really? Totally. So definitely credit to you.","c":57,"n":8,"i":"ai_tech","s":100},{"id":"Tilda-005011-071","p":"Tilda","t":"00:50:11","q":"It's that real intelligent, right?","c":3,"n":4,"i":"work_content","s":14},{"id":"Tilda-005028-072","p":"Tilda","t":"00:50:28","q":"Yeah. Well, I think I would definitely maybe go back into that comms focus. So comms and marketing tie quite closely together, but it's more so like the messaging that we use. Like how we're actually engaging with people through, like the messaging we put out. And you know, council was quite, you know, had some really good processes on that. Like, how can we simplify this complex information that we're using and present it to the average person? So they feel informed?","c":12,"n":19,"i":"leaving","s":62},{"id":"Tilda-005104-073","p":"Tilda","t":"00:51:04","q":"Yeah. Yeah, totally. Yeah, yeah. I also love my graphic design. Yeah. And my brand design. So whether I, you know, look at kind of building that out again and starting to offer more creative design, [00:51:17] but currently I feel very creatively burnt out. [00:51:21]","c":126,"n":13,"i":"wellbeing","s":50},{"id":"Tilda-005132-074","p":"Tilda","t":"00:51:32","q":"[00:51:32]No, totally. I think it's yeah, it's that it's that push of more and more and more yeah. And that expectation of, you know, you should just be able to do this. That shouldn't take any time. I'll put this through ChatGPT and it'll spit out something and you can use that... You have to... You almost have to put all of your, you know, your emotional feelings for it, or your creative feelings to the side. And that might just, you know, it comes down to the needs of every different company. But for me, I'm really starting to think, is this the right fit for me? [00:52:15]If this is the case, you know, that value, the creative value is just... Yeah. If we're just kind of mass producing stuff. And where is the strategy?","c":92,"n":8,"i":"ai_tech","s":0},{"id":"Tilda-005244-075","p":"Tilda","t":"00:52:44","q":"Yeah. Yeah, I think for me, like, I really, like they say a problem shared is a problem halved. I have to be really aware of not dumping it all onto my partner. you know, and he works in a totally different industry. I won't mention what he does, but he you know, I think because he's, you know, not in marketing, it's probably that he doesn't have that understanding, you know, but he's definitely kind of my... You know, my ear when I want to talk out my frustrations. I kind of... [00:53:21] It's just that feeling of, you know, finishing up a day and just feeling like I've been able to get, you know, not even half of my workload done that I wanted to. And I'm, you know, part time as well. So constantly working over those hours. [00:53:36]","c":3,"n":4,"i":"work_content","s":49},{"id":"Tilda-005340-076","p":"Tilda","t":"00:53:40","q":"Oh, I'm very... From working for myself, I'm very conscious of not doing more than I'm being paid for.","c":4,"n":6,"i":"pay","s":83},{"id":"Tilda-005352-077","p":"Tilda","t":"00:53:52","q":"And I think in New Zealand, we are maybe a little bit more like that because we have that idea of work life balance. And so I wouldn't say I'm doing more than a handful, but it does mean that things slip and that, you know, people don't hear back from me, you know, things that are urgent, get pushed, you know, pushed back. So there's those kind of fallbacks as well. Even though, yeah, it's hard to balance.","c":17,"n":5,"i":"balance","s":73},{"id":"Tilda-005430-078","p":"Tilda","t":"00:54:30","q":"[00:54:32]I wanted to touch on kind of that Sunday scaries. You know, that is very real. That is very real. And it's you know, even though you might clock out of a job, you've done your hours for the week mentally, you're still thinking about that. So and you don't get paid for that mental load. [00:54:48]","c":4,"n":6,"i":"pay","s":23},{"id":"Tilda-005455-079","p":"Tilda","t":"00:54:55","q":"[00:54:55]It has in the past couple of weeks? Definitely. I feel yeah, I do feel pretty anxious. And maybe that it's it might not be that I'm getting criticism from work or anything, but I think for me, like professionally, I hold myself to that high standard of getting work done. [00:55:11]","c":10,"n":13,"i":"wellbeing","s":45},{"id":"Tilda-005515-080","p":"Tilda","t":"00:55:15","q":"Because I can't do everything. It just it's... I think, oh, I'm, I'm not good enough for this, but and logically you think, well you're, you know, you can't possibly do everything but yeah.","c":1,"n":4,"i":"work_content","s":56},{"id":"Tilda-005553-081","p":"Tilda","t":"00:55:53","q":"Well, I've been really conscious of switching off and getting off my, my devices because I spend so much time online on a screen connected. That's definitely... I don't want that to spill over into my life because I feel quite burned out. You know, sitting and scrolling after work when I've been scrolling all day for work.","c":12,"n":19,"i":"leaving","s":100},{"id":"Tilda-005627-082","p":"Tilda","t":"00:56:27","q":"Exactly, exactly. Yeah. And just the thought that I've got all these messages from people that I haven't got back to because, yeah, mentally, I just don't have that space, but Yeah, it just it's switching off. I love reading, so definitely reading a lot. Have you heard of the right, the writer, Dale Carnegie? Carnegie. Carnegie who? How to win friends and influence people.","c":2,"n":4,"i":"work_content","s":82},{"id":"Tilda-005657-083","p":"Tilda","t":"00:56:57","q":"Oh, you should, you should. I actually, I've only read about half of it, but I have read he's got a book called how to Worry Less and Live More. And it was written maybe, you know, nearly a hundred years ago, but it was really, really good. It's a really great way of trying to take that stress that you feel from your job or whatever. Yeah. And kind of, you know, just love a little. So just having that as a kind of way to raid and switch off has been really, really helpful.","c":10,"n":13,"i":"wellbeing","s":90},{"id":"Tilda-005753-084","p":"Tilda","t":"00:57:53","q":"Yeah, definitely. I have to be really careful because I have quite a, like. My jaw is a little bit [stiff]","c":13,"n":19,"i":"leaving","s":36},{"id":"Tilda-005802-085","p":"Tilda","t":"00:58:02","q":"Yeah. Tense. Yeah. Did you have Braces or anything?","c":2,"n":4,"i":"work_content","s":18},{"id":"Tilda-005811-086","p":"Tilda","t":"00:58:11","q":"[00:58:11]Yes I did. Yeah. So I went through all of the braces and orthodontics and stuff. But yeah, I still have a little bit of a... I hold my stress in my jaw, so I definitely know that I'm stressed. Yeah. You're just like ahh! [00:58:23]","c":74,"n":20,"i":"somatic","s":0},{"id":"Tilda-005829-087","p":"Tilda","t":"00:58:29","q":"I don't get headaches, but I definitely get very, like, tense in my, my shoulders. I'm trying to, like, outside of work. I'm trying to really create that kind of richer social life just to try and, you know, balance out and have those good things to focus on. but at the end of the day, when you're absolutely mentally drained, you know, the last thing you want to do is go out for dinner and talk, talk with a bunch of friends, even though you love your friends, you're just like, I just want to be alone and switch everything off and lie down.","c":68,"n":20,"i":"somatic","s":79},{"id":"Tilda-005929-088","p":"Tilda","t":"00:59:29","q":"Yeah, yeah. And totally. And that's the thing, right? There's the job economy is still quite slow.","c":13,"n":19,"i":"leaving","s":40},{"id":"Tilda-005936-089","p":"Tilda","t":"00:59:36","q":"It is. It is.","c":6,"n":7,"i":"procedural","s":26},{"id":"Tilda-005937-090","p":"Tilda","t":"00:59:37","q":"Yeah. It is, it is. And I feel like we're very lucky in New Zealand with, you know, going onto jobseekers that we have that support because you know, if I wanted to quit tomorrow. Yeah, I could, and I could, I had that option. And that is always the back up in my mind. You know, I've been working through solutions with my boss, though, and, like, I'm confident that she has my back.","c":40,"n":15,"i":"rejection","s":29},{"id":"Tilda-010007-091","p":"Tilda","t":"01:00:07","q":"Yeah, it really helps. But I think these things take time, you know, it's this real structural change. It's not going to be like an overnight fix. Yeah.","c":0,"n":4,"i":"work_content","s":41},{"id":"Tilda-010028-092","p":"Tilda","t":"01:00:28","q":"And they are. And it's actually really, for me, you know, having experience like freelancing and doing stuff I think, you know, [01:00:35] do they know something I don't? Or is it just that they are that older, fixed mindset of this is your job. [01:00:42] This is exactly... Yeah.","c":1,"n":4,"i":"work_content","s":36},{"id":"Tilda-010124-093","p":"Tilda","t":"01:01:24","q":"[01:01:24]Yeah, totally. And it's something like for the women in business, you know, you think when are people going to start listening to what I have to say. Like, do you know, it does kind of start to get in your head. You think maybe I don't know as much as I should, or even though you have a degree, you've been working in the industry for a number of years. You think, you know, why do people not listen to my advice or do this? But it is. Yeah. It's not a problem that lies with me. [01:01:55]","c":91,"n":33,"i":"gender","s":0},{"id":"Tilda-010208-094","p":"Tilda","t":"01:02:08","q":"Oh thank you Charlotte. No it's cool. No I hope it's not falling into a therapy session but yeah.","c":6,"n":7,"i":"procedural","s":91},{"id":"Tilda-010216-095","p":"Tilda","t":"01:02:16","q":"It's good to Share that with you. It's like oh my gosh, You know.","c":1,"n":4,"i":"work_content","s":44},{"id":"Tilda-010233-096","p":"Tilda","t":"01:02:33","q":"No that's cool.","c":9,"n":7,"i":"procedural","s":32},{"id":"Tilda-010258-097","p":"Tilda","t":"01:02:58","q":"You know, I would love to be. In five years, I would love to be running my own, you know, design studio full time. And choosing the clients that I work with. And I definitely have that calling towards working with women in business. Ideally I'd love to see that. And I think it's hard, you know, because [01:03:23] I've only really dived into kind of this full time corporate space. You know, it hasn't even been six months, and I'm already thinking, you know, is this the right fit for me? Is this the kind of, you know, career move that I want to take? [01:03:36] But, yeah, you kind of think in your head, [01:03:38] could I do this for the next 20 years? I don't think I can already. [01:03:42] I know very well in myself, I don't think I could. Which is a real shame when you think about it, because there's probably, I [01:03:51] think as a graduate, I would have been over the moon to have been in a role like this. But then the reality of it kind of sets in and you think, you know, was I disillusioned by how marketing actually functions in the real world, in real corporate companies? Yeah. [01:04:11]","c":111,"n":33,"i":"gender","s":0},{"id":"Tilda-010428-098","p":"Tilda","t":"01:04:28","q":"No, no, that's all good. No. We can. Keep going to quarter past.","c":0,"n":4,"i":"work_content","s":59},{"id":"Tilda-010445-099","p":"Tilda","t":"01:04:45","q":"Gosh, I think it's the idea that you that you're going to be, you know, working on these big campaigns and, you know, it's exciting. And everyone will listen to your feedback. And it's when you do get to the level, you get caught down in the admin of it all. You know, and it's kind of those, those small details. If you're a creative like myself and you've got these overall ideas and then you get down to a level of you know, discussions over, like, you know, what colour do we make this text? Or, you know, do we want to be... Are we going to be putting $10 or $12 on the specific ad? And it's just like, oh my goodness.","c":2,"n":4,"i":"work_content","s":50},{"id":"Tilda-010537-100","p":"Tilda","t":"01:05:37","q":"But in saying that some people, some marketers are that really, you know, detail orientated and they might tend towards those really small details of a campaign. I think you probably have seen like, you know, the memes about you can be like the creative marketing girly or you'd be the real numbers focused, logical, like you know, driven marketing girly. And I've like definitely met a good mix of both. And I think they're both important. But for me personally, it's that idea of I really thought... Yeah. The creative and you know, now we're getting to this point with AI it's really kind of disrupting how the industry values creativity and like craftsmanship. Yeah. And individualism as well. Really interesting.","c":57,"n":8,"i":"ai_tech","s":50},{"id":"Tilda-010654-101","p":"Tilda","t":"01:06:54","q":"And it's like, where is the original like purpose of social media? The connection. Yeah, I do feel pretty jaded by it now. I'm just like, this is all this is all the same. This is all and it's all by, you know, this, this idea of more.","c":46,"n":3,"i":"networks","s":0},{"id":"Tilda-010738-102","p":"Tilda","t":"01:07:38","q":"Yeah. And I think. Yeah. And your 20s, you know, what do they say? Like the quarter life crisis. And you always are going to be thinking, you know, what direction should I take? Should I do this? So for me, I, my focus at the moment is really thinking, being honest with myself and thinking, is this what I'm wanting to stay in. [01:08:00] And you know, some people might say, oh you should stay in a job at least one year to get, you know, get it on your CV. But I also, you know, from my past roles, I feel having all of those diverse jobs has benefited me. [01:08:16]","c":3,"n":4,"i":"work_content","s":57},{"id":"Tilda-010837-103","p":"Tilda","t":"01:08:37","q":"Totally. But Yeah, but I mean, yeah, it's not all doom and gloom. You know, Charlotte, it's... At the moment, I've got 1 or 2 freelancing clients","c":1,"n":4,"i":"work_content","s":24},{"id":"Tilda-010852-104","p":"Tilda","t":"01:08:52","q":"Good boss as well, which is cool. And that does help to kind of alleviate some of that, you know, disorder and overwhelm.","c":15,"n":9,"i":"mentor_good","s":58},{"id":"Tilda-010907-105","p":"Tilda","t":"01:09:07","q":"So it's, you know, not all, you know, clients of marketing will be bad. It's just, Are they the right fit? Do they have that That trust in you? Yeah.","c":1,"n":4,"i":"work_content","s":32},{"id":"Tilda-011001-106","p":"Tilda","t":"01:10:01","q":"Oh gosh, that's a really good question","c":3,"n":4,"i":"work_content","s":11},{"id":"Tilda-011003-107","p":"Tilda","t":"01:10:03","q":"No, no, that's a really good one. Yeah. And it's You don't want to say 'don't do it' because, you know, it's, you know, people might enjoy that. I think it's, especially in marketing. It's just trying every opportunity that comes your way. Even if you might not, you know, think that you're an expert or that you have those skills you know, internships, things like that that can come your way or being proactive and approaching people. I've had a couple of people from university, you know, her students, like, messaged me on my LinkedIn and say, hey, I'm, you know, currently studying, wondered if you needed any, you know, help or anything. And I always think that's really cool that people are, you know, have that yeah. That proactive attitude. I think it'll get you very far.","c":90,"n":3,"i":"networks","s":0},{"id":"Tilda-011103-108","p":"Tilda","t":"01:11:03","q":"Because then, you know, even if you know, you might reach out to someone and that they might say, sorry, I don't have, like, capacity to have an intern or to employ you, but here's an opportunity. Or you should talk to this person. Yeah, yeah.","c":127,"n":24,"i":"health_change","s":50},{"id":"Tilda-011124-109","p":"Tilda","t":"01:11:24","q":"Just working together as well with your peers, like... Yeah. [01:11:29] I've had so many amazing women in my life who have, like, supported me, you know, whether professionally in my career or just in life. [01:11:36] Yeah. And I just think, wow. Like, yeah, you just you just never know in your circle or who might be able to help you with something or that you can help them. And it's those genuine connections, I think when you're online all the time and there's just more and more and more, it's people that will really pull you back down to earth.","c":93,"n":33,"i":"gender","s":0},{"id":"Tilda-011241-110","p":"Tilda","t":"01:12:41","q":"No, I think that's great. No, I think that's cool. Yeah. And I don't want to just dissuade anyone from going into marketing, but just from sharing my experience, you know, this is my might be some of the things that you could come up against in your career and they will genuinely make you think, wow, like, is this for me?","c":2,"n":4,"i":"work_content","s":75},{"id":"Tilda-011414-111","p":"Tilda","t":"01:14:14","q":"Cool. That's awesome.","c":6,"n":7,"i":"procedural","s":37},{"id":"Tilda-011437-112","p":"Tilda","t":"01:14:37","q":"[closing chats].","c":5,"n":7,"i":"procedural","s":20},{"id":"Eliza-000836-001","p":"Eliza","t":"00:08:36","q":"Sure. So I'm currently Wow. I've just been restructured, so my roles changed again. So currently I'm health and safety business partner for Fletcher Easy Steel. So I have easy steel, many well distribution manufacturing sites from lower North Island down to Invercargill. Whoa. That happened basically overnight because of a restructure. Just before that... So up until June, I was business partner for South Island and had several different brands that were in the steel manufacturing space. But I had, I guess, less regional travel because [there are] more sites in Christchurch. Before that... And this is me entering the workforce after uni in a semi relevant role... I entered as EHF coordinator... So all progressing through the same company and the same kind of scope and area. [I] started with the company and progressed fairly quickly after about 18 months into the next role. A lot of that though was... Luck.","c":45,"n":36,"i":"security","s":100},{"id":"Eliza-001007-002","p":"Eliza","t":"00:10:07","q":"I hated the job for a couple of for a good couple of months... Like, I didn't enjoy it, didn't want to be there. And then I got a new colleague and he was great. And he basically said, \"look, I don't spend very long in a job, so I'm planning on being here about 18 months. My intention for that time is to get you... Kind of into my role\". So he was he was very like up front and just went, \"look, if you're interested, this is what I would do. I would bring you along the journey and get you ready to a point where you can kind of take my job\". So that's where the luck part came in, was meeting him.","c":1,"n":4,"i":"work_content","s":76},{"id":"Eliza-001048-003","p":"Eliza","t":"00:10:48","q":"Yeah, and unusual. Yeah. But he was like, \"I like mentoring people, and I don't intend to be here for particularly long. So if you're happy to stick it out for two years, like this is, this is where you'll get... and end up\".","c":15,"n":9,"i":"mentor_good","s":47},{"id":"Eliza-001104-004","p":"Eliza","t":"00:11:04","q":"And I also had a change in manager. My first manager was kind of useless. She just thought that all... She thought that all young women wanted to be in admin. And so... That's what I mean by useless. She wanted me to be an administrator. I did not want to do that. I found that really boring.","c":25,"n":18,"i":"autonomy","s":86},{"id":"Eliza-001127-005","p":"Eliza","t":"00:11:27","q":"Yeah. And, like, even when I chat with her, she had no interest in getting to know me or what I could do. Like, for so long, she thought I was a med student.","c":1,"n":4,"i":"work_content","s":60},{"id":"Eliza-001144-006","p":"Eliza","t":"00:11:44","q":"Yeah. So, yeah, when she transitioned and then I got a boss who kind of understood me, had a similar background, and kind of helped develop me.","c":30,"n":17,"i":"learning","s":10},{"id":"Eliza-001154-007","p":"Eliza","t":"00:11:54","q":"Yeah. Yeah, yeah. And then getting into the job initially... I just applied for everything that I found that was kind of in Christchurch or nearby that I thought might work for me. So when I got the call to interview, I couldn't even remember the job I'd actually applied for. I'd gotten to a point of I had a folder for every area of OD or Org Psych that I thought I could possibly get my finger in the pie for. So we had the HR ones... We had the OD ones... We had the L&D ones... Like that's where I was at.","c":19,"n":2,"i":"interview_process","s":68},{"id":"Eliza-001245-008","p":"Eliza","t":"00:12:45","q":"So 2021 I think is when we finished.","c":0,"n":4,"i":"work_content","s":25},{"id":"Eliza-001304-009","p":"Eliza","t":"00:13:04","q":"Yeah. Because that's why you're like, when did I finish? Yeah. So I finished that and then continued working in the dental industry, which is where I'd kind of worked through uni. And then it was about March, but I was looking since pre-Christmas.","c":2,"n":4,"i":"work_content","s":68},{"id":"Eliza-001329-010","p":"Eliza","t":"00:13:29","q":"I need a job!","c":6,"n":7,"i":"procedural","s":33},{"id":"Eliza-001402-011","p":"Eliza","t":"00:14:02","q":"In all honesty, I had no motivation to work in health and safety. Health and safety is not where I wanted to be. I did not enjoy the course. Yeah.","c":38,"n":18,"i":"autonomy","s":8},{"id":"Eliza-001414-012","p":"Eliza","t":"00:14:14","q":"Yeah. We had Chris, I don't know if you got? Yeah.","c":3,"n":4,"i":"work_content","s":22},{"id":"Eliza-001442-013","p":"Eliza","t":"00:14:42","q":"So Chris yeah.","c":8,"n":7,"i":"procedural","s":19},{"id":"Eliza-001446-014","p":"Eliza","t":"00:14:46","q":"But yeah! I didn't enjoy the health and safety part. Originally I was very much looking more in the HR/OD space. And it probably took me a while before I expanded and looked for other things. But I was also... I think the main difference for me was that I was really lucky in that I wasn't on a minimum wage job at the time. So what I was doing wasn't what I wanted, and I didn't want to be working six days a week. That was my main motivator. At the time, my current partner... We had just kind of met and he was working nights. I was working six days a week.","c":25,"n":18,"i":"autonomy","s":81},{"id":"Eliza-001539-015","p":"Eliza","t":"00:15:39","q":"And so to be honest, that was my motivator to expand. I was like, oh, I really like this guy. But we are struggling. And the reason we're struggling is because we literally work completely different shifts. I was like, at least if I could get Monday to Friday.","c":0,"n":4,"i":"work_content","s":53},{"id":"Eliza-001557-016","p":"Eliza","t":"00:15:57","q":"I'd have a weekend. And then if I stayed up really late Friday night or Saturday night, I'd still wasn't in the world and could recover. Yeah. So that was probably my motivator to start looking for other things. But yeah, as I said, I was just applying for anything. We were doing the Doom Scroll and we were going, that's vaguely relevant... That's vaguely relevant... And just throwing CVs and cover letters out. And I had a folder for each... And I hadn't gone to industry type yet. But I got into the fields.","c":40,"n":15,"i":"rejection","s":100},{"id":"Eliza-001639-017","p":"Eliza","t":"00:16:39","q":"I was working as a dental nurse.","c":0,"n":4,"i":"work_content","s":28},{"id":"Eliza-001642-018","p":"Eliza","t":"00:16:42","q":"Yeah. Fell into it. My first year of uni, just some random dentist was like, yeah, I'll hire someone. And I quit that job pretty quickly because she was not the kind of dentist you wanted to see, but... She was still using, like, amalgam filling for, like, the. Yeah. Yeah. Right.","c":12,"n":19,"i":"leaving","s":14},{"id":"Eliza-001706-019","p":"Eliza","t":"00:17:06","q":"Yeah. Just ... Anything. And I didn't know enough to know... A lot of that. But I knew that you shouldn't have a dentist who just walks out when there's a patient in the chair.","c":0,"n":4,"i":"work_content","s":69},{"id":"Eliza-001719-020","p":"Eliza","t":"00:17:19","q":"Yeah. Yeah. And I had no idea when my hours were going to finish if I left, but it gave me something to put on my CV. Then I worked at the uni clinic and then I got poached from the uni clinic for the dentist's private practice and then that just kind of saw me through uni. I did other things. Yeah. But yeah.","c":3,"n":4,"i":"work_content","s":46},{"id":"Eliza-001753-021","p":"Eliza","t":"00:17:53","q":"I did a lot of pre-work I think in high school.","c":2,"n":4,"i":"work_content","s":61},{"id":"Eliza-001800-022","p":"Eliza","t":"00:18:00","q":"So I'd already really looked into a lot of things and gone. Definitely not for me. And a lot of it was routine orientated. So like my first job, working check-out, hated it because you've got one thing you do. And then even in the dental clinic you're not like as a nurse, my role and my scope was pretty small. But even as a dentist, I still kind of saw it as 'I'd just be looking at teeth all day?'","c":51,"n":23,"i":"transition","s":93},{"id":"Eliza-001833-023","p":"Eliza","t":"00:18:33","q":"And I know that's making it... That's the very basic level... Like there is a lot involved and a lot of things, but I saw it as there's one thing I can do.","c":2,"n":4,"i":"work_content","s":75},{"id":"Eliza-001846-024","p":"Eliza","t":"00:18:46","q":"Yeah. And I'd originally looked at being an optometrist was something I loosely contemplated and that got... And I was like, okay, cool. If I want to move on from that, what do I do? And the best I got to was like, go be an optometrist in a different country.","c":2,"n":4,"i":"work_content","s":68},{"id":"Eliza-001908-025","p":"Eliza","t":"00:19:08","q":"Yeah. So, yeah.","c":9,"n":7,"i":"procedural","s":5},{"id":"Eliza-001917-026","p":"Eliza","t":"00:19:17","q":"So I did psychology and economics... And economics was purely because I had a lot of help from my family as well. So my dad was very much about don't close off [options] too early. So I ended up tracking... Even from first year, where I could get to [from] third year onwards. I didn't even know APSY was a thing at that point.","c":103,"n":1,"i":"family_influence","s":100},{"id":"Eliza-001950-027","p":"Eliza","t":"00:19:50","q":"Yeah! So I started with psychology, marketing and economics and theatre. But that was just for my sanity.","c":1,"n":4,"i":"work_content","s":64},{"id":"Eliza-002004-028","p":"Eliza","t":"00:20:04","q":"Yeah, yeah. Dropped Theatre, dropped marketing, and stuck with psychology and economics through... But I'd kind of gone, oh, this is for me, but then did a bit of all of the psychs... I did the clinical papers. Did that the APSY papers, when they were a thing, did cognitive, did like the bio psych side of it as well. So it was pretty broad. Yeah.","c":0,"n":4,"i":"work_content","s":50},{"id":"Eliza-002034-029","p":"Eliza","t":"00:20:34","q":"But with purpose. So I got very good direction from someone who was like, you can't just have a wash [across]... They were always going, 'And where might this take you? And is this openness allowing you to kind of get somewhere?' Yeah.","c":73,"n":31,"i":"purpose","s":0},{"id":"Eliza-002058-030","p":"Eliza","t":"00:20:58","q":"I remember sitting in a lecture, I think I must have... Was that APSY pay for third year? I think it was third year. So I think I sat in a lecture in second year from Joana and was like, that's what I want to do.","c":0,"n":4,"i":"work_content","s":78},{"id":"Eliza-002117-031","p":"Eliza","t":"00:21:17","q":"And then I did the third year paper and went, oh God, this is not what I want to do.","c":0,"n":4,"i":"work_content","s":72},{"id":"Eliza-002127-032","p":"Eliza","t":"00:21:27","q":"It was just dry. Like I remember sitting there and going, 'I'm so bored'.","c":22,"n":18,"i":"autonomy","s":45},{"id":"Eliza-002139-033","p":"Eliza","t":"00:21:39","q":"So I was I wasn't enjoying it, but I knew enough... But because I'd also considered clinical, I got good advice. I think it was also second year and someone said, go and see a clinical psychologist. Just find some... Go have go have conversations with them. Find out what they do. Find out what their jobs are. And if you can have a session and like discuss. And so I did that, and I kind of did the same in the org psych space. So I found people in the job, found out what they'd done, where they'd gone to. And also I had the idea... Second year I when I was starting uni, I had a bit of a oh my goodness, what am I going to do with my life? Worst case scenario, I'll join the police.","c":71,"n":28,"i":"advice","s":71},{"id":"Eliza-002235-034","p":"Eliza","t":"00:22:35","q":"That was that was my well... If all else fails, we'll do that, then moved to I'll join the Defence Force. So from second year onwards, my full intention was I'm going to get qualified, I'm going to go in the Defence Force and I'm going to become a registered psychologist through them. And that was everything I wanted to do until it all fell apart.","c":79,"n":37,"i":"relocation","s":56},{"id":"Eliza-002302-035","p":"Eliza","t":"00:23:02","q":"So third year? No.. it was, so second year of the APSY Masters, and my [NZDF] application was going pretty well, then I made it off the wait list for jaw surgery and was going to get my jaw surgery done, and the defence force said, 'oh, really sorry, that that pulls you. You can't do it with braces'. And with jaw surgery You have to have braces kind of before the surgery, I had two surgeries. So they said basically, sorry, no, you can't do basic training with braces.","c":2,"n":4,"i":"work_content","s":86},{"id":"Eliza-002342-036","p":"Eliza","t":"00:23:42","q":"So I yep, I deferred my application. Needed to find a job.","c":8,"n":7,"i":"procedural","s":78},{"id":"Eliza-002351-037","p":"Eliza","t":"00:23:51","q":"So I was like, we're just we were just trying to fill in time until I could join the defence force. During my current job, I was still redoing my defence force application post-jaw surgery. And then the day before my physical, I ruptured my Achilles.","c":3,"n":4,"i":"work_content","s":59},{"id":"Eliza-002413-038","p":"Eliza","t":"00:24:13","q":"The gnarliest thing. I'm so glad I didn't know what it was like until I did it.... Because the anxiety of living my life... Probably would have been different.","c":10,"n":13,"i":"wellbeing","s":65},{"id":"Eliza-002442-039","p":"Eliza","t":"00:24:42","q":"I was just about to sit my physical, to getting injured. So, still in the assessment part, but it's one of the last, like, you've got medical clearance. So Saturday I did it. Sunday. I was meant to be sitting. And then they came back to me and said that excludes you for good.","c":0,"n":4,"i":"work_content","s":78},{"id":"Eliza-002509-040","p":"Eliza","t":"00:25:09","q":"I asked the surgeon what he would do if it was his leg, and he said I would not get surgery because there's more complications. Unless you're an elite athlete. Don't do it.","c":0,"n":4,"i":"work_content","s":75},{"id":"Eliza-002539-041","p":"Eliza","t":"00:25:39","q":"That's what I got told. So yeah.","c":0,"n":4,"i":"work_content","s":19},{"id":"Eliza-002545-042","p":"Eliza","t":"00:25:45","q":"Yeah they excluded me for... They said nope, you're done for good, I contested it, I got it... Kind of revoked because I had my specialist and everyone I was seeing being like, 'elite athletes do this all the time and continue to play like, what are you talking about?' That was just their risk thing. They have a real weird risk rating, and if you're in your fleet for anything, but until you're in, they're like, oh no, that's scary.","c":2,"n":4,"i":"work_content","s":71},{"id":"Eliza-002626-043","p":"Eliza","t":"00:26:26","q":"Crazy, and I'd done... So I started my research really early, so, like, I had... I got laser on my eyes... They only accept one kind of laser. Like. And if you go... And New Zealand's better than most... Most military are even crazier. So, like, I knew my stuff, and then I had the Achilles thing, so I got that revoked.","c":0,"n":4,"i":"work_content","s":59},{"id":"Eliza-002651-044","p":"Eliza","t":"00:26:51","q":"But by that point, I was transitioning into my new role, so into the business partner role... actually really enjoying it. Pay was way better, so I would have been taking a really significant pay cut... losing a car... So I was like, this is just going to be a very expensive decision...","c":66,"n":10,"i":"decision","s":81},{"id":"Eliza-002714-045","p":"Eliza","t":"00:27:14","q":"And also there was the opportunity to, potentially because I'd been bugging [department head] since I graduated about the new program, the registration pathway... And I was like, well, if that's a possibility, I would rather do that than owe the Defence Force time, especially because I knew they'd changed their program, so they'd extended it, which meant the amount of time you owed extended...","c":51,"n":23,"i":"transition","s":100},{"id":"Eliza-002742-046","p":"Eliza","t":"00:27:42","q":"And as a young female, if, you know, you might want children, that's family planning. There's all of that... That kind of complicates things. So I stuck with my job, and I'm currently doing that registration pathway at the uni, but funnily enough.","c":80,"n":38,"i":"family_planning","s":10},{"id":"Eliza-002759-047","p":"Eliza","t":"00:27:59","q":"I do and I don't.","c":1,"n":4,"i":"work_content","s":8},{"id":"Eliza-002805-048","p":"Eliza","t":"00:28:05","q":"No. You're good. Yeah. If you. Definitely. I'm more than happy to chat about it if you're considering it. I have reopened my defence application again.","c":9,"n":7,"i":"procedural","s":100},{"id":"Eliza-002822-049","p":"Eliza","t":"00:28:22","q":"Because the restructure at work is not good. Yeah, I was kind of feeling I'd, like, capped my role anyway. And because my entire career progression has been broad scope... I don't want to go into an EHF manager role. That does not appeal to me. That's narrowing way too early. And then, yeah, we had someone come into the course from the defence force again and I went, damn it, that's really what I want to do.","c":45,"n":36,"i":"security","s":94},{"id":"Eliza-002851-050","p":"Eliza","t":"00:28:51","q":"And of course, I don't think this course will prepare you well enough.","c":3,"n":4,"i":"work_content","s":41},{"id":"Eliza-002931-051","p":"Eliza","t":"00:29:31","q":"So I think, I think we will get registered. Yeah, I think we will get there. And I like for me, the reason why it is a useful and beneficial thing for me is I think I'll still go through the defence force and get that actual hands on experience.","c":22,"n":18,"i":"autonomy","s":60},{"id":"Eliza-002948-052","p":"Eliza","t":"00:29:48","q":"But the other thing is my working for a really big corporate company, I've got 80% of my course funded.","c":2,"n":4,"i":"work_content","s":82},{"id":"Eliza-002957-053","p":"Eliza","t":"00:29:57","q":"And I don't owe time to them.","c":1,"n":4,"i":"work_content","s":12},{"id":"Eliza-003000-054","p":"Eliza","t":"00:30:00","q":"So that's, that's the difference for me. I would say if you're funding it yourself, really think about it. Because as far because you will not get an internship in New Zealand really where you're actually doing the job fully because unless you're working for an independent org psych, who has their own business and even then you're probably going to be very limited scope because they'll have had to specialize.","c":55,"n":21,"i":"aspiration","s":71},{"id":"Eliza-003029-055","p":"Eliza","t":"00:30:29","q":"So my boss is a registered org psych like and but I still am like I still have to do corporate bullshit and like you end up going, how is this relevant and what lens can I look through it at? But you never get to really try. Best practice. You're always looking and going this like some of my assignments. I wrote one and [course coordinator] literally wrote but why? And I was like, I know it's dumb, but that's what they did.","c":11,"n":9,"i":"mentor_good","s":57},{"id":"Eliza-003104-056","p":"Eliza","t":"00:31:04","q":"Yeah. So as far as learning what to do best practice or how to get because at the end of the day, right. Best practice in all, psych still isn't perfect because we're still pushing shit uphill. But when you never get the opportunity in most businesses to even get as close as you can and see how well that works.","c":4,"n":6,"i":"pay","s":77},{"id":"Eliza-003126-057","p":"Eliza","t":"00:31:26","q":"So yeah.","c":5,"n":7,"i":"procedural","s":0},{"id":"Eliza-003210-058","p":"Eliza","t":"00:32:10","q":"In my current place? Or when I was talking about the between the business partner or between the defence force? So the initial point?","c":1,"n":4,"i":"work_content","s":84},{"id":"Eliza-003223-059","p":"Eliza","t":"00:32:23","q":"I did have a little bit of a pros and cons list. But to be honest, also, I think if I was single, then that might have changed my decision.","c":66,"n":10,"i":"decision","s":100},{"id":"Eliza-003239-060","p":"Eliza","t":"00:32:39","q":"I don't, I don't know if I would have, but I think it would have been harder decision.","c":81,"n":10,"i":"decision","s":0},{"id":"Eliza-003255-061","p":"Eliza","t":"00:32:55","q":"Yeah. So and it was... If I registered through them, I owed them. So part of my decision now for the setup I've given myself is I would not owe them anything.","c":81,"n":10,"i":"decision","s":38},{"id":"Eliza-003308-062","p":"Eliza","t":"00:33:08","q":"And I that was, that was something really important to me because I have been in situations and I like I've said, I'm terrible at saying no. So if I owe you and you ask something and I'm terrible at saying no, I would, I would just say yes to anything. And that would have been terrible for me personally and my relationship.","c":1,"n":4,"i":"work_content","s":72},{"id":"Eliza-003333-063","p":"Eliza","t":"00:33:33","q":"But I think, yeah, a lot of it, because I looked at everything, I was like, oh, what would I do if the course doesn't work out? Looked at it from a financial perspective, looked at it from family planning, did the consideration for both parts for family planning?","c":80,"n":38,"i":"family_planning","s":0},{"id":"Eliza-003347-064","p":"Eliza","t":"00:33:47","q":"I think the other thing that swayed me slightly as well was policy. So I had a really weird childhood dream. So I guess values are entitled as well. So one of my childhood dreams was I want to be able to take maternity leave and not be financially penalized for it, so that was a goal. As soon as I heard about maternity pay, I was like, what, [expletive]! But it horrified me. I was like, so I'm going to work my butt off, and then I'm going to take a massive nosedive in pay to have a child. And that really pissed me off. So I wanted, I was like my goal as far as, like a career wasn't to have a job title or a certain role or be a boss or blah, blah blah. It was to have the ability to negotiate that if I take maternity pay, I am valued enough that I'm not penalized for it.","c":80,"n":38,"i":"family_planning","s":20},{"id":"Eliza-003455-065","p":"Eliza","t":"00:34:55","q":"[current org], at the time when I was looking at making this decision, introduced their new maternity policy, which was just that.","c":94,"n":38,"i":"family_planning","s":100},{"id":"Eliza-003512-066","p":"Eliza","t":"00:35:12","q":"Yeah. So even though and it's funny now because now I'm going, oh is my job worth that? Because the other thing is current times, my colleague has been restructured twice on maternity leave. She's still in the company because that's the consideration that 13 year old me didn't make... I didn't realize it was completely legal and common to be restructured on maternity leave. So now I go, yes, you might have higher pay, but they can still just get rid of you.","c":128,"n":38,"i":"family_planning","s":50},{"id":"Eliza-003548-067","p":"Eliza","t":"00:35:48","q":"Yeah. Or none. Or they can just comfortably get rid of you and you have nothing to come back to. So that's kind of complicated. My little, like, schema of decision making. But, yeah, I was happy in my job. I saw a possible alternative too... The pay was good. I was well supported. I had a good plan B if that course ever came to fruition. My boss was supportive. I had the support in the company. And, yeah, the family planning policy as well. Tipped me.","c":80,"n":38,"i":"family_planning","s":100},{"id":"Eliza-003632-068","p":"Eliza","t":"00:36:32","q":"Right? Two years now.>","c":8,"n":7,"i":"procedural","s":28},{"id":"Eliza-003645-069","p":"Eliza","t":"00:36:45","q":"Or it was. I started it this year so it would have been last year. So I want to say probably let's say September last year. So I'd been in the role at the time 15 months.","c":3,"n":4,"i":"work_content","s":76},{"id":"Eliza-003659-070","p":"Eliza","t":"00:36:59","q":"But I knew that this was going to happen about a year after. So I got I was still in contact with [dept], and it was at the time when they were submitting the proposal. So I knew a proposal was going. So I was like, okay, this is looking pretty good. Was in that role for a year, established and set up my role to support the course as best as I could. So I set clear expectations around what I wanted to do. And I guess my approach to health and safety and kind of got myself quite established there, then applied for the course, got in, and then that's probably when everything turned to shit at work!","c":20,"n":19,"i":"leaving","s":74},{"id":"Eliza-003742-071","p":"Eliza","t":"00:37:42","q":"I was I mean, I was probably just getting fidgety. I was going actually, after this course. What next? Yeah, I've had my ten year plan of this point. And I was I was kind of getting to, like, a bit of a maintenance point, I guess, with my sites, with the relationships, with the growth. I've got a site currently, and they now call me to tell me what they've done, and I'm like... But like, in the best kind of way. Right? So normally they'd be like, oh, Eliza, do you need to know about this? And they'd
