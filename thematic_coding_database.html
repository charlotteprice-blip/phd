ving and you get really good at problem solving when you have to, and there's no one else there. And like, you know, after a while, suddenly those major things that on my first few weeks really stressed me out. It's just another blip, you know, it's like, oh, whatever, Microsoft's having an outage. Okay. There's nothing we can do when it comes back up. I'll let you know.","c":10,"n":13,"i":"wellbeing","s":45},{"id":"Mitchell-002233-024","p":"Mitchell","t":"00:22:33","q":"In the meantime, I'll make sure everyone knows.","c":2,"n":4,"i":"work_content","s":43},{"id":"Mitchell-002238-025","p":"Mitchell","t":"00:22:38","q":"And that was that was that was like a big part of adjusting was, was getting into professional communication and realizing that I, I was actually in a position of authority, like, I, you know, I was the person who would have to go out and communicate those things to the business. I'd have to stand up in the team meetings and be like, this is what we're doing, and this is a change. And that was that was a bit that was really intimidating at the start. But then as you rolled out project after project, you just go, well, this is just another project. You know, I've done this for five, six, ten, 12, 20 times now. Yes. This might be bigger in scale than some of those other ones, but they all mostly went smoothly. And when they didn't, I now know why they didn't. And so I just won't make that mistake again. So yeah.","c":1,"n":4,"i":"work_content","s":36},{"id":"Mitchell-002328-026","p":"Mitchell","t":"00:23:28","q":"I think I was also backed by the business and that really helped. Yeah, I had a great manager and [CEO] and I had a good manager before him and [prior manager]. Both of them gave me backing. Both of them gave me buy in. They were a bit useless sometimes in terms I'd be like, hey, what's this process? And they'd go, I don't know. And so then I'd have to go out and find the process. But like, you know, in terms of when push came to shove, they always backed me. And as long as they were aware of issues, they they always backed me as well. So yeah, I thought that was, that was that was really important.","c":14,"n":9,"i":"mentor_good","s":74},{"id":"Mitchell-002416-027","p":"Mitchell","t":"00:24:16","q":"Yeah, I remember the first. So when I signed my initial contract after my project as the tech specialist, there was a clause built in. I'd asked for a higher salary and that said no. And that like compromised. And they said, we'll take you to that higher salary when you graduate, which was like six months after, basically. And fair enough. I'd just come off the project. I think they were like, let's just see.","c":4,"n":6,"i":"pay","s":63},{"id":"Mitchell-002446-028","p":"Mitchell","t":"00:24:46","q":"I was.","c":8,"n":7,"i":"procedural","s":19},{"id":"Mitchell-002447-029","p":"Mitchell","t":"00:24:47","q":"Anyway, I went into that meeting six months afterwards with [CEO]. So the first the first guy I met with, [prior manager], he was come from an advice background, but he'd done a lot of operational management and research and very technically able in that scenario, but not very technologically able. And then after a while, [CEO] took over. And so [CEO] was an advisor. He'd been a consultant at [big 4]. He'd done information systems at uni. He was a lot younger. He was more switched on in the tech space. And also just a visitor.","c":7,"n":0,"i":"big4","s":67},{"id":"Mitchell-002521-030","p":"Mitchell","t":"00:25:21","q":"Just a real pragmatic manager. You know, whenever I had a problem, he would help solve it, whereas [prior manager] would kind of go, oh, did a wee bit. So like, [CEO] was really good. And I went into that meeting with [CEO] with my like the clause in my contract printed and highlighted. And I was like, yeah, you know, I was real gearing up for like a confrontation because [colleague] had had a similar clause in his contract and they diddled him around and he hadn't got it. And it took months. And it was this whole drama. So I was like gearing up for a confrontation. And basically, like [CEO] kicked off the meeting, said [name]. We're thrilled. We're loving your work. We'd love you to stay around. We're going to, you know, increase you to that contract, and then we'll review this in eight months time when it's part of our regular cycle. Like we're really happy with your work. Are you having any problems? What can we do to make it better? And I was like, it's just so taken aback. I was.","c":11,"n":9,"i":"mentor_good","s":50},{"id":"Mitchell-002614-031","p":"Mitchell","t":"00:26:14","q":"So ready to like, fight for what I deserved. And like, it was just the opposite. So yeah about about 8 or 9 months into my stint there, they hired a COO, which was a first for them. They'd had this kind of operations manager, but everyone had been from an advice background, whereas they hired this person called [COO], who had come from running tech businesses in Australia. She was operational, but she had a good degree of tech literacy. She was super polished, very able to get things moving. And she was great. And so I became the IT manager after maybe a year, which basically was just us replacing some of our vendors, just amalgamating them and having them report to me. And then I reported to [COO], who was COO and then basically she would help design the project pipeline roadmap. And then I would execute it and she'd touch base with me regularly, and then she'd report to the leadership team and the board and then basically a year and a half ago, kind of start of last year. We basically said, look, my roles evolving. Let's offload the like tech support element of it. Let's bring in someone who can handle that stuff. And I can go full time on project work, basically. Because [COO], like, you know, there's no point you spending all your time on computer problems. You're way.","c":15,"n":9,"i":"mentor_good","s":26},{"id":"Mitchell-002743-032","p":"Mitchell","t":"00:27:43","q":"Know, we can we can outsource that. I'd done a real I'd done a really helpful mentoring session with a guy who is the head of a tech company in town called [tech company], and he basically helped me work out, list out all the bits of work that I was doing. Which ones can we outsource easily? Which ones do you enjoy doing? Which ones provide the most impact to the business? And so that kind of classified it quantitatively. And he was like, by the way, you're doing like three people's roles, just so you know. And like if you want to go somewhere else, it'll take like 2 or 3 people to replace the work that you're doing. So just make sure you've got that in your head when you go into those negotiations. And I was like doesn't doesn't everyone do that? And he's like, no, like your business has a really good deal. And it felt like he was going to bat for me. He was basically saying, you need to first. He said, you need to go somewhere else. And then he said, okay, as long as you can still learn there, you can stay there, but you need to get yourself a better deal and you need to off source all this, outsource all this other stuff that's you're not interested in. And so that was like a real like well okay. And so he really helped me set up there.","c":11,"n":9,"i":"mentor_good","s":33},{"id":"Mitchell-002854-033","p":"Mitchell","t":"00:28:54","q":"No, it was it was through [industry association]. So [industry association] is an association. And they I go to some of the events and, and one of them newsletters, they said we're running like a early stage career mentoring program if you're interested come along. And it was 12 of us or 13 of us. You had to apply. And then they did like a speed date and two groups with all the mentors. And the first one, I was like oh. Because they were all software engineers or network engineers. And I was like, shoot, there's no one here that's like relevant for me. And I was like oh. And then the second group there was [mentor], who's the CEO of of [tech company], and he basically just we really clicked and I. So you listed like, who you wanted as your number one. And I was like, shoot, if I don't get [mentor], I don't know, like no one else here really, you know, gelled for me. And then clearly he liked.","c":15,"n":9,"i":"mentor_good","s":26},{"id":"Mitchell-002951-034","p":"Mitchell","t":"00:29:51","q":"I had as well.","c":8,"n":7,"i":"procedural","s":25},{"id":"Mitchell-002953-035","p":"Mitchell","t":"00:29:53","q":"So that recommended like an eight week program with like set topics. But we just freestyled and and he was just like, here's what we're doing. And it was really good. And, and I've actually been back just every so often I hit him up and we have a yarn. But yeah, he was fantastic and really gave a lot of perspective.","c":1,"n":4,"i":"work_content","s":56},{"id":"Mitchell-003019-036","p":"Mitchell","t":"00:30:19","q":"Yeah, well, a big part of that work was basically saying, what is it that you're doing and what is it that the company could outsource? So like up until then, a lot of my value proposition had been, well, you should pay me a bit more because I'm doing tech support and I'm doing project work. And he was basically like, you should pay me more because the project work is way more valuable. So take the tech stuff off me. You can get someone else to do that and let me just do project work and I'll deliver more projects. The business will get a better outcome. And you know that the project stuff is the hard stuff to outsource. So pay me more because that's valuable work. And so that kind of flipped my value proposition around a little bit. Started looking at it that way. And I basically said to [COO], I said, look I'm really interested in doing more and more project work and less and less tech support and cybersecurity stuff. I think we should outsource that. Which will let me focus way more on the technology roadmap.","c":2,"n":4,"i":"work_content","s":46},{"id":"Mitchell-003123-037","p":"Mitchell","t":"00:31:23","q":"And [COO] went okay. Yep. I agree, that makes sense. And so then I ran another project, which was basically an RFP for a vendor that would do that. And they came on board and like September last year. And then yeah, ever since then, I, I still am involved a little bit in that stuff, but like most of the time it goes straight to them and they sort it and I kind of liaise with them. So it took a lot, a lot of like that. That level one is what we call it. And level two, level two is your technical stuff. Level one is your basic break. Fix took away a lot of that responsibility, which just gave me a lot of time back. It's still not fully there because we have other services outside of that, which I'm still doing that level one support for. But it gave me a lot of time back. And then that led to more projects and then the business was stoked with that. So yeah, it was a good outcome.","c":2,"n":4,"i":"work_content","s":32},{"id":"Mitchell-003227-038","p":"Mitchell","t":"00:32:27","q":"Yeah, [mentor] and I had some real good discussions about that because initially I was like, I want to be like a IT manager, a technology manager, a head of technology. Like, I definitely want to go the business management route. I need to get skills prepped so that once I go somewhere else, I'll be able to land one of those jobs. And he said, look, that's great, but management isn't all it's cracked up to be. A lot of time you're just dealing with people shit, and you're not actually doing anything that you want to be doing. And he talked a lot around the delayed gratification that you get when you go up levels. He basically said, when you're on the front line like you are, you're shipping projects all the time. You're delivering stuff. You're getting big hits of dopamine. When people say, hey, [name], that was really helpful. And you're actually doing stuff and you go up a level and you're managing the people who are doing that, and you're probably still involved and you're probably aware, but you're not getting that day to day stuff. You're thinking more strategy. You're thinking more one year plans, three year plans, five year plans. You know, the projects you're working on might not happen for 18 months and you might be just gently grinding away. And so I kind of took that on board and I was like, oh yeah, interesting. I still think I want to do that. Well, the projects I've been working on since then have been longer term and have been more delayed, and I haven't necessarily loved that. So that was that was great advice that I've still remembered was that switch between you're not actually doing where he basically where do you get your joy? Where do you what fires you up? Is it doing something for other people or is it the like the coming together of all these projects? And I initially thought it was, but really now I think it's more in the doing and I kind of want to be in the middle somewhere. Yeah. And that's kind of where consulting stuff has kind of come in, or I kind of want to get into board and governance, which, you know, would be, I want to have a couple different levels is kind of what I want to think, because some of the strategy stuff I've really enjoyed. But then I missed the doing. So I'm really in the weeds on doing at the moment, which I'm liking, but I want to elevate my strategy skill set, but I don't want to lose completely. So I'm in a tricky spot where business is larger than me. I'll have to pick one, and I'll be either strategy or doing because larger than me, they split that out, whereas in my current role it's small enough that I can do both, and I think that's what I want to kind of keep doing. But I'm aware that small fish, you know, midsize businesses who can afford a dedicated resource that can pay, someone who can do strategy, that have a focus on that, but also don't necessarily have doing people are not common, particularly in my field, particularly in [city], particularly willing to take a bet on someone like me. So yeah. Yeah.","c":116,"n":34,"i":"reject_ladder","s":100},{"id":"Mitchell-003524-039","p":"Mitchell","t":"00:35:24","q":"Basically, it came out of [COO] before. So [COO]'s left. She left at the start of the year. And so that was kind of another level of increase in my role, where I'm now doing more with, with [name], who's the head of advice, and [CEO], who's the CEO. And so it's kind of resulted in like an A level up. I'm now dealing directly with them. I'm doing a lot less reporting to [COO] who's reporting to them. So in some ways it's really good because it's less.","c":71,"n":28,"i":"advice","s":100},{"id":"Mitchell-003552-040","p":"Mitchell","t":"00:35:52","q":"And now I'm getting a bit more stuck in, which is cool. But in some ways it means I'm less focused 100% on projects. I'm like 90% projects, 10% on all this other stuff that now comes with it. But that's okay. I think on the whole, I'm enjoying it. Basically it came down to last year looking and going, what is it that I'm going to develop my skills in? Because my technical stuff, I have a I have a understanding of technical stuff, but I'm never going to be a technical expert. I've got a decent project management thing, but, like, you know, I'm very in my bubble at [current firm], very in my bubble. I'm comfortable and I know that. And I'm happy there. And I was talking with someone else, [tutor], my tutor from [polytechnic]. He announced that he was doing a bit of, like, ad hoc mentoring kind of stuff, and he was like, it sounds like you just need more exposure to other business. And I think, yeah, that's great. And so we've been taught I've been talking all through my time at [current firm] with other financial advice firms. There's not really many in New Zealand our size. But there's a lot in Australia. And so there's an association that we were a part of called [international association], which involves Australian and international firms. And so I did a lot of like chatting with them and engagement with them. And, um, you know, a couple of them were like, hey, if you ever come to Australia, like, we'd love to have you, but, you know, if you're interested kind of thing. And so I kind of toyed with the idea of maybe I do some, some consulting work for them. And then I was like, oh, you know, we had a board change about two years into my role. And they brought in professional directors rather than just the people who founded the business. And it made, like a world of difference, you know, having a more effective board was, like, super impactful. They got a lot more direction. It was really helpful for my role because it kind of steered where the business was going and what I should focus on. And it was like real noticeable. And I was kind of like, oh, interesting. That's like a really effective way to have an impact. Plus if and this is a side benefit, but like a lot of those people who go into boards sit on like ten boards, collect like 20 K per board. And then they, like, retire at 40 and just be board members full time. Yeah. And I was like, damn, that could be a nice side hustle. Long way to go. It would be a lifetime journey. But like, if you could put the yin yang then that would that would potentially be quite a quite a cool option. And like with my technology people and I'm lacking in the business acumen. But you would develop that in, in that, in that space. So that was kind of like something that that's like a challenge. That's like something oh cool. I can I can spend time developing that skill set and then like long term that could pay real dividends. And it's something I could do that would give me exposure to other business, other charities, other organizations while still staying at [current firm].","c":18,"n":9,"i":"mentor_good","s":44},{"id":"Mitchell-003916-041","p":"Mitchell","t":"00:39:16","q":"I'd say it's a combo of all of the above. I've been pretty fortunate that because I am the only person at [current firm], I've been able to negotiate pretty hard in terms of pay, and thankfully each time that goes well, it gives me more confidence to go harder next time. And like I've, I am very well compensated for what I do. And I'm and I enjoy the work that I do and I'm happy there and so but I'm very aware that I'm a big fish in a small pond and the firm is growing, but not massively. And I am aware the longer I stay there, the harder it might be to get my next job. Kind of. And so I don't want my skill set to stagnate. I don't want to stop growing. I've been super fortunate to do like 30 different projects over the last five years that have all been different and all I've learned that, like, I can talk cybersecurity, but I probably won't don't want to do the cybersecurity bit. I definitely don't want to do the help desk or the technology like implementation stuff, but I can I have an understanding of that. I've done a lot of work on our CRM, a lot of work on automation, a lot of work on process design and on understanding process and facilitation and that kind of stuff. And so what I don't know is like, what does that role look like? Because let's say I wanted to go somewhere else. What is that role? Yeah. You know, I've got elements of management, I've got elements of strategy. I've got elements of like overseeing and building an operational tech stack, which all works together and hums really well.","c":7,"n":0,"i":"big4","s":30},{"id":"Mitchell-004051-042","p":"Mitchell","t":"00:40:51","q":"And then I've got elements of like niche project management, I've got an expertise in dynamics 365, CRM customization, like it's just this whole really weird skills that's super specific. The financial services niche is really small in New Zealand, but crying out, like all of the smaller firms we talk to just have no one to do that and they can't afford anyone to do it. There's no consultancy that's in that space that nails it. And so I like [mentor] and I fleshed it out. And basically we come back to the problem, which is how do you scale. And ultimately you can't because I've just got this niche overlap and blend of a few different things that happens to make me really good at this specific role. But if I went to, say, an insurance company or, you know, something like that, I'd lose so much of that niche, I would just be another IT manager there. Whereas here I understand the regulatory regime, I understand their advice process. I understand where the business is going. So I'm stuck. I'm stuck in a pickle and I don't know what the next step looks like. One possible option is law, which is like financial services. It's not finance, but there's a lot of law firms that need technical help. But that's a whole new world of, you know, all of my all of my knowledge would not be relevant. And there's other people in that law space, and I've talked to a few of them and they reckon that it could be a good option. But yeah. Anyway, long story short, I'm not sure it's a mix of I want to develop an industry generic skill set, which is something I think governance would really support.","c":18,"n":9,"i":"mentor_good","s":60},{"id":"Mitchell-004232-043","p":"Mitchell","t":"00:42:32","q":"That would support if I wanted to go into management, maybe and that would support just introductions across my network with other people and like building networks at the governance level, I think would be like just like goated for your career long term because you get jobs through the people you know. And if you know the top dogs, then you're in. And so yeah, it's I also am interested in the governance side of things, you know, seeing the impact that a good board head on. Our business was pretty like, whoa. And there's a lot of businesses out there that don't do security well, particularly with AI. I think I could add a niche there without necessarily being like the chief information security officer, because most firms can't afford one of those. You know, you could a lot, a lot of technology providers sell you a security offering. And if you don't know what you're looking at, they go, yep, this is great. And then they get hacked and they're like, what the heck? We paid for so and so. But like, if you don't have anyone at their governance level who has acumen in that space, you just read that report and go, this is great and carry on. And I think I could add a lot, a lot of value in, in that regard and actually push back and go, this doesn't say anything or why aren't we doing this? Or we're paying way too much for this.","c":33,"n":6,"i":"pay","s":39},{"id":"Mitchell-004344-044","p":"Mitchell","t":"00:43:44","q":"So yeah. Yeah.","c":8,"n":7,"i":"procedural","s":0},{"id":"Mitchell-004422-045","p":"Mitchell","t":"00:44:22","q":"Yeah for sure. The first thing I would say is what [tutor] told me, which is that every business and every industry requires someone who can talk, both tech and business. So I would focus on developing your expertise and your business acumen. And to be honest, business acumen is where I've lacked. So I've had to learn a lot of that myself. And I've been fortunate the business has allowed me to, but if I came in with a stronger business understanding, I would have had a real, a much more valuable business proposition or value proposition. Early doors. I had to develop a lot of that, and that was just me following my nose. So I would focus on practical degrees, like the one at [polytechnic] stuff that teaches you a broad range of subjects like project management, like development methodologies, like business analyst skills. But if I had to pick one, it would be the business analyst skills, because being able to interview and understand and design requirements gives you that insight into the business. And it lets you run those projects and you can kind of muddle through as long as you've got good requirements and you understand what you're trying to achieve. And then the second piece would be develop some technical skills like mine happened to be SharePoint and Microsoft, and that got me in the door. And it still I do a fair bit of work, but I'm definitely not a Microsoft guru and I think that would be. The other thing is, you don't have to have massive depth, you just have to have a range of skills.","c":4,"n":6,"i":"pay","s":33},{"id":"Mitchell-004546-046","p":"Mitchell","t":"00:45:46","q":"And so at least with the businesses that I've been in, they've acknowledged that you're not going to be the expert in all things. And at some points you'll need to bring in an external consultant. But you need to know what's the consultancy you need to bring in. You need to go like, oh, we need someone who's really good at power BI because I just can't do that enough. Let's find a power BI consultant as opposed to being like, well, I don't know how to do this reporting project at all. Let's bring in someone who can. You need to be able to go, like, here's where I'm up to. And like you can try upskilling. I've tried it with power BI, I have, I manage, but I'm never going to be an expert because you could spend a lifetime being an expert in that one niche. And for me, that's not the direction I want to go in. So have a surface level understanding to deliver an MVP or a proof of concept and then say, right, we need to get someone proper to to build this. So yeah, it would be it would be practical programs like the degree at [polytechnic] or other polytechnics or AUT, that kind of thing. I think the uni that uni courses that I went to were too high level, they weren't practical enough and they wouldn't give you the skills to actually deliver at a small medium business.","c":60,"n":17,"i":"learning","s":46},{"id":"Mitchell-004657-047","p":"Mitchell","t":"00:46:57","q":"I would develop a few keystone skills, whether that's SharePoint, whether that's programming, whether that's like something that you can base your other soft skills on. And I would try and get an internship or industry experience as early as possible. Because that then just once you're in the doorway opportunities come along. But if you're not, it's really hard to pick a student and trust them with the keys to your technology stack, you need to.","c":60,"n":17,"i":"learning","s":92},{"id":"Mitchell-004724-048","p":"Mitchell","t":"00:47:24","q":"A foot in the door by experience somewhere else. And I was just really fortunate that [prior org] came up. And then that led to me to [current firm]. You know, like without that, I wouldn't have got any of my projects other than that documentation writing piece, which I wouldn't have wanted. And then I would have come out of that project being able to write documentation for a CRM that no one uses, you know? So I wouldn't have had any of the skills to then go on. It was just a lucky aligning of the stars.","c":42,"n":17,"i":"learning","s":100},{"id":"Mitchell-004756-049","p":"Mitchell","t":"00:47:56","q":"And all.","c":5,"n":7,"i":"procedural","s":7},{"id":"Mitchell-004757-050","p":"Mitchell","t":"00:47:57","q":"Are people, you know?","c":6,"n":7,"i":"procedural","s":24},{"id":"Mitchell-004823-051","p":"Mitchell","t":"00:48:23","q":"All of them are, I just I knew [colleague] and he presented an opportunity. He actually presented it to [name], and I interviewed better than him and got the job, so, like, nice, you know? That was the first step. And then the person I knew from [prior org] who recommended me for [current firm] was someone I knew.","c":16,"n":2,"i":"interview_process","s":90},{"id":"Mitchell-004823-052","p":"Mitchell","t":"00:48:23","q":"It it really is about when there's an opportunity just just taking it and back yourself. Yeah, yeah.","c":52,"n":25,"i":"confidence","s":10},{"id":"Mitchell-004831-053","p":"Mitchell","t":"00:48:31","q":"So even when you're breaking, even when you're breaking your pants, you just gotta do it and you'll figure it out. And most people there, if they're hiring you, they know less than you. And you can muddle your way through until you figure it out. But you have to figure it out. Like, don't bullshit too much.","c":21,"n":2,"i":"interview_process","s":22},{"id":"Mitchell-004845-054","p":"Mitchell","t":"00:48:45","q":"There's a there's a you can get away with a little bit, but not a lot.","c":3,"n":4,"i":"work_content","s":65},{"id":"Mary-000543-001","p":"Mary","t":"00:05:43","q":"Yes. Okay. So my role at the moment I work at [a government agency]. I've been in this role for a little over three years. How I came in. So in my role is interesting because when I came in, there was this whole this there was this plan to develop well, to implement a five year strategic change enterprise function. So to really build the organisation's change maturity and in that time since shortly after arriving, one of the senior advisors left, and then there was a reset or a little bit of a restructure. And before that had happened, the principal advisor left and they didn't actually fill those two roles. So it was just me, literally just me and the, the function. So in terms of the work that I've been doing it's, it's shifted quite a bit from what I thought it was going to be, which was, you know, quite significant. And I guess it talks to leadership valuing or priority. Prioritizing this work is the sort of work that if leaders get it, they really get behind it. And if they don't, it's kind of just seen as, oh, it's just another overhead type thing. So within yeah, within this work I've been doing more advising versus directly working on projects. I've worked on a couple of them. But yeah, the initial understanding of what the role was going to be was that I'd be directly supporting a number of projects and building out the change maturity for the organization alongside the other two colleagues. So yeah, I've been doing advisory work, building change capability across the organization as well, knowing that I have to be kind of a one to many side of things.","c":45,"n":36,"i":"security","s":59},{"id":"Mary-000731-002","p":"Mary","t":"00:07:31","q":"So a bit of a playbook around change management and templates and building people's leadership capability around change. So for individuals going through change, running workshops, developed a workbook and short guide for them as well. And I've done that for managers as well. So for me moving into this role, I had previously been at [a research institute] for six years. And within that I loved it. Absolutely loved it. Amazing manager. He really got me really well, and he was very supportive and helped me develop a great deal. But yeah, so I was conscious that I need to do something different, otherwise I could just get too comfortable here. So. So, yeah, I sort of shifted into more of the. I was interested because we did a great organizational program around change. When I was at [a research institute], I could see the benefits of it. And then there was a a change in leadership and a significant strategy change for the organization. And they didn't wrap change management support around it. So it was so hard for people to know. Yeah. Even just with their basic work, is it valued? Is it what the organization wants, all of that sort of stuff. So that was interesting because they it was just fascinating for me to see the impact when you wrap support around people versus not. So that was part of my reason for focusing more on change management in my next role. Because within [a research institute], I was doing organizational development and change facilitation. So the next question was.","c":14,"n":9,"i":"mentor_good","s":63},{"id":"Mary-000911-003","p":"Mary","t":"00:09:11","q":"The.","c":5,"n":7,"i":"procedural","s":10},{"id":"Mary-000914-004","p":"Mary","t":"00:09:14","q":"So I was doing a bit of that change work at [a research institute], but I was doing a lot of OD work as well, which was a lot of fun, and I loved it.","c":1,"n":4,"i":"work_content","s":92},{"id":"Mary-000923-005","p":"Mary","t":"00:09:23","q":"But yeah, for me, the why was definitely around. I can see when change is done. Well. The theme throughout my roles is around the people impact that I can have. And I could see when people are not invested in or supported that it's really hard. And we know that people have got a lot of personal change going on, and there's so much more change happening in the world now than there used to be globally, but also at an organization level. There's change fatigue, change saturation. So for me, if I can help, help that experience with people navigating change, then that that's a good that's a good thing. So that's kind of been the theme sort of weaving through both roles. Yeah, yeah.","c":34,"n":31,"i":"purpose","s":67},{"id":"Mary-001022-006","p":"Mary","t":"00:10:22","q":"It was, it.","c":9,"n":7,"i":"procedural","s":18},{"id":"Mary-001023-007","p":"Mary","t":"00:10:23","q":"So it was amazing. I, I was challenged in so many ways right from the beginning. I was leading facilitating a change management steering group with senior leaders. So I was sort of thrown in the deep end in a way. But I had incredibly supportive managers or manager, and the team was really wrapped a lot of support, just a very strong value alignment. And even the program manager of of the change work, she was incredible, incredible leader. And I think if the change side of things hadn't been run as well as it had I don't think I would have been rushing into doing more change work. But I was just so impressed with what great leadership looks like and how if you if you do it well and you lead it, lean into supporting people. It's not easy work. Then it can be really positive at the same time. I don't know if I saw myself. I don't think I would have seen myself doing something like change management in the past, because I would have thought, oh, that's just like an ugly thing. And it's got negative connotations. It does. And yeah. And often associated with restructuring. So restructuring happening at the moment at [a government agency]. And just everyone just thinks, oh change equals restructuring. So you can see how it has such negative connotations versus if these business changes changes in processes or technology that that's actually change management as well. It's a very different type of change management. But it's the wrapping support around people to make sure they're able to successfully transition through the change and adopt it. So yeah.","c":45,"n":36,"i":"security","s":65},{"id":"Mary-001222-008","p":"Mary","t":"00:12:22","q":"Like when people hear what your name is, your title, they're like, oh yeah, people on the back foot from the beginning in a way.","c":67,"n":11,"i":"status","s":71},{"id":"Mary-001257-009","p":"Mary","t":"00:12:57","q":"I think from memory. So I got my role at [a research institute] in May and I'm not sure was it? I think the graduation march. Yeah, I think it was around that time. So for me, I, I wasn't I wasn't looking for jobs when I was doing the Masters. And I was fortunate to live at home at that point. So it wasn't like it was the financial pressure. But we were as a, as a cohort, we were talking actively about sort of our next thing. I don't recall me actively looking at that time. But I think I did know probably passively, I could see that in terms of the job ads out there. Very little in [city]. Especially in that, you know, experience. Yeah. You've got qualifications, but you don't have experience side of things. So for me, it was more about, okay, I've got to be more open to living somewhere else as well. And I've spent a lot of time and energy on this, and I don't want to be I want to invest in my career and make sure that I'm successful. And so for me, it was actually being open to to moving somewhere else. And I'd never lived anywhere else. I've always I grew up, I grew up in [city].","c":4,"n":6,"i":"pay","s":47},{"id":"Mary-001408-010","p":"Mary","t":"00:14:08","q":"It was funny. And mum, mum said, please just don't go to [another city]. Just with the earthquake dynamic like that was her one thing. I was like, okay, [another city]'s out of the mix. So it was looking in [another city] and [city] and I don't think I was directly thinking, oh, I will take a role in those places. It was more I'll put applications in and then decide closer to the time. And yeah, I when I was looking at this application in particular, I thought, this looks like amazing work. Freaked me out. The idea of facilitating these sort of senior leader sessions like, oh my God, that's terrifying. But I applied and just thought, just take it step by step. And then I was like, oh gosh, I actually have to do this now. So yeah, it was I, I don't recall there being many jobs in [city] at that point in time. So it was really and this was an amazing role. OD advisor, change facilitator out out of uni, this sort of a coordinator role, which I probably wouldn't have moved to [another city] for a coordinator role. I would have waited in [city] for, for a bit longer around that.","c":14,"n":9,"i":"mentor_good","s":53},{"id":"Mary-001509-011","p":"Mary","t":"00:15:09","q":"Yeah, yeah, it's a big move to make.","c":5,"n":7,"i":"procedural","s":33},{"id":"Mary-001514-012","p":"Mary","t":"00:15:14","q":"Another city?","c":6,"n":7,"i":"procedural","s":28},{"id":"Mary-001534-013","p":"Mary","t":"00:15:34","q":"Yeah, it's probably not the coordinator title. More what I would be giving up to move. So if you I mean the idea of moving. I was very happy in [city]. And it was more about you have to start afresh. And I didn't have friends in [another city]. I had a couple of my sisters, but they were living their own lives and that sort of thing. So for me, it wasn't it was more about it has to be a role worth moving for because there's a lot of loss that I would have with that change. And there'll be a lot of work to build a new life in [another city]. So I think like a coordinator role would be all good if I was in [city]. It's just the loss of so much with the change of moving city. It had to be like, there's a lot. There has to be a lot to gain by making that move.","c":32,"n":11,"i":"status","s":33},{"id":"Mary-001633-014","p":"Mary","t":"00:16:33","q":"I think for yeah, for me, in terms of work, I need it to be I need to have a lot of variety in it, a lot of challenge and to be exposed to a lot of different things. And yeah, for me it was if I can find something that I find quite exciting and challenging, then that's a really great place to be. Especially after all that you're fully immersed in all your studies, and you get really passionate about all these areas, and you want to feel like you can. Well, yeah, that you can contribute. Well there's sort of being put in a box perhaps of only being able to do some repetitive tasks where you're not feeling like you're able to add that value. And again, it's that whole purpose piece as well. Being able to not just sit at a desk all the time, but build relationships with people across the organisation and, and feel like you're contributing in a, in a positive way.","c":53,"n":31,"i":"purpose","s":62},{"id":"Mary-001738-015","p":"Mary","t":"00:17:38","q":"So they were they've got sites across the country. It was in [another city]. So I had three years in [another city]. And then I was able to work from [a nearby town] for the last 3 or 4 years in [another city], and then four years, I think it was, and then two years in [a nearby town] which was very handy.","c":134,"n":37,"i":"relocation","s":50},{"id":"Mary-001820-016","p":"Mary","t":"00:18:20","q":"Yeah. So I was very fortunate because one of the guys in my course, he very A-type personalities, very serious about his work. So he just got a really flashy job and I was fortunate to be close, physically close by him at one point. And he's like, yeah, he was just I was like, how do you write a good CV and that sort of thing? So he shared his examples and they were like stellar, top level, like amazing. So that gave me a really solid high bar. So I did take a lot of time with the cover letter and making sure that it was very thought through and that they could get a real sense of who I was and what was important, instead of just a boring cover letter making sure word for word, it mattered. And then in terms of interviews, I, I recall having one for what was a consultancy firm in [city]. I just can't quite remember which one it was, but it was interesting because it felt very, very formal and I felt really uncomfortable. It was I hadn't had many interviews, I think. I think it might have actually been [a consultancy]. And yeah, it was surprising how just the formality and the way that they actually ran that interview, it was very serious. And I it's been interesting since then when I've done interviews sort of at the probably a bit more in the later point in my career so far that when they create a more relaxing environment, you can just bring your personality out more. So I think they were probably I know when we were doing apps, it's, you know, it's got to be very formal. You've got to be very not sort of give any hints away around your emotions and be very. Prescriptive. Almost very, very prescriptive. And since then, having done other interviews where you can relax and where it's more conversational. Of course, the good quality questions I found that to be hugely valuable, and I feel like I can be myself and answer the questions better, and you get a better.","c":32,"n":11,"i":"status","s":100},{"id":"Mary-002035-017","p":"Mary","t":"00:20:35","q":"And it's one of those things of it's that question of could I go for a long car drive with this person? Like, that's you're spending so much time in your life working with these people. You've got to have strong value alignment and be comfortable and have that psychological safety. So it was really interesting because I, yeah, experienced that interview and I just felt really uneasy, just so proper and serious. And it's kind of like yeah, it was weird. I didn't like it too much at all. So I was I didn't get that interview because, well, I didn't get that role and I just wasn't myself anyway. So it was no surprise. But when I went to do this [a research institute] interview. So the first one was online and the second I travelled to [another city] for it. I just thought, wow, these are my people.","c":79,"n":37,"i":"relocation","s":0},{"id":"Mary-002122-018","p":"Mary","t":"00:21:22","q":"Very warm and inviting. And I sitting on the other side of where you are on an interview panel, you just want people to do well because you want to find someone for the role and you want them to be successful type thing. So yeah, it was such a contrast of experience that I was like, I felt like I could be myself. They could get a real feel of who I was for a person. Not just a number, not just a, you know, your experience or your. Exactly, exactly. So pretty amazing. Really. I yeah. Such a contrast of experience. And I thought, well, if I'm going to make a big move to [another city], I feel like I'd be really happy and comfortable with these people.","c":79,"n":37,"i":"relocation","s":100},{"id":"Mary-002202-019","p":"Mary","t":"00:22:02","q":"Yeah. And it's quite rare to find that, I think. I don't think I realised how fortunate I was at the time. Amazing manager. Like. Incredible. You don't get a manager like that. You never really. You really get one in your career at all. And then a general manager of people and culture who care deeply about people who'd been with the organization in the previous versions of it for 40 years. So he really was invested in the people and he knew everyone's names, and this is sort of 2000 people type thing. So that was the sort of environment that it was. Yeah. And of course, scientists are a bit challenging. Well, they're unique in their own way, but it was just inspiring. I thought, wow. Because I think when I was at uni there was a comment made around, oh, I don't I think you're kind of not made for HR type thing. Just the whole harsh sort of prescriptive way that they do things. And I thought, oh, this from that organisation, I was like, actually, the way that I do operate, depending on the environment is seen and is valued. So yeah, it was quite interesting from that perspective as well, going into interviews thinking, oh, maybe I'm not the right fit for this sort of work, having that sort of grew out there. So yeah, it was really interesting.","c":13,"n":19,"i":"leaving","s":28},{"id":"Mary-002342-020","p":"Mary","t":"00:23:42","q":"Kind of. Yeah. Being comfortable, having difficult conversations with people, but always with care.","c":2,"n":4,"i":"work_content","s":54},{"id":"Mary-002348-021","p":"Mary","t":"00:23:48","q":"But yeah, I think probably the work that I do is more on the positive side of people culture stuff, which probably helps. I don't think I could be, I could never do employment relations type work.","c":0,"n":4,"i":"work_content","s":69},{"id":"Mary-002409-022","p":"Mary","t":"00:24:09","q":"That's that. Is it?","c":9,"n":7,"i":"procedural","s":16},{"id":"Mary-002424-023","p":"Mary","t":"00:24:24","q":"Yeah. So one so when I started out we, we had I mean, throughout the whole time it was more about. How would I start. So we we started out with understanding what are some things that I could develop in. So facilitation skills. So I went on a short training for that. The organization had [a leadership development] program, which was a leadership development program one year after you'd been with the organization. So it had 360s in it, which was awesome. Had a presentation skills session. So there was a lot of different opportunities. We were always looking at what are the things that I can develop in and I think throughout the whole six years we had ongoing conversations about so if we were running workshops together or we were designing a program it was constantly reflecting and evaluating on how we did things. So if I did a presentation on something, then he'd always give me feedback, things that I could improve on. And I think for me, it was I always felt this need to make him proud type thing, which is an interesting dynamic. And then having worked together, together for six years, there was that sort of tension point where, you know, he'd been alongside me the whole time, and I was kind of like, well, you know, I can I can do it a bit more. So I think that was a when you've had the same manager for six years, which is quite unique. We did have a bit of a teething point at one at one stage, and we worked through that.","c":15,"n":9,"i":"mentor_good","s":74},{"id":"Mary-002554-024","p":"Mary","t":"00:25:54","q":"We did work through it. And I think it was actually I'd always I never really articulated what I needed. So that was probably one of the, the challenges in that space. But I mean, I look at I look at what I see with other managers and my manager is great. My current manager is great. It's just you can't you can never beat what I had because our values were so strongly aligned. He cared so deeply. He wanted me to be successful. And he also took great pride in his own work. So I felt his level of duty and responsibility to do it. Do it. Well and I think working in a science environment, it's always a learning environment. So that helped from a development perspective that I could try different things out. And I mean, coming into the organization, it wasn't a hierarchical way of doing things. And they valued my expertise. It wasn't turning up in a certain way that I was really valued for what I had to offer. Which is really cool, really cool. And that doesn't happen in every organization. I think it helps that it was a learning organization where people valued your qualifications and your skill set, all that good stuff. So yeah, it's been been an interesting one in terms of the development side of things. I must say, the challenge for me, in part of the reason that I left was I started on obviously as a graduate and my salary that was we never really had conversations around the salary side of things.","c":15,"n":9,"i":"mentor_good","s":74},{"id":"Mary-002729-025","p":"Mary","t":"00:27:29","q":"And it's I stepping back now. I can see it was never very comfortable with that sort of thing anyway. For himself, he was never sort of pushing around those conversations. So we had really rich, incredible development conversations. But the salary side of things we never really talked about. And I think at the organization level, they weren't very good at that anyway. And this the fight paying people properly wasn't done particularly well. But for me, having been a graduate and then six years later the salary was quite a joke for what I was doing. And I did get to a point where we did have did have a salary conversation before I left where the GM was looking at increasing it, and she did. But I did leave in that time, and I could see that the salary increase wasn't much anyway. So it was really interesting to go out, having had a wealth of experience and value that I could offer versus where I was in the beginning and getting paid considerably more than, than what I was at [a research institute] because I loved [a research institute], but I, I actually couldn't think to the future. Like buying a house on that salary is not great. And trying to save and all that sort of thing. Like financially, your future wise, you are really limited. If you're not paid properly for what you do and you get a bit resentful, and I don't want to be in that space around things. So yeah, I think the challenge coming in is great.","c":4,"n":6,"i":"pay","s":40},{"id":"Mary-002908-026","p":"Mary","t":"00:29:08","q":"Yes. And if you're really limited around what you can do because of your finances, it's not good, especially when you've worked really hard on your career for so long and you're seeing people getting paid huge amounts of money and you're just like, what? Yeah.","c":4,"n":6,"i":"pay","s":63},{"id":"Mary-002943-027","p":"Mary","t":"00:29:43","q":"No, that was more around, I guess, the level of support I needed and kind of like how much I followed his guidance for my own. And I think it was helped in part by physically being in different locations with me being in [a nearby town]. And that wasn't why I moved to [a nearby town]. But I think that gave us a bit of separation, and we were all. We always caught up. It's not like we had a meeting every week. Like we were always on the phone to each other on teams and all that. So I think it gave us a level of separation where he could see that I was actually getting in my stride, and I knew what I was doing, and I would seek out as support as I needed it. So I think, yeah, the teething was around him kind of giving me space to do it my way. And I think because he's he was and he's still in the organization, he's been there for 15 years or so. He's so invested in it. And it's kind of it's a bit of a hard one in a way for him because he's so, so much of his investment of himself is in the organization. So I'm an extension of him. So he always wants it to be at that higher level because it comes back on him type thing. And a good way. But he takes such pride in his work. So I think that's the thing I always felt like, oh, there's. And it was good because I had such a high bar that I was expected to operate at, with lots of support to achieve that. But yeah, I think it was that teething of giving me the bit of space to figure it out myself at, at those points, because I think I was always sort of doubting myself a little bit, and having that physical distance just gave me a bit more confidence in what I was doing, I think.","c":96,"n":25,"i":"confidence","s":73},{"id":"Mary-003151-028","p":"Mary","t":"00:31:51","q":"I think it was a mix of both. We were particularly in the more so. Well, in the beginning, a lot of it was around my career. First three. Well, two ish years and then but we also had a, a key, a strong focus on how the organization operates because from his observations of the organization, they can either they like you or you don't like you're accepted or not by the quirky, wonderful people there. So I think that was one of the things he's very mindful of in terms of who he chose for the role, that he didn't sort of want a bull in a China shop type thing. But I think, yeah, the fact that I was very fresh coming out of uni allowed him to sort.","c":2,"n":4,"i":"work_content","s":64},{"id":"Mary-003234-029","p":"Mary","t":"00:32:34","q":"Yeah, exactly. And, and I think it sort of allowed him to probably mould me in a way to what he saw as successful. And I think I'm, I'm very grateful for that because there's so many things that I have learnt. Interesting, though, from a, I guess, a more one of the things I've observed in this role is that you've got a lot of power dynamics, and you've got people with ego and coming from science where it's actually about humility and you've got like world level leaders and they are just so casual and welcoming. So it's a very it's.","c":15,"n":9,"i":"mentor_good","s":84},{"id":"Mary-003312-030","p":"Mary","t":"00:33:12","q":"They do, they do. And it's kind of like it's a different rulebook here to what I've kind of my values are and probably have been further instilled from working in that context. So it is a bit different in some ways more reactive versus the thoughtful, sort of considered approach at [a research institute]. We're operating on a shoestring budget versus kind of waste that when you're on a bigger scale, you just see some silly waste happening and you've got it's less of a focus on valuing expertise, which is important to me in science. They value your expertise, but it's so bureaucratic and hierarchical that you've got senior senior people who actually have no idea of what your work actually is. And they don't They don't kind of take advantage of the fact they're paying for experts to provide guidance. So I think that's the. Yeah. Interesting.","c":26,"n":16,"i":"values_fit","s":50},{"id":"Mary-003417-031","p":"Mary","t":"00:34:17","q":"So I was at a point where I was thinking, oh, I've been where I am for six years, and I need I could stay here, but financially, not a great move. And it's important to be able to apply your knowledge and skills to different contexts. So I, I'd had a lot of yeah, I think there was some things that what was interesting because we did have a new people and culture lady come in after the first amazing guy, and she shifted the dynamics of the organization considerably. So engagement survey results were really high and positive. And then when she came and yeah, her being there for a couple of years, they dropped significantly. So that was, it just wasn't as fun. And basic needs of our people were not being met. They had huge workloads. And I think Covid certainly accelerated a lot of those tensions. Anyway I mean, as an organization, we prioritized our people. Like, there was no everyone was going to be kept on and that sort of thing. It was all that security of roles. But financially there was a drop in travel and that sort of thing. So you couldn't sort of connect with people as easily. And I think that then became more of a financial reason as well, after Covid had happened, that there was sort of factors that were extended beyond that time. But it was interesting because my manager had to talk, had to work directly with this GM of people and culture, the new lady and she was just horrific towards him. Just.","c":54,"n":32,"i":"covid","s":75},{"id":"Mary-003602-032","p":"Mary","t":"00:36:02","q":"A very toxic sort of behavior. And I, I think that was yeah, it was really hard because it was just such a, a shift in how we operated. And it wasn't as much fun because you were interacting with people who were really struggling across the organization. And I was rolling out things around diversity and inclusion and mental health and wellbeing and rolling out things around mental health and wellbeing when we can't even get the basics right for our people. And we're telling them to manage their people's mental health and wellbeing. Whilst as an organisation we weren't doing, we weren't really doing our part. It felt quite jarring and it felt wrong that we were doing that sort of stuff. When you think of Maslow's hierarchy of needs, sort of what are the basic things we need to get right? And it's understanding roles and the workloads on them and that sort of thing This, you know, teetering around the edges type stuff. And yeah, I ended up working on we kind of had a bit of a me too movement in the organization from a few individuals, and I ended up leading work around sexual harassment. We had a program around that, and I ended up leading that work. So it was a quite a big thing where there was a lot of heightened emotion around it. And even the scope of it wasn't quite right in the project. The consultants we have weren't quite right. And there was just it was it was a good piece to work on, but at the same time I it was. Yeah. Well, for a start, it wasn't really recognized properly for all the work that I was doing.","c":29,"n":27,"i":"mentor_bad","s":80},{"id":"Mary-003735-033","p":"Mary","t":"00:37:35","q":"Yeah. And I think it was. Yeah. So that was an important piece of work, but it was probably more of a learning of a lot of what not to do as well. And when you've got a climate within the organization where things are already quite prickly and you're doing that work, and it actually causes other people harm where they need. The bigger issue was about workplace culture, bullying, harassment sort of things versus focusing on a singular group. Yeah. Yeah. So the scope wasn't right, and some people felt like they were being demonized in a way, even though they were the ones actually experiencing.","c":110,"n":29,"i":"ethics_industry","s":100},{"id":"Mary-003815-034","p":"Mary","t":"00:38:15","q":"Themselves. So it was a lot of different dynamics happening in the organization. I was very passionate about it, very keen to do things right. But I was also I thought, it's this organization is things are not going to improve for a long time. And I could see under her leadership it was not going to change. And with the CEO, his direction wasn't. Yeah. It wasn't really working for, for me or the organization. So I thought, well, I'm not getting paid properly. It's it's hard work where I don't always know if our efforts are where they should be and and all of those sort of things. It just wasn't what it was when I first started, and I felt like I had a lot more to offer. And I thought, oh, maybe it's actually a change of scene. It's probably not a bad thing. I was open to OD roles or change roles and yeah, came across this role and the idea of building that change enterprise change function was really exciting because it did have the leadership capability building piece in there as well. So it didn't end up being that in the end. But I think it's one of those things where you kind of go back and think, I you've got to make a decision. Sometimes it's not going to be perfect, but making a decision is important. And I've learned so much and it's been a very different environment. Yeah. And sort of not having my boss sort of hold my hand like I had had. Yeah, it's sort of given me the confidence to know I can I can do it all. And I've learned so much from my time there and yeah.","c":14,"n":9,"i":"mentor_good","s":68},{"id":"Mary-004015-035","p":"Mary","t":"00:40:15","q":"Yeah, it was interesting because she's this she was the sort of person that could get rid of people quite easily. At the same time she. Well, yeah. Well, I think she a past organization she was in, she said, oh, yeah, I've been able to get rid of people in the past. She, she was attacking me for my. She was my manager more than me. I was quite fortunate because I was seen as I was the youngest and the group. And she saw that as, you know, quite exciting. Someone with, you know, new ideas and you know that young energy. So it was oddly the the opposite way around where.","c":11,"n":9,"i":"mentor_good","s":77},{"id":"Mary-004050-036","p":"Mary","t":"00:40:50","q":"Was more discrimination on on people like my manager, who's been in the organization for ten odd years at that point. And he was kind of she thought, oh, well, you know, that's that's a bit tragic type thing versus valuing the fact he was so invested in the place and had those relationships he she came to over probably two, three years to appreciate him. But yeah, she, she she was great with me. I think it was just that if anything I did, if there's anything that I did wrong, she would go at him for it. Like it was always his fault. So I, I never I mean, I didn't really make any mistakes, but a couple of small ones which totally natural to do. She, she went at him for which I, I found quite hard because.","c":15,"n":9,"i":"mentor_good","s":58},{"id":"Mary-004135-037","p":"Mary","t":"00:41:35","q":"Does the right thing and it's my issue. It's not, you know, just because he's my manager. I think that's the thing that I found challenging when that happened, a lot of that was on our relationship. Yeah, well, it's important that relationship and and I think he did talk to me quite a bit around how [name] was experiencing things. And I was probably a bit bit of an agony aunt at that point. I have kind of kind of I was I was a bit of that for people in the organization. So that was, yeah, a dynamic where it was hard to hard to see what he was experiencing, really. It was quite tough.","c":14,"n":9,"i":"mentor_good","s":79},{"id":"Mary-004215-038","p":"Mary","t":"00:42:15","q":"And I'm really flourishing for so long.","c":2,"n":4,"i":"work_content","s":21},{"id":"Mary-004235-039","p":"Mary","t":"00:42:35","q":"Yes, walk on eggshells sort of stuff. That's what he was living with every, every day at work. But me to a very small extent, but just not not fun.","c":2,"n":4,"i":"work_content","s":79},{"id":"Mary-004301-040","p":"Mary","t":"00:43:01","q":"I certainly found it easier than the first time round. Looking for a job number one. I can't actually recall. You may have just been, like, 1 or 2. I think when I had interviews, I was. I had a better chance of getting them. It was kind of like once I got to the interview stage, then it was a lot easier versus if you were just like the application type thing. I yeah, I went for this job because I thought, yeah, the role looked really exciting. And when I interviewed. So it was an interesting one, it was CV cover letter and it was an online interview. It was only one. Was it? One might have only been. Oh, I don't know if it was 1 or 2 interviews, but they were both online. And again, for me it was important to understand the manager. He seemed very switched on, had a strong academic background. But it was a very warm interview. And I think that's the other thing. If they're warm and welcoming and you can give a bit more of your your energy and your personality, that was really important. If that was too formal and too sort of straight laced type thing, then I didn't feel that comfortable with them. So I can't really recall. May have had one other interview I can't even remember now. But yeah, I remember with this one that it was really energising and having having the opportunity to just talk change was was awesome. And to draw on all those different experiences that I'd had. Yeah.","c":16,"n":2,"i":"interview_process","s":76},{"id":"Mary-004442-041","p":"Mary","t":"00:44:42","q":"Hugely because otherwise you're just talking about your academic stuff. Yeah. First time around and and you were.","c":1,"n":4,"i":"work_content","s":64},{"id":"Mary-004450-042","p":"Mary","t":"00:44:50","q":"And if you're just drawing on part time jobs as well, it's harder to relate it to situations.","c":1,"n":4,"i":"work_content","s":64},{"id":"Mary-004507-043","p":"Mary","t":"00:45:07","q":"Well, it was interesting because I stepping back now, I feel a little bit bad because it was. And the idea of leaving my manager, it was more about my manager than anyone else. After six years that was really hard. So I actually didn't tell him about it till I needed a reference check. And I kind of wish that I had taken him on that journey a little bit earlier. I think he could see that I was probably ready for something new. I don't know if he really thought about the salary aspect being as strong a thing as it was. But yeah, it was it was not. It was a it was a hard conversation to have. Of course, he was happy for me. But I think, yeah, it was interesting because I actually wanted I was going to go up to [another city] and have a sort of a lovely farewell with my team. And then I got Covid just before going.","c":76,"n":32,"i":"covid","s":100},{"id":"Mary-004602-044","p":"Mary","t":"00:46:02","q":"Gutted, I was gutted. The last proper catch up with, with the team, which many of them were like family.","c":5,"n":7,"i":"procedural","s":100},{"id":"Mary-004610-045","p":"Mary","t":"00:46:10","q":"Six years. Yeah.","c":5,"n":7,"i":"procedural","s":20},{"id":"Mary-004614-046","p":"Mary","t":"00:46:14","q":"So it was, it was really hard. It was beautiful because. Yeah, he sent down a a gift, a beautiful pounamu which was very thoughtful and. Yeah, it's just beautiful. Yeah. And he's to this day, always happy to champion me. We catch up every now and again. Yeah. Always happy to be a referee. We always have catch up every three months or so. Yeah. Yeah.","c":2,"n":4,"i":"work_content","s":68},{"id":"Mary-004643-047","p":"Mary","t":"00:46:43","q":"I think it's probably a bit of both.","c":0,"n":4,"i":"work_content","s":34},{"id":"Mary-004646-048","p":"Mary","t":"00:46:46","q":"I he he does sort of cheer a lot of his thinking about what's going on in his world now. It's probably more we kind of mean to each other, I guess.","c":2,"n":4,"i":"work_content","s":71},{"id":"Mary-004658-049","p":"Mary","t":"00:46:58","q":"It's quite a different dynamic than it used to be. Yeah. Like you'll be telling about telling me about the sort of lay lay of the landscape with the current merger stuff. And I'm always really interested to know how it's going, but also how he's navigating it and the challenges and the dynamics that are at play for him having other organizations, people at his level with his job title and how those dynamics are playing out when there's no certainty on who's going to have those roles in the future. So it's him sharing that sort of insight. Yeah. And then, yeah, me talking about the dynamics that I have in my world as well. But I think one of the things that I've noticed in myself that I used to really care deeply, deeply, but I in terms of the work that I'm doing, but there's so many messy things that happen in the organization beyond your control, that there's a point where you care, but you also have to protect yourself by not caring too much.","c":32,"n":11,"i":"status","s":73},{"id":"Mary-004802-050","p":"Mary","t":"00:48:02","q":"And I think that's been a big thing for me to learn, because I think my old manager cares so deeply about his work. But I, I feel like that burns him out a bit. So it's been quite interesting sort of seeing those two different ways of doing things. And maybe it's maybe it's part of the, the whole Covid dynamic where you do get that perspective to a greater perspective, greater sense than you did before. But yeah, I think it's probably a timing thing as well, where my world was [a research institute] in terms of work life balance, it didn't really have. It was just about my time there. When I moved back to [city], yeah, when I moved back to [city], it was I met my partner and that. Yeah. [name], as you've met and, you know, able to build a life with this new home together. And I think having had more things outside of work has given me a really strong buffer around things that are happening in the organisational context. Because me going into an organisation like this, in the beginning, I would have been fried alive. I'd just be stewing over so many things because it is so complex and dysfunctional. But yeah, so it's interesting to just see that dynamic for me shift as well.","c":44,"n":32,"i":"covid","s":88},{"id":"Mary-004931-051","p":"Mary","t":"00:49:31","q":"Yeah. So it's interesting because it is such a big organization. And when I first started the role, there was an actual change team, and they had a principal advisor who was sitting at the tier four level. And once they once they left and the other guy left, I was put into the OD team, which, you know, I love OD. So that was fine. But I was at the tier five level and no sort of like direct change person. So that's a challenge, I think. Because, yeah, I was kind of put in a small area without the visibility of change within the organization. And also with my skill set getting pulled into some of the OD work like facilitating workshops and presentations and stuff that some members of my team just don't like doing. So I ended up having ended up having to do quite a bit of that. But also big. It's interesting because there's some senior people that get us. How would I describe it? There's some people. Well, I guess it's the behaviors. What's rewarded or recognized in the organization. And this sort of organization, it's about results but sort of tick box sort of results. First embedded sustained well considered results. So I think that's kind of the value misalignment I had that at [a research institute].","c":87,"n":16,"i":"values_fit","s":0},{"id":"Mary-005051-052","p":"Mary","t":"00:50:51","q":"It was quite noticeable when when that isn't there. And yeah, I think that's been one of the things is that people here don't ask those challenging, meaty questions around your expertise areas, which was always the case at [a research institute] to a very high level. So I think it's yeah, it's a very it's not like I get the continuous improvement feedback sort of dynamic. At the same time, it's I've got a lovely team that I work with. Great manager. So those things are all really, really good. And I think those are the key ones. If you've got a great manager, great team. You've got good work to do, even if it's just it's been a big shifting of expectations for me because I was kind of at [a research institute]. I was it was just my manager and I in the OD space. And even within our directorate, OD Directorate, there's like 30, 40 people. So you kind of get drowned out with that and you're a more specialist areas. So I think that's the thing that I loved about my old role, where I could just do so many different things, and you were really well connected to the people in the organisation where I'm more at a distance from that in this role.","c":18,"n":9,"i":"mentor_good","s":44},{"id":"Mary-005212-053","p":"Mary","t":"00:52:12","q":"Yeah, totally. Well, I have there are some restructuring happening in the organisation first. Well, there was a little bit in the past, but really big wide restructuring Structuring happening. So my I don't trust that my role will exist in the new structure. So I have definitely I've been on the job hunt and got a couple of very strong leads at the moment. So I'm very much in that. Yeah, I'm I'm not going to be in this role for much longer. And it has been I mean, it's been a good three year stint. I, I will miss the sort of capability building part of it in particular. But yeah, I think it's actually it's about job security in this current environment. That's really important. So for me, like, there's not as much odd work out there at the moment, but more there's a little bit of change work. So yeah, my I will continue in the change space. But it might I think it's probably more tech change, which seems to be more in demand. People change at the moment.","c":58,"n":36,"i":"security","s":0},{"id":"Mary-005320-054","p":"Mary","t":"00:53:20","q":"So just being open I think, and find not being too prescriptive around what the future roles will be. And I mean, the way the world's going, there's so much change. So I think it's kind of just riding the waves of like if I'm being asked like, what would you what would you do in five years? I don't know. I think it's so ever changing the landscape. So it's kind of just taking it step by step of, is this going to give me a new challenge? Is there something different in this that I haven't done before? I feel like this role I'm currently in hasn't been particularly challenging. So I a challenging in different ways, I guess. But yeah, I need I probably need a bit more stretch in the next next thing.","c":114,"n":21,"i":"aspiration","s":100},{"id":"Mary-005431-055","p":"Mary","t":"00:54:31","q":"Good question. Yeah. Well, it's the first time that I've kind of potentially been exposed to restructures. Put it this way, effect. And I've said this to my old manager, if you said that to me at [a research institute], I'd be freaking out and gutted because I had roots there, really strong roots. And of course, with the restructure, it's not by choice. But I'm I mean, there's one point I was a little bit upset about it, but I'm actually the role I'm in. I know that I need to change anyway, and it's kind of like it's actually give me like a shake.","c":43,"n":36,"i":"security","s":80},{"id":"Mary-005507-056","p":"Mary","t":"00:55:07","q":"It's giving me a shake to get a bit of a move on. And I've. Yeah, I think I've, I've learnt and gained as much as I can out of this role. So it's kind of a bit of a kick up the bum to keep moving. I think when you think about changes beyond your control. This is one where, okay, there's restructuring happening. What are you going to do about it? You can just ride it out and see if you get made redundant, or you can actively look and focus on, you know, what are the things you need to do, look after your well-being more during all those times, that sort of thing. But for me, it's been I need to I need to be active and proactive and find something. And I think also in the context of seeing a couple of my friends who I did my masters with, one who was the year above a good friend with and one who was in my year. So one of them, she's she was made redundant and she's just got a job, I think four months after that. And then I've got another friend who works at [a health agency] and she's just been made redundant. Yeah. So for me it's actually I need that lead in time. And even if my job isn't made redundant, it's still it's not the long term answer for from anywhere I feel like I've done and gained as much as I can.","c":82,"n":36,"i":"security","s":69},{"id":"Mary-005634-057","p":"Mary","t":"00:56:34","q":"It's tough.","c":9,"n":7,"i":"procedural","s":37},{"id":"Mary-005638-058","p":"Mary","t":"00:56:38","q":"So and just the job search the market at the moment.","c":0,"n":4,"i":"work_content","s":41},{"id":"Mary-005659-059","p":"Mary","t":"00:56:59","q":"Totally. So for me, what are the things that pull me in? I've got to feel a level of comfort with the manager that they get me, that they're supportive. Psychological safety, all that sort of thing. That there's opportunity for something of a stretch. So I think so. I'll give you the two examples of the two roles that are very.","c":1,"n":4,"i":"work_content","s":96},{"id":"Mary-005720-060","p":"Mary","t":"00:57:20","q":"So yeah. Yeah. No. Happy to so one of them is a secondment. So it's an internal opportunity within the organisation. And that's on the [an inter-agency programme] programme. So it's a big modern communications across all the operational stations. For the sorry for the trucks. And it's an inter-agency program with.","c":2,"n":4,"i":"work_content","s":68},{"id":"Mary-005851-061","p":"Mary","t":"00:58:51","q":"other emergency ce is not too dissimilar in that.","c":12,"n":19,"i":"leaving","s":43},{"id":"Mary-005937-065","p":"Mary","t":"00:59:37","q":"So that would be more working in the digital change project space. And again, funny with me not being a tech person at all. But so I think the attraction with that one is I like the idea of working in the tech space, leaning into that.","c":2,"n":4,"i":"work_content","s":75},{"id":"Mary-010000-066","p":"Mary","t":"01:00:00","q":"Exactly. And the it.","c":5,"n":7,"i":"procedural","s":30},{"id":"Mary-010005-067","p":"Mary","t":"01:00:05","q":"100%. And the fact it is a private sector organisation. Yeah. So I think that's the thing. They're both very different types of challenges.","c":63,"n":18,"i":"autonomy","s":17},{"id":"Mary-010016-068","p":"Mary","t":"01:00:16","q":"And I probably if you're looking at the manager side of things, I'd probably lean towards the [the inter-agency programme] or the [a government agency] manager at the same time. The job security is probably higher at [a private company] in the sense that it's a permanent role. The secondment with the [the inter-agency programme] programme is two years. But after that I may have lost my job with this whole restructuring. So it's all of those sort of dynamics","c":43,"n":36,"i":"security","s":100},{"id":"Mary-010043-069","p":"Mary","t":"01:00:43","q":"Exactly. Yeah. You gotta pay your mortgage. Yeah. So, so I think.","c":33,"n":6,"i":"pay","s":39},{"id":"Mary-010049-070","p":"Mary","t":"01:00:49","q":"Yes, exactly. So that's sort of playing on my mind a little bit around that aspect. So yeah, it's not, not crystal clear, but I'm probably. Yeah. I'm not, I'm not sure. So those are some different aspects that I'm weighing up around it at this point in time. But yeah, I don't know if I, I it's kind of like, you don't know if the grass is greener, and at least I know the grass that I'm in a little bit. So there is that dynamic in there as well. Yeah. So some of the thinking.","c":81,"n":10,"i":"decision","s":50},{"id":"Mary-010124-071","p":"Mary","t":"01:01:24","q":"Yes. Well, sing out at any point if you want to hear more. Yeah, yeah.","c":3,"n":4,"i":"work_content","s":43},{"id":"Mary-010130-072","p":"Mary","t":"01:01:30","q":"Oh, I'd love that. I'd love that. I'd love that, yes.","c":22,"n":18,"i":"autonomy","s":60},{"id":"Mary-010145-073","p":"Mary","t":"01:01:45","q":"Like, yes, I, I think so probably the.","c":3,"n":4,"i":"work_content","s":27},{"id":"Mary-010151-074","p":"Mary","t":"01:01:51","q":"No, no, I think it's been the the questions have been really meaty to get to those points. Yeah. I think probably the dynamic of moving to another city, moving to [another city]. I found that really hard from a friend making perspective. And I also because I was conscious of money. I ended up in a flat which was pretty dire. Like it was really old, moldy. And I, I don't think I appreciated the impact that had on my wellbeing. It was not great. So I think that was probably one of the things when, when you kind of go into a new city and all that, trying to make.","c":4,"n":6,"i":"pay","s":70},{"id":"Mary-010231-075","p":"Mary","t":"01:02:31","q":"A great environment for yourself. And I think I, I didn't prioritize that enough. It's just so hard to.","c":2,"n":4,"i":"work_content","s":86},{"id":"Mary-010239-076","p":"Mary","t":"01:02:39","q":"Massive changes.","c":5,"n":7,"i":"procedural","s":30},{"id":"Mary-010241-077","p":"Mary","t":"01:02:41","q":"Especially living at home most of my life as well. So it was a lot of change all at once. Yeah.","c":2,"n":4,"i":"work_content","s":75},{"id":"Mary-010257-078","p":"Mary","t":"01:02:57","q":"Yeah, it was, it was I felt very lonely because I didn't have that friendship circle. I didn't want to be a burden on my sisters. I wanted to. Yeah, I was conscious about not spending too much money. I didn't have my driver's license. I was walking to work and I was living on a really busy, noisy road where I'd be
