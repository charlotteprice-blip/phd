<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Thematic Coding Database — Open Coding Map</title>
<link href="https://fonts.googleapis.com/css2?family=Fira+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#FFFBF4; --navy:#1E3A5F; --espresso:#37221F; --muted:#7A6A66;
  --panel:#FFFFFF; --line:rgba(30,58,95,.15);
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;background:var(--cream);color:var(--espresso);font-family:'Fira Sans',system-ui,-apple-system,sans-serif;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh}
header{display:flex;align-items:center;gap:14px;padding:10px 18px;border-bottom:1.5px solid var(--line);background:var(--cream);flex:0 0 auto;flex-wrap:wrap}
header h1{font-size:11px;letter-spacing:.18em;text-transform:uppercase;opacity:.45;font-weight:600;margin:0;white-space:nowrap}
#stats{font-size:11px;color:var(--muted);white-space:nowrap}
#searchwrap{position:relative;margin-left:auto}
#search{width:230px;padding:7px 12px;border:1px solid var(--line);border-radius:6px;background:#fff;font:inherit;font-size:12.5px;color:var(--espresso);outline:none}
#search:focus{border-color:var(--navy)}
#searchresults{position:absolute;top:36px;right:0;width:320px;max-height:320px;overflow:auto;background:#fff;border:1px solid var(--line);border-radius:8px;box-shadow:0 8px 24px rgba(30,58,95,.14);display:none;z-index:50}
#searchresults div{padding:8px 12px;font-size:12.5px;cursor:pointer;display:flex;justify-content:space-between;gap:8px}
#searchresults div:hover{background:#F2F6FB}
#searchresults .kind{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
button.btn{font:inherit;font-size:12px;padding:7px 14px;border-radius:6px;border:1px solid var(--navy);background:#fff;color:var(--navy);cursor:pointer;font-weight:500;white-space:nowrap}
button.btn:hover{background:var(--navy);color:#fff}
#legend{display:flex;gap:14px;align-items:center;font-size:11px;color:var(--muted)}
.lg{display:flex;align-items:center;gap:6px;white-space:nowrap}
.lg svg{display:block}
#main{display:flex;flex:1 1 auto;min-height:0}
#mapwrap{flex:1 1 auto;position:relative;min-width:0}
#map{width:100%;height:100%;display:block;cursor:grab}
#map.dragging{cursor:grabbing}
#hint{position:absolute;left:16px;bottom:14px;font-size:11px;color:var(--muted);background:rgba(255,251,244,.9);padding:6px 10px;border-radius:6px;border:1px solid var(--line);pointer-events:none;max-width:60%}
#zoomctl{position:absolute;right:14px;bottom:14px;display:flex;flex-direction:column;gap:6px}
#zoomctl button{width:30px;height:30px;border-radius:6px;border:1px solid var(--line);background:#fff;color:var(--navy);font-size:15px;cursor:pointer;line-height:1}
#zoomctl button:hover{border-color:var(--navy)}
#panel{flex:0 0 430px;max-width:46vw;border-left:1.5px solid var(--line);background:var(--panel);display:flex;flex-direction:column;min-height:0}
#panelhead{padding:16px 18px 12px;border-bottom:1px solid var(--line);flex:0 0 auto}
#panelhead h2{margin:0 0 4px;font-size:16px;color:var(--navy);font-weight:600;line-height:1.3}
#panelhead .sub{font-size:12px;color:var(--muted)}
#chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.chip{font-size:11px;padding:3px 9px;border-radius:99px;border:1px solid var(--line);cursor:pointer;background:#fff;color:var(--espresso)}
.chip:hover{border-color:var(--navy)}
.chip.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.chip .n{opacity:.55;margin-left:4px}
#defbox{padding:10px 18px 12px;border-bottom:1px solid var(--line);flex:0 0 auto;background:#FFFDF8}
#defbox h3{margin:0 0 6px;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:600;display:flex;align-items:center;gap:8px}
#defstate{font-size:9px;letter-spacing:.08em;padding:1px 7px;border-radius:99px;border:1px solid var(--line);color:var(--muted);text-transform:none;font-weight:500}
#defstate.edited{border-color:#2E7D32;color:#2E7D32}
#defrestore{margin-left:auto;font-size:10px;color:var(--navy);cursor:pointer;text-transform:none;letter-spacing:0;font-weight:500}
#defrestore:hover{text-decoration:underline}
#defta{width:100%;border:1px solid var(--line);border-radius:6px;padding:8px 10px;font:inherit;font-size:12px;line-height:1.5;color:var(--espresso);background:#fff;resize:none;outline:none;min-height:44px}
#defta:focus{border-color:var(--navy)}
#relbox{padding:10px 18px;border-bottom:1px solid var(--line);flex:0 0 auto;max-height:150px;overflow:auto}
#relbox h3, #panelbody h3{margin:0 0 6px;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:600}
.rel{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:12.5px;cursor:pointer;border-radius:4px}
.rel:hover{background:#F6F9FC}
.rel .w{font-size:10px;color:#fff;background:var(--navy);border-radius:99px;padding:1px 7px;min-width:20px;text-align:center}
.rel .w.rel2{background:#94A3B8}
.rel .dot{width:9px;height:9px;border-radius:50%;flex:0 0 auto}
#panelbody{flex:1 1 auto;overflow:auto;padding:12px 18px 24px}
#ordernote{font-size:10.5px;color:var(--muted);margin:0 0 10px;line-height:1.45;border-left:2px solid var(--line);padding-left:8px}
.qcard{border:1px solid var(--line);border-radius:8px;padding:10px 12px;margin-bottom:10px;background:#fff}
.qmeta{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.qid{font-size:11px;font-weight:600;color:var(--navy);letter-spacing:.02em}
.pchip{font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px;color:#fff}
.qts{font-size:10px;color:var(--muted)}
.qill{display:flex;gap:2px;align-items:center}
.qill i{width:5px;height:5px;border-radius:50%;background:var(--navy);opacity:.18}
.qill i.on{opacity:.85}
.qcode{font-size:10px;color:var(--muted);font-style:italic;margin-left:auto;cursor:pointer}
.qcode:hover{color:var(--navy);text-decoration:underline}
.qtext{font-size:12.5px;line-height:1.5}
.qnote{margin-top:7px;font-size:11px}
.qnote summary{cursor:pointer;color:var(--navy);font-weight:500;font-size:11px}
.qnote p{margin:6px 0 0;color:var(--muted);line-height:1.45}
#loadmore{display:block;width:100%;padding:9px;font:inherit;font-size:12px;border:1px dashed var(--line);border-radius:8px;background:transparent;color:var(--navy);cursor:pointer;margin-top:4px}
#loadmore:hover{border-color:var(--navy)}
.empty{color:var(--muted);font-size:12.5px;line-height:1.6;padding:8px 2px}
.node{cursor:pointer}
.node text{pointer-events:none;user-select:none}
.edge-link{stroke:var(--navy);fill:none}
.edge-rel{stroke:#94A3B8;stroke-dasharray:5 4;fill:none}
.edge-hub{stroke:var(--navy);fill:none}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:rgba(30,58,95,.2);border-radius:6px}
::-webkit-scrollbar-track{background:transparent}
</style>
</head>
<body>
<div id="app">
<header>
  <h1>Thematic Coding Database</h1>
  <div id="stats"></div>
  <div id="legend">
    <span class="lg"><svg width="26" height="10"><line x1="1" y1="5" x2="25" y2="5" stroke="#1E3A5F" stroke-width="2.5"/></svg>linked (co-occurring)</span>
    <span class="lg"><svg width="26" height="10"><line x1="1" y1="5" x2="25" y2="5" stroke="#94A3B8" stroke-width="1.6" stroke-dasharray="5 4"/></svg>related (shared issue)</span>
    <span class="lg"><svg width="14" height="14"><circle cx="7" cy="7" r="6" fill="#1E3A5F"/></svg>issue</span>
    <span class="lg"><svg width="14" height="14"><circle cx="7" cy="7" r="5" fill="#93C5FD" stroke="#1E3A5F"/></svg>code</span>
  </div>
  <div id="searchwrap">
    <input id="search" type="text" placeholder="Search codes and issues…" autocomplete="off">
    <div id="searchresults"></div>
  </div>
  <button class="btn" id="exportdefs" title="Download all working definitions as JSON">Export definitions</button>
  <button class="btn" id="importdefs" title="Restore definitions from an exported JSON file">Import</button>
  <input type="file" id="importfile" accept="application/json" style="display:none">
  <button class="btn" id="reset">Reset view</button>
</header>
<div id="main">
  <div id="mapwrap">
    <svg id="map"></svg>
    <div id="hint">Click an issue to unfold its codes · click a code for linked codes and quotes · click empty space to reset · drag nodes · scroll to zoom</div>
    <div id="zoomctl"><button id="zin">+</button><button id="zout">−</button><button id="zfit" title="Fit to view">⤢</button></div>
  </div>
  <div id="panel">
    <div id="panelhead"><h2>Open coding map</h2><div class="sub" id="panelsub"></div><div id="chips"></div></div>
    <div id="defbox" style="display:none"></div>
    <div id="relbox" style="display:none"></div>
    <div id="panelbody"></div>
  </div>
</div>
</div>

4,10,2],[20,10,2],[36,0,2],[37,1,2],[37,5,2],[6,27,2],[12,8,2],[2,25,2],[25,5,2],[1,64,2],[39,4,2],[39,2,2],[25,18,2],[11,5,2],[49,3,2],[102,3,2],[24,2,2],[13,5,2],[4,40,2],[13,40,2],[4,46,2],[21,72,2],[8,53,2],[73,2,2],[74,1,2],[86,10,2],[47,9,2],[27,19,2],[11,17,2],[54,15,2],[70,1,2],[78,1,2],[34,3,2],[0,75,2],[6,48,2],[13,48,2],[6,68,2],[11,2,2],[11,18,2],[91,4,2],[124,1,2],[4,51,2],[47,0,2],[105,2,2],[55,9,2],[9,17,2],[8,107,2],[89,2,2],[89,0,2],[18,15,2],[27,4,2],[109,3,2],[43,3,2],[44,76,2],[44,24,2],[54,3,2],[4,76,2],[44,0,2],[41,17,2],[29,41,2],[9,19,2],[9,42,2],[55,4,2],[85,0,2],[2,54,2],[54,110,2],[56,110,2],[57,3,2],[126,3,2],[13,10,2],[13,74,2],[40,1,2],[2,46,2],[90,3,2],[1,45,2],[30,25,2],[8,38,2],[8,25,2],[51,3,2],[71,0,2],[79,2,2],[9,45,2],[45,3,2],[81,66,2],[80,128,2],[82,0,2],[58,1,2],[32,3,2],[1,32,2],[43,1,2],[58,0,2],[112,3,2],[112,0,2],[84,0,2],[94,1,2],[2,98,2],[59,23,2],[59,3,2],[83,1,2],[23,14,2],[34,0,2],[30,95,2],[95,3,2],[23,3,2],[22,11,2],[2,96,2],[1,96,2],[27,1,2],[27,42,2],[27,10,2],[11,73,2],[60,3,2],[60,0,2],[15,26,2],[11,7,2],[46,0,2],[35,2,2],[23,12,2],[12,5,2],[62,3,2],[62,2,2],[21,41,2],[12,16,2],[115,23,2],[23,78,2],[9,132,2],[9,82,2],[92,10,2],[7,15,2],[7,18,2],[60,4,2],[60,42,2],[5,42,2],[6,14,2],[6,53,2],[53,32,2],[134,32,2],[79,32,2],[79,13,2],[9,15,2],[4,96,2],[14,15,2],[76,1,2],[76,5,2],[61,2,2],[63,0,2],[63,3,2],[2,40,2],[2,50,2],[63,8,2],[2,48,2],[83,2,2],[22,83,2],[56,5,2],[35,10,2],[69,1,2],[9,35,2],[2,21,2],[61,3,2],[21,19,2],[138,0,2],[52,11,2],[16,19,2],[62,8,2],[87,0,1],[117,8,1],[118,4,1],[89,119,1],[120,0,1],[121,103,1],[121,122,1],[47,104,1],[123,1,1],[74,108,1],[2,125,1],[127,3,1],[114,29,1],[129,3,1],[130,0,1],[131,113,1],[58,133,1],[135,1,1],[6,136,1],[1,137,1]],"quotes":[{"id":"Clara-000327-001","p":"Clara","t":"00:03:27","q":"My current role, So it was a fluke, and an accident. That's probably the way to put it. I was at [previous big 4], but was... Yeah. Happy... Happy there... Happy enough? And I was a volunteer board member for a, not for profit organization called [name], which... A whole of fair trade items that was actually founded by my granddad's brother and his wife.","c":7,"n":0,"i":"big4","s":80},{"id":"Clara-000433-008","p":"Clara","t":"00:04:33","q":"Yeah. So that's stories. Grandparents. So another family friend of ours is was on the board of the Christchurch Shops at each shop independently. So I was just on the board of the Christchurch one, and the guy, I was the Air Board member.","c":97,"n":1,"i":"family_influence","s":100},{"id":"Clara-000450-009","p":"Clara","t":"00:04:50","q":"And the HR Board member before me was [name], who is a recruiter. He's one of the managing directors or something at [recruitment firm].","c":21,"n":2,"i":"interview_process","s":67},{"id":"Clara-000501-010","p":"Clara","t":"00:05:01","q":"And so yeah, long story short, there was some trouble for [firm] last year. They were in the media and they were closing all their retail stores and going online. And so we had lots of board meetings, and I went to catch up with [recruiter] to just go over a few small things from when he was a board member. And he was like, are you looking for another job? And I was like, no. And I'd just come back from two months in [city] on secondment for [Big 4 firm] in the Philippines. And so I was half brain dead, to be honest. After working some massive hours over there for March year end. Yeah. And I was like, no, I'm definitely not looking for another job.","c":7,"n":0,"i":"big4","s":37},{"id":"Clara-000537-011","p":"Clara","t":"00:05:37","q":"And then, yeah, six months later, he just called me, or one of his recruiters, [name] called me out of the blue and was like, are you looking for another job? And I was like, no. And he's like, are you sure? And I was like, yes. And he's like, do you want to have a think about it? And I was like, I don't know.","c":16,"n":2,"i":"interview_process","s":29},{"id":"Clara-000550-012","p":"Clara","t":"00:05:50","q":"Anyway, then he rang me the next day and he's like, have you had a think? And I'm like, yep. And he's like, do you want to apply? And I was like, I still don't know. And then he said, well, if you if you do, I need your CV tomorrow because I'm presenting some other CVs. And it was a job they weren't... they were Choosing not to advertise. So they were just kind of choosing a few people in their network. And yeah, long story short, I was one of seven and I got it.","c":46,"n":3,"i":"networks","s":64},{"id":"Clara-000612-013","p":"Clara","t":"00:06:12","q":"Very cool. I love it.","c":1,"n":4,"i":"work_content","s":20},{"id":"Clara-000623-014","p":"Clara","t":"00:06:23","q":"Yeah. So I did a Bachelor of Commerce in double the double major in accounting and tax and HR and with some geography papers in there. And I did one year at Victoria and three years at UC. And I am almost finished my chartered accounting [qualification] now.","c":7,"n":0,"i":"big4","s":60},{"id":"Clara-000641-015","p":"Clara","t":"00:06:41","q":"And then I had a bit of a break last year from CA going to [secondment city], and then we renovated extensively our house. So just took some more time off and yeah, got one paper to go.","c":17,"n":5,"i":"balance","s":41},{"id":"Clara-000700-016","p":"Clara","t":"00:07:00","q":"I did from very young, actually, I wanted to be an accountant.","c":3,"n":4,"i":"work_content","s":46},{"id":"Clara-000705-017","p":"Clara","t":"00:07:05","q":"I was always fascinated about the correlation of numbers and people in an organization, and so that is why I studied HR and accounting, because it kind of feels like what makes the world go round, what makes businesses run is people and money. And that's your golden combo. So a lot of people have asked me why I've studied that combination, and they say it's rare and I actually know a few people. [name], for example, she's... That was something I talked to her about extensively in her first year, was why I was doing what I was doing, and I shouldn't say that I influenced what she did because I shouldn't say that. But I think it was part of the conversation that we had around working out what to do. Yeah, there you go.","c":4,"n":6,"i":"pay","s":60},{"id":"Clara-000750-018","p":"Clara","t":"00:07:50","q":"Oh it was... It changed... Probably moving from Vic to [UC]... I had no intention of coming back to Christchurch, but I was super sick in my first year in Wellington. So being so far away from family and stuff wasn't...","c":2,"n":4,"i":"work_content","s":100},{"id":"Clara-000800-019","p":"Clara","t":"00:08:00","q":"[it's] Hard. So yeah, moved home over the end of first year summer break and then yeah, the way the courses kind of lined up, it was going to be three and a half years. Yeah. So I just chose to mixture of geography papers and then, yeah four years later.","c":3,"n":4,"i":"work_content","s":24},{"id":"Clara-000830-020","p":"Clara","t":"00:08:30","q":"For accounting?","c":9,"n":7,"i":"procedural","s":24},{"id":"Clara-000831-021","p":"Clara","t":"00:08:31","q":"I've always been very analytical. My parents would tell you that. Yeah. I've always liked to know why things are the way they are, and have a sense of curiosity around money and the economy. My mum's an economics teacher, so I guess that might have come into it. And my parents had businesses when I was growing up, so I guess it's a bit of a fascination that started pretty young. But yeah, I guess the analytical mindset and the people orientation.","c":4,"n":6,"i":"pay","s":60},{"id":"Clara-000900-022","p":"Clara","t":"00:09:00","q":"I don't think necessarily that accounting, traditional accounting is going to stay the way it is, necessarily, with things like AI and the way the world is going. And I also don't know that sitting behind a screen all day is where I see myself either. So it's kind of a bit of a... Now, it's a bit of a, like a bit of a journey to work out where, where I fit. But I find it really good now that I'm not working for lots and lots of clients, on lots and lots of jobs, flat out all the time. I'm in one business focusing on one common goal with... There's 550 staff at [firm], and there's 150 in the support office, head office. So yeah, we're all working on one common goal of selling heavy machinery equipment and then follow on parts and service.","c":64,"n":8,"i":"ai_tech","s":100},{"id":"Clara-000943-023","p":"Clara","t":"00:09:43","q":"So I like that side of the organization.","c":0,"n":4,"i":"work_content","s":16},{"id":"Clara-000946-024","p":"Clara","t":"00:09:46","q":"Working with different people to solve different parts of the problem.","c":3,"n":4,"i":"work_content","s":38},{"id":"Clara-000957-025","p":"Clara","t":"00:09:57","q":"Yep. So a bit of a random story. I got a scholarship in year 13, so there was a scholarship advertised for like... They... I think they advertised for like accounting, law, science. They kind of keep it pretty broad. But I think they probably favour people studying accounting or commerce degrees, and law. And so, I had a mentor in my first three years of uni as part of that, it was a staff member from PwC. The first one was in Auckland and then they transferred me to having a Christchurch person when I came home. And then I did an internship at the end of my third year. And then ironically, they were looking for someone, they were going to advertise for, like a part time bookkeeper for our team. And so they said, do you want to work part time in your last year of uni?","c":14,"n":9,"i":"mentor_good","s":58},{"id":"Clara-001043-026","p":"Clara","t":"00:10:43","q":"So I actually did two days a week in my fourth year and studied full time, which was hard going! But it was a good decision, I think, because once I got there, I'd hit the ground running, and I was progressed faster.","c":84,"n":10,"i":"decision","s":100},{"id":"Clara-001102-027","p":"Clara","t":"00:11:02","q":"I think that made it.... I wouldn't say easy, because man, it was hard doing both, but the transition itself was easy. The workload was full on, but yeah, it was just a natural progression.","c":1,"n":4,"i":"work_content","s":72},{"id":"Clara-001113-028","p":"Clara","t":"00:11:13","q":"And I think it did mean that when I started, I was definitely ahead of my peers, obviously in the same cohort. And they're veru... The way they run... They're very structured. So it was challenging the status quo.","c":98,"n":11,"i":"status","s":100},{"id":"Clara-001126-029","p":"Clara","t":"00:11:26","q":"And the partner in charge of my team, or there was two partners on my team, I was under one of them. He was very good at pushing the national boundaries of what a standard practice looks like, to advocate for me to progress faster. So I was really lucky to have [managing partner].","c":85,"n":5,"i":"balance","s":100},{"id":"Clara-001150-030","p":"Clara","t":"00:11:50","q":"Honestly, working full time. So working two days a week and studying full time was. That was the hardest part.","c":3,"n":4,"i":"work_content","s":62},{"id":"Clara-001156-031","p":"Clara","t":"00:11:56","q":"And we can touch on it, but you do a lot over time in the professional services firm, and you do a lot of overtime when you work two days a week even. And so I wasn't working two days a week. I was working more than that. Yeah. And the admin that is required, like e-learn trainings and compliance trainings and independence and risk trainings. And you do the same amount of that whether you work two days a week or five. So on top of the already pressure to meet a certain amount of billable hours in two days, you've also got an it feels like an exhausting amount of admin, which everyone has, but you've got a condensed amount of time to achieve it. So yeah, that was probably the hardest transition or the hardest part of doing that was.","c":31,"n":12,"i":"billables","s":38},{"id":"Clara-001244-032","p":"Clara","t":"00:12:44","q":"Balancing the admin. As well as trying to do a degree.","c":3,"n":4,"i":"work_content","s":38},{"id":"Clara-001306-033","p":"Clara","t":"00:13:06","q":"Leaving [big 4] was like a divorce. Leaving [big 4] was very, very challenging and I had a really amazing working relationship with [managing partner], who was the partner in charge of my team, and there was a lot of work that... I was a senior associate when I left, and I was working directly with him.","c":65,"n":0,"i":"big4","s":100},{"id":"Clara-001322-034","p":"Clara","t":"00:13:22","q":"Normally you have a manager or a director in between you and a partner, but because we had such a great working relationship, 90% probably of the work that I was doing, I was working with the Manila team who are offshore resource. They were doing a lot of the grunt work. I was doing a lot of the reviewing and analytical preparation and client... Client interaction, dealing with the client. And then I was passing it up to him and I would say for a senior associate, there was a huge amount of trust there between him and I.","c":3,"n":4,"i":"work_content","s":68},{"id":"Clara-001351-035","p":"Clara","t":"00:13:51","q":"And so yeah, going to see him was really tough, but it was incredible. It was one of the hardest weeks of my life, probably because I had these conversations with [names], the recruiters, and then I went and had two interviews.","c":16,"n":2,"i":"interview_process","s":76},{"id":"Clara-001406-036","p":"Clara","t":"00:14:06","q":"And then I was offered the job and I was like, do I want this job? This job feels like it's kind of just fallen in my lap. It wasn't advertised. I didn't go looking for it. It's literally come to me, which was an amazing moment.","c":0,"n":4,"i":"work_content","s":59},{"id":"Clara-001406-037","p":"Clara","t":"00:14:06","q":"But I had to go to [partner] and say, right, what do I want? Right. Moving overseas, finishing my C.A. there were so many factors to balance and we do want to go overseas, so.","c":2,"n":4,"i":"work_content","s":86},{"id":"Clara-001430-038","p":"Clara","t":"00:14:30","q":"When is that going to be? I didn't know. How is this going to implicate that I didn't know. So yeah, I just went to him with a really open mind and said basically, basically in tears and said, right, I've been offered this job. It feels like it smacked me in the forehead really.","c":10,"n":13,"i":"wellbeing","s":58},{"id":"Clara-001445-039","p":"Clara","t":"00:14:45","q":"[I said] \"What do you think?\" And he was amazing. Like billing week. The end of the month was always really stressful, getting client fees out and managing work balances and all of that. And so this was billing week, and I just had to say like, look, I need your help. I need your support to work out...what to do? What is the best thing for me?","c":10,"n":13,"i":"wellbeing","s":68},{"id":"Clara-001504-040","p":"Clara","t":"00:15:04","q":"And I said, I really need you to take off your [big 4] partner hat and be the mentor that you are to help me make this decision. And he gave... We had three, three hours each, or an hour... An hour on... I think I went to him on the Monday and the Tuesday, Wednesday and Thursday, we had an hour each day to discuss different things.","c":7,"n":0,"i":"big4","s":70},{"id":"Clara-001521-041","p":"Clara","t":"00:15:21","q":"He took me through a moment when he was ten years into his career at [big 4]. He's only ever worked at [big 4] from grad to partner, 27 years later. So that's all he knows. But he's had moments where he's been headhunted or asked to apply for jobs, and he took me through a pros and cons list, he wrote 17 years ago when he was ten years in, and I was only four years in, but ten years. And what he weighed up and what he what ended up being the ultimate decision for him. But we talked about having kids. He doesn't have children and he's got a partner now, but he didn't for a long time. And so he we had a very candid discussion basically, and it was hard.","c":7,"n":0,"i":"big4","s":53},{"id":"Clara-001600-042","p":"Clara","t":"00:16:00","q":"But once that was out of the way, I made my decision and I just had to tell him this is what I'm doing. And he was amazing. And not everyone or very few people have that experience.","c":99,"n":10,"i":"decision","s":100},{"id":"Clara-001611-043","p":"Clara","t":"00:16:11","q":"Very few. And I... We're still in touch on probably a weekly basis. Just checking in. He's great.","c":1,"n":4,"i":"work_content","s":80},{"id":"Clara-001617-044","p":"Clara","t":"00:16:17","q":"But I feel very fortunate because I know that that is I'm an outlier in that.","c":100,"n":14,"i":"privilege","s":100},{"id":"Clara-001628-045","p":"Clara","t":"00:16:28","q":"Yeah, it was tough.","c":9,"n":7,"i":"procedural","s":37},{"id":"Clara-001631-046","p":"Clara","t":"00:16:31","q":"I think a lot of people probably thought I was on the trajectory for manager, and it probably would have been midway through 2026 or the end of this year that I would have gone to manager. And then you have a portfolio of your own clients that you manage, and people probably thought that there was no chance I was going to leave and I didn't even know.","c":1,"n":4,"i":"work_content","s":92},{"id":"Clara-001649-047","p":"Clara","t":"00:16:49","q":"So I knew I would go overseas at some point, but they certainly didn't know that. [managing partner] didn't know that until I told him that I'm leaving. And I've got a way out going to Australia. And what?","c":1,"n":4,"i":"work_content","s":84},{"id":"Clara-001701-048","p":"Clara","t":"00:17:01","q":"What I do in the next in the time between now and when I go to Australia, how do I make the most of my career to set myself up the best over there? And he certainly had reasons why [big 4] would help me, and I certainly had reasons I thought why the management accounting role, or something else would help me. And we just discussed pros and cons.","c":7,"n":0,"i":"big4","s":87},{"id":"Clara-001717-049","p":"Clara","t":"00:17:17","q":"Yeah, but colleagues were shocked. Yeah, the team was very sad, bless them, because I obviously was very close to them having been to Manila. Yeah, yeah that's amazing.","c":0,"n":4,"i":"work_content","s":50},{"id":"Clara-001732-050","p":"Clara","t":"00:17:32","q":"Yeah, yeah. So obviously I was a very respected member, like, fortunately, of the private business team. And that came with its challenges. Right?","c":32,"n":11,"i":"status","s":0},{"id":"Clara-001744-051","p":"Clara","t":"00:17:44","q":"So it's a very I would say it's a very competitive environment. You're working in private business. It's not like working on an audit where you've got a $500,000 fee to that client. We're talking about $5000 to $10,000 for most of my clients, for annual compliance of financial statements and tax returns.","c":86,"n":15,"i":"rejection","s":100},{"id":"Clara-001801-052","p":"Clara","t":"00:18:01","q":"And the thing with professional services is some professional services are extremely value-add and high benefit to the client... Private business, which is preparing financial statements and tax returns and audit are both compliance right. Or they have a compliance element. Clients don't want to pay for that necessarily, but they have to. So it's a very different attitude talking to a client that you're dealing with on that versus someone in the mergers and acquisitions deals team, which you're about to make them a whole lot of money to sell their business. They want to pay you because they need you.","c":4,"n":6,"i":"pay","s":90},{"id":"Clara-001835-053","p":"Clara","t":"00:18:35","q":"And so because of that, it's very competitive on utilization and within a team. Like I said, it's very structured. You're at certain levels and you compete very heavily with your peers. And I think most people are in it for themselves. Don't get me wrong. There's cliques within certain social circles within a team.","c":36,"n":12,"i":"billables","s":18},{"id":"Clara-001858-054","p":"Clara","t":"00:18:58","q":"However I... How do I say this? My values do not align with that [competitive individual motivations]. I am very people focused. I want to see other people thrive and succeed. I would put my own success in terms of KPI targets behind, watching a team of young professionals come through beneath me and flourish because they've got the help and support they need.","c":28,"n":12,"i":"billables","s":77},{"id":"Clara-001921-055","p":"Clara","t":"00:19:21","q":"So when you've got competitiveness going on about billable targets of hours most people would give you two minutes or no help and say, \"I'll get you going and here's this\", and then they'll leave you to flounder. Whereas I would sit there for, I don't know...","c":37,"n":12,"i":"billables","s":100},{"id":"Clara-001938-056","p":"Clara","t":"00:19:38","q":"Time and time and time again, I would sit there with grads or people between a grad and me to make sure that they were set up for success. A) to help the client, B) to help them succeed, C) to make the managers task of review easier because they've got further along before they've had to ask a more expensive resource in a manager to help.","c":0,"n":4,"i":"work_content","s":94},{"id":"Clara-001956-057","p":"Clara","t":"00:19:56","q":"And there's some serious pros and cons of that.","c":66,"n":10,"i":"decision","s":0},{"id":"Clara-002000-058","p":"Clara","t":"00:20:00","q":"I became everyone's go to. All the managers were asking me for help. All the grads were asking me for help. And I honestly felt stuck between a rock and a hard place of. \"My values do not align with this place. And if this is how a professional services team is going to be run, this isn't for me.\" Eventually, this isn't for me. And whether that was then or whether that was when I went to [other country], potentially in 18 months time, that was a tough decision.","c":87,"n":16,"i":"values_fit","s":100},{"id":"Clara-002024-059","p":"Clara","t":"00:20:24","q":"But I had some very candid conversations with Nathan about how I felt like the mother hen.","c":26,"n":16,"i":"values_fit","s":57},{"id":"Clara-002028-060","p":"Clara","t":"00:20:28","q":"...Of the team, because I was the only one that was prepared to put my own success in KPI targets behind the careers of other young people in our team, and he understood that. But yeah, it's political. There's only so much he says and does to respond to that, if that makes sense.","c":36,"n":12,"i":"billables","s":0},{"id":"Clara-002046-061","p":"Clara","t":"00:20:46","q":"So that's pretty much what my pros and cons list came down to in terms of team dynamic and professional position within the team at [big 4].","c":7,"n":0,"i":"big4","s":73},{"id":"Clara-002056-062","p":"Clara","t":"00:20:56","q":"The other side of it was, yeah, I don't want to be a [big 4] partner, and after senior associate, there's only so much, so many skills you learn in a professional services firm. Once you get to that manager and above level, you're specializing in what [big 4] do based on [big 4] processes or other big four or whatever you work, the firm that you're in.","c":7,"n":0,"i":"big4","s":100},{"id":"Clara-002117-063","p":"Clara","t":"00:21:17","q":"And so yeah, the pros and cons list was I mean pay to leave. Be it felt like a fresh start and a, a reset to go into a new team where there's not heaps of juniors below you. You might be dealing with accounts receivable and accounts payable stuff. But they've probably been there. I don't know, ten, 15, 20 years. Yeah. And they just want help with a process, not a....","c":10,"n":13,"i":"wellbeing","s":55},{"id":"Clara-002145-064","p":"Clara","t":"00:21:45","q":"Or a theory or... Yeah. All of that. So, yeah, I mean, in the end, as you're probably hearing it, the decision made itself up. But there was a lot of judgment that went into, do I want to make this change now or do I want to make this change in 18 months? I was never going to stay there long term because of I don't want to be a [big 4] partner. Arguably, I would say I don't have the self restraint required to be a [big 4] partner, because you have to be able to put yourself and your own objectives above, above other people and their success.","c":7,"n":0,"i":"big4","s":60},{"id":"Clara-002214-065","p":"Clara","t":"00:22:14","q":"Say I can't do this.","c":0,"n":4,"i":"work_content","s":25},{"id":"Clara-002219-066","p":"Clara","t":"00:22:19","q":"You learn a lot about yourself in the professional services firm.","c":7,"n":0,"i":"big4","s":67},{"id":"Clara-002226-067","p":"Clara","t":"00:22:26","q":"I mean yeah it's just I think your values become clear.","c":2,"n":4,"i":"work_content","s":39},{"id":"Clara-002231-068","p":"Clara","t":"00:22:31","q":"In what you want and your success and your progression. And if you aren't prepared to put in the work and you aren't prepared to arguably put that aside, then you will get your career growth will be stunted, I would say.","c":27,"n":17,"i":"learning","s":86},{"id":"Clara-002246-069","p":"Clara","t":"00:22:46","q":"It's so competitive.","c":5,"n":7,"i":"procedural","s":27},{"id":"Clara-002257-070","p":"Clara","t":"00:22:57","q":"It's so clique-y","c":5,"n":7,"i":"procedural","s":20},{"id":"Clara-002259-071","p":"Clara","t":"00:22:59","q":"It's very destructive. And you know which clients are more profitable than others. And you know which clients are more you know, the clients you want to be on to make yourself look good. But everyone has to be... All those tax returns have to be prepared, regardless of the good ones and the bad.","c":67,"n":11,"i":"status","s":100},{"id":"Clara-002315-072","p":"Clara","t":"00:23:15","q":"Yeah. That's what I mean by it's political. Because, yeah... It depends on who's friends with the allocator, you know.","c":8,"n":7,"i":"procedural","s":67},{"id":"Clara-002338-073","p":"Clara","t":"00:23:38","q":"Completely different.","c":6,"n":7,"i":"procedural","s":28},{"id":"Clara-002340-074","p":"Clara","t":"00:23:40","q":"One small example is what I call the Sunday Scaries. So after lunch on a Sunday when I was in my old job, I would start going into an internal panic subconsciously about what I had to achieve by the following Friday. Right? So I start thinking, what was my utilisation this week? What have I not achieved? Even though I've worked 50 hours that I should have achieved, I've got to go into tomorrow morning and give my manager a list of the jobs I'm working on and where they're at. Have [office] done their part of the job to make me look either good or bad? What difficult conversations am I going to have to have this week about telling [office] to press harder than they're already pressing? I don't know. I just would go into this a bit of a spiral of and like [name] my partner, would just know that Sunday afternoons are shit! Literally.","c":28,"n":12,"i":"billables","s":15},{"id":"Clara-002439-075","p":"Clara","t":"00:24:39","q":"Because... You know, so I don't have any of that anymore. I don't do a... Part of it probably comes down to there's no time sheet in the management accounting.","c":2,"n":4,"i":"work_content","s":75},{"id":"Clara-002450-076","p":"Clara","t":"00:24:50","q":"So time sheeting was... That you needed to hit or you didn't \"need\" to do anything. You *should* have 80% billable hours out of 37.5 hours a week.","c":28,"n":12,"i":"billables","s":54},{"id":"Clara-002504-077","p":"Clara","t":"00:25:04","q":"Which arguably means that four days out of five are billable or six hours a day out of seven and a half available. But there is just so much admin that goes into a job at [big 4]. And arguably our charge out rates continue to grow it exponentially each year, more than inflation. And the fee only gets raised by say, let's say 5% year on year or none, depending on who the manager of director sending out the fee is. And so there's just never enough time to complete all the risk and independence admin, the onboarding, the liaising with IRD if something's wrong. And then you've got to put time down, which isn't going to get billed until next year. And then the person doing the fee next year, or the person doing the year end write offs of what balances go, what's less time. And you tell them and you're like... Yeah. And it ends up being a political discussion around whether that's billable or not.","c":36,"n":12,"i":"billables","s":45},{"id":"Clara-002603-078","p":"Clara","t":"00:26:03","q":"You just work over time and it just doesn't get put in time sheet to get, to keep up. And that's they call it \"eating time\" as the as the term. And I was probably a shocker for it. And part of that was, was that, that learning and development time of helping grads or, or the [location] team, it's technically not billable.","c":37,"n":12,"i":"billables","s":93},{"id":"Clara-002622-079","p":"Clara","t":"00:26:22","q":"So you're scrambling and you're working so hard to meet a billable target while trying to conform to [big 4] values which don't align with yours. It creates a very messy, challenging, off road.","c":31,"n":12,"i":"billables","s":62},{"id":"Clara-002637-080","p":"Clara","t":"00:26:37","q":"Yeah. So now I work 8.30 to 5. I'm about to bring that forward 7.30 to 4, but I just felt my team work... Most of my team start between 8 and 8.30, and while I was trying to learn what I was meant to be doing, it was just easier to work their hours. But I prefer to finish at four so I can go cycling or do whatever.","c":4,"n":6,"i":"pay","s":90},{"id":"Clara-002653-081","p":"Clara","t":"00:26:53","q":"And cycling is not, no fun in the mornings. Yeah. You want to go in the afternoon. And I don't work in the CBD. I work in [suburban] Business Park.","c":2,"n":4,"i":"work_content","s":68},{"id":"Clara-002701-082","p":"Clara","t":"00:27:01","q":"That's such a beautiful new office, but it's like you can drive there. You've got a car park. Do not underestimate, you know, being at uni... But do not underestimate the value of having a car park.","c":3,"n":4,"i":"work_content","s":38},{"id":"Clara-002710-083","p":"Clara","t":"00:27:10","q":"Being able to get yourself to work and start your day fresh, rather than thinking about is the bus going to be late or is it too cold to bike? Or is it pouring with rain? Or is someone going to... Yeah, someone took my wing mirror off. Hit it on a lime scooter parked on [name] Ave. Just like silly. Yeah.","c":1,"n":4,"i":"work_content","s":60},{"id":"Clara-002728-084","p":"Clara","t":"00:27:28","q":"That. Additional admin on top of it.","c":0,"n":4,"i":"work_content","s":19},{"id":"Clara-002733-085","p":"Clara","t":"00:27:33","q":"Yeah. So challenging. And arguably you're not paid the same as working out of a professional services firm. So that's also a factor.","c":7,"n":0,"i":"big4","s":80},{"id":"Clara-002747-086","p":"Clara","t":"00:27:47","q":"So I got paid a 30K pay rise to leave.","c":101,"n":6,"i":"pay","s":0},{"id":"Clara-002752-087","p":"Clara","t":"00:27:52","q":"Perspective. Right. That.","c":6,"n":7,"i":"procedural","s":33},{"id":"Clara-002755-088","p":"Clara","t":"00:27:55","q":"And I'm working arguably 20 to 30 hours a week less.","c":0,"n":4,"i":"work_content","s":44},{"id":"Clara-002805-089","p":"Clara","t":"00:28:05","q":"And we have a house and a mortgage.","c":33,"n":6,"i":"pay","s":0},{"id":"Clara-002808-090","p":"Clara","t":"00:28:08","q":"Not that we couldn't make it work before, because obviously we absolutely could, but it just provides you so much more financial freedom.","c":4,"n":6,"i":"pay","s":93},{"id":"Clara-002820-091","p":"Clara","t":"00:28:20","q":"Money on the things that matter rather than just the necessities.","c":4,"n":6,"i":"pay","s":43},{"id":"Clara-002833-092","p":"Clara","t":"00:28:33","q":"Different. Completely different.","c":5,"n":7,"i":"procedural","s":30},{"id":"Clara-002835-093","p":"Clara","t":"00:28:35","q":"You actually have time to invest in, if there's a problem or a question or something you don't know, you have got absolute free rein now to spend as many hours as you like, pretty much within reason, researching or asking or going to different people in the business to come up with a process on how something should happen or work. You're all technically working together for a common goal. Before, like I said, it was just really competitive. And yeah, even though I was considered really good at my job, there was all these issues around supporting learning, development. And the other side to that is not just grads, it's the people that are coming in as what we call lateral hires.","c":47,"n":15,"i":"rejection","s":100},{"id":"Clara-002915-094","p":"Clara","t":"00:29:15","q":"Who have, say, been into a commercial role rather than a professional services role straight up. So then they've come in at the same level as you or above you but...","c":1,"n":4,"i":"work_content","s":80},{"id":"Clara-002926-095","p":"Clara","t":"00:29:26","q":"Yeah. They [lateral hires] need [big 4] training. And when there's 100 different processes that don't talk to each other, you can't know that without being shown.","c":7,"n":0,"i":"big4","s":57},{"id":"Clara-002933-096","p":"Clara","t":"00:29:33","q":"And they've also they're also trying to hit a charge at a rate higher than yours. Mine, which was already a problem. And you're trying to help them. And there's just I do not think professional services firm handle lateral hires at all.","c":7,"n":0,"i":"big4","s":83},{"id":"Clara-002947-097","p":"Clara","t":"00:29:47","q":"A could write your book on that. That's. Yeah, that's a whole other thing. So I had a friend. Who... A mutual friend who had been at another big four, gone out into a commercial role and then come to [big 4]. And she really, really struggled and didn't even last 12 months. She left just after me.","c":65,"n":0,"i":"big4","s":25},{"id":"Clara-003005-098","p":"Clara","t":"00:30:05","q":"Because it was just, they don't.... And I saw so many lateral hires come and go within 12 months... They just don't have the processes to support it.","c":1,"n":4,"i":"work_content","s":68},{"id":"Clara-003015-099","p":"Clara","t":"00:30:15","q":"Absolutely crazy.","c":6,"n":7,"i":"procedural","s":33},{"id":"Clara-003026-100","p":"Clara","t":"00:30:26","q":"Easy, easy. So easy.","c":5,"n":7,"i":"procedural","s":30},{"id":"Clara-003034-101","p":"Clara","t":"00:30:34","q":"It was really hard. It was really like it was. Sorry. I say it was easy. It wasn'y easy. The challenging part of it, I guess, was I worked with lots of young people before who were my friends. And I still am friends with most of them. Yeah. And now I'm in a business where lots of people have been there 30 years.","c":22,"n":18,"i":"autonomy","s":65},{"id":"Clara-003052-102","p":"Clara","t":"00:30:52","q":"Typically. Or older men who know a lot about [product]. But the finance team, there's a there's a few of us that are young and ex-professional services, but other than that.","c":1,"n":4,"i":"work_content","s":80},{"id":"Clara-003102-103","p":"Clara","t":"00:31:02","q":"I'm not... You're not really friends. You're colleagues. But I still have so many friends from uni and RA'ing obviously. And [big 4]. That's not a problem, it's just a, it's just a shift.","c":7,"n":0,"i":"big4","s":63},{"id":"Clara-003133-104","p":"Clara","t":"00:31:33","q":"For helping people?","c":9,"n":7,"i":"procedural","s":32},{"id":"Clara-003137-105","p":"Clara","t":"00:31:37","q":"I think it is difficult, right. So I talk about businesses and people in HR, and when you finish uni, you either have to be an accountant grad or you have to be an HR grad. No, actually, Well... There's very little crossover.","c":1,"n":4,"i":"work_content","s":92},{"id":"Clara-003150-106","p":"Clara","t":"00:31:50","q":"I had a fascination for helping young people come through in that L&D lad element at [big 4], and now it's shifted to helping other people within the business understand their financial performance within their department.","c":7,"n":0,"i":"big4","s":63},{"id":"Clara-003203-107","p":"Clara","t":"00:32:03","q":"So whether that's used equipment, new equipment, rental equipment, to understand what a... Like there's very, I find very low financial acumen of my colleagues in these departments who are in management roles, who should understand, arguably, in my opinion, more than they do.","c":4,"n":6,"i":"pay","s":77},{"id":"Clara-003219-108","p":"Clara","t":"00:32:19","q":"So I've yeah, set up quite a few meetings and monthly meetings with people who are managing these departments to run through a [review] with me and go through what their month looks like. How, are they hitting budget? Are they not? Why is that not happening? Just to put a financial lens on things, because they're way too stuck in the operations that they don't think, in my opinion, enough about the financials. So yeah, we're working through that and I find that fascinating.","c":4,"n":6,"i":"pay","s":80},{"id":"Clara-003251-109","p":"Clara","t":"00:32:51","q":"Financial lens on what they're already doing.","c":4,"n":6,"i":"pay","s":40},{"id":"Clara-003252-110","p":"Clara","t":"00:32:52","q":"And I'm talking to 40 year old men. Not grads, which is great. It's just different. And they really appreciate it because I think so many accountants are introverts and just get stuck in the detail. And all they care about is [legal] standards and compliance. Whereas don't get me wrong, there's a certain amount of that that goes on, but I kind of compliment our team in a different way of saying, well, you guys have got all that stuff sorted. I'm going to focus on this. And they love that.","c":22,"n":18,"i":"autonomy","s":100},{"id":"Clara-003325-111","p":"Clara","t":"00:33:25","q":"Yeah. You know how I talk about this divorce meeting?","c":1,"n":4,"i":"work_content","s":20},{"id":"Clara-003329-112","p":"Clara","t":"00:33:29","q":"[the resignation meeting] felt like my job funeral, right? That's such a bizarre thing to say. But you hear all this incredible feedback, and, no, we don't want to lose you. And yes, we'll pay you more as a one off payment of bonus to keep you. And you're this... And you're amazing. This and you're that, and our clients love you and blah blah blah. But you don't hear any of that until you go to leave. You hear it in very small doses. But you go to leave, you hand in your resignation letter, and holy moly it all comes out of the woodwork.","c":20,"n":19,"i":"leaving","s":96},{"id":"Clara-003402-113","p":"Clara","t":"00:34:02","q":"Yeah. It took me a long time to digest everything that had been said and want to say to them \"Why did this not come earlier?\"","c":1,"n":4,"i":"work_content","s":76},{"id":"Clara-003412-114","p":"Clara","t":"00:34:12","q":"I think by the time I'd already... By the time we got to the end of those four days, I'd already made up my mind.","c":1,"n":4,"i":"work_content","s":92},{"id":"Clara-003419-115","p":"Clara","t":"00:34:19","q":"But I remember saying to [partner], you need to think about how you're like, we had such a great working... Lots of people were scared of him because he was pretty on the outside, pretty icy in terms of... I worked really hard to break through that ice to get to know the real [partner]. And I guess when you've been single for a long time, you don't have children. Yeah, that changes the way that you think and act. And honestly, being a [big 4] partner and being in that organization for 27 years, it makes you, I would imagine, pretty tunnel visioned.","c":7,"n":0,"i":"big4","s":60},{"id":"Clara-003446-116","p":"Clara","t":"00:34:46","q":"So yeah, I said to him, you need to factor this in going forward in your performance reviews, because we had eight weekly catch ups. And you didn't say this stuff to me. You just said, it's all going well. Keep doing what you're doing. But that's very different to the positive stuff that came out of the end.","c":1,"n":4,"i":"work_content","s":76},{"id":"Clara-003501-117","p":"Clara","t":"00:35:01","q":"When arguably it was too late.","c":3,"n":4,"i":"work_content","s":16},{"id":"Clara-003522-118","p":"Clara","t":"00:35:22","q":"I would say I had anxiety about work. That's what I mean. Yeah. I do not have any of that now. And I had a serious amount of tonsillitis.","c":68,"n":20,"i":"somatic","s":0},{"id":"Clara-003535-119","p":"Clara","t":"00:35:35","q":"And I just had another bout of it, to be honest. But one in the last five months compared to constantly. And I'm actually getting my tonsils out in September, so that will no longer be a problem.","c":48,"n":20,"i":"somatic","s":31},{"id":"Clara-003547-120","p":"Clara","t":"00:35:47","q":"I'm not looking forward to the recovery, but I'm looking forward.","c":1,"n":4,"i":"work_content","s":48},{"id":"Clara-003550-121","p":"Clara","t":"00:35:50","q":"Chris Thompson.","c":9,"n":7,"i":"procedural","s":37},{"id":"Clara-003559-122","p":"Clara","t":"00:35:59","q":"But, yeah, I'm really looking forward to it, but. Yeah. Yeah, totally.","c":3,"n":4,"i":"work_content","s":19},{"id":"Clara-003603-123","p":"Clara","t":"00:36:03","q":"You sacrifice everything to get those billable hours sorted. And you're so tired and exhausted and just drained. You're not tired. You're drained. You just don't go to the gym and you stop doing the things that you should be doing, like road cycling, because you're working all the time, or if you're not working, you're thinking about work. Whereas now I don't. I had to work from home for a few days last week to while we were moving offices, and I had never logged on to my computer at home in the prior four months to know if my computer even worked at home. Whereas I used to work every night.","c":28,"n":12,"i":"billables","s":100},{"id":"Clara-003638-124","p":"Clara","t":"00:36:38","q":"Yeah. No, totally. My friends would say... Totally different person.","c":0,"n":4,"i":"work_content","s":41},{"id":"Clara-003643-125","p":"Clara","t":"00:36:43","q":"Yeah. Like I didn't sleep. I did, yeah, but barely. I never slept properly. Oh, my God, I was. I was awake hourly or two hourly for three years. Because I was constantly anxious. Worse obviously on a Sunday. But I was constantly running at this heightened sense of stress all the time.","c":48,"n":20,"i":"somatic","s":100},{"id":"Clara-003707-126","p":"Clara","t":"00:37:07","q":"So I'm very glad that's over.","c":1,"n":4,"i":"work_content","s":0},{"id":"Clara-003712-127","p":"Clara","t":"00:37:12","q":"Monday. Friday, 830 to 5 or 830 till four.","c":3,"n":4,"i":"work_content","s":30},{"id":"Clara-003716-128","p":"Clara","t":"00:37:16","q":"They're pretty good on the Friday. I probably go cycling 2 or 3 nights a week after work, and my weekends are free to spend with my nephew, and we've just. We've finished all our house renos, but do stuff that we actually want to do. Go on holiday, do actual things.","c":3,"n":4,"i":"work_content","s":73},{"id":"Clara-003730-129","p":"Clara","t":"00:37:30","q":"You never knew if you went away on holiday whether you were going to have a deadline that was going to shift or move, or whether you were going to work to like classic, we're going to Australia next week. And I was still at [big 4] when I booked my flights and I booked them for Saturday, not for Good Friday, because I was like, what if I'm working till midnight on Thursday? I don't want to be at the airport at 4 a.m. on Friday. So we booked for Saturday and now I could have like technically.","c":7,"n":0,"i":"big4","s":60},{"id":"Clara-003754-130","p":"Clara","t":"00:37:54","q":"Could have gone on the Friday.","c":3,"n":4,"i":"work_content","s":22},{"id":"Clara-003757-131","p":"Clara","t":"00:37:57","q":"Crazy.","c":8,"n":7,"i":"procedural","s":25},{"id":"Clara-003800-132","p":"Clara","t":"00:38:00","q":"If you had sick leave or started to leave you, they would contact you. Yeah.","c":0,"n":4,"i":"work_content","s":69},{"id":"Clara-003806-133","p":"Clara","t":"00:38:06","q":"Never. Never. I've never once been.","c":2,"n":4,"i":"work_content","s":29},{"id":"Clara-003811-134","p":"Clara","t":"00:38:11","q":"That's totally different. It's just bizarre.","c":5,"n":7,"i":"procedural","s":40},{"id":"Clara-003853-135","p":"Clara","t":"00:38:53","q":"Hard question to answer.","c":5,"n":7,"i":"procedural","s":47},{"id":"Clara-003855-136","p":"Clara","t":"00:38:55","q":"No no no no no I mean I was a well probably I would say a well liked team member with... Yeah, I was performing, but that's because I did so much overtime and I guess the, the variance or the issue with that was I had to do all that overtime to compensate, to align with my values and support other people, and to work as a team when everyone else is working against that grain. By being team rather than self-oriented. Yeah. Yeah. That over time compensates for that.","c":26,"n":16,"i":"values_fit","s":100},{"id":"Clara-003943-137","p":"Clara","t":"00:39:43","q":"Honestly, I think at the moment I ask this all the time because I'm so focused on in my head still on utilization, even though it doesn't matter. It's not a thing anymore. Just they just want me to get to know the processes. And the computer system is so complicated at my work that now my questions are not accounting focused. Their process orientated.","c":31,"n":12,"i":"billables","s":100},{"id":"Clara-004000-138","p":"Clara","t":"00:40:00","q":"So yeah, it honestly, it's easy to be a high performer.","c":2,"n":4,"i":"work_content","s":32},{"id":"Clara-004005-139","p":"Clara","t":"00:40:05","q":"So do you feel that professional services mindset. That's why they hire.","c":0,"n":4,"i":"work_content","s":53},{"id":"Clara-004010-140","p":"Clara","t":"00:40:10","q":"Before. Because they know what they're getting and they know that they're getting people that are used to being on the timesheets, even though they're not. They're still conscious of it. And they, you know, they. Yeah. They say that people, they can tell who's bigger and who's not.","c":3,"n":4,"i":"work_content","s":73},{"id":"Clara-004033-141","p":"Clara","t":"00:40:33","q":"They're great. Yeah I mean there's yeah there's no issues with that whatsoever now.","c":2,"n":4,"i":"work_content","s":54},{"id":"Clara-004049-142","p":"Clara","t":"00:40:49","q":"They thought it was... I mean, they probably knew I was working at the time. I mean, I would probably say, I mean, there's the odd week where I would work 40 hours a week. Our contracts were for 37.5. Probably 50 to 55 average with or... Yeah... March would probably lift the average. 70. 80. I worked 90 to 100 hours a week. At least a [international office].","c":0,"n":4,"i":"work_content","s":66},{"id":"Clara-004119-143","p":"Clara","t":"00:41:19","q":"Yeah, that was mad.","c":9,"n":7,"i":"procedural","s":29},{"id":"Clara-004120-144","p":"Clara","t":"00:41:20","q":"7 a.m. to 2 a.m.. Constant.","c":2,"n":4,"i":"work_content","s":7},{"id":"Clara-004125-145","p":"Clara","t":"00:41:25","q":"And the ironic thing is, you don't put enough billable hours on your timesheet, and you get... They're watching you all the time, but you put 150% utilization in your timesheet, and no one says anything either. But no one says anything, but they say something if you're under.","c":36,"n":12,"i":"billables","s":100},{"id":"Clara-004141-146","p":"Clara","t":"00:41:41","q":"150% and another 40 hours of unbillable overtime for training in [international office]. Like just.","c":37,"n":12,"i":"billables","s":0},{"id":"Clara-004147-147","p":"Clara","t":"00:41:47","q":"That was a very extreme outlier though. Yeah. Over there.","c":100,"n":14,"i":"privilege","s":0},{"id":"Clara-004154-148","p":"Clara","t":"00:41:54","q":"Now I work at 8.30 till 5.","c":3,"n":4,"i":"work_content","s":27},{"id":"Clara-004219-149","p":"Clara","t":"00:42:19","q":"I wouldn't imagine that I'll go any higher than management accountant before I leave to go to Australia. I guess what I mean when I talk about that is do I want to continue to tunnel narrow-mindedly be a manager at [big 4], or do I want to be in a management accounting role in an organization doing budgeting and forecasting and monthly? The monthly stuff is kind of similar to what I was doing at [big 4], but budgeting, forecasting and working within a business unit to improve efficiencies is something I would not have ever got.","c":7,"n":0,"i":"big4","s":63},{"id":"Clara-004252-150","p":"Clara","t":"00:42:52","q":"Diversify my skill set yeah. And I would say that in depending on where we go in Australia, that is better suited for me than professional services experience, which is why I made the ultimate decision to leave.","c":20,"n":19,"i":"leaving","s":85},{"id":"Clara-004311-151","p":"Clara","t":"00:43:11","q":"I didn't.","c":6,"n":7,"i":"procedural","s":24},{"id":"Clara-004314-152","p":"Clara","t":"00:43:14","q":"You just do it on top.","c":3,"n":4,"i":"work_content","s":14},{"id":"Clara-004318-153","p":"Clara","t":"00:43:18","q":"You do get study leave. But yeah they contacted me while I was working on my study. Yeah. Just. Yeah.","c":1,"n":4,"i":"work_content","s":48},{"id":"Clara-004327-154","p":"Clara","t":"00:43:27","q":"Yeah. It was.","c":6,"n":7,"i":"procedural","s":17},{"id":"Clara-004335-155","p":"Clara","t":"00:43:35","q":"You don't have to. But... you should.","c":1,"n":4,"i":"work_content","s":8},{"id":"Clara-004345-156","p":"Clara","t":"00:43:45","q":"You don't. You don't have to. But 90% would. Yeah.","c":3,"n":4,"i":"work_content","s":19},{"id":"Clara-004359-157","p":"Clara","t":"00:43:59","q":"I think it'll, it'll really depend on where we go in Australia and how long we stay there for.","c":3,"n":4,"i":"work_content","s":65},{"id":"Clara-004403-158","p":"Clara","t":"00:44:03","q":"You have to continue to do CPD hours. Yeah. As part of CA.","c":3,"n":4,"i":"work_content","s":38},{"id":"Clara-004409-159","p":"Clara","t":"00:44:09","q":"I don't even know because I haven't finished yet. Yeah, you don't have to do it, because the courses I'm doing cover it, but it's like it's staggered. You have to do, like, say 120 hours in three years. With a minimum of 90 per year. Sorry, 30 per year.","c":1,"n":4,"i":"work_content","s":60},{"id":"Clara-004424-160","p":"Clara","t":"00:44:24","q":"And work provide time to do that.","c":1,"n":4,"i":"work_content","s":12},{"id":"Clara-004429-161","p":"Clara","t":"00:44:29","q":"It would have but you would have worked it.","c":2,"n":4,"i":"work_content","s":36},{"id":"Clara-004440-162","p":"Clara","t":"00:44:40","q":"I'm not doing one in term two. So I think it's September finishes term three.","c":1,"n":4,"i":"work_content","s":80},{"id":"Clara-004448-163","p":"Clara","t":"00:44:48","q":"So good.","c":5,"n":7,"i":"procedural","s":27},{"id":"Clara-004449-164","p":"Clara","t":"00:44:49","q":"That'd be really cool to see what that's like.","c":3,"n":4,"i":"work_content","s":38},{"id":"Clara-004502-165","p":"Clara","t":"00:45:02","q":"If I stay in this kind of role I'll go to be a finance manager. And then maybe a CFO. It just depends on how it goes. Alternatively, [partner] and I may start a building company. So potentially, if he starts, if we started building company, then that will look very different.","c":0,"n":4,"i":"work_content","s":78},{"id":"Clara-004518-166","p":"Clara","t":"00:45:18","q":"Yeah. It'll be more HR, payroll, budgeting, forecasting. I may... If we do that, I'll probably go and do some quantity surveying papers actually.","c":1,"n":4,"i":"work_content","s":72},{"id":"Clara-004530-167","p":"Clara","t":"00:45:30","q":"Yeah. Because that's a fundamental part of the company. So [partner] will probably... we'd probably do it together ironically. Yeah. He's he's doing a [org] supervisory course at the moment. He's a site manager. But I think if we go into a business, we'll do some Quantity Surveying stuff.","c":15,"n":9,"i":"mentor_good","s":84},{"id":"Clara-004548-168","p":"Clara","t":"00:45:48","q":"So we'll see how that looks. Depends on what tangent we take.","c":1,"n":4,"i":"work_content","s":52},{"id":"Clara-004553-169","p":"Clara","t":"00:45:53","q":"I don't know what it looks like yet.","c":0,"n":4,"i":"work_content","s":22},{"id":"Clara-004603-170","p":"Clara","t":"00:46:03","q":"I would say, yeah. I will go to Australia and get a job, probably in something like what I'm in now. There's definitely a chance to transfer. Yeah. To [partner] dealership. So maybe that.","c":2,"n":4,"i":"work_content","s":71},{"id":"Clara-004620-171","p":"Clara","t":"00:46:20","q":"Yeah. And I'm 24, so. Yeah, there's no rush, but I would say five years and then it'll be a total toss up of what we decide to do. Yeah. When we have children, whether we start the building company. Yeah. I don't know.","c":69,"n":21,"i":"aspiration","s":50},{"id":"Clara-004640-172","p":"Clara","t":"00:46:40","q":"So we'll.","c":6,"n":7,"i":"procedural","s":26},{"id":"Clara-004653-173","p":"Clara","t":"00:46:53","q":"Buckle up.","c":8,"n":7,"i":"procedural","s":31},{"id":"Clara-004702-174","p":"Clara","t":"00:47:02","q":"I'd say keep. Keep working hard. Keep prioritizing the things that matter. And probably. Yeah. Stick to stick to your guns. Your values are what matter. And that's ultimately why I ended up leaving [big 4], because I couldn't... I didn't like that juggling act of having to compromise on who I was for a corporate [company], that didn't sit right. And so keep going to the gym and don't prioritise utilization to the nth degree because it'll run you into the ground. You know like you've got to have you on the side as part of that process.","c":36,"n":12,"i":"billables","s":18},{"id":"Clara-004743-175","p":"Clara","t":"00:47:43","q":"I mean, I do have this conversation with people. I always say you need to want to be an accountant to study accounting. You need to know that this is what you want to do. Because the best, arguably, I would still tell you that the best start is in a big 4, you get so much client exposure, you get the biggest client issues out there. And that's what Professional Services is all about, solving the world's problems with, I guess, intelligent individuals who have expertise in the area. And I don't regret working for [big 4]. It shaped me into the professional that I am now. And I think you get you do get a huge amount out of it. It's just a hard graft. So yeah, if you're prepared to put in the work, go for it. But stick to it and know that for the next five or, your uni degree and 3 to 5 years afterwards, that's what you're doing. Then the world is your oyster. And that's why I got the job that I, arguably that's why I got the job I got, Because I've got the [big 4] badge.","c":117,"n":0,"i":"big4","s":50},{"id":"Clara-004854-176","p":"Clara","t":"00:48:54","q":"I don't think so. I think it's a hard transition. But it's... It's common. That's what people do. And I think the people that start in the big four and then go into a commercial role are well respected and well regarded. People... That's what people want.","c":7,"n":0,"i":"big4","s":70},{"id":"Theo-000121-001","p":"Theo","t":"00:01:21","q":"I'm a corporate commercial lawyer, what am I now, senior solicitor. Been at my current firm for just over one and a half years. Coming up two in July.","c":3,"n":4,"i":"work_content","s":92},{"id":"Theo-000137-002","p":"Theo","t":"00:01:37","q":"What do I like doing? I like my job.","c":0,"n":4,"i":"work_content","s":41},{"id":"Theo-000144-003","p":"Theo","t":"00:01:44","q":"I quite like doing transactional work as part of my role. Client interactions are good fun. Learning about businesses, learning about what they do. That's quite a cool and rewarding point, especially if you're selling or buying a business on behalf of your client.","c":4,"n":6,"i":"pay","s":73},{"id":"Theo-000206-004","p":"Theo","t":"00:02:06","q":"So yeah, I enjoy that aspect. Yeah.","c":2,"n":4,"i":"work_content","s":0},{"id":"Theo-000307-005","p":"Theo","t":"00:03:07","q":"Where did you want me to start?","c":2,"n":4,"i":"work_content","s":36},{"id":"Theo-000318-006","p":"Theo","t":"00:03:18","q":"Yeah. So first year, always had an interest in law and a very strong interest in commerce from school. And so when I went to uni was kind of natural to take a crack at first year law and to do accounting papers, which was the initial idea of a career. And so I started off doing a B.Com and an LLB, BCom in accounting and Tax. So yeah did first year didn't enjoy law overly well because first year is kind of just an introduction.","c":3,"n":4,"i":"work_content","s":54},{"id":"Theo-000357-007","p":"Theo","t":"00:03:57","q":"It's not really law. So I kind of wasn't sure and then got into second year and thought I'd give it another year and see what happens. So I did, and I started to enjoy it more.","c":0,"n":4,"i":"work_content","s":81},{"id":"Theo-000421-008","p":"Theo","t":"00:04:21","q":"Yeah. Third year. Yeah. So you do sort of three, 3 to 4 compulsory four years, and then you'll do the extra two in the third year. Yeah. So I was starting to enjoy it more. So I started doing that and then yeah I guess third year started to take over more and realise that that was probably more what I was interested in. And started to do papers I enjoyed more than compulsories.","c":0,"n":4,"i":"work_content","s":56},{"id":"Theo-000449-009","p":"Theo","t":"00:04:49","q":"So kept going through. Ended up prioritizing the law degree. To finish that earlier. So I finished that at the end of 2018. So at the end of 2018 I started an internship at Deloitte.","c":49,"n":22,"i":"drift","s":100},{"id":"Theo-000518-010","p":"Theo","t":"00:05:18","q":"Yeah. So I worked in the tax team. So it's a bit of both, but primarily more accounting side. But then started into... Yeah. Finished off my... I sort of had a half year to go, but I ended up starting early as a graduate in 2019. Sort of part time for the rest of my commerce degree. By working full time and then doing papers over the top of it.","c":50,"n":23,"i":"transition","s":100},{"id":"Theo-000543-011","p":"Theo","t":"00:05:43","q":"It was interesting. It was full on. It wasn't too bad because I don't think we were overly busy.","c":0,"n":4,"i":"work_content","s":78},{"id":"Theo-000552-012","p":"Theo","t":"00:05:52","q":"But we also had like an internal tax paper that we were doing. So I joined the CAANZ module that they were doing.","c":1,"n":4,"i":"work_content","s":64},{"id":"Theo-000601-013","p":"Theo","t":"00:06:01","q":"So I joined that. I had to do that as part of working in tax. And so did that, finished off Commerce graduated at the end of 2019 with my B.Com. And then just kept working.","c":51,"n":23,"i":"transition","s":83},{"id":"Theo-000631-014","p":"Theo","t":"00:06:31","q":"It's kind of funny because I went to a careers fair, so in 2017.","c":0,"n":4,"i":"work_content","s":56},{"id":"Theo-000640-015","p":"Theo","t":"00:06:40","q":"Yeah, one of the [university] ones. It was either 2017... must of been 2017. And I was meant to go and listen to someone different speak, was meant to listen to a prosecutor speak, because I was quite interested in criminal law.","c":12,"n":19,"i":"leaving","s":67},{"id":"Theo-000655-016","p":"Theo","t":"00:06:55","q":"And I missed him because I was talking to someone from [big 4].","c":7,"n":0,"i":"big4","s":47},{"id":"Theo-000700-017","p":"Theo","t":"00:07:00","q":"So very engaging, and we're having a good yarn. We're just sort of... I just lost track of time and... And I had a friend who worked at Deloitte as an intern the year before that, so he had just been like he said. \"Yeah, it was really cool\". So he sort of recommended that I give it a crack. And then... Yeah, got a job interview, got through, and then was an intern over 2017-18.","c":21,"n":2,"i":"interview_process","s":44},{"id":"Theo-000729-018","p":"Theo","t":"00:07:29","q":"No sorry 2018-19.","c":6,"n":7,"i":"procedural","s":41},{"id":"Theo-000754-019","p":"Theo","t":"00:07:54","q":"I guess interest. Yeah that was probably the biggest thing. I was interested in those topics for commerce... Probably more good for applications rather than [interest].","c":5,"n":7,"i":"procedural","s":93},{"id":"Theo-000811-020","p":"Theo","t":"00:08:11","q":"Well, yeah, I was usually... I was pretty good at accounting in high school. And that kind of like just kept going and then... Yeah once I sort of started at uni and realized that accounting wasn't really what it was, I then yeah, kind of prioritised law a bit more than that. But yeah.","c":3,"n":4,"i":"work_content","s":54},{"id":"Theo-000837-021","p":"Theo","t":"00:08:37","q":"So I would say definitely interest of law. I have a family member who's like a police. So law and order has always been an interesting topic for me. So it's nice to do something that was in the family line.","c":3,"n":4,"i":"work_content","s":57},{"id":"Theo-000916-022","p":"Theo","t":"00:09:16","q":"Probably evolved. But I mean, like, I remember wanting to be a cop when I was a kid. You know, every kid probably has that dream of wanting to be a cop or something like that.","c":2,"n":4,"i":"work_content","s":61},{"id":"Theo-000927-023","p":"Theo","t":"00:09:27","q":"I wasn't the only one. And yeah, by the end of it, I realized that it wasn't really for me, but I guess I always wanted... I was always interested in that side of things. But... It was always interesting.","c":0,"n":4,"i":"work_content","s":72},{"id":"Theo-000943-024","p":"Theo","t":"00:09:43","q":"So I guess that kind of kind of drove a wee bit about what I studied and why I stuck with it, but yeah.","c":2,"n":4,"i":"work_content","s":46},{"id":"Theo-001016-025","p":"Theo","t":"00:10:16","q":"It's definitely a change.","c":6,"n":7,"i":"procedural","s":37},{"id":"Theo-001020-026","p":"Theo","t":"00:10:20","q":"I guess uni... And we sort of talk about it with students now because we're going through a recruitment process [for grads]. You sort of talk about like, uni is not seen as easy as. it's by no means easy, but the time commitment and how much effort you put in at certain points. It's very varied. So you know, I probably wasn't an ideal student and I wasn't a gold standard student by any means. But you know, you would particularly amp up your work in certain times.","c":16,"n":2,"i":"interview_process","s":71},{"id":"Theo-001057-027","p":"Theo","t":"00:10:57","q":"Yeah. Or you had a test or you had something that you needed to study for or needed to put effort in. And the rest of the time you were kind of just coasting.","c":3,"n":4,"i":"work_content","s":43},{"id":"Theo-001108-028","p":"Theo","t":"00:11:08","q":"And you could sit at home and pretend to watch a lecture.","c":1,"n":4,"i":"work_content","s":36},{"id":"Theo-001113-029","p":"Theo","t":"00:11:13","q":"Whereas with work you're you were there at 830 and you're on for the day.","c":1,"n":4,"i":"work_content","s":72},{"id":"Theo-001118-030","p":"Theo","t":"00:11:18","q":"It's definitely an adjustment. And I remember coming off the first week, and our guys will talk to that as well. When you have your first week in a full time job, you feel like you've done a lot of teaching, a lot of reading, a lot of I\\interacting with people. It's mentally and physically exhausting.","c":68,"n":20,"i":"somatic","s":100},{"id":"Theo-001145-031","p":"Theo","t":"00:11:45","q":"So when you kind of think about, oh, I didn't really do anything. You kind of realize, oh, actually, I had to learn a whole bunch of stuff. I had to learn how to do a timesheet. I had to learn how to use my emails. I'd never had to use outlook before.","c":4,"n":6,"i":"pay","s":63},{"id":"Theo-001203-032","p":"Theo","t":"00:12:03","q":"Yeah, exactly. So it's all those kind of facets that are like, they introduce you to that corporate world.","c":3,"n":4,"i":"work_content","s":32},{"id":"Theo-001210-033","p":"Theo","t":"00:12:10","q":"So I think that was the biggest adjustment for me.","c":3,"n":4,"i":"work_content","s":27},{"id":"Theo-001232-034","p":"Theo","t":"00:12:32","q":"Senior consultant.","c":8,"n":7,"i":"procedural","s":31},{"id":"Theo-001240-035","p":"Theo","t":"00:12:40","q":"Yeah. So I guess as a background, I sort of thought a few years ago that I wanted to go into law. Always wanted to use that degree but wasn't particularly using it to its fullest extent when I was at [big 4]. So I thought, well, if I'm going to go, I'm starting to get too senior now that, the gap is too big. Not just pay but also learning curve and everything else. You get too senior and it's harder to make that move. So I sort of started putting feelers out and it took a wee bit of time. But eventually, about four and a half years into [big 4], I found a new role to go to. But yeah. Is that alright?","c":7,"n":0,"i":"big4","s":47},{"id":"Theo-001346-036","p":"Theo","t":"00:13:46","q":"At [big 4]... You know, the firms sort of talk about the kind of structure. And they have a plan for everyone. And you can sort of see that mapped out at any firm you kind go to. Usually if you can't see it you shouldn't be there. And [big 4] obviously has the thing where you can see each step and you know what it looks like to partner.","c":7,"n":0,"i":"big4","s":37},{"id":"Theo-001410-037","p":"Theo","t":"00:14:10","q":"It's quite it's quite formal. You know roughly what that timeline looks like. But yeah, I sort of figured well, if I don't go now, it's not going to happen. I'm going to get stuck down that [path].","c":24,"n":19,"i":"leaving","s":68},{"id":"Theo-001428-038","p":"Theo","t":"00:14:28","q":"Yeah. And it's just going to get harder and harder to move when I want to. And so it's like it has to be now.","c":1,"n":4,"i":"work_content","s":60},{"id":"Theo-001443-039","p":"Theo","t":"00:14:43","q":"Yeah. So I was like, well, now's a good time to do it. Like my finances aren't that bad and I can I can afford to take a pay cut. And I'm willing to do that, and willing to like, put in the time and effort to upskill again. I recognize that a lot of my skills are transferable. I know how to talk to a client and I know how to send an email. I can do all that stuff.","c":33,"n":6,"i":"pay","s":100},{"id":"Theo-001507-040","p":"Theo","t":"00:15:07","q":"You can take your soft skills across. But you can't necessarily take the [big 4 topics].","c":7,"n":0,"i":"big4","s":57},{"id":"Theo-001513-041","p":"Theo","t":"00:15:13","q":"And, you know, sometimes my old work comes in handy once in a while, but, yeah, predominantly. Like, it's been a year and a half or so of learning entirely.","c":4,"n":6,"i":"pay","s":40},{"id":"Theo-001527-042","p":"Theo","t":"00:15:27","q":"I had already done it, did it at [big 4]","c":7,"n":0,"i":"big4","s":27},{"id":"Theo-001549-043","p":"Theo","t":"00:15:49","q":"The biggest reason for me wanting to leave was not seeing a career in what I was doing. So I didn't want... I kind of recognized that I didn't want to be doing what I was doing for the rest of my life.","c":118,"n":24,"i":"health_change","s":50},{"id":"Theo-001603-044","p":"Theo","t":"00:16:03","q":"Yeah, like I didn't... I didn't see that as my future career prospect. And that was kind of like wasting time.","c":69,"n":21,"i":"aspiration","s":25},{"id":"Theo-001617-045","p":"Theo","t":"00:16:17","q":"Yeah. I wasn't overly enjoying the work. Like there were aspects of it that I really loved, some of the consultancy work, some of the work that I was doing.","c":0,"n":4,"i":"work_content","s":66},{"id":"Theo-001629-046","p":"Theo","t":"00:16:29","q":"Yeah. And, like, I had specific facets of that I liked, but it was the monotonous stuff that came around every year that we knew would come around every year, and you kind of just went from preparing something to reviewing it.","c":38,"n":18,"i":"autonomy","s":23},{"id":"Theo-001645-047","p":"Theo","t":"00:16:45","q":"So there wasn't there wasn't much by way of.... I wanted to come into work every day and do something completely different.","c":2,"n":4,"i":"work_content","s":86},{"id":"Theo-001656-048","p":"Theo","t":"00:16:56","q":"Yeah. So that was kind of another interest. So I kind of another reason why I felt I needed something different.","c":0,"n":4,"i":"work_content","s":62},{"id":"Theo-001738-049","p":"Theo","t":"00:17:38","q":"I'm kind of at the level I was at when I left [big 4]. Same title. Very similar roles.","c":65,"n":0,"i":"big4","s":0},{"id":"Theo-001748-050","p":"Theo","t":"00:17:48","q":"But obviously a completely different sphere.","c":0,"n":4,"i":"work_content","s":19},{"id":"Theo-001752-051","p":"Theo","t":"00:17:52","q":"And it feels more rewarding now. It's not necessarily like you are rewarded with more work, but more you have more confidence and more ability to do work. There's probably more trust in you from partners.","c":52,"n":25,"i":"confidence","s":100},{"id":"Theo-001812-052","p":"Theo","t":"00:18:12","q":"And run a file. Yeah. Which at [big 4] it takes a while for that confidence to be built from managers to their junior staff.","c":7,"n":0,"i":"big4","s":43},{"id":"Theo-001827-053","p":"Theo","t":"00:18:27","q":"I think it's the process and structure. It is What it is.","c":1,"n":4,"i":"work_content","s":56},{"id":"Theo-001833-054","p":"Theo","t":"00:18:33","q":"Yeah, well, they've just got very firm processes. Like, I look at the way that my old team used to operate when I was to work compared to now. The team was a lot bigger. Like, double the size, at least.","c":3,"n":4,"i":"work_content","s":51},{"id":"Theo-001848-055","p":"Theo","t":"00:18:48","q":"We had another layer of managers sitting up between you and your partner, and probably 85-90% of your work was with a manager rather than a partner. Now it's the other way around. I sort of 85-90% with my supervising partner or another partner. Then I do working for a senior associate or a special counsel.","c":10,"n":13,"i":"wellbeing","s":74},{"id":"Theo-001915-056","p":"Theo","t":"00:19:15","q":"I find tha
