t process more enjoyable.","c":2,"n":4,"i":"work_content","s":29},{"id":"Theo-001918-057","p":"Theo","t":"00:19:18","q":"Sometimes it is nice to have a fallback where you have a manager over here or something. But I think you get more learning out of it because you're adapting your work to what the end result needs to look like. Rather than going through... You preparing something how you think, and then a manager tweaking that to how they think and then it going to the partner and it being changed again.","c":4,"n":6,"i":"pay","s":77},{"id":"Theo-001940-058","p":"Theo","t":"00:19:40","q":"So quite often... I quite like where we're... I'm purely interacting with my partner, and we're working together more collaboratively. Rather than just seeing the end product go out and going like, oh, that looks way different, and wondering like why did that happen.","c":20,"n":19,"i":"leaving","s":59},{"id":"Theo-001957-059","p":"Theo","t":"00:19:57","q":"I'd say so.","c":9,"n":7,"i":"procedural","s":39},{"id":"Theo-002003-060","p":"Theo","t":"00:20:03","q":"Yeah it was little bit like that, and that does come with firm size, like the kind of. \"Oh, this is how we've always done it\", internally as well.","c":3,"n":4,"i":"work_content","s":41},{"id":"Theo-002025-061","p":"Theo","t":"00:20:25","q":"I think there's still similarities, and then, the partner still wants the best work product to go out. So if that needs a hundred changes or needs three, it doesn't matter it gets done. But it's kind of more interesting to see that thinking going on... sitting there with my partner going, yeah, here's why I changed this and this and this. And I just wanted this to read a little bit better. Or be a little bit more clearer. And I'm like, that's cool. I can bank that... Think about that when I go to draft a spar next time, or draft a memo.","c":3,"n":4,"i":"work_content","s":62},{"id":"Theo-002121-062","p":"Theo","t":"00:21:21","q":"Usually not.","c":5,"n":7,"i":"procedural","s":23},{"id":"Theo-002122-063","p":"Theo","t":"00:21:22","q":"More like you'll pick up a file you're being the junior on it, and working with a partner. Rather than there being you and someone else working on it.","c":3,"n":4,"i":"work_content","s":54},{"id":"Theo-002142-064","p":"Theo","t":"00:21:42","q":"No, I don't think so. Not that I can remember. We usually were quite like, segmented out. And we just did the work. And you would pick up other people's client files if need be. Most of the time it was doing the work.","c":24,"n":19,"i":"leaving","s":95},{"id":"Theo-002218-065","p":"Theo","t":"00:22:18","q":"Yeah. Look, there are times where you're certainly stressed. Yeah, it's just a natural piece.","c":10,"n":13,"i":"wellbeing","s":58},{"id":"Theo-002230-066","p":"Theo","t":"00:22:30","q":"Oh yeah. Transactional work like and the work that needs to get done. and it just needs... You just need to sit down and do it, so stress. Yes.","c":10,"n":13,"i":"wellbeing","s":74},{"id":"Theo-002246-067","p":"Theo","t":"00:22:46","q":"Yeah. It sort of depends on the job, like, my workload wasn't massively high. It was just a byproduct of maybe how much work was available.","c":2,"n":4,"i":"work_content","s":57},{"id":"Theo-002257-068","p":"Theo","t":"00:22:57","q":"But now it's usually quite busy. So it's enough to keep you occupied as you move through tasks.","c":20,"n":19,"i":"leaving","s":67},{"id":"Theo-002308-069","p":"Theo","t":"00:23:08","q":"Yeah, you're a bit more engaged, I guess. But, yeah, I still enjoyed the work at [big 4].","c":7,"n":0,"i":"big4","s":40},{"id":"Theo-002342-070","p":"Theo","t":"00:23:42","q":"I don't think so, other than a few more grey hairs.","c":2,"n":4,"i":"work_content","s":54},{"id":"Theo-002346-071","p":"Theo","t":"00:23:46","q":"It's pretty consistent, you sort of like learn to manage things, and some people are a bit better at it than others. In terms of how you react to that pressure.","c":4,"n":6,"i":"pay","s":60},{"id":"Theo-002410-072","p":"Theo","t":"00:24:10","q":"My supervising partner is very, very good. Very happy to have a chat and things like that. And everyone sort of understands that we work hard and that sometimes you can burn out a wee bit and just kind of need to chill.","c":10,"n":13,"i":"wellbeing","s":65},{"id":"Theo-002436-073","p":"Theo","t":"00:24:36","q":"Yeah. And I've never felt... Yeah. Like, I don't I don't think I've left the office later in either job later than 10:00. So that's just me personally.","c":2,"n":4,"i":"work_content","s":68},{"id":"Theo-002449-074","p":"Theo","t":"00:24:49","q":"Like it's funny to say, but, you know, the work we do isn't life and death it's not something that if you leave it tonight and pick it up in the morning. Yeah, so as much as you want to get that work done, sometimes you just have to go. Go and do something else.","c":3,"n":4,"i":"work_content","s":51},{"id":"Theo-002515-075","p":"Theo","t":"00:25:15","q":"No. It was just if I had a deadline. Filing deadlines are what they are and you can't move them.","c":0,"n":4,"i":"work_content","s":69},{"id":"Theo-002525-076","p":"Theo","t":"00:25:25","q":"Yeah. At (current firm) it's just transactions usually.","c":9,"n":7,"i":"procedural","s":47},{"id":"Theo-002529-077","p":"Theo","t":"00:25:29","q":"It's not a regular thing.","c":1,"n":4,"i":"work_content","s":4},{"id":"Theo-002543-078","p":"Theo","t":"00:25:43","q":"Yeah, and I think everyone sort of knows that and accepts it. And if anything, a lot of people are prepared for something way worse.","c":0,"n":4,"i":"work_content","s":56},{"id":"Theo-002550-079","p":"Theo","t":"00:25:50","q":"And to be honest, I was probably pleasantly surprised when I first started you know, and we do hear stories about.... Some of our, like, fellow grads in audit were being burnt pretty hard. Just because of the nature of the work that they do and the timeframes that they work to. But they kind of would have a few busy months of audit season and they'd relax for the rest. So its peaks and troughs.","c":1,"n":4,"i":"work_content","s":60},{"id":"Theo-002637-080","p":"Theo","t":"00:26:37","q":"I wouldn't say I was a hard worker.","c":2,"n":4,"i":"work_content","s":39},{"id":"Theo-002641-081","p":"Theo","t":"00:26:41","q":"A little bit, yeah, but it wasn't like a come naturally and get excellences. It was like a come naturally and pass. And put in a bit of effort and ah suddenly it's a merit. And it's probably not a great habit to have, and I wouldn't endorse it.","c":0,"n":4,"i":"work_content","s":50},{"id":"Theo-002705-082","p":"Theo","t":"00:27:05","q":"I fully recognize if I went back to uni now. And it comes with time. You know how to play the game at uni. But if I was starting my time again. Yeah, a bit more effort. Yeah, maybe. But I wouldn't change my career path.","c":2,"n":4,"i":"work_content","s":75},{"id":"Theo-002801-083","p":"Theo","t":"00:28:01","q":"Well, we have sort of regular feedback. So every six months a year, feedback on how you're sort of going and how, you know, you get indicative feedback from partners...","c":0,"n":4,"i":"work_content","s":53},{"id":"Theo-002820-084","p":"Theo","t":"00:28:20","q":"Yeah. Yeah. For me, like, if I'm able to cycle through tasks and I feel good about doing each one... I guess it's a level of productivity and, it sort of lends itself. And I probably got a bad habit from [big 4] and carrying over that... you worked a job until you felt it was 100%. But... And that's not to say that it's not the case at [current firm]. It is. But the standard might be a little bit different. So, you know, I might I mean, I'm guilty of trying to catch myself working a job a little bit longer than I probably should do just to feel like I'm accomplishing what I need to do.","c":36,"n":12,"i":"billables","s":9},{"id":"Theo-002917-085","p":"Theo","t":"00:29:17","q":"I mean, it's just like yeah, you trying to do as much as you can possible. And that's the same thing. Same thing anywhere, but it might be that, you know, you need to recognize where your knowledge or your ability stops. And where someone else's start.","c":0,"n":4,"i":"work_content","s":41},{"id":"Theo-002943-086","p":"Theo","t":"00:29:43","q":"There was always, you have your billable hours. There's not a KPI on how much work you put in. It's just trying to meet your billable hours targets. But in the end, it's sort of something you can't control.","c":28,"n":12,"i":"billables","s":31},{"id":"Theo-003000-087","p":"Theo","t":"00:30:00","q":"You get handed work.","c":5,"n":7,"i":"procedural","s":33},{"id":"Theo-003002-088","p":"Theo","t":"00:30:02","q":"You do it to the best of your ability.","c":3,"n":4,"i":"work_content","s":24},{"id":"Theo-003012-089","p":"Theo","t":"00:30:12","q":"Yeah, yeah. Managers would try to do that and say, oh, you know, I'd probably expect to do that. It would take an hour or whatever. And you'd try to do that. Yeah. But sometimes you'd go, there's more work here than.","c":0,"n":4,"i":"work_content","s":47},{"id":"Theo-003024-090","p":"Theo","t":"00:30:24","q":"And it was sort of up to you to communicate that. Yeah. So what happened a lot of times.","c":5,"n":7,"i":"procedural","s":70},{"id":"Theo-003032-091","p":"Theo","t":"00:30:32","q":"I'm not a great communicator. That's one of my weakness. But yeah, like, if you sort of said a lot of the time I was coming back at the end of it and it took me longer. Yeah, that's my problem. Proactiveness. But, yeah.","c":2,"n":4,"i":"work_content","s":54},{"id":"Theo-003057-092","p":"Theo","t":"00:30:57","q":"Or everyone gets a bit nervous when you're kind of like, your work's being judged.","c":3,"n":4,"i":"work_content","s":43},{"id":"Theo-003105-093","p":"Theo","t":"00:31:05","q":"Like there's still in any job. There's an expectation that you don't really know what you're doing until you do. And then probably our partners are probably a little bit better now. And knowing that you don't know everything and they don't know everything.","c":0,"n":4,"i":"work_content","s":78},{"id":"Theo-003144-094","p":"Theo","t":"00:31:44","q":"Yeah, there's sort of benchmark.","c":5,"n":7,"i":"procedural","s":23},{"id":"Theo-003147-095","p":"Theo","t":"00:31:47","q":"Ours target. So it's probably a lot harsher on our sites. It's much of a metric.","c":0,"n":4,"i":"work_content","s":69},{"id":"Theo-003159-096","p":"Theo","t":"00:31:59","q":"What else do you do that adds into that? Yeah.","c":3,"n":4,"i":"work_content","s":46},{"id":"Theo-003204-097","p":"Theo","t":"00:32:04","q":"Not to say.","c":9,"n":7,"i":"procedural","s":29},{"id":"Theo-003205-098","p":"Theo","t":"00:32:05","q":"Recognize you doing other stuff, coming up with gradients and stuff. But yeah, I don't really know how your work is judged, but it kind of goes out for feedback.","c":1,"n":4,"i":"work_content","s":60},{"id":"Theo-003221-099","p":"Theo","t":"00:32:21","q":"There's like a set list of… you're given a set list of stuff that like, what does this look like?","c":1,"n":4,"i":"work_content","s":48},{"id":"Theo-003230-100","p":"Theo","t":"00:32:30","q":"Do they do you do this? Do you?","c":2,"n":4,"i":"work_content","s":25},{"id":"Theo-003234-101","p":"Theo","t":"00:32:34","q":"So there is like a guideline. It's probably not overly well publicized.","c":2,"n":4,"i":"work_content","s":39},{"id":"Theo-003240-102","p":"Theo","t":"00:32:40","q":"But.","c":5,"n":7,"i":"procedural","s":3},{"id":"Theo-003246-103","p":"Theo","t":"00:32:46","q":"Yeah. And.","c":8,"n":7,"i":"procedural","s":11},{"id":"Theo-003251-104","p":"Theo","t":"00:32:51","q":"Or some of the time when I'd have, like, a catch up with my, like, my coach.","c":5,"n":7,"i":"procedural","s":90},{"id":"Theo-003258-105","p":"Theo","t":"00:32:58","q":"It would be like, one of the first things I'd come to would be like, your target wasn't. I think That it's just priority.","c":1,"n":4,"i":"work_content","s":60},{"id":"Theo-003330-106","p":"Theo","t":"00:33:30","q":"In terms of.","c":5,"n":7,"i":"procedural","s":33},{"id":"Theo-003336-107","p":"Theo","t":"00:33:36","q":"Contracted to get 40 and we'll do 40. The number of billables depends, but I'm always at work for 830 to 530 most of the time. A little bit later but usually around the 530 or 6 mark. So it's probably. Yeah, I think when you really record it in your timesheet, it's like probably around 40 hours. But yeah, that's a piece of something.","c":37,"n":12,"i":"billables","s":50},{"id":"Theo-003407-108","p":"Theo","t":"00:34:07","q":"Try to make sure they take notes. Yeah. I've never really been one for eating at my desk. You're fixing a day away.","c":2,"n":4,"i":"work_content","s":82},{"id":"Theo-003419-109","p":"Theo","t":"00:34:19","q":"Yeah. I don't like doing that.","c":8,"n":7,"i":"procedural","s":25},{"id":"Theo-003430-110","p":"Theo","t":"00:34:30","q":"A, there's nothing like it's not often said, but like I personally, my personal thing is I'm not leaving the office at 530. Like I'll stay a little bit longer just to not have that perception that you leave. Oh, okay. But that's just personal.","c":2,"n":4,"i":"work_content","s":71},{"id":"Theo-003446-111","p":"Theo","t":"00:34:46","q":"There isn't a hard and fast rule that you shouldn't leave at five.","c":3,"n":4,"i":"work_content","s":46},{"id":"Theo-003450-112","p":"Theo","t":"00:34:50","q":"Like a lot of people, if you've got something to go to you. Yeah, yeah. And I certainly have done that.","c":2,"n":4,"i":"work_content","s":61},{"id":"Theo-003505-113","p":"Theo","t":"00:35:05","q":"And a little bit of feedback from door. Oh yeah as well.","c":0,"n":4,"i":"work_content","s":41},{"id":"Theo-003511-114","p":"Theo","t":"00:35:11","q":"Yeah. Like it's strange because you kind of go well I'm here if I've got no work to do, why can I not go home?","c":3,"n":4,"i":"work_content","s":43},{"id":"Theo-003520-115","p":"Theo","t":"00:35:20","q":"Yeah. It's just the like, suggestion of perception.","c":9,"n":7,"i":"procedural","s":39},{"id":"Theo-003525-116","p":"Theo","t":"00:35:25","q":"Yeah, or like going up to people. Most people don't. So it's kind of like.","c":3,"n":4,"i":"work_content","s":38},{"id":"Theo-003534-117","p":"Theo","t":"00:35:34","q":"A little bit. Like I still try. Yeah.","c":6,"n":7,"i":"procedural","s":35},{"id":"Theo-003542-118","p":"Theo","t":"00:35:42","q":"But in the end, like, you're growing up.","c":27,"n":17,"i":"learning","s":0},{"id":"Theo-003545-119","p":"Theo","t":"00:35:45","q":"You decide the decision on how you work and if you've got something inside.","c":66,"n":10,"i":"decision","s":43},{"id":"Theo-003551-120","p":"Theo","t":"00:35:51","q":"But most of the time I sort of think, well, I can probably pick it up.","c":3,"n":4,"i":"work_content","s":54},{"id":"Theo-003558-121","p":"Theo","t":"00:35:58","q":"It's about how you set your own boundaries and on what you know... Some people just like to be in the office and be involved. And that was maybe the perception of [big 4] was like, you're there at 630 or 730, you're the hard worker, you're a hard worker. Some people have different definitions of that.","c":7,"n":0,"i":"big4","s":43},{"id":"Theo-003617-122","p":"Theo","t":"00:36:17","q":"Like during the day, like one of my friends was maybe not as productive in the morning, so he'd stay late.","c":3,"n":4,"i":"work_content","s":49},{"id":"Theo-003627-123","p":"Theo","t":"00:36:27","q":"Yeah, like... So he would come in later but he'd leave a little bit later. It's just the way he worked","c":3,"n":4,"i":"work_content","s":41},{"id":"Theo-003643-124","p":"Theo","t":"00:36:43","q":"Yep. The only thing that sort of stops you from meeting your billable target would be absence. I generally would hit my target each day unless I've had trainings or external things or something other than... Other internal work that you still code to your time sheet, but it just isn't a billable unit.","c":28,"n":12,"i":"billables","s":77},{"id":"Theo-003713-125","p":"Theo","t":"00:37:13","q":"No. It's included. So during your day, it'll be like an hour. We'll go to a team training. You'll be able to record that. But of course, with that comes an hour and a half of work that you've missed. So sometimes just a bit of trying to catch up on work.","c":3,"n":4,"i":"work_content","s":59},{"id":"Theo-003737-126","p":"Theo","t":"00:37:37","q":"They usually are your lunch breaks.","c":2,"n":4,"i":"work_content","s":21},{"id":"Theo-003742-127","p":"Theo","t":"00:37:42","q":"We're provided lunch service. That's something. But. Yeah it is what it is.","c":2,"n":4,"i":"work_content","s":61},{"id":"Theo-003750-128","p":"Theo","t":"00:37:50","q":"Probably once a month.","c":8,"n":7,"i":"procedural","s":39},{"id":"Theo-003817-129","p":"Theo","t":"00:38:17","q":"Yeah. For me personally, I'm probably never satisfied with the work I put out. But most of the time, yeah, I probably feel more confident with I work I do now, but I didn't when I first started. But it grows with experience doing some things.","c":70,"n":25,"i":"confidence","s":67},{"id":"Theo-003835-130","p":"Theo","t":"00:38:35","q":"Yeah. And also what you think is good is, you know, is coming from a year and a half's worth of doing that work compared to a partner who's done 20 years of it.","c":0,"n":4,"i":"work_content","s":62},{"id":"Theo-003853-131","p":"Theo","t":"00:38:53","q":"I probably hold myself to a high standard. Sometimes you just need to get the job done. Kind of like spending a little more time to refine it. Like, sometimes.","c":2,"n":4,"i":"work_content","s":64},{"id":"Theo-003917-132","p":"Theo","t":"00:39:17","q":"Bit of both.","c":5,"n":7,"i":"procedural","s":30},{"id":"Theo-003922-133","p":"Theo","t":"00:39:22","q":"Not competition based, it's probably a past experience.","c":2,"n":4,"i":"work_content","s":36},{"id":"Theo-003931-134","p":"Theo","t":"00:39:31","q":"Yeah. I guess, like, you do something that you think is good, but it's really not. And. Yeah, I don't know. It's weird to explain.","c":3,"n":4,"i":"work_content","s":35},{"id":"Theo-003950-135","p":"Theo","t":"00:39:50","q":"Sometimes you don't want the feedback.","c":3,"n":4,"i":"work_content","s":19},{"id":"Theo-003957-136","p":"Theo","t":"00:39:57","q":"Yeah like I trust you [the partner].","c":5,"n":7,"i":"procedural","s":30},{"id":"Theo-004041-137","p":"Theo","t":"00:40:41","q":"Yeah, I'd say so, yeah. Like I think if you said that you wanted to do something, they would pull out the stops to help you. It's good. Like in my most recent performance. I said I wanted to be senior, and my boss was like well, that jobs already been done, you're there. So I was kind of like, well, sweet. What's next?","c":18,"n":9,"i":"mentor_good","s":28},{"id":"Theo-004105-138","p":"Theo","t":"00:41:05","q":"So that's the kind of thing.","c":0,"n":4,"i":"work_content","s":3},{"id":"Theo-004110-139","p":"Theo","t":"00:41:10","q":"Yeah. It was unexpected for me. Like I hadn't pushed per se, for it.","c":0,"n":4,"i":"work_content","s":50},{"id":"Theo-004116-140","p":"Theo","t":"00:41:16","q":"And it's nice that it was there. They just decided that it's the right time. Sometimes it's out of your control.","c":0,"n":4,"i":"work_content","s":66},{"id":"Theo-004141-141","p":"Theo","t":"00:41:41","q":"Well, because we have a set timetable of trainings internally. So they run within our team generally that's usually how we do it.","c":1,"n":4,"i":"work_content","s":84},{"id":"Theo-004211-142","p":"Theo","t":"00:42:11","q":"In terms of?","c":5,"n":7,"i":"procedural","s":33},{"id":"Theo-004235-143","p":"Theo","t":"00:42:35","q":"There's nothing per se. But like the Law Society or you know, some of those little things, they run their own trainings. Yeah. And we're from time to time set up if... the firm pays.","c":7,"n":0,"i":"big4","s":37},{"id":"Theo-004252-144","p":"Theo","t":"00:42:52","q":"So, like, the firm's pretty open to paying for you to go and do something.","c":7,"n":0,"i":"big4","s":33},{"id":"Theo-004259-145","p":"Theo","t":"00:42:59","q":"Yeah, they've tried to. They've tried to do networking things.","c":88,"n":3,"i":"networks","s":0},{"id":"Theo-004305-146","p":"Theo","t":"00:43:05","q":"Everything's a really weird like... it is encouraged.","c":1,"n":4,"i":"work_content","s":8},{"id":"Theo-004323-147","p":"Theo","t":"00:43:23","q":"There's probably not as much opportunity for juniors as there is partners.","c":3,"n":4,"i":"work_content","s":46},{"id":"Theo-004330-148","p":"Theo","t":"00:43:30","q":"In terms of like conferences and stuff like that.","c":1,"n":4,"i":"work_content","s":4},{"id":"Theo-004335-149","p":"Theo","t":"00:43:35","q":"Probably not.","c":6,"n":7,"i":"procedural","s":24},{"id":"Theo-004348-150","p":"Theo","t":"00:43:48","q":"Yeah. Not really sure.","c":8,"n":7,"i":"procedural","s":22},{"id":"Theo-004355-151","p":"Theo","t":"00:43:55","q":"I kind of take it as it comes. I have no reason to leave where I am, like, I'm happy, I like the people, Like, there's probably some jobs that would be quite cool to go and do.","c":12,"n":19,"i":"leaving","s":43},{"id":"Theo-004411-152","p":"Theo","t":"00:44:11","q":"Yeah. There's one that I probably find interesting in the law, and that would probably be going in-house.","c":1,"n":4,"i":"work_content","s":76},{"id":"Theo-004419-153","p":"Theo","t":"00:44:19","q":"Like as in-house counsel.","c":6,"n":7,"i":"procedural","s":30},{"id":"Theo-004423-154","p":"Theo","t":"00:44:23","q":"But, like I don't see that in the next year or two because I still want to keep building what I'm building now. The next goal is associate, that would be interesting.","c":3,"n":4,"i":"work_content","s":81},{"id":"Theo-004433-155","p":"Theo","t":"00:44:33","q":"But then I don't really know. What's the plan from there/","c":1,"n":4,"i":"work_content","s":20},{"id":"Theo-004452-156","p":"Theo","t":"00:44:52","q":"At the moment, yes. But there's always the long harboured dream of like going to be a CEO or something like that. And one of our law partners actually did that.","c":0,"n":4,"i":"work_content","s":62},{"id":"Theo-004511-157","p":"Theo","t":"00:45:11","q":"Yeah, I think so, yeah. And you can get into doing something like moving into management ranks if you really wanted to. So yeah I guess there's options.","c":0,"n":4,"i":"work_content","s":38},{"id":"Theo-004525-158","p":"Theo","t":"00:45:25","q":"Yeah building the knowledge.","c":5,"n":7,"i":"procedural","s":27},{"id":"Theo-004557-159","p":"Theo","t":"00:45:57","q":"I don't know. Yeah. Like, my grades weren't fantastic. They weren't bad. They weren't amazing. And, but it's kind of weird because I look at it and I go, well, I only really applied for two intern clerkships when I was applying for [big 4], [big 3 law] was the other, and I got [big 4] straight away.","c":7,"n":0,"i":"big4","s":60},{"id":"Theo-004626-160","p":"Theo","t":"00:46:26","q":"It's kind of... I haven't got the experience of applying to like a hundred firms and hoping that you get one of them, it's kind of like it fell into place, that's where it went from there. It's kind of hard to judge what I could've... I could've not got the one and had to go into the to the pool with a thousand other LAW students trying to get a job.","c":89,"n":22,"i":"drift","s":100},{"id":"Theo-004657-161","p":"Theo","t":"00:46:57","q":"I don't think, yeah, I don't know. Young Theo was expecting to be in law to be fair, and now he is he's kind of like. Whoa! Okay.","c":1,"n":4,"i":"work_content","s":48},{"id":"Theo-004709-162","p":"Theo","t":"00:47:09","q":"Yeah. I don't know. It is definitely different from what you do at uni. In terms of the work and the interaction. Like, I think uni teaches you to be book smart, but it doesn't teach you how to do people smart. And you know, like probably 50% of our job is talking to people, suddenly you need to know how to communicate. If you can't talk to someone but you have a GPA of nine, like, it's... Like you, we know you can do the work. Probably you sit down and do the work. But you won't talk to anyone.","c":119,"n":26,"i":"uni_gap","s":50},{"id":"Theo-004745-163","p":"Theo","t":"00:47:45","q":"Yeah. And you can't... You can't talk to a client and pick up the phone.","c":0,"n":4,"i":"work_content","s":56},{"id":"Theo-004751-164","p":"Theo","t":"00:47:51","q":"Yeah we are a client service industry. And that's yeah, that's probably the worst thing... If someone can't talk to you, then you're not going to get the work.","c":2,"n":4,"i":"work_content","s":68},{"id":"Theo-004812-165","p":"Theo","t":"00:48:12","q":"It's different from suits. Because there's definitely people who get into law and it's probably for the wrong reasons. and when they get into law, they go... \"That's not what I was expecting. I don't like this\", like what happened to Harvey Specter? And yeah, it's kind of like that, I think. it's not what you think. In any American legal program you watch, you know, we don't all go to court and start yelling at each other, you know, like, it's very procedural. Court in New Zealand is very procedural. And it's very like prosecution speaks, defence speaks, prosecution, etc. it's very it's very procedural. Compared to watching suits and someone's yelling at each other, it's just, it's not like that.","c":120,"n":27,"i":"mentor_bad","s":50},{"id":"Theo-004916-166","p":"Theo","t":"00:49:16","q":"And also a lot of people probably have the perception that our work as a bit boring. That you just sit in front of the screen all day... It's like. Yes, but like...","c":25,"n":18,"i":"autonomy","s":57},{"id":"Theo-004932-167","p":"Theo","t":"00:49:32","q":"And you know, you might, you might be sitting at a desk all day, but you're using your brain.","c":1,"n":4,"i":"work_content","s":48},{"id":"Theo-004955-168","p":"Theo","t":"00:49:55","q":"Don't do it.","c":5,"n":7,"i":"procedural","s":17},{"id":"Theo-004957-169","p":"Theo","t":"00:49:57","q":"No. Again, it's very different from what you do. Having that basic knowledge of debits and credits and stuff is fundamental to what you do in accounting. And I was never an accountant, per se, but the work has moved on from that. You know, you're no longer a bookkeeper. You're an advisor, and you need to know how to do the basics, but you need to know how to understand those basics.","c":1,"n":4,"i":"work_content","s":76},{"id":"Theo-005029-170","p":"Theo","t":"00:50:29","q":"Yeah. Like you know, we didn't need to do so much of that [fundamentals] in our team because we had our, we had our own tax software, a lot of the work would be automated through.","c":64,"n":8,"i":"ai_tech","s":20},{"id":"Theo-005040-171","p":"Theo","t":"00:50:40","q":"You've got to think about, you know. Is that correct? Is that the correct treatment? Am I sort of finding that, and writing that note for it? But in our private advisory, business advisory, a lot of it was Xero will do those accounts for you. But how do you interpret that? What does looking at that and going \"oh that's increased\". \"Why has it increased?\". How can we tailor that advice?","c":39,"n":28,"i":"advice","s":100},{"id":"Theo-005107-172","p":"Theo","t":"00:51:07","q":"And yeah that's probably what a lot of people don't realize is that accounting is... Yeah it's software will do that for you, it's the thinking. It's the thinking about what's going on.","c":1,"n":4,"i":"work_content","s":56},{"id":"Theo-005129-173","p":"Theo","t":"00:51:29","q":"Yeah, I guess so yeah. Like it's all the same fundamentals, You know, like tax comes from the Income Tax Act. Company, company law comes from the Companies Act. So we're still using that same fundamental law base. It's just what you do with that.","c":4,"n":6,"i":"pay","s":23},{"id":"Theo-005152-174","p":"Theo","t":"00:51:52","q":"Like drafting... Well, it's the same as if you had like a template and you would draft and think about how something would affect something that's going in the cover letter for a tax return. Like \"hey, let's go back\", whereas now when we're drafting a spar, we have a spar template. And you're adapting them to fit the client?","c":19,"n":2,"i":"interview_process","s":58},{"id":"Theo-005217-175","p":"Theo","t":"00:52:17","q":"And probably more back and forth as well.","c":1,"n":4,"i":"work_content","s":12},{"id":"Theo-005222-176","p":"Theo","t":"00:52:22","q":"Yeah. So just like in the in tax base, a lot of it is you and your partner.","c":2,"n":4,"i":"work_content","s":57},{"id":"Theo-005228-177","p":"Theo","t":"00:52:28","q":"Well not that, but like you know, we want to be sort of advice on how to treat this.","c":39,"n":28,"i":"advice","s":9},{"id":"Theo-005237-178","p":"Theo","t":"00:52:37","q":"Here. It's like I'm buying that business, and then back to the opposing counsel and then coming back again with comments on what's happening. And why did you do that.","c":10,"n":13,"i":"wellbeing","s":58},{"id":"Theo-005249-179","p":"Theo","t":"00:52:49","q":"There's probably more back and forth. Whether it's a free piece of advice or a free thing for a client. This one's like, yeah, we do that. But we're also dealing with someone on the other side who's trying to work for their client's business.","c":71,"n":28,"i":"advice","s":57},{"id":"Theo-005313-180","p":"Theo","t":"00:53:13","q":"Yeah, absolutely. Obviously I think it's important the people you have.","c":2,"n":4,"i":"work_content","s":46},{"id":"Theo-005322-181","p":"Theo","t":"00:53:22","q":"Your partners and your managers guide how your experience is. If you have bad people who are not supportive or don't want the best for you and how you progress career, it's hard.","c":3,"n":4,"i":"work_content","s":62},{"id":"Theo-005339-182","p":"Theo","t":"00:53:39","q":"No. Probably the opposite.","c":8,"n":7,"i":"procedural","s":36},{"id":"Theo-005344-183","p":"Theo","t":"00:53:44","q":"Yeah, I think so. Yeah. My former boss was very difficult to work for. But ge had my best interests at heart. Like when I told him I wanted to leave for the Law, he understood that. And he tried to find contacts to go and talk to. So, you know, that was encouraging. But I recognize that if I went to a firm where I had someone who didn't support or mentor, or help out in those first couple of years, it was going to it's going to be pretty shit.","c":11,"n":9,"i":"mentor_good","s":83},{"id":"Theo-005417-184","p":"Theo","t":"00:54:17","q":"I was talking to one of my team members, a special counsel. I said, you know, like the I'm very glad I made the jump to the team and the supervising partner because I think that plays a big part in how you adjust. If you jump to the wrong person, the wrong team environment, and it's toxic, the partner is not supportive, or the team doesn't care and doesn't want to help you get up to speed, then you get a year in and you're like, I'm out. it can change, you know, changes a lot.","c":29,"n":27,"i":"mentor_bad","s":100},{"id":"Theo-005503-185","p":"Theo","t":"00:55:03","q":"Like if I, if my boss wasn't so good with me. I think, yeah, getting through would have been a lot.","c":11,"n":9,"i":"mentor_good","s":67},{"id":"Greta-000731-001","p":"Greta","t":"00:07:31","q":"I am in the digital services department, so it's it just a fancy name for IT, really, and I work, you know, because obviously it's like the [institution], and then they kind of branch off into different departments and things. And then underneath digital services, I'm in like a hub called portfolio management and delivery or something similar. And so we, what I do. So I'm an analyst and I work with all of the project managers and change managers to make sure that, one, they're doing what they should and like, they're meeting all their milestones and stuff. I work on them with, like, just any questions they might have. And then, of course, being an analyst, I analyze their data for a whole bunch of different things. So at the moment we're working on what we call a quarterly MIP reports, a major investment plan. So essentially I gather all the data we have about all of our projects in the digital services space, and then we put together a report that goes to council eventually. Yeah. And kind of just like it's yeah, it is quite interesting. It's about, you know, how much money they've spent obviously because that's yeah. You know public money.","c":4,"n":6,"i":"pay","s":13},{"id":"Greta-000851-002","p":"Greta","t":"00:08:51","q":"Yeah, yeah, yeah. But also, you know, how they're tracking what their kind of forecasts are, spend when they're forecast to complete any risks and issues and all that stuff as well. Yeah.","c":2,"n":4,"i":"work_content","s":29},{"id":"Greta-000910-003","p":"Greta","t":"00:09:10","q":"Yeah. Yeah I really like it though I think. Yeah working on projects is just so interesting.","c":0,"n":4,"i":"work_content","s":44},{"id":"Greta-000933-004","p":"Greta","t":"00:09:33","q":"Oh absolutely not. I wouldn't even been able to tell you if it existed when I started studying. I really liked economics in high school, and so I was like, well, I have to study economics. And then I was like, oh, but I really love politics. And so I was like, oh, why don't I do economics and politics? And this is really bad. But I didn't want to do a BA for some reason. I just like, yeah.","c":25,"n":18,"i":"autonomy","s":81},{"id":"Greta-001004-005","p":"Greta","t":"00:10:04","q":"Yeah. Just a BSc and a B.Com. It's better you know, like it just I don't know, it's really bad but whatever.","c":0,"n":4,"i":"work_content","s":47},{"id":"Greta-001033-006","p":"Greta","t":"00:10:33","q":"So I did a B.Com. So economics and I couldn't really, I didn't really know what I wanted, what else I wanted to study because, you know, everyone does a double major right? And so I went through my first year kind of trying out all the different courses, and I settled on what's called OSCM or operations and supply chain management, because it seemed less airy fairy than like management itself. It was a lot more based on math and analysis and forecasting and stuff, and I found that really interesting. But I didn't really know, like, I couldn't tell you what I would be from my degree. I was like, well, I can be an economist. I can be like a supply chain person, or I could be an operations management person, you know?","c":25,"n":18,"i":"autonomy","s":62},{"id":"Greta-001124-007","p":"Greta","t":"00:11:24","q":"And so I got to the end of my degree, and then I started my master's of Commerce in management in 2021. And it was just a bit of a shit show, really. So I yeah, my partner at the time, his mum died, and so I kind of took time off to help support him. And then the following year, I was like, all right, I'm back at it. I'm ready. And... it was so bad, but I had asked one person to be my supervisor, but she was on sabbatical, and she didn't want to supervise, which is fair. And so I was like, darn. She was the one I really wanted to work with. And then I went to another person, and I sat in their office for two hours just talking about everything. And I really got on with them, loved them. Like she was going to be my supervisor and then she passed away.","c":29,"n":27,"i":"mentor_bad","s":87},{"id":"Greta-001224-008","p":"Greta","t":"00:12:24","q":"I know it's bad, it's bad. And then yeah, I know I got unlucky. And then. Yeah. And then I got a supervisor again. Obviously you have a primary and then a secondary masters. I'm sure it's similar for what you do?","c":18,"n":9,"i":"mentor_good","s":56},{"id":"Greta-001252-009","p":"Greta","t":"00:12:52","q":"Yeah Structured program. But obviously there's also the thesis as well. So yeah similar.","c":0,"n":4,"i":"work_content","s":50},{"id":"Greta-001301-010","p":"Greta","t":"00:13:01","q":"Yeah. Yes I managed finally.","c":5,"n":7,"i":"procedural","s":37},{"id":"Greta-001314-011","p":"Greta","t":"00:13:14","q":"And me and my supervisor, I ended up taking taking an idea from him because obviously I was just a bit tired, you know?","c":11,"n":9,"i":"mentor_good","s":60},{"id":"Greta-001327-012","p":"Greta","t":"00:13:27","q":"Like No one wants me. It's hard. And so I took his idea, so he, you know, gave it to me and was like, oh, yeah, we'll work on this together. Yeah. And our personalities just really didn't mix well.","c":1,"n":4,"i":"work_content","s":40},{"id":"Greta-001343-013","p":"Greta","t":"00:13:43","q":"Yeah, like to the utmost extreme. It was horrific. And so I was like, all right, this is, a master's degree. Ain't for me. So.","c":3,"n":4,"i":"work_content","s":41},{"id":"Greta-001355-014","p":"Greta","t":"00:13:55","q":"I know.","c":9,"n":7,"i":"procedural","s":18},{"id":"Greta-001358-015","p":"Greta","t":"00:13:58","q":"Yeah. But so, yeah, I ended up with half a master's degree, and. No, you can't really show anything for that. But. Yeah. So anyway, that's what I did.","c":49,"n":22,"i":"drift","s":0},{"id":"Greta-001425-016","p":"Greta","t":"00:14:25","q":"And so, yeah, I got to the end of my master's degree and I realized, oh, my God, I need a job. So I started working part time for the [institution]. I just saw the job online and applied. Got it. I was really stoked. And then. Yeah. And then like two months into it, I realized, oh my God, my master's degree really isn't for me. And I like working. And so they offered me full time and I dropped the master's degree. And so I've just been working. So just [at work] ever since.","c":3,"n":4,"i":"work_content","s":54},{"id":"Greta-001621-017","p":"Greta","t":"00:16:21","q":"That's alright. Yeah.","c":6,"n":7,"i":"procedural","s":24},{"id":"Greta-001652-018","p":"Greta","t":"00:16:52","q":"A few things. So I am really interested in strategy. So like strategic planning or strategy and planning was the role of the job I applied for. And I have had a lot to do with working on the [student[ exec and how their strategy interlinks with the UK strategy. I remember [shared memory]. Oh how good.","c":3,"n":4,"i":"work_content","s":65},{"id":"Greta-001722-019","p":"Greta","t":"00:17:22","q":"Oh, funny! Yeah.","c":5,"n":7,"i":"procedural","s":20},{"id":"Greta-001725-020","p":"Greta","t":"00:17:25","q":"Yeah yeah yeah of course. Yeah, yeah. Learnt so much in those two years. Yeah I learnt so much. It was invaluable for sure. And I just, I, you know, I have always found stuff like that interesting, like finding a shared goal or common purpose. Relating, you know, balancing. Sorry. Not only the money side and profitability, but also with the consumer side. Obviously, the main purpose of a [institution] is to teach students. Right? And to do that you need a bunch of other stuff and, you know, also balancing it with environmental sustainability and things like that.","c":102,"n":29,"i":"ethics_industry","s":0},{"id":"Greta-001806-021","p":"Greta","t":"00:18:06","q":"I also liked the idea that I was just getting my foot in the door, you know, because that's so important, Just getting your foot in the door making connections with [firm] staff in an area that I hadn't really interacted with before.","c":90,"n":3,"i":"networks","s":100},{"id":"Greta-001826-022","p":"Greta","t":"00:18:26","q":"Yeah, I yeah, I just remember, yeah. Really like crossing all my fingers and toes and just hoping that I got the job because it just seemed Good. And it was my first ever office job as well. So that was also part of the reason.","c":2,"n":4,"i":"work_content","s":61},{"id":"Greta-001901-023","p":"Greta","t":"00:19:01","q":"Yes. About two months.","c":8,"n":7,"i":"procedural","s":36},{"id":"Greta-001912-024","p":"Greta","t":"00:19:12","q":"It's definitely a big change because I would approach being a student with a lot of flexibility. So some days I'd be in bed to, you know, 12 p.m., but I'd be like up for 36 hours the next day, you know? So I think getting into a routine was quite difficult because I'm not adverse to routines, but I like to, i like my own personal freedom, you know? Yeah. So it was, you know, kind of it was arguably it was, sorry.","c":17,"n":5,"i":"balance","s":32},{"id":"Greta-001947-025","p":"Greta","t":"00:19:47","q":"This is gonna be a nightmare for the transcript.","c":0,"n":4,"i":"work_content","s":31},{"id":"Greta-001952-026","p":"Greta","t":"00:19:52","q":"It was quite difficult. You know, I never really. Especially when you're doing a master's degree. Right? It's so much more flexible than doing an undergrad degree because you have less classes and whatever else. And so going from almost no classes to I have to be at work from 9 to 5 every day. It was a little bit of a a shock to the system. But then again, it was also lovely having weekends off and being able to enjoy that time off as well. Yeah. Yeah.","c":17,"n":5,"i":"balance","s":59},{"id":"Greta-002037-027","p":"Greta","t":"00:20:37","q":"Yeah, that's that's a good question. It definitely was at the beginning. So obviously when you start a new job, you're spending all your time learning how to do things.","c":4,"n":6,"i":"pay","s":73},{"id":"Greta-002047-028","p":"Greta","t":"00:20:47","q":"Yeah Onboarding and all of that stuff. And so I thought that that was really exciting and I loved being able to learn new skills. Et cetera. Et cetera. But then it kind of, you know, it levels out once you know how to do a job, right. But I think it was a good mix of being really comfortable and knowing what you're doing and then also learning. So a part, a portion of my job is admin, as it is with, you know, 99% of jobs in the world. And so obviously, I found that quite, some days I'd find it incredibly boring and unfulfilling. But then some days, you know, it's kind of nice.","c":4,"n":6,"i":"pay","s":70},{"id":"Greta-002133-029","p":"Greta","t":"00:21:33","q":"Yeah, literally. And then I would do a lot of research in that role as well. So I found the research really interesting because obviously it's you're learning. Yeah.","c":4,"n":6,"i":"pay","s":63},{"id":"Greta-002159-030","p":"Greta","t":"00:21:59","q":"Very... I would say it's probably quite challenging because first of all, you don't know how to, you know, like, I'm not an idiot. Like, I know how to not make a fool of myself, but you don't really know how to act in a corporate environment. And it's really tiny things like, you know, where to put your food in the fridge or you know, when to, like, knock on the door if someone's got your meeting room when you've booked it, you know?","c":24,"n":19,"i":"leaving","s":77},{"id":"Greta-002230-031","p":"Greta","t":"00:22:30","q":"Very different etiquette. And I'm probably overthinking it. Or like, even you know, when you have to come up with one fun fact about yourself and stuff like that. So yeah, I think sorry, what was the question again?","c":2,"n":4,"i":"work_content","s":61},{"id":"Greta-002253-032","p":"Greta","t":"00:22:53","q":"Yeah. My entire team is/was a lot older than me as well. So there was one person who was maybe a less than five years older than me, but we came from very different backgrounds, like culturally and religiously and stuff, and we were very different people. So it found it really hard to connect. And she was training me up for everything because I was taking her job. So there was always going to be like a little bit more of a divide there as well, like a bit more corporate rather than like friendly. Yeah. And yeah. And everyone was just so much older than me. So I found it. You know, they're talking about having, you know, taking their kids to rugby on the weekend. And I am not doing that, you know. Yeah, yeah.","c":23,"n":30,"i":"ethnicity","s":33},{"id":"Greta-002344-033","p":"Greta","t":"00:23:44","q":"Yeah. It is quite different. And it's not necessarily bad, but it's you know, I would often feel quite jealous when my other friends would talk about going to drinks on the weekend with their work friends or doing whatever else with their work friends, because I could never really connect with my work friends like that. I don't think there would be much like, I don't think they're actually friends with anyone else around their age either. It's just very much we go to work and then we come home and then we go to work. You know, we don't really hang out outside of that.","c":13,"n":19,"i":"leaving","s":72},{"id":"Greta-002511-034","p":"Greta","t":"00:25:11","q":"It's hard. Yeah.","c":5,"n":7,"i":"procedural","s":23},{"id":"Greta-002522-035","p":"Greta","t":"00:25:22","q":"Yeah, absolutely. I've made my best friends from the master's program, so if nothing else I got, you know. that which is good. Yeah.","c":0,"n":4,"i":"work_content","s":53},{"id":"Greta-002604-036","p":"Greta","t":"00:26:04","q":"A handful of things, as it always is. It's never just one thing. So there is quite a few reasons.","c":24,"n":19,"i":"leaving","s":86},{"id":"Greta-002615-037","p":"Greta","t":"00:26:15","q":"Top reason is well, it's not it's not my main motivator, but it is what most people think my main motivator is. So my partner lives in Sydney and so I want, i'm applying for jobs in Sydney. To be closer with him. And also my mum lives in Brisbane, so, you know, Sydney and Brisbane are not that close, but a lot closer.","c":103,"n":1,"i":"family_influence","s":0},{"id":"Greta-002639-038","p":"Greta","t":"00:26:39","q":"Yeah. Yeah, exactly. So to be closer with friends and family essentially over there.","c":0,"n":4,"i":"work_content","s":47},{"id":"Greta-002648-039","p":"Greta","t":"00:26:48","q":"I have had a really rough time in my current role because of my manager, who had her last day yesterday. So a win is a win. I dealt with a lot of bullying and purposefully embarrassing me in front of groups of people, making me feel stupid, like a whole bunch of things, you know, yelling and all that stuff. And so I was absolutely miserable for months on end.","c":121,"n":27,"i":"mentor_bad","s":50},{"id":"Greta-002729-040","p":"Greta","t":"00:27:29","q":"Sucks, but that's okay. Yeah. And you should have seen me the day she told me she was leaving. I was walking into a meeting with her, and I literally had to have the laptop on my face, and I just, like, could not stop smiling. I was like, \"oh, no.\" It's terrible.","c":2,"n":4,"i":"work_content","s":68},{"id":"Greta-002755-041","p":"Greta","t":"00:27:55","q":"I think that's why. Yeah, yeah. Yeah. Yeah, it's a long story. Anyway so that that really put a dampener on things. And because I wasn't going to, like, deal with that, I would go to her manager to tell, like, ask for advice, talk about that. And I didn't really feel like the support was there either. So that also put a bad taste in my mouth. And then when I would go to my colleagues and kind of ask how they were dealing with it. She wasn't anywhere near, like, as bad to them. Yeah.","c":122,"n":28,"i":"advice","s":50},{"id":"Greta-002836-042","p":"Greta","t":"00:28:36","q":"Yeah. As the months go on, our team is getting a lot more lean. So people are leaving for various reasons, like contracts come to an end or you know, they need to move back to their family or in Asia or wherever, right? So it's not necessarily because of the culture, but as the team gets way more lean and we don't hire more people, the workload becomes a lot more stressful.","c":10,"n":13,"i":"wellbeing","s":61},{"id":"Greta-002901-043","p":"Greta","t":"00:29:01","q":"So at this point, it does feel like a bit of a sinking ship. And so, yeah, I'd like to leave.","c":1,"n":4,"i":"work_content","s":48},{"id":"Greta-002945-044","p":"Greta","t":"00:29:45","q":"So the last reason is that I've heard that, you know, especially when you're young, you should kind of aim to change jobs every, like, 2 to 4 years in order to maximise your income. And how much you're learning. Et cetera. Et cetera. So I am very conscious of not getting stuck, you know, and my growth.","c":4,"n":6,"i":"pay","s":50},{"id":"Greta-003048-045","p":"Greta","t":"00:30:48","q":"Yeah. Great question. so I've been looking since the start of the year, but a lot more casually back in January and maybe since March, I've been pretty seriously on it. So I started off applying just for other [institutions] because I love working for a [institution], and I'd happily do that again in a heartbeat. I just love the energy of [setting] brings. I don't know. It sounds so stupid, but I get really emotional whenever I visit a [institution] because it's just so many people, so many people there who just want to learn and grow. And yeah, I don't know why. And it's always so beautiful. You know, [institutions] are stunning, right? They're half a million buildings and there's always some nice nature and stuff. Yeah.","c":4,"n":6,"i":"pay","s":77},{"id":"Greta-003201-046","p":"Greta","t":"00:32:01","q":"Yeah. So anything, any [institution] really. So and when I say anything obviously not a lecturer or not like a boiler fitter, but anything that's more in the professional in general services category anything that has the word analyst in it, is quite good. Yeah. So that would, yeah, that was where I started. And then I've also been applying for... what other kind of roles? Anything with the term analyst or coordinator. So preferably analysts over coordinator, but coordinators probably like a step below what I do at the moment. So yeah, arguably might have more of a chance of getting a job in that realm.","c":13,"n":19,"i":"leaving","s":48},{"id":"Greta-003324-047","p":"Greta","t":"00:33:24","q":"Yeah, absolutely. Yeah. So yeah. Really applying for anything. I've also branched out into just administration roles because, you know, I am quite desperate to move up, even though I don't want to do that for the rest of my life. It would be a good intermediate stepping stone. Yeah, stepping stone for sure.","c":40,"n":15,"i":"rejection","s":21},{"id":"Greta-003346-048","p":"Greta","t":"00:33:46","q":"But then saying that I'm honestly it's I've seen over 200 applications, so. Yeah.","c":6,"n":7,"i":"procedural","s":67},{"id":"Greta-003355-049","p":"Greta","t":"00:33:55","q":"So it's a lot. It's a lot of things. Yeah.","c":3,"n":4,"i":"work_content","s":24},{"id":"Greta-003407-050","p":"Greta","t":"00:34:07","q":"So. Yes. But anything. Yeah. Around IT or anything to do with just. Yeah. The general office jobs really, you know. Analyst, coordinator. Advisor, etc..","c":0,"n":4,"i":"work_content","s":41},{"id":"Greta-003450-051","p":"Greta","t":"00:34:50","q":"Yeah. I definitely pay a lot of attention to salary because I care about what I'm making.","c":4,"n":6,"i":"pay","s":83},{"id":"Greta-003504-052","p":"Greta","t":"00:35:04","q":"Yeah. Exactly. Yeah. So in terms of the things I look for, salaries definitely up there. So if it were my dream job with like a horrific salary, i probably still wouldn't take it because I'd prefer a better salary with a bit more of a job that I didn't really like as much. Yeah, because obviously salary with that money I can go and spend my money on doing things I do like to do, you know?","c":4,"n":6,"i":"pay","s":57},{"id":"Greta-003539-053","p":"Greta","t":"00:35:39","q":"Absolutely. I also look for how many employees the organization has. I'm really trying to work for a bigger organization so I can build a lot more connections that will hopefully help me sooner or later.","c":46,"n":3,"i":"networks","s":100},{"id":"Greta-003604-054","p":"Greta","t":"00:36:04","q":"Yeah, yeah. Yeah, absolutely. I also look for keywords in the job description. So more in a negative way than a positive way. So if they say, you know, 'challenging', 'fast paced environment', 'we need lots of flexibility' and 'availability' and stuff. I'm like, oh no no.","c":17,"n":5,"i":"balance","s":9},{"id":"Greta-003628-055","p":"Greta","t":"00:36:28","q":"Yeah. Hit the ground running. Yes. Not necessarily because I can't do that, but I think it's usually an indicator.","c":8,"n":7,"i":"procedural","s":94},{"id":"Greta-003637-056","p":"Greta","t":"00:36:37","q":"Yeah. Yeah. And that they don't really have a handle on things. If they're needing someone new to come in and really sort everything out and hit the ground running. Blah, blah, blah, blah, blah. So I usually try to step away from that and exclude that from my. Yeah.","c":3,"n":4,"i":"work_content","s":46},{"id":"Greta-003804-057","p":"Greta","t":"00:38:04","q":"I think at the current time it fluctuates heaps. So. As you're probably aware, the job market is quite awful at the moment. Insert better word there. I don't know and it's, you know, so I know a lot of people that are unemployed or that are also looking to move jobs. Right? But they can't because,there's nothing out there and everything has, you know, hundreds of applicants and it just becomes a lot more tricky.","c":20,"n":19,"i":"leaving","s":100},{"id":"Greta-003843-058","p":"Greta","t":"00:38:43","q":"So I go between feeling awful because I can't get any interviews, or I feel like I'm bad at my job because of like tall poppy syndrome or because of, if I were to make a very minor mistake, I take that and it really blows up in my mind and I really think, oh my God, I'm the worst person ever, etc. etc.. So it goes between like negative feelings like that. Like, of course I can't find a job because I'm useless and you know, I can't do my job properly, so who would who else would want to hire me? And \"I can't do my job properly. Everyone hates me.\" I think that's quite a what's it called? Like a recurring thought?","c":72,"n":15,"i":"rejection","s":100},{"id":"Greta-004040-059","p":"Greta","t":"00:40:40","q":"Yeah yeah! And in corporate, people don't really compliment as much because it's, you know, time consuming. Yeah. Time consuming. You probably know a lot more about it than I do. But you know, people really don't compliment. So I go out of my way to provide compliments. But I don't think people because obviously everyone I work with is a lot older as well. So they don't really receive them very well because they're just like, \"what's going on\", you know?","c":3,"n":4,"i":"work_content","s":46},{"id":"Greta-004111-060","p":"Greta","t":"00:41:11","q":"But then. Yeah, but then other days I feel really positive, you know, like, and that is usually based around how my job search is going as well. So if I get an interview or if I get a call back or something, I'm like, oh my God, I'm not useless. Like I am employable. Or, you know. Yeah, I don't know or I, yeah, it's. Yeah, usually negative neutral and then like some positive, but Yeah.","c":21,"n":2,"i":"interview_process","s":17},{"id":"Greta-004155-061","p":"Greta","t":"00:41:55","q":"It is insane. Yeah, yeah.","c":6,"n":7,"i":"procedural","s":26},{"id":"Greta-004220-062","p":"Greta","t":"00:42:20","q":"Perfect. Good.","c":8,"n":7,"i":"procedural","s":31},{"id":"Greta-004244-063","p":"Greta","t":"00:42:44","q":"Yes, there's definitely a shift. So yeah, I, I definitely got a lot more enjoyment and reward. And overall my neutral was a lot happier when I was studying than working full time. Why that is, I could probably figure it out, but I don't know exactly why, you know?","c":0,"n":4,"i":"work_content","s":72},{"id":"Greta-004343-064","p":"Greta","t":"00:43:43","q":"A sense of purpose. So when I come to work, I feel like there's a purpose for me being there and that I'm adding value to other people's lives. I say people rather than the business because people are a lot, you know, it's easier to connect with people than connect with, like, a business, right?","c":53,"n":31,"i":"purpose","s":77},{"id":"Greta-004408-065","p":"Greta","t":"00:44:08","q":"Yeah, clients. Anyone. Yeah. so Purpose. Value. New job, what else would I look for? Just a really good, positive team culture as well. So that could obviously mean different things for different people. But I think just the ability to have people around you that understand and are willing to help as well, that everyone has enough time to help, because a lot of the time people are like \"too busy sort it out yourself\". That the onboarding process is good as well. So I feel like I know everything I need to know, and if I don't know it, then I know what to do to figure it out, right?","c":73,"n":31,"i":"purpose","s":100},{"id":"Greta-004459-066","p":"Greta","t":"00:44:59","q":"Or who to go to, etc., etc.. Yeah. Yeah, yeah. Positive team culture. Like, I'm not necessarily like, I want to go to, like, netball every Thursday with my team or.","c":0,"n":4,"i":"work_content","s":31},{"id":"Greta-004513-067","p":"Greta","t":"00:45:13","q":"It's just yeah, my expectations are a lot lower than that. It's just. Yeah. Positive, understanding. Yeah. Genuinely like care about their environment and who's in it.","c":2,"n":4,"i":"work_content","s":46},{"id":"Greta-004557-068","p":"Greta","t":"00:45:57","q":"I'm definitely... It fluctuates. So Fluctuates week to week depending on different deadlines as well. So I mean not unlike university, right? Like pressure does fluctuate week to week, but generally I, you know, I don't work longer than I am supposed to. So I'm definitely like trucking along. Yeah. Yeah.","c":1,"n":4,"i":"work_content","s":36},{"id":"Greta-004658-069","p":"Greta","t":"00:46:58","q":"Yeah in my team again, it probably varies. So people at my level are all very similar. So we're probably trucking along. But I do think everyone pretends to be a lot busier than they are, because if you don't pretend to be busy, you're going to get a whole lot more work, and then you're actually going to be busy, right? Yeah. I think genuinely like every day it's just like, \"oh, what are you working on?\" \"Oh, I'm just so busy\". But they're not busy. No one's busy.","c":0,"n":4,"i":"work_content","s":75},{"id":"Greta-004727-070","p":"Greta","t":"00:47:27","q":"But then above me. So my old manager and everyone above that I genuinely believe are, like, work to the bone. Yeah. So they're all working, you know, way too long. Way too many hours. They always look really stressed. Never really have that much time for you. Et cetera. Et cetera. They never really know what you're doing, either, because they're too caught up in their own world. So. Yeah, it's definitely a divide.","c":10,"n":13,"i":"wellbeing","s":61},{"id":"Greta-004804-071","p":"Greta","t":"00:48:04","q":"Really, like stressful. Really difficult. Really. Because I hate feeling like I'm annoying people. And so you know you just feel like you're annoying them, and it's not nice.","c":10,"n":13,"i":"wellbeing","s":55},{"id":"Greta-004818-072","p":"Greta","t":"00:48:18","q":"Yes. Of course.","c":9,"n":7,"i":"procedural","s":26},{"id":"Greta-004828-073","p":"Greta","t":"00:48:28","q":"Yeah, all the time. It's usually quite easy and simple right. Like it's not necessarily, you know, \"write this whole extra report for me\", it's more \"oh can you find this for me?\" \"Can you do a bit of research on this?\" \"Can you figure out what's going on here?\" And I like that because it's a short, measurable task and it usually doesn't, you know, sometimes it might take half a day, but that's not really a whole lot in the grand scheme of things. So I don't mind, like I really don't mind being thrown extra tasks here and there. If they're quite short. Yeah.","c":12,"n":19,"i":"leaving","s":43},{"id":"Greta-004917-074","p":"Greta","t":"00:49:17","q":"It depends. So I have needed help with other things before, and it's always been quite difficult, quite bad. So last year, end of last year, we were myself and a colleague were working on something for our boss, the one who left. And she, we were asking questions because we didn't want to do it incorrectly. And it was quite a big piece of work. Or he was asking them. I was a bit too shy. And he's like 65, so he doesn't care, you know? And so essentially we're all on a teams call. And she goes, \"you know what? Whatever. I'll just do it all myself then\". And then she just, like, clicked off the call. And so obviously we're like, all right. Yeah, that's not mean to happen. But yeah,","c":12,"n":19,"i":"leaving","s":24},{"id":"Greta-005026-075","p":"Greta","t":"00:50:26","q":"I think it is very normal.","c":3,"n":4,"i":"work_content","s":14},{"id":"Greta-005032-076","p":"Greta","t":"00:50:32","q":"Yeah. And you know she's done that multiple times after that as well. So that's really cool.","c":0,"n":4,"i":"work_content","s":53},{"id":"Greta-005038-077","p":"Greta","t":"00:50:38","q":"And then, or I had to there was a portion of time where basically everyone was on leave or sick or whatever. And so I had to take over for the whole team. And I was talking to a colleague of mine who was like the one other guy, and I was like, \"oh, can you please help me with this? Because I don't really know what I'm doing\". And I'd only really just started in the role. He said, \"no, that's not my job\". And I was like, \"I know, but it's me and you here, buddy. So what are we going to do?\" And he goes, \"I don't know. It's not really my job\". And he was like, I don't know. And I was like, okay, that's fine then I don't know. So yeah, I don't know.","c":3,"n":4,"i":"work_content","s":65},{"id":"Greta-005132-078","p":"Greta","t":"00:51:32","q":"Yeah. Yeah. I'm. Yeah, I'm definitely always willing to help people if I can. And if I can't help them, then I'll help them find out, find someone who can. Yeah yeah yeah, yeah. So I found that really difficult because I feel like I'm always like the go to person if someone has a question. And I always was, because I would always feel too scared going to my boss as well. So they'd come to me. And so I'd be inundated with all these things that, you know, I could or couldn't answer. So.","c":15,"n":9,"i":"mentor_good","s":79},{"id":"Greta-005208-079","p":"Greta","t":"00:52:08","q":"Yeah. It's just a little bit tricky for sure.","c":1,"n":4,"i":"work_content","s":20},{"id":"Greta-005239-080","p":"Greta","t":"00:52:39","q":"No, no, no. That's fine. Physically, I yeah, that yeah, I have been affected physically. I'm a big believer that whatever, like, affects your mind could affect your body in some way. So if I get stressed, I get like the most sore, tight shoulders ever. And I'm always like, as soon as I yeah, feel the shoulders, I'm like, oh well, it must be stress. It also like in pairs, like my digestive functions and things, which is a lot less nice to talk about. But I've had a lot of issues there as well, and it's all stress related.","c":74,"n":20,"i":"somatic","s":100},{"id":"Greta-005318-081","p":"Greta","t":"00:53:18","q":"No, that's all right. So I've spent some time at the doctors. So yeah, negatively is the answer. Right. And also I've noticed my old boss told me this actually, she goes, \"why is your posture so bad when you're around me?\" And I was like, oh, that's really funny. But it's because I'm like sitting at my desk and I'm like scared. Like, [laughs]","c":0,"n":4,"i":"work_content","s":59},{"id":"Greta-005347-082","p":"Greta","t":"00:53:47","q":"Yeah, literally. Yeah. But she goes, oh, but like, you know, when you're hanging out with John who's another colleague like your shoulders are back. You're more relaxed. And I'm like, well, that's because I'm not terrified of him. But yeah, yeah, yeah. So yeah, my posture is, you know, gotten a lot worse, which could arguably just be because I'm like on a computer all day. But I would you know, it's definitely yeah stress related as well. Yeah. Yeah. Sorry, I'm mentally and emotionally stressed obviously. Yeah. Just. Yeah. Feeling less than, low self-esteem. A bit of tall poppy syndrome as well. Yeah, that's about it.","c":86,"n":15,"i":"rejection","s":67},{"id":"Greta-005435-083","p":"Greta","t":"00:54:35","q":"Yes. Yeah. Yeah. So we get we're through EAP. So yeah","c":10,"n":13,"i":"wellbeing","s":0},{"id":"Greta-005442-084","p":"Greta","t":"00:54:42","q":"Yeah, yeah. Three free counseling sessions for every issue. So I've been to maybe five of their counsellors, just for different things and bits and bobs throughout my almost three years at [org]. So yeah, I've definitely utilized that. I also, yeah, with some of the staff, as soon as you kind of know that they're leaving, they become a lot more candid about life at the [org]. And so it's been nice to kind of have a bit more [talk], So you realize that you're not crazy. Like. Yeah.","c":10,"n":13,"i":"wellbeing","s":45},{"id":"Greta-005537-085","p":"Greta","t":"00:55:37","q":"Yeah. Of course. Yeah.","c":8,"n":7,"i":"procedural","s":17},{"id":"Greta-005546-086","p":"Greta","t":"00:55:46","q":"Yeah. You know, everyone's hearing about my issues. Don't you worry.","c":0,"n":4,"i":"work_content","s":28},{"id":"Greta-005611-087","p":"Greta","t":"00:56:11","q":"Thank you. Thank you.","c":6,"n":7,"i":"procedural","s":72},{"id":"Greta-005634-088","p":"Greta","t":"00:56:34","q":"Nothing compulsory. No. So working for [org], obviously we're very focused on like, lifelong learning and things like that. So there are a lot of courses and things that you can sign up for at work, whether they be, you know, like project management one on one or all that first aid stuff. There's genuinely like hundreds and hundreds of different courses. So some of them are online and do at your own pace, and then some of them are in person, like a workshop for a day kind of thing. So none of that is compulsory though, but there is a lot of opportunity, and there is usually a bit of money every year to put towards professional development. So whether it be like going to a conference or going on a course and stuff. It's not a lot of money and it usually only goes to like one person for that year, but it's still there. So yeah.","c":4,"n":6,"i":"pay","s":23},{"id":"Greta-005743-089","p":"Greta","t":"00:57:43","q":"I would definitely like to do some sort of course, or something. So I can learn a bit more about portfolio management or data analysis or I don't know, attend a conference of some sort, but I don't think that would be accepted, if that makes sense. Because, one because, like taking time off work, but two you know, everything's like, yeah, money, right? So I think, you know, it would help my employability and help me feel a lot more fulfilled in my current job, feeling like I've got to I'm learning something new, and it's a new sense of purpose and things. Right? But I don't think there's any possibility of that happening.","c":4,"n":6,"i":"pay","s":70},{"id":"Greta-005851-090","p":"Greta","t":"00:58:51","q":"Yeah, it's quite... So every year in January or December. So kind of turning into the following year, right? You're supposed to sit down with your manager and kind of talk about how you can see your, the year and your job progressing and what you want and what they can do to make you more successful. And so every year you put down, you know, like, I've looked into this course and, you know, it's just kind of more of a tick box exercise, like they're never going to do that. So unfortunately. Yeah.","c":24,"n":19,"i":"leaving","s":68},{"id":"Greta-010011-091","p":"Greta","t":"01:00:11","q":"Oh in ten years. I'll be 36. I don't necessarily have a concrete view of where I would see myself in ten years because I think, you know, you learn more things about yourself every day, right?","c":4,"n":6,"i":"pay","s":80},{"id":"Greta-010031-092","p":"Greta","t":"01:00:31","q":"But I would love to be working in a job where I can see the benefits of my labor a little bit more Tactically, like you like working one on one. Right. So. Mine probably wouldn't necessarily be one on one, but seeing the work I do be appreciated. I love meeting new people, and I love the sense of community. So I'd love to be more involved in a purpose driven organization, whether it be a charity or something like that, or even working for like a media company, because I've always, like when I was a kid, I always wanted to work as a journalist.","c":34,"n":31,"i":"purpose","s":87},{"id":"Greta-010117-093","p":"Greta","t":"01:01:17","q":"And. Yeah, so cool. But I never did it. I don't think I would ever do it, but I'd love to work. it's Quite hard.","c":12,"n":19,"i":"leaving","s":62},{"id":"Greta-010125-094","p":"Greta","t":"01:01:25","q":"I'd be bloody struggling haha. So maybe something a little bit more related to media or TV or whatever. Yeah. I love economics and politics, so something like around that. So yeah, I'm, not necessarily a job title is what I'm after. I'd also like to be like managing people as well.","c":32,"n":11,"i":"status","s":47},{"id":"Greta-010155-095","p":"Greta","t":"01:01:55","q":"Thanks. Yeah. Because, you know, you've. I mean, I'm sure you have, but you've probably had a manager in your past that just did a horrific job. And you think I could do a way better job, right? You're like \"I've got notes\"","c":2,"n":4,"i":"work_content","s":54},{"id":"Greta-010211-096","p":"Greta","t":"01:02:11","q":"Yeah so I'd love that. Yeah. And just something to be involved with the community, wherever I am as well. So at the moment, like the last couple of years, I've been involved with some scholarship kids at [org]. So, yeah, it's really nice seeing like the clients or the customers, but from a different angle. Right?","c":38,"n":18,"i":"autonomy","s":0},{"id":"Greta-010233-097","p":"Greta","t":"01:02:33","q":"Yeah, yeah. So. Yes. So I'll still be working. Won't be retired, I assume. But if if I was on a yacht retiring [laughs] yeah, I, you know, going to work and not feeling like you're really dragging yourself out of bed each day and yeah, having a good community around me and having a really fulfilling out of work life is equally as important to me. So it would be a whole balance of things.","c":75,"n":31,"i":"purpose","s":89},{"id":"Greta-010322-098","p":"Greta","t":"01:03:22","q":"Yeah, that's a good question. I, I won't lie, I think I did my university time, like, really well, which was my goal, right? I got involved and everything, and I was you know, I spent every waking hour doing something, and so I'd probably just tell myself not to be so hard on myself as well, because I was always striving for perfection. And that. Yeah. Just to, like, really nurture the friendships I made in first year. And, you know, I took school really seriously in first year. All the years. Really. So I wouldn't, you know, tell myself to relax on that, because I still think that is really important. Yeah. But, yeah, just not to be so hard on myself. Like, I remember once I got, like, an A instead of an A plus, and I sobbed like, what's wrong with me? What is wrong with me? I can't, I can't, I cannot handle it. I look back and I'm like, who was I? So yeah, not to be so hard on myself. Go to the tutorials would be another one. And yeah, really nurture the friendships you do have.","c":2,"n":4,"i":"work_content","s":21},{"id":"Greta-010507-099","p":"Greta","t":"01:05:07","q":"So yeah, I would, I would, this is really like dark, but I would probably tell them, like, not to get their hopes up, really. Like, you know, at the end of the day, it's a job and you get paid to be here. Whereas if it was that fun, no one would be paid, right? So I guess just to like, yeah, not go to work and expect to be the crying tears of joy every day. It is work at the end of the day and work can be really hard. But I would, you know, tell them that the most important thing is probably building connections in your organization. Because especially in New Zealand, you never really know who'll be working at your next organisation or how you could get your next job right. It could be of knowing someone who knows someone. And I would also say like, you know, work your hardest to meet deadlines because that's the most important thing in any place of work, really. Because it does, you know, tell a lot. If you can't meet those deadlines and can't get on with certain people and whatever else. So it's a bit dark, but yeah.","c":4,"n":6,"i":"pay","s":3},{"id":"Willa-000346-001","p":"Willa","t":"00:03:46","q":"Oh. That's hard. Where to start?","c":0,"n":4,"i":"work_content","s":25},{"id":"Willa-000350-002","p":"Willa","t":"00:03:50","q":"Yeah. So I studied a conjoint of bachelor of commerce and bachelor of law, and I think like starting from the very beginning, going into university, there wasn't sort of much guidance over what is out there in terms of like courses, options, uni, non uni, what to do. So I remember in high school we had like a career guidance counsellor and she was like oh you're really good at English and history and you do like debating and you're quite argumentative. So you should do a Bachelors of Commerce and Law. And I was kind of like, okay, that sounds good. So then that's what I studied for five and a half years, did six months of profs.","c":10,"n":13,"i":"wellbeing","s":35},{"id":"Willa-000429-003","p":"Willa","t":"00:04:29","q":"And I think when I graduated, it was like a really tricky time because it was sort of Covid. So it was in 2021 that I finished studying. And then looking around for grad roles was pretty tricky, and I sort of knew that I enjoyed consulting because I did a bit of consulting in uni. I enjoyed being a lawyer, but I didn't really know what it meant.","c":76,"n":32,"i":"covid","s":60},{"id":"Willa-000451-004","p":"Willa","t":"00:04:51","q":"So my first actual job out of uni was doing business, like, billing analyst for a startup called [startup], which I had interned with before. So that was a really nice way of like getting into the workforce post uni.","c":0,"n":4,"i":"work_content","s":59},{"id":"Willa-000510-005","p":"Willa","t":"00:05:10","q":"And then I did a grad program at [professional firm], where I progressed to senior consultant in two and a half years. But it was sort of at that, let's say like three years of work experience where I'm kind of like, what do I actually want to do in the future? Because by that point I know myself better, I sort of know what direction I want to go in.","c":7,"n":0,"i":"big4","s":60},{"id":"Willa-000532-006","p":"Willa","t":"00:05:32","q":"So then I was like, okay, maybe I do want to become a lawyer. And that honestly took me months to decide because there was a lot of like, what is the opportunity cost? Because I'm doing so well in my career as a consultant. Do I really want to give that up? Start again. What are the risks like? I have to buy pet food for my cat. So what if suddenly I can't afford that anymore. So there was sort of a lot of conflict going on.","c":33,"n":6,"i":"pay","s":100},{"id":"Willa-000559-007","p":"Willa","t":"00:05:59","q":"Maybe I want to say honestly, six months, up to a year, which is why I found your like PhD thesis and research so interesting because it is like actually quite a lot of conflict that goes on even at a relatively young stage of your career. And I feel like I was super fortunate to find so I'm currently a junior legal counsel at [practical org].","c":10,"n":13,"i":"wellbeing","s":74},{"id":"Willa-000622-008","p":"Willa","t":"00:06:22","q":"So I did end up doing the... I know so cool! So I ended up transitioning into that legal space, but I think I was quite lucky to have found a path where they sort of acknowledged that consulting experience is a real experience. Whereas when I interviewed for other firms, they were like, oh no, it's not PQE. So you're starting at like the very bottom as a clerk. They weren't like that at all. So I guess that's a little bit about the career side of things as an intro. Yeah.","c":12,"n":19,"i":"leaving","s":48},{"id":"Willa-000706-009","p":"Willa","t":"00:07:06","q":"Amazing yeah.","c":6,"n":7,"i":"procedural","s":28},{"id":"Willa-000712-010","p":"Willa","t":"00:07:12","q":"University of Auckland.","c":9,"n":7,"i":"procedural","s":34},{"id":"Willa-000717-011","p":"Willa","t":"00:07:17","q":"It was fine. Like it was uni.","c":1,"n":4,"i":"work_content","s":4},{"id":"Willa-000902-012","p":"Willa","t":"00:09:02","q":"This is exactly what I want to do?","c":8,"n":7,"i":"procedural","s":50},{"id":"Willa-000941-013","p":"Willa","t":"00:09:41","q":"Yeah, I know.","c":6,"n":7,"i":"procedural","s":20},{"id":"Willa-000958-014","p":"Willa","t":"00:09:58","q":"Cool. Yeah, yeah. That's so interesting.","c":0,"n":4,"i":"work_content","s":9},{"id":"Willa-001010-015","p":"Willa","t":"00:10:10","q":"Yes, that [professional firm]. So it was mostly around consulting projects, internal audit, procurement. So you'd be working on projects maybe 3 to 5 at one time, and you'd be advising clients on, like, the internal processes, strength, weaknesses.","c":0,"n":4,"i":"work_content","s":66},{"id":"Willa-001032-016","p":"Willa","t":"00:10:32","q":"Because of my legal background, I had a pretty big focus on compliance. So for an example there's like a not for profit that work in social housing and sort of like mental health and wellbeing and supporting a lot of like Māori and Pasifika teens. So it was a really big Privacy Act audit for them because they have so much personal information kept in their systems. And there were stories about field people losing clipboards filled with like people like WINZ information. So that was really interesting.","c":23,"n":30,"i":"ethnicity","s":53},{"id":"Willa-001106-017","p":"Willa","t":"00:11:06","q":"And then doing a health safety and wellbeing audit for like a government entity that do a lot of NPI contracting, which is again super interesting because it's people going out into like farms with like minimal protective equipment, so called, and they're isolated quite a lot of the time. So how do you look after their well-being? So that was that was a bucket of my work.","c":13,"n":19,"i":"leaving","s":52},{"id":"Willa-001133-018","p":"Willa","t":"00:11:33","q":"And then I was seconded to [client] for the whole two and a half years, again, because of the legal background, and working with their legal team on like, a greenfield development. So looking at property developers working out the legal side of things, like looking at land disputes and whatnot. So that's yeah, a bit of the work I did at [professional firm].","c":30,"n":17,"i":"learning","s":43},{"id":"Willa-001158-019","p":"Willa","t":"00:11:58","q":"Yes, it was quite varied.","c":24,"n":19,"i":"leaving","s":0},{"id":"Willa-001216-020","p":"Willa","t":"00:12:16","q":"I'm just letting my cat in but continue.","c":5,"n":7,"i":"procedural","s":60},{"id":"Willa-001224-021","p":"Willa","t":"00:12:24","q":"Okay. Yes. Conjoint degree. Sorry about that.","c":1,"n":4,"i":"work_content","s":16},{"id":"Willa-001247-022","p":"Willa","t":"00:12:47","q":"Not at all.","c":9,"n":7,"i":"procedural","s":18},{"id":"Willa-001305-023","p":"Willa","t":"00:13:05","q":"There was a lot of tunnel vision. There wasn't much big picture thinking. It was very much past this paper. Do well in this exam, potentially start thinking about internships. Make sure you're doing extracurriculars. So I think there was not big picture at all. Very much. What do I have in the next few weeks? Okay. Let's go over that hurdle and then think about the next one.","c":1,"n":4,"i":"work_content","s":92},{"id":"Willa-001354-025","p":"Willa","t":"00:13:54","q":"Yeah. No, I think it was when I started to do papers that I enjoyed because there will be like contract law and you're like yuck. I don't enjoy any of this, but I think during my conjoint, I definitely enjoyed the commerce side a lot more. And maybe it was because there was more group projects. You got to meet more people. It was a little less competitive than law and a little less, you know, cutthroat. So that's when I was like, oh, I quite enjoy looking at businesses and figuring out how they can do better.","c":47,"n":15,"i":"rejection","s":94},{"id":"Willa-001430-026","p":"Willa","t":"00:14:30","q":"And I was quite interested in the sustainability side of things as well, because, you know, growth is sort of inevitable for companies, but how can you do it in a way where y
