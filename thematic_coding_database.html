ou're not sort of destroying the planet or destroying people's... Not lives, but, you know, like society and doing good things and not just making money. And then again, challenging be like, actually, do companies need to grow? Like, how does it actually work?","c":26,"n":16,"i":"values_fit","s":0},{"id":"Willa-001457-027","p":"Willa","t":"00:14:57","q":"So that's what made me really interested in the type of like work and internships. But I mean, it was also desperation. It was just like, I need work experience in my field. Let me apply to anything and everything. So yeah, to be honest, I don't think there was much luxury of choice. It's like, oh, these are the nice to haves. And then realistically, 'if I want to even find a job when I graduate, what do I need to do' type thing.","c":104,"n":23,"i":"transition","s":100},{"id":"Willa-001551-028","p":"Willa","t":"00:15:51","q":"Oh, yeah. It was like in 2019. Let me think. So the startup internship, it was my second internship. Yes, my second one. And it was sort of in a market analyst category. So I was looking at what the startup currently had to offer on the market and looking at how do they grow. Do they want to grow into new markets? Do they want to make new products? Do they want to do something different with the products? So it was a lot of research in my spare time because I guess, you know, intern, you're there for three months. You get given like a discrete project to work on and then doing a lot of interviews with the different stakeholders. So talking to the software developers, talking to the people who, you know, do the compliance, do the sales side of things. So it was all a mixed bag. And then it culminated into like a written report and sort of presentation to the CEO after that three month period. Yeah.","c":19,"n":2,"i":"interview_process","s":47},{"id":"Willa-001703-029","p":"Willa","t":"00:17:03","q":"I think it was Auckland Uni. They had a website called, I think CDES, CDES. And I was like career development, employment services, search type things. So it was like an Auckland uni specific one.","c":27,"n":17,"i":"learning","s":62},{"id":"Willa-001726-030","p":"Willa","t":"00:17:26","q":"but I mean at the same time, it was like student job search, seek, googling where to find internships.","c":19,"n":2,"i":"interview_process","s":32},{"id":"Willa-001745-031","p":"Willa","t":"00:17:45","q":"I finished all my papers in 2021, but it was... The graduation ceremony didn't happen until 2022 because of Covid.","c":77,"n":32,"i":"covid","s":100},{"id":"Willa-001805-032","p":"Willa","t":"00:18:05","q":"It would have been February 2022.","c":1,"n":4,"i":"work_content","s":8},{"id":"Willa-001820-033","p":"Willa","t":"00:18:20","q":"So I went from uni back to [startup] for six months. And then to [firm].","c":0,"n":4,"i":"work_content","s":69},{"id":"Willa-001854-034","p":"Willa","t":"00:18:54","q":"[start up]","c":8,"n":7,"i":"procedural","s":3},{"id":"Willa-001913-035","p":"Willa","t":"00:19:13","q":"It was quite stressful because it was the moment where you realized that you had actual responsibilities, and like the actions you would make, like the decisions you would make and the actions you would take, had real world consequences. Like looking back on it now, it's kind of like, 'oh no, it was totally fine'. But I remember in the moment being like, oh my God, like, 'What if I don't know what to do? And then they lose like thousands of dollars because of me, and it's all my fault'. But I had really good managers who coached me through that mindset, and they were like it's only $10,000. That doesn't matter. And you're like, what? It doesn't matter in the grand scheme of things. So you become desensitized to it quite quickly.","c":10,"n":13,"i":"wellbeing","s":35},{"id":"Willa-001956-036","p":"Willa","t":"00:19:56","q":"But I think it was actually really hard doing an eight hour working day because uni is very much stop start, stop, start. You have lectures, you do something else, have lectures again, and it's only exam time where you're cramming like 12, 14 hour days. But that's quite... In a compact time frame. And I remember like the shock thinking, oh, there's no longer mid-sem[ester] break. Like I don't have Christmas holidays anymore? So I think there was also the component to working that I entirely did not expect. It's like I just don't get to go on holiday for like two, four weeks and do nothing.","c":12,"n":19,"i":"leaving","s":52},{"id":"Willa-002049-037","p":"Willa","t":"00:20:49","q":"That's also a great question. I think when I had my internships, it was very difficult because in my head I'm like, oh, these people are very scary and intimidating. But because I had done like a couple internships by the time I started sort of full time at [startup], it was like a better sense of where you fit in and how you place. And to be honest, working at like [startup] or [firm] or [current org], the dynamics change every single time. So you find your personality and the way you interact with people change also depending on like what level they're at, you know, their age and sort of like all of these other considerations. So it was definitely tricky. And I think it takes months to sort of figure out where you are, how you act, and how you talk to who.","c":0,"n":4,"i":"work_content","s":34},{"id":"Willa-002205-038","p":"Willa","t":"00:22:05","q":"I think it was.... They didn't see themselves as... Not better than me necessarily, but they were very open to hearing my opinions because they're like, 'oh, it's great that we have a fresh set of eyes' because often I think like, 'oh, I actually think this, but what do I know? So I'm not going to say it'. But they were constantly always asking me, what do you think? Like, do you have any questions? So they very much opened the door for me to express my opinion. And even if what I said was totally wrong, they were like, oh, that's a good point. But have you considered X, Y, and Z? And then you're like, oh yeah, actually never mind. And they're like, no. Like it's a fair point. But now you have all the information, you know. So now you know why that wouldn't have necessarily worked in that situation.","c":3,"n":4,"i":"work_content","s":51},{"id":"Willa-002317-039","p":"Willa","t":"00:23:17","q":"Again, this was just like such an interesting turn of events because I was applying for the grad roles at [firm] and everywhere else. And you know how grad roles don't start until like a year or six months into the future? So by the time I started [startup], I sort of, I already knew that I had my grad role lined up, but I didn't tell anyone. But I think they sort of figured it out because I didn't say outright, oh, I'm only going to be here for six months. And to be honest, the role that I jumped into was only for like a fixed term anyway with the flexibility of extension. So after it got to like months 4 or 5 and they're like, oh, are you interested in extending blah, blah blah? And I'm like, actually, I have another role lined up. And they were like, yeah, cool, fine. So that's how the jump sort of went.","c":17,"n":5,"i":"balance","s":0},{"id":"Willa-002418-040","p":"Willa","t":"00:24:18","q":"It was super nerve wracking because my direct reporting manager the person who was really lovely and really open to my suggestions, he was super supportive and he was like, 'oh, that's so good'. Like, 'yeah, that's exactly what you want to do in your career. You don't want to be doing this for the rest of your life. Amazing. Go for it'. But his manager. So, like, my big boss, he was not very happy. And then during my last few months, there were situations where I would be, like, cut out of meetings because they were like, what's the point in involving her? And I think at one point someone made a comment like to the big boss, let's say his name was like Steve. He was like, 'oh, Steve, how does it feel to have a knife in your back?' Which I thought was very dramatic because I was getting paid very a little bit over minimum wage, doing like a very like grunt work type job where anyone could have really done, like, I just thought it was all very dramatic. But at that point, yeah, I was really upset and I was quite sad over it all because I'd interned there before. I'd had such great experiences.","c":4,"n":6,"i":"pay","s":30},{"id":"Willa-002528-041","p":"Willa","t":"00:25:28","q":"And a great manager! And then suddenly, because I was leaving, it was like a big shift and my manager would be like, oh, 'why aren't you in this meeting?' And I'd be like, 'what meeting?' And he's like, oh no, okay. But he isn't really in a position to say anything about it as well. So it was all very awkward at the end and a lot of hard. A lot of my team didn't know I was actually leaving until I was like, oh, by the way, from next week onwards, you'll have to do this task instead because I'm leaving. Then everyone went, what? You're leaving? So that was a little bit awkward.","c":11,"n":9,"i":"mentor_good","s":67},{"id":"Willa-002604-042","p":"Willa","t":"00:26:04","q":"No, no they didn't.","c":9,"n":7,"i":"procedural","s":21},{"id":"Willa-002637-043","p":"Willa","t":"00:26:37","q":"I did not!","c":8,"n":7,"i":"procedural","s":22},{"id":"Willa-002640-044","p":"Willa","t":"00:26:40","q":"I regret it, I should have had a break. I think at that point it was very much, oh, I might as well just work until my last day of notice and then start the grad role because I was like, I don't need a break, I'll be fine type thing. I didn't realize that it takes time to transition between like, jobs and different working environments.","c":13,"n":19,"i":"leaving","s":72},{"id":"Willa-002712-045","p":"Willa","t":"00:27:12","q":"It was totally different because I came in with like a grad cohort instead of just, like starting a job. So it was very structured, you know? They got out the catering. They got all the big dogs into the room and like, tell us what it was about. You got a buddy that you talk to all the time. You had sort of like a partner that was like your partner. This is the partner you report to. So it was very structured.","c":1,"n":4,"i":"work_content","s":48},{"id":"Willa-002741-046","p":"Willa","t":"00:27:41","q":"I would say maybe around like 25 to 30. Like there were quite a few.","c":12,"n":19,"i":"leaving","s":33},{"id":"Willa-002814-047","p":"Willa","t":"00:28:14","q":"It was so difficult because it was a professional services client facing private company. So immediately it was drilled into you that you need to be billable and you're expected to have this amount of utilization. And it was very much like a structured reporting, like you reported to a senior consultant who reported to a manager who reported to a director who reported to a partner. The benefits of [firm] being like... The consulting team was quite small when I started. So there weren't as many layers. And you could get to a partner, like talk to a partner pretty quickly, and they were pretty approachable and easy. But that was one side, the billable side. The quite hierarchical side. And the fact that you were working on multiple engagements at once, so you had to context switch between different projects, which was also quite tricky at the beginning.","c":37,"n":12,"i":"billables","s":50},{"id":"Willa-002926-048","p":"Willa","t":"00:29:26","q":"I think This sounds very cheesy, but I think it was just the culture side of things because startups are so relaxed. You'd rock up to work at 10:00 and no one would care like and at [firm]. And I'm sure all other, you know, similar private firms, if you weren't there by 830, someone would mentally note. And if you didn't, if you were like... Kept being late to work or if you took longer lunch breaks or if you left at 5:00 on the dot, people would start making comments, which is something that, to be honest, it was fine because you learned pretty quickly like, oh, I have to be here early, leave a little bit later. So I think that was sort of that culture side of things, and it was just a big company with lots of internal politics. Yeah, with a lot of, you know, equity partners doing this, you little grad doing that. And you were working with different managers. You didn't have one direct manager. So that was quite tricky because all the managers expected different things as well.","c":4,"n":6,"i":"pay","s":7},{"id":"Willa-003042-049","p":"Willa","t":"00:30:42","q":"I guess it was nice having a buddy. I guess the other complicating factor was the fact it was during Covid and the grads... I think it was... I don't know what the levels were, but it was the level where you could go into the office, but you could also stay at home. So of course, all the grads we were kind of told, look, wear a mask in the office, but still be in the office.","c":54,"n":32,"i":"covid","s":100},{"id":"Willa-003105-050","p":"Willa","t":"00:31:05","q":"So there weren't too many people around, but the people that were around were super nice and approachable, and you could just sort of go to their desk and be like, oh, is it fine if I leave a little bit earlier? I have like a doctor's appointment and they're like, oh yeah, it's fine. So I think it was good having people on the ground and giving you that support.","c":0,"n":4,"i":"work_content","s":47},{"id":"Willa-003141-051","p":"Willa","t":"00:31:41","q":"It was like a 6 to 8 month decision I think. Yeah, in mid 2023. So after I'd been there a year and a half, I started to not love the work I was doing. I had a really great team, but the work just wasn't interesting to me anymore. Like, I felt like I made a decision where I was like, 'I don't want to be doing this for the rest of my life. And if I want to move, when should I move? How should I move?' And I think the legal industry has quite a reputation of being unapproachable. And it's sort of you have to start as a clerk and work your way up to being like associate senior, associate partner. It was very... You come in at the very beginning and then you work your way up, which I found to be terrifying. So I had I had a coach, mentor at [firm] from a different office and a different service line, which was really helpful because I could be entirely transparent with her and say, look, I want to move into a legal career, but I don't know how to do it. I don't know what it looks like. And she was like, oh, there's like a few lawyers in the office. Do you want to chat to them about it? So I spoke to some of the lawyers, ex lawyers in the office, but I found that wasn't super helpful because there was a reason why they were working at [firm] and not as a lawyer. So they were saying like, yeah, being a lawyer is nice, but blah, blah, blah, blah, blah where I was hoping to hear more of no, this is a good decision.","c":15,"n":9,"i":"mentor_good","s":58},{"id":"Willa-003320-052","p":"Willa","t":"00:33:20","q":"Yeah, it was tricky. Yeah. And then also not wanting people to know that I was looking to leave because then you get... Not obviously, but you get taken off projects. People are like, oh, we don't need to invest in her as much because she's leaving. Yeah. And then there was just a lot of internal politics at work that I wasn't comfortable with, and it got to a point where I was like, I don't want to work here anymore at all. If I leave, I might as well try a shot at law.","c":2,"n":4,"i":"work_content","s":79},{"id":"Willa-003349-053","p":"Willa","t":"00:33:49","q":"So I went to a couple of recruiters. So I actually found this [current] job via [legal recruiter], and they were really, really lovely. They were saying like, oh, it's totally valid. We've heard all of this before. Like, it's totally fine and we understand where you're coming from. And they recommended this job to me and then I just applied for it. But out of my own volition, I also did get another offer from quite like a boutique type of law firm, but they were quite interesting where they told me that they needed to start me on like $58,000, which I think is like minimum wage. Yeah.","c":20,"n":19,"i":"leaving","s":67},{"id":"Willa-003430-054","p":"Willa","t":"00:34:30","q":"Yeah. I was like, I've got a cat to feed. I've got rent to pay. I can't be doing this.","c":8,"n":7,"i":"procedural","s":89},{"id":"Willa-003436-055","p":"Willa","t":"00:34:36","q":"Exactly. I spoke to a couple of lawyers and they said that the like, the managing counsel was awful to work with and that he has not a great reputation for being like a good litigant in the community. And I sort of thought, I don't want to be moving from, like, a well-paying job, not great work, great team to somewhere where it was okay work, awful pay and potentially awful working environment.","c":10,"n":13,"i":"wellbeing","s":74},{"id":"Willa-003532-056","p":"Willa","t":"00:35:32","q":"Yeah, sure. So Sorry. I'm just thinking about how.","c":3,"n":4,"i":"work_content","s":24},{"id":"Willa-003552-057","p":"Willa","t":"00:35:52","q":"In the private client industry. It's all about billables, right? It's billables that matter. But along with that is also how much you can complain about how busy you are. So often the people that were doing well and being promoted were sort of like the 'finance bros archetype', where they play golf during the weekends, they go sailing, they gamble, they've got horses and they're like, 'oh bro, I'm so busy'. Over the weekend I had to work like 24 hour days in the weekend. And I was like, yes, because you didn't do any work during the week. And that was sort of the culture that was doing well.","c":28,"n":12,"i":"billables","s":0},{"id":"Willa-003627-058","p":"Willa","t":"00:36:27","q":"And there were a few partners in particular that would gossip a lot about the juniors. So I would have a partner who was really nice, which made it all the more interesting. He would go to me and he's like, you know, like, let's call her Sally. Like, Sally's doing such an awful job. I'm going to have to put her on a performance management plan. And I'd be working with Sally, and Sally would be my friend. And he'd be like, you know, like Sally isn't contributing. You know, this place isn't a charity. We don't give out money for free. And I'm like, I'm having lunch with Sally in 30 minutes. Like, you shouldn't be telling me this.","c":4,"n":6,"i":"pay","s":43},{"id":"Willa-003702-059","p":"Willa","t":"00:37:02","q":"And there wasn't much trust. And it was very clear who were the partner's favourites. And there was one person in particular that I didn't get along with, because they were very much of the complain about how busy you are. Like, talk, a lot of smack behind other people's back. And he was constantly getting promoted over me.","c":31,"n":12,"i":"billables","s":62},{"id":"Willa-003722-060","p":"Willa","t":"00:37:22","q":"And then that's where I sort of got the message that was like, okay, no matter how hard I work, how hard I like, do well, and clients loved me and how much positive feedback I get, it wouldn't really matter because I wasn't complaining enough. And I don't really like to complain about how busy I am because what's the point?","c":31,"n":12,"i":"billables","s":54},{"id":"Willa-003742-061","p":"Willa","t":"00:37:42","q":"So it was sort of those things, and it was in so we have promo rounds in March. It was in March where I found out that he got promoted over me, where I was like, literally, what's the point? I might as well do something different. So that was one side of it.","c":3,"n":4,"i":"work_content","s":51},{"id":"Willa-003801-062","p":"Willa","t":"00:38:01","q":"And the other side is there were just sort of comments because I once got told that I was put on a proposal due to diversity and equity reasons. The partner was saying, like, there are too many white men in this proposal. We should just put [Willa's] photo in it. And I actually had a friend who came to me in confidence and was like, look, just letting you know this has happened. I'm really uncomfortable by it, but I don't know what to do because... He was like on the same level as me. So we were both like very bottom. And he was like, look, this is uncomfortable. I don't know what to do. I think I should just let you know, I'm really sorry that I didn't... I couldn't say anything. And I was like, no, fair enough. Thanks for letting me know.","c":70,"n":25,"i":"confidence","s":17},{"id":"Willa-003847-063","p":"Willa","t":"00:38:47","q":"And I was a bit cheeky because I messaged the partner and I was like, oh, hey, I saw my name's on this proposal. Is there anything you need me to do? And then he Was like, and then he was like, no, don't worry about it. We don't have time for you to like give part of the presentation. But I'll let you know if you can contribute. And I was like, cool. That's fantastic to know. Thank you. So that really.","c":1,"n":4,"i":"work_content","s":48},{"id":"Willa-003914-064","p":"Willa","t":"00:39:14","q":"It's fine. Yeah. But I mean, I can look back and laugh about it now, but at the moment, because I think... at the time it was awful. I was like, oh my God, I'm a diversity hire. This is the only reason why I'm here.","c":2,"n":4,"i":"work_content","s":82},{"id":"Willa-003930-065","p":"Willa","t":"00:39:30","q":"But it was really good to have a team around me. Like at my similar level, the juniors who were like, no, that's ridiculous. They're just being stupid. Like, you're doing so well. You're like one of the highest performing team members. Don't even think about that. So that was really nice. And I think it was the team at my level that actually convinced me to stay as long as I did.","c":3,"n":4,"i":"work_content","s":51},{"id":"Willa-003959-066","p":"Willa","t":"00:39:59","q":"Otherwise It would have been dark.","c":3,"n":4,"i":"work_content","s":14},{"id":"Willa-004009-067","p":"Willa","t":"00:40:09","q":"Yeah. But I actually went to my reporting manager about this, And then he was really nice. He was like, oh, that's not true at all. You're not a diversity hire. And then I was like, do you think I should say anything about it? And he gave me very realistic advice. He was like, if you do, I'm fully supportive. I'll be in the room as you do it, but just know that it could be career limiting. And I was like, that's really true. And I really, really appreciate his honesty because he could have said, oh yeah, go for it. You know, do what's right. I'll be there, support you or I won't be there to support you. The fact that he was like, you can do it. It's up to you completely. It could be career limiting. So think about how to use this, which I thought was really, really valuable advice.","c":39,"n":28,"i":"advice","s":9},{"id":"Willa-004131-068","p":"Willa","t":"00:41:31","q":"I just started the job, I guess.","c":0,"n":4,"i":"work_content","s":31},{"id":"Willa-004144-069","p":"Willa","t":"00:41:44","q":"Oh, this is a good question because it's still quite fresh.","c":20,"n":19,"i":"leaving","s":41},{"id":"Willa-004151-070","p":"Willa","t":"00:41:51","q":"Since September or, like, late August. So a couple of months? Yeah, I still feel like a baby. It was tricky due to two reasons. One, the subject matter was entirely different because I was quite confident being a consultant and, you know, making pretty PowerPoints and giving these speeches and presentations. It was really difficult to, like, tap back into the legal advice side of my brain that was dormant for like three or like two and a half, three years to be like, I'm no longer a consultant, I'm giving legal advice. These are my obligations as a lawyer. So technically it was really tricky. And it was a little bit embarrassing because I like went back to my uni notes and I was like, what on earth are they talking about? And I was like, oh yeah, I remember vaguely. So that side was tricky.","c":41,"n":25,"i":"confidence","s":43},{"id":"Willa-004246-071","p":"Willa","t":"00:42:46","q":"And it was also tricky because my team is really small. There are only two other lawyers in Auckland.","c":1,"n":4,"i":"work_content","s":76},{"id":"Willa-004257-072","p":"Willa","t":"00:42:57","q":"Yeah. So you go from like a team of 50 to a team of three and there weren't any sort of formal, you know, induction or training because it's like quite a small organization.","c":24,"n":19,"i":"leaving","s":36},{"id":"Willa-004338-073","p":"Willa","t":"00:43:38","q":"I was feeling so happy. I think I no longer had nightmares about work. And I was like, I'm free. I'm free from Billables and I'm free from these, like, weird internal politics. And I get to be a lawyer. And I quickly found that the technical subject matter of things was exactly what I wanted to do. Yeah.","c":31,"n":12,"i":"billables","s":85},{"id":"Willa-004400-074","p":"Willa","t":"00:44:00","q":"And I'm like it's coming back. Like, realistically, I could see this as a career because in uni it was like I couldn't really see being a lawyer as like a long term career for me, and it's because what is taught at uni is so different to what is taught at profs. And again, super different to what is actually on the job on the tools.","c":78,"n":24,"i":"health_change","s":100},{"id":"Willa-004431-075","p":"Willa","t":"00:44:31","q":"Because law school especially in [city] uni is a lot about theory and it's a lot about applying the law to these like quite bizarre cases that would never happen in real life. There weren't many of the like legal writing skills or like oral advocacy skills or as lawyer, how do you actually give advice? And a lot of those learning gaps were filled in profs where the modules you did was like a pretend court session, a pretend interview, a pretend negotiation. So it was more of learning those actual, I would say, like softer skills of how do you communicate to someone in the business?","c":101,"n":6,"i":"pay","s":100},{"id":"Willa-004511-076","p":"Willa","t":"00:45:11","q":"Because I think it's different between in-house and firms as well, because in in-house, I quickly found was that everyone is your client. It's not the fact that you don't have a client, it’s that everyone is your client. So when you're at your desk at any time of the day, people would go to you and say, oh, I've done this. Was that illegal? And then you quickly have to pick apart and be like, what exactly did you do? When did you do this? To what extent did you do this? No, it's not technically illegal, but you definitely shouldn't have done that.","c":1,"n":4,"i":"work_content","s":68},{"id":"Willa-004544-077","p":"Willa","t":"00:45:44","q":"It's super interesting.","c":9,"n":7,"i":"procedural","s":32},{"id":"Willa-004547-078","p":"Willa","t":"00:45:47","q":"Yeah. And it's how do you package the, like, legal theory side of things? It's like, oh, well this was a breach of contract because of clause blah blah blah. They don't care about that. They want to know in layman's terms, but like practically like, what should I do now?","c":123,"n":26,"i":"uni_gap","s":50},{"id":"Willa-004608-079","p":"Willa","t":"00:46:08","q":"I do enjoy it. I enjoy it a lot. Yeah.","c":3,"n":4,"i":"work_content","s":32},{"id":"Willa-004622-080","p":"Willa","t":"00:46:22","q":"Yes, definitely a better sense of purpose because in consulting you very much just give advice. You say what should be done. You don't know what happens. You don't know about the implementation side of things, whereas in law they actually take the advice you give them because they have to. So that's super interesting. It's more fulfilling, I found.","c":75,"n":31,"i":"purpose","s":100},{"id":"Willa-004643-081","p":"Willa","t":"00:46:43","q":"And there's like actual impact behind your job, especially because I mean it's rugby and everyone is obsessed with rugby in New Zealand. And to be honest, I don't care about rugby at all. Like it's fine, I'll watch the game, but I'm not like a diehard rugby fan. Like everyone... Everyone at work is like a diehard rugby fan, so I think their level of enjoyment has had another level where I'm like, oh, I love being a lawyer and I love law. And, you know, working with like the [team] IP and doing all of these sponsorship negotiations, it's like really cool stuff. Do I care about the sport? No.","c":34,"n":31,"i":"purpose","s":53},{"id":"Willa-004804-082","p":"Willa","t":"00:48:04","q":"Oh my God, that's so funny.","c":2,"n":4,"i":"work_content","s":25},{"id":"Willa-004810-083","p":"Willa","t":"00:48:10","q":"He's like, you idiot? Because I work with quite a few ex All Blacks and I. Oh yeah, I don't know them, I don't know the ex all blacks like our CEO is an ex all black and I'm like who's this dude. Like who's this random dude? And it's like that's all black. And I'm like no way. Cool.","c":20,"n":19,"i":"leaving","s":37},{"id":"Willa-004846-084","p":"Willa","t":"00:48:46","q":"It is quite a positive work environment. But then I'm like, oh, I feel bad. I'm not excited enough because whenever there's a game, they like put it in the kitchen and everyone goes to watch and I'm like, oh, okay, I'll go and watch. But I do feel like I'm slowly getting into it because it's like everyone's into it. It's like such a good vibe. It is fulfilling seeing like the work you do translated on in like an actual match on the big screen. So I'm like, okay, I'm slowly coming around to it. But I remember when I started, I had this like huge culture shock. I was like, why is everyone so obsessed with the sport? Okay. That makes sense. I work in this type of organization.","c":75,"n":31,"i":"purpose","s":78},{"id":"Willa-004937-085","p":"Willa","t":"00:49:37","q":"I think it's the amount of emails I can clear from my inbox. It's like the amount of contracts I can get signed.","c":0,"n":4,"i":"work_content","s":69},{"id":"Willa-005002-086","p":"Willa","t":"00:50:02","q":"That's so interesting when you say implied because I find that I'm actually busier and [current org] than I was at [firm], because [firm] like every six minutes, you had to, like, log your time. I'm wasting so much time doing this. And it's the thought of, like, I need to be busy. I need to be productive. I need to be, like billable. So I, like, don't get fired. Or so I progress further in my career. I need to be like getting clients and getting more work. And that took up maybe, honestly, 60, 65% of my brain. And then the actual 35% of my brain is actually doing the work.","c":37,"n":12,"i":"billables","s":50},{"id":"Willa-005037-087","p":"Willa","t":"00:50:37","q":"Whereas at like an in-house role, you're still productive like eight hours of the day, but there isn't an expectation for you to, like, flaunt it or for you to, like, work overtime so you can like, make up those like silly little figures. And I think speaking to a lot of people who have come out of that industry, they're like, oh yeah, it's not a good way to measure productivity. And it's just a way to like, build clients. But it's not actual, you know, representative of anything.","c":31,"n":12,"i":"billables","s":0},{"id":"Willa-005115-088","p":"Willa","t":"00:51:15","q":"It does.","c":5,"n":7,"i":"procedural","s":13},{"id":"Willa-005131-089","p":"Willa","t":"00:51:31","q":"Yeah, I think so.","c":6,"n":7,"i":"procedural","s":22},{"id":"Willa-005141-090","p":"Willa","t":"00:51:41","q":"I think there's a lot of information out there on what you should and shouldn't do, which I found to be useful, but also like very unhelpful because it just makes you more stressed because there's so much information out there about like what to do when, when is it too late to change? Because even a year and a half of my career or will like two years. I was like, oh my God, it's too late for me to change where actually it isn't.","c":48,"n":20,"i":"somatic","s":38},{"id":"Willa-005207-091","p":"Willa","t":"00:52:07","q":"And I think the legal industry is getting better at this. in-House is definitely a lot better at this than private practice. But there isn't that much of a mystery to the legal career, and it is not unapproachable. I want to say where, talking to my friends who are lawyers, and then talking to my friends that used to be lawyers and they're now like, changed careers and whatnot. They're all like, oh, you know, it's like this. They only very much talk about the negatives of it. They don't really talk about and... Not the positives, but they don't offer too much of the benefits. But I think I've also been like incredibly lucky in just like timed things quite well to get to where I am today. Yeah.","c":13,"n":19,"i":"leaving","s":32},{"id":"Willa-005309-092","p":"Willa","t":"00:53:09","q":"Yeah it's super cool.","c":6,"n":7,"i":"procedural","s":33},{"id":"Willa-005322-093","p":"Willa","t":"00:53:22","q":"I want to be overseas. That's a big thing. Yeah, but I think I still want to be doing law. And I do want to try private practice because I want to know what it's like. And I feel like I won't be shocked at Billables and I won't be shocked at, like, you know, the expectation to work over time. But I'm quite curious to see what that's like in a legal industry rather than like a management consulting industry.","c":28,"n":12,"i":"billables","s":31},{"id":"Willa-005400-094","p":"Willa","t":"00:54:00","q":"Just like, don't stress. Like it's literally fine. No one cares about your grade, in like, international business. 202. And I think, I think I stressed too much at that point, whereas like it will all work out and that there isn't one path. Like you don't need to get a clerkship to become a lawyer, and you can just literally do whatever you want and it will probably be fine.","c":68,"n":20,"i":"somatic","s":43},{"id":"Willa-005434-095","p":"Willa","t":"00:54:34","q":"I think... Think about why you want to do it. Because you might just be told to do it. When actually it might potentially not be for you. So have a think. Like think of the things you enjoy doing, like outside of class. And just like in general. And do you think a legal career would benefit or like match up to those things? Because to be honest, I think I'd be pretty happy as, like a high school teacher, you know?","c":1,"n":4,"i":"work_content","s":68},{"id":"Willa-005519-096","p":"Willa","t":"00:55:19","q":"Don't do it. No. I'm kidding. Don't do it. Oh, that's tricky, because, yeah, all I'm thinking is don't do it.","c":1,"n":4,"i":"work_content","s":68},{"id":"Willa-005532-097","p":"Willa","t":"00:55:32","q":"Yeah. Just don't do it.","c":9,"n":7,"i":"procedural","s":16},{"id":"Willa-005541-098","p":"Willa","t":"00:55:41","q":"But yeah, it's been hectic.","c":2,"n":4,"i":"work_content","s":4},{"id":"Ellis-000551-001","p":"Ellis","t":"00:05:51","q":"I'm [city], born and bred, That was one of the reasons I wanted to come and work here. Alongside the great work environment and the opportunity to make change. So I joined [org] in late 2021. So coming up four years ago having worked at [prior org] before that I moved I came here as an organizational development manager. And so my background as you're probably aware is more of that OD space that that positive, proactive side of people and culture.","c":30,"n":17,"i":"learning","s":95},{"id":"Ellis-000703-002","p":"Ellis","t":"00:07:03","q":"I'd never done HR in my life. I've studied APSY. I'm a smart guy, and I've worked it out as I went along, which is really cool. So I was straight in here doing REM. I was straight in here doing disciplinaries, performance. I wasn't doing too much recruitment. We outsource a lot of that. But being involved in the recruitment process, and maybe designing a slightly better recruitment process, that sort of thing. So, yeah, did that sort of straight away, but also doing a lot of OD focus. Bringing in leadership development programmes and stuff like that.","c":29,"n":27,"i":"mentor_bad","s":93},{"id":"Ellis-000803-003","p":"Ellis","t":"00:08:03","q":"Four including the person who was leaving? So three left.","c":1,"n":4,"i":"work_content","s":40},{"id":"Ellis-000814-004","p":"Ellis","t":"00:08:14","q":"No, I... it's an interesting one. I probably already, like when you get those opportunities, those things happen. I like, I was, I left, I, I'll waffle but I left [prior role] went and got married had my honeymoon, came back on the Sunday before we, I started here. Me and my wife found out she was pregnant. And then the next day I started here and I was like.","c":1,"n":4,"i":"work_content","s":76},{"id":"Ellis-000839-005","p":"Ellis","t":"00:08:39","q":"I was like, f***. And then my boss leaves and I was like, oh my God, all this change. And it's one of the probably the moments I'm most proud of because I am like not traditionally amazing with change and uncertainty. I made a genuine effort to be like, oh, I'm going to throw myself into this and make it treat this as an opportunity. I would say that it probably took 6 to 9 months of really recognizing there was a space to step into, because there was an element of getting to know the business.","c":11,"n":9,"i":"mentor_good","s":87},{"id":"Ellis-000909-006","p":"Ellis","t":"00:09:09","q":"Because the [executive level role (HR)] was burned off, the rest of the team were probably a little bit feeling a certain way about that and feeling a little bit I suppose threatened because if one of your colleagues loses their job or resigns and you come in the next day, they're thinking, oh, who's next? Right? So then they were expecting me to basically field the [EXECUTIVE LEVEL ROLE (HR)] and the questions they'd go to her for would then come to me.","c":13,"n":19,"i":"leaving","s":100},{"id":"Ellis-000942-007","p":"Ellis","t":"00:09:42","q":"I'm new, and I've never done this stuff before. Yeah. I really, and I think also I was the first OD manager that [org] ever had. So they don't even know what the hell and OD was supposed to be doing.","c":2,"n":4,"i":"work_content","s":89},{"id":"Ellis-000954-008","p":"Ellis","t":"00:09:54","q":"So they just see me as the new [executive level role (HR)]. So yeah. Anyway, from a formal point of view we just worked that way for about 18 months maybe less, maybe a year. And then I moved into a head of people and culture role. So basically leading the people and culture function. I was in the SLT meetings every week, but not a formal member of SLT. Didn't go to the board meetings and stuff like that. And then after about six months of that due to probably me getting an offer somewhere else as well. That my role changed to [executive level role (HR)]. So a full member of the SLT and the and running the Health and Safety subcommittee of the Board and people subcommittee of the board, in every board meeting and yeah, yeah, with that comes the good stuff. So","c":1,"n":4,"i":"work_content","s":28},{"id":"Ellis-001050-009","p":"Ellis","t":"00:10:50","q":"So yeah. So I would say, and me and my wife talked about this a bit, but I'd say the last year is the first time I've actually felt truly comfortable at [org], because it's been always out of my comfort zone, always learning, always learning new stuff.","c":4,"n":6,"i":"pay","s":87},{"id":"Ellis-001107-010","p":"Ellis","t":"00:11:07","q":"Right on the edge of the next thing. And then it's literally the last year. I'm like, okay, I know this, I know this business, I know what I can do well. And I'd say in this next 12 months, it's time for me to be like, okay, what's what else can I do? Yeah, yeah.","c":2,"n":4,"i":"work_content","s":71},{"id":"Ellis-001121-011","p":"Ellis","t":"00:11:21","q":"So it's been pretty hectic.","c":2,"n":4,"i":"work_content","s":18},{"id":"Ellis-001127-012","p":"Ellis","t":"00:11:27","q":"Yeah four years. And then before that four years at [prior org]. So I went in there as the talent and development coordinator. Just an entry level role. I was in that for about five months before they created an OD advisor role for me. And then just through general, every 12 months, I became senior OD adviser. OD lead and leading up the OD function there just because of internal movement and opportunities there as well.","c":30,"n":17,"i":"learning","s":100},{"id":"Ellis-001200-013","p":"Ellis","t":"00:12:00","q":"Well, yeah. Well, I suppose I'm not really in the, you probably argued that after my first year here, I've no longer been in the OD function. But yeah, it's it's definitely where my, I definitely understand the value of it a lot. Which a lot of, I suppose general people and culture come from that more HR background. So but if you're actually trying to change culture, change the way things work, you need to build those firebreaks as opposed to just fighting fires. So I'm pretty big on the way we plan as a people and culture team. It's a non-negotiable to have a couple of those things bubbling under the surface every quarter.","c":2,"n":4,"i":"work_content","s":82},{"id":"Ellis-001240-014","p":"Ellis","t":"00:12:40","q":"It's a, it's an interesting one because we call a lot of what we say strategic, do strategic. But it's probably more tactical. Because we're looking on that, how can we make things better over a 1 to 2 year horizon? Or how can we chip away at this bigger problem with little, little things and iterate towards a better culture or a better way of working or whatever it might be.","c":3,"n":4,"i":"work_content","s":100},{"id":"Ellis-001312-015","p":"Ellis","t":"00:13:12","q":"To be honest like my I've got two people and culture business partners that report to me. I've got a health and safety consultant that's coming in a couple of days a week that does... That's a subject matter expert in health and safety. And we've got a a people and culture coordinator that is sort of shared with finance. So on a day to day basis, my I'd say my role is more at that strategic level, supporting the SLT, with big initiatives. And I suppose there's board level work and stuff like that. So I we have 3 or 4 health and safety people... Health and safety committee meetings every year. And there's a lot of papers that go up to them to do that sort of stuff. There's dealing with [external], which is our at the parent company that sits between us and the [stakeholder]. And then there's leadership of the team. And I suppose I would say I'm probably closer to the action than a lot of [EXECUTIVE LEVEL ROLE (HR)]s would be because, just of the size of the organization.","c":18,"n":9,"i":"mentor_good","s":28},{"id":"Ellis-001415-016","p":"Ellis","t":"00:14:15","q":"Yeah. And, you know everyone. So it's probably helping coach, and helping with escalations from the business partners. And yeah, just supporting that sort of stuff. Yeah. I've always got a few projects and things I'm working on on the go.","c":3,"n":4,"i":"work_content","s":32},{"id":"Ellis-001430-017","p":"Ellis","t":"00:14:30","q":"Yeah, I suppose so. I don't, I don't have, like, a portfolio of business leaders I support, but I, I'd say I support the people supporting them because... And make sure everyone's all joined.","c":11,"n":9,"i":"mentor_good","s":70},{"id":"Ellis-001449-018","p":"Ellis","t":"00:14:49","q":"Yeah, I'd say so, yeah, yeah. So making sure that people and culture priorities are set, like because everyone's got their business units and stuff like that and there's recruitment going on, all that sort of carry on. But equally, we've got a gender action plan that we've got to deliver to. So if we break that down, we've committed to doing work on our ways of working. So someone's got a project around that and making sure we're on track with those things.","c":91,"n":33,"i":"gender","s":100},{"id":"Ellis-001516-019","p":"Ellis","t":"00:15:16","q":"Yeah, yeah. So I'd say it's largely leadership and strategic. But just because of the size of the organization, you flow down into the detail when required.","c":18,"n":9,"i":"mentor_good","s":52},{"id":"Ellis-001527-020","p":"Ellis","t":"00:15:27","q":"So recently we've been doing, a good example. June was, June and early July was performance reviews. I didn't have to do a hell of a lot with that. Just making sure the people and culture business partners are doing that. I step in for the talent and critical people work and the remuneration increases. So I lead that process and those are going live. The letters have been sent out and they are going live in the next payroll. So that's quite a busy BAU time for us. At the same time, I've been writing papers for the HSP subcommittee meeting in, which is next Tuesday. So that's SLT REM increases, SLT bonuses, SLT financial 26, KPIs, some health and safety papers as well. So that's quite a big, big one.","c":4,"n":6,"i":"pay","s":67},{"id":"Ellis-001613-021","p":"Ellis","t":"00:16:13","q":"There's a lot of variation and equally a lot of autonomy as well. And this is probably something I've, I've learnt a lot at [org] is that there's no shortage of opportunity to like, I could list 500 projects we could do here if we wanted to, but it's identifying the ones that are going to have the most value and having that commercial mindset around the effort. And also what good looks like for those projects, because I would say coming from a more academic background, it's easy to want to gold plate something and get something perfect and best practice. Yeah, whereas the buy into something is just as good as the quality of the solution and the corporate environment for sure.","c":4,"n":6,"i":"pay","s":60},{"id":"Ellis-001654-022","p":"Ellis","t":"00:16:54","q":"Yeah, and then everything we do takes up leaders and people's capacity to change. So you've got to choose where you're going to take those coins out of them. So yeah.","c":14,"n":9,"i":"mentor_good","s":68},{"id":"Ellis-001703-023","p":"Ellis","t":"00:17:03","q":"Yeah. So that's basically how I work.","c":1,"n":4,"i":"work_content","s":16},{"id":"Ellis-001707-024","p":"Ellis","t":"00:17:07","q":"And well, yeah, it's it's a good senior leadership role. But it's also I don't have 40 people reporting to me.","c":124,"n":34,"i":"reject_ladder","s":50},{"id":"Ellis-001716-025","p":"Ellis","t":"00:17:16","q":"Yeah. And I so you can sort of you're, I'm aware of what's going on.","c":0,"n":4,"i":"work_content","s":53},{"id":"Ellis-001722-026","p":"Ellis","t":"00:17:22","q":"If I go, if I went to the university or [other large company] or.","c":1,"n":4,"i":"work_content","s":72},{"id":"Ellis-001729-027","p":"Ellis","t":"00:17:29","q":"You're going to have heads of reporting to you, people reporting to them, and you might have a team of 30 sort of thing. So you're sort of just focusing on different bits. But yeah, I probably see the whole value chain here.","c":0,"n":4,"i":"work_content","s":53},{"id":"Ellis-001747-028","p":"Ellis","t":"00:17:47","q":"Yeah. First I'd say proper job. Yeah. So so right after I graduated, I went straight over to the UK for a couple of years. I played cricket at the time, and I had the opportunity to play sort of semi-professional cricket over there for a couple of years. It's just a good way to travel and see the world. Yeah. I do think, I actually look back on that. And while it wasn't technically working, I was working, I worked for, like, a horse racing syndication startup over there, and I worked for a garden garden, furniture place in sort of operations, just like little. Yeah. casually, jobs.","c":51,"n":23,"i":"transition","s":79},{"id":"Ellis-001819-029","p":"Ellis","t":"00:18:19","q":"Yeah. So. Well, yeah, I played cricket and that sort of me out financially, but I still needed to do stuff during the week. So I did work over there. But in terms of using my degree, my first [job] was back here, but I actually looked back on those two years over there as really formative in terms of helping me get to a place where I've moved so quickly in my career.","c":4,"n":6,"i":"pay","s":73},{"id":"Ellis-001842-030","p":"Ellis","t":"00:18:42","q":"Yeah. No, it's more my mindset as well. I look at the people in my apsy class and I don't know about yours. And a lot of them came out thinking what we learnt in that was the be all and end all of life. Like, this is how everything needs to go. So they go into organizations like, nah, you're doing it all wrong. Yeah. Whereas I went to working class Yorkshire and no one in a pub over there gives a f*** if I've done a master's in psychology, Sorry!","c":4,"n":6,"i":"pay","s":70},{"id":"Ellis-001908-031","p":"Ellis","t":"00:19:08","q":"Yeah. And that sort of, like, cut me down. Dare I say, cut me down to size a little bit?","c":0,"n":4,"i":"work_content","s":56},{"id":"Ellis-001916-032","p":"Ellis","t":"00:19:16","q":"So I came back and worked in... Went into a b*****, low paid role and like not the most glamorous organisation, but I approached it with the right mindset to what I'm going to do. I probably, I don't know if I've ever felt like I've worked as hard as my first six months now in [prior] L&D coordinator role. Do you know what I mean?","c":4,"n":6,"i":"pay","s":67},{"id":"Ellis-001935-033","p":"Ellis","t":"00:19:35","q":"I'd say yes to everything. I'd... Yeah. And I've learnt a hell of a lot of how businesses work out. What a constructive mindset it's all about all the way through. But it's, but I do look back on those two years and think, if I went straight into a job, probably a bit burnt out after uni, I might not have moved as quickly.","c":4,"n":6,"i":"pay","s":100},{"id":"Ellis-002008-034","p":"Ellis","t":"00:20:08","q":"Half of our job on people and culture is convincing people to do things they don't want to do, like, and if you can't relate to them, you can't understand, and you can't see things from other people's perspectives. You're just kind of...","c":1,"n":4,"i":"work_content","s":64},{"id":"Ellis-002020-035","p":"Ellis","t":"00:20:20","q":"Or you're telling them what to do. And then HR becomes that... What personnel used to be like in the past. Like everyone's scared of them. Like if people are scared to talk to me. I'm not doing my job right. If I'm not trying to find solutions to people rather than saying no. Yeah. I'm not doing my job right. Yeah.","c":0,"n":4,"i":"work_content","s":69},{"id":"Ellis-002046-036","p":"Ellis","t":"00:20:46","q":"I would say my natural tendency is task focused if you had to go between the two. So I, like I'm... I'd like to think I'm quite a commercially driven people and culture person. So I understand the people and I understand the value of getting people to buy into stuff. Yeah, but sometimes it's tactical to achieve that.","c":13,"n":19,"i":"leaving","s":60},{"id":"Ellis-002105-037","p":"Ellis","t":"00:21:05","q":"So it's like we know what we need to do. How do we get the people to do it?","c":2,"n":4,"i":"work_content","s":82},{"id":"Ellis-002149-038","p":"Ellis","t":"00:21:49","q":"I think one of the things I... It's hard to look back on that.","c":3,"n":4,"i":"work_content","s":59},{"id":"Ellis-002153-039","p":"Ellis","t":"00:21:53","q":"I have always been quite academically strong, like I was on academic scholarships and all the way through school and stuff like that. But then when I got to uni, I sort of, I actually started engineering and somehow I passed my first semester and hated it. And yeah.","c":13,"n":19,"i":"leaving","s":52},{"id":"Ellis-002214-040","p":"Ellis","t":"00:22:14","q":"It's one of those ones... I realized I was like, I've got to where I am doing subjects that a career advisor told me to do at uni, at school, because I'm smart, right? So it's like, okay, you'd be a lawyer or an engineer.","c":1,"n":4,"i":"work_content","s":72},{"id":"Ellis-002226-041","p":"Ellis","t":"00:22:26","q":"Yeah. So you do the sciences. But my strength was what my natural tendency was elsewhere, so I... But then I ended up doing psychology and political science and all that sort of carry on. And you get to the end of The Bachelor's and you're like, well, that doesn't really get me too far in terms of leading into a job.","c":49,"n":22,"i":"drift","s":64},{"id":"Ellis-002248-042","p":"Ellis","t":"00:22:48","q":"Yeah, I think I did... Honestly my first year at uni was first year. Half a year engineering. Half a year like management or something. I didn't turn up to anything and I failed everything. And I'm top one, top 5% of intelligence, I'd say. Yeah. And I just didn't turn up. I just did not care about anything.","c":0,"n":4,"i":"work_content","s":69},{"id":"Ellis-002321-043","p":"Ellis","t":"00:23:21","q":"Yeah well, I just didn't even attend anything or do anything. And I basically was at uni, but not at uni. I wanted to play cricket professionally at the time. Then that was 2008, 2009. I went over and played a season of cricket in Scotland and decided I wanted to do psychology while I was over there. But even when I came back, I did psychology and I breezed through. But I think I actually failed a first year psych paper. I wasn't turning up. And then I just kept on sort of fighting my way through a degree. Went back to Scotland in 2011 after the earthquakes and did a couple of papers while I was over there because it went online and then all of a sudden it got to, oh s***, I'm in the last year of my degree. Yeah, I think that was like 2012 or 13 or something like that. And I think I did really well in like a 300 level psych paper in like, jud[executive level role (HR)]ent and decision making.","c":99,"n":10,"i":"decision","s":0},{"id":"Ellis-002416-044","p":"Ellis","t":"00:24:16","q":"Yeah it was a really good Paper.","c":5,"n":7,"i":"procedural","s":40},{"id":"Ellis-002417-045","p":"Ellis","t":"00:24:17","q":"Yeah it's cool. I still remember doing that a lotto lecture, So cool. Yeah. Sorry.","c":3,"n":4,"i":"work_content","s":46},{"id":"Ellis-002422-046","p":"Ellis","t":"00:24:22","q":"Yeah. No, I. And then I did the APSY one, and I was just looking into what some master's in psychology, and the apsy course looked at least applied and it could lead to a job.","c":2,"n":4,"i":"work_content","s":82},{"id":"Ellis-002437-047","p":"Ellis","t":"00:24:37","q":"And none of that interested me.","c":2,"n":4,"i":"work_content","s":18},{"id":"Ellis-002447-048","p":"Ellis","t":"00:24:47","q":"And I'm like, that's another realistically seven years before doing anything. So yeah, did apsy and I didn't really know what I was turning up to. But I suppose I got into a good mindset, like I got in, so I must have had decent grades. But you don't need to set the world on fire. But then I set. Then I actually started treating APSY like a job. Made good friends in the class. So yeah.","c":0,"n":4,"i":"work_content","s":62},{"id":"Ellis-002511-049","p":"Ellis","t":"00:25:11","q":"Still people like [apsy friend], one of the ones, and that I was quite good friends with in there. We still catch up, well she's in London now at the moment, but we keep in touch. So yeah, I suppose I went from getting B's and B minuses without turning up to getting A's and A plus' by actually trying. So yeah.","c":20,"n":19,"i":"leaving","s":81},{"id":"Ellis-002534-050","p":"Ellis","t":"00:25:34","q":"Yeah. And I think like, dare I say, like I come from a sporting background. There's other people there. Yeah. It was we had quite an immature and competitive class. So people were talking about the grade. So I was like, **** it, I'm going to do well.","c":47,"n":15,"i":"rejection","s":53},{"id":"Ellis-002546-051","p":"Ellis","t":"00:25:46","q":"Yeah. And people think I'm a bit of a joker. I'm not that smart. Although then they do the psychometric assessments with Chris Burt and I'm the I get the highest marks.","c":0,"n":4,"i":"work_content","s":69},{"id":"Ellis-002555-052","p":"Ellis","t":"00:25:55","q":"Yeah. So I actually tried, but I even look back now and I was like, well, I still could have worked harder.","c":2,"n":4,"i":"work_content","s":79},{"id":"Ellis-002609-053","p":"Ellis","t":"00:26:09","q":"And I was in the [regional] cricket squad at the time. So juggling both. So that's that's sort of how I got there. I think it was the how, where is this going to lead. Yeah. But I still left uni having no idea how businesses worked adn organisations work. Yeah.","c":1,"n":4,"i":"work_content","s":56},{"id":"Ellis-002627-054","p":"Ellis","t":"00:26:27","q":"And I'd already signed a contract, and I was moving over to the UK, and I didn't know how long I was going to move over there for. I was on a five year visa through ancestry. So I went over there and basically thinking, I'm going to do 2 to 3 years. I'll go over there, play cricket, get me established, and then I'll find a job and and work and stuff like that. But I, and then so I was over there, I think I moved over in April or something like that. And then I came back for a couple of weeks, supposed to be six weeks in that and that January period. While it was winter over there, I had a couple of weddings I wanted to go to and and stuff like that. And then I met my now wife while I was back. So I extended that by another month sort of thing and went back over in March, because I'd already signed another cricket contract for the next next summer over there. So she came over and visited me, and I moved back for good in October.","c":105,"n":35,"i":"migration","s":0},{"id":"Ellis-002723-055","p":"Ellis","t":"00:27:23","q":"Yeah. In terms of getting the job at research. I it was actually [apsy friend] who who I just talked about. She messaged me and was like, hey I did an internship at [prior org], and the boss, they asked me if I was interested in this job. I've just got this job at [their org], and I put your name forward. You should you should chuck your CV in. And I remember sitting on the ground and, in Manchester airport, with my laptop out applying for this job. Then I actually came back and that process was still ongoing because I'd literally applied the day I left.","c":0,"n":4,"i":"work_content","s":75},{"id":"Ellis-002800-056","p":"Ellis","t":"00:28:00","q":"Yeah. And I, I think I applied for some other roles as well. And I ended up with this crossroads where I had an opportunity to work for [other org]. And I'm big into sport, right. And like, a community sport role. Which was probably going to be paying 10 to 15 K more which is about full context, about 25% more. Yeah, right. So I was looking at like 60 to 65 K versus 47 K at [prior org]. Yeah I live in town. That's out at Lincoln. Yeah. And I made the decision to take the lower offer with the bigger commute. Yeah. Just because I can't actually remember, I think it probably because I thought there was more upside there if, like.","c":49,"n":22,"i":"drift","s":27},{"id":"Ellis-002844-057","p":"Ellis","t":"00:28:44","q":"If I think in 2 to 5 years, where could I be or five years, where could I be? And [sport] one, I would have had another few hundred dollars a fortnight in the hand and a shorter commute to and from work. [chosen org] I'm like, well, it actually is the start of a career path, so I chose that.","c":55,"n":21,"i":"aspiration","s":100},{"id":"Ellis-002911-058","p":"Ellis","t":"00:29:11","q":"They were recommending the leader. And that's one of the big things I think is, I've been very fortunate with, [prior manager] probably the worst leader I've had. But she she wasn't bad. It was I... Yes, that was a factor. And I think. Yeah, I think it, it would have been a factor. I can't actually remember the main decision, but I think it was more like a kind of bet on yourself moment where it's like, okay, where do I want to be in 5 to 10 years? What's actually the best way? Best role, to take if I'm focusing on the long game rather than the next?","c":18,"n":9,"i":"mentor_good","s":76},{"id":"Ellis-002954-059","p":"Ellis","t":"00:29:54","q":"That was my key thing yeah.","c":9,"n":7,"i":"procedural","s":26},{"id":"Ellis-003000-060","p":"Ellis","t":"00:30:00","q":"Oh, no, I wouldn't say I was loving the UK because I I ended up in this cushy job my first year. I was over there doing horse racing syndication, so I was going to the races. I was travelling around the UK, I was seeing all these great racetracks. It was great. So that stopped me actually trying to get like an HR job.","c":106,"n":22,"i":"drift","s":100},{"id":"Ellis-003018-061","p":"Ellis","t":"00:30:18","q":"And yeah, that sort of came to an end in what a logical end. In around Christmas time that year, and because I was going back to the news to New Zealand, and then when I met [wife], I was like, well, I'm probably not going to, I knew I was going to be coming back in October. So I was like, I'm sort of committing to that. So I didn't actually, I knew I wasn't looking for a career job over there in that second summer, so I was doing as much travel as I could, worked in a garden furniture shop and sort of like operations and delivery and stuff like that, which is cool.","c":0,"n":4,"i":"work_content","s":53},{"id":"Ellis-003053-062","p":"Ellis","t":"00:30:53","q":"I wish I did more, but like.","c":0,"n":4,"i":"work_content","s":19},{"id":"Ellis-003055-063","p":"Ellis","t":"00:30:55","q":"Yeah. So it was primarily to start my life properly over here.","c":3,"n":4,"i":"work_content","s":35},{"id":"Ellis-003113-064","p":"Ellis","t":"00:31:13","q":"Yeah I came back unemployed.","c":5,"n":7,"i":"procedural","s":33},{"id":"Ellis-003138-065","p":"Ellis","t":"00:31:38","q":"I actually remember talking to a recruiter at the time that [wife's] dad put me on to. And my intention was I didn't want to end up in HR. I didn't want to be another APSY person that ended up in HR. I don't want to say I'm better than HR, but I was like, I don't want to just go up.","c":16,"n":2,"i":"interview_process","s":95},{"id":"Ellis-003159-066","p":"Ellis","t":"00:31:59","q":"Yeah. So but I was interested in the more OD space. And what appealed to me about [sport org] is like, okay, I've learnt all this stuff at uni and now I'm going into like this new environment where I could just apply it however I wanted, sort of thing. So, but the reality is that with my qualification and level of experience, the the roles I was going to get, opportunities and interviews and that sort of stuff, had to be relatively related to what I've done. And unless I was getting a hook up through someone I knew.","c":4,"n":6,"i":"pay","s":60},{"id":"Ellis-003243-067","p":"Ellis","t":"00:32:43","q":"Yeah, I suppose so. Yeah, but I would say I wasn't like, this is my dream to go and work in OD or HR. I think, like, I would have loved to go and work in because, I'm glad I didn't, but like a [big 4] or something in the consulting space. But but then you get to this point in your career and like thank God I didn't do that.","c":7,"n":0,"i":"big4","s":47},{"id":"Ellis-003313-068","p":"Ellis","t":"00:33:13","q":"To be honest, I'm quite financially driven because I love work, but I've got two, I've got two young children. I've got a wife. And I want her to have the best life I can [provide]. So a lot of what I do at work is trying to find as much efficiency so I can have a bit of mental space or physical space away from this place as well.","c":4,"n":6,"i":"pay","s":97},{"id":"Ellis-003336-069","p":"Ellis","t":"00:33:36","q":"Yeah, I'd say so because I'd say in [big 4] you're charging every hour, right? Yeah. And there's no hiding. There's no pretending. Not that I'm pretending, but it's like. Like I fundamentally think those places are there to make the partners money. Yeah, and it's great if you're a partner. But if you're in... Because I thought about going to [manager], who hired me at a research, moved to [big 4] and still is there, and she... We get on really well, and she she's like, oh, you come, come to Deloitte. And she started talking to me about the REM. And I was like, even then I'd have to take like a 30 k pay cut to go and work twice as hard and longer hours, less flexible. So yeah, I... It's just not. If I could just, like, fast forward my life and just say I've done two years of consulting, I think it'd be really good for me because I think it's a good warrant of fitness on your skills. Yeah, but I don't want to go through it.","c":7,"n":0,"i":"big4","s":7},{"id":"Ellis-003436-070","p":"Ellis","t":"00:34:36","q":"I think I'd love the outcome of having done it because I just don't want to do it.","c":3,"n":4,"i":"work_content","s":76},{"id":"Ellis-003449-071","p":"Ellis","t":"00:34:49","q":"Especially for the. Accountant.","c":9,"n":7,"i":"procedural","s":34},{"id":"Ellis-003530-072","p":"Ellis","t":"00:35:30","q":"Yeah. I think anytime your... My wife has to do it, time recording which I totally get. If I was running a business, I'd want to know.","c":8,"n":7,"i":"procedural","s":100},{"id":"Ellis-003541-073","p":"Ellis","t":"00:35:41","q":"You're charging time for people's clients, and you're then asking them to pay a big bill for Said time. You need that practice, right? Yeah. But that that inherently limits flexibility. Yeah. Maybe I need to be a bit. Yeah.","c":17,"n":5,"i":"balance","s":36},{"id":"Ellis-003559-074","p":"Ellis","t":"00:35:59","q":"I'm. I'm like, outcomes driven, right? Like, am I? And if I have to work 40 hours, 20 hours or 60 hours to get there. Right. Last week, [wife] was in a trial and we had two sick kids at home. So I was looking after kids all day. And then I work from midnight each night sort of thing. And yeah.","c":3,"n":4,"i":"work_content","s":59},{"id":"Ellis-003615-075","p":"Ellis","t":"00:36:15","q":"But it comes with my pay level and my level of responsibility that sometimes you've got to give back a little bit.","c":75,"n":31,"i":"purpose","s":0},{"id":"Ellis-003635-076","p":"Ellis","t":"00:36:35","q":"A lot of some, some things. I... A lot of my work is my own deadlines. Right? There's some stuff, urgent stuff that gets popped up and board stuff has External deadlines. So that was board stuff I was working on, so there were external deadlines. I think for me, I set a lot... There's a lot of internal pressure. I set high standards for myself. And that's probably one of my strengths to get me here. But also it can be overplayed to be a flaw that you put too much pressure on yourself. You set false deadlines and you don't want to be seen that all this s*** that's happening in your personal life is slowing stuff down.","c":0,"n":4,"i":"work_content","s":75},{"id":"Ellis-003714-077","p":"Ellis","t":"00:37:14","q":"I think it's that I don't want to let other people down, and I don't want to be seen to be not performing.","c":3,"n":4,"i":"work_content","s":65},{"id":"Ellis-003725-078","p":"Ellis","t":"00:37:25","q":"I'd say it's probably more the way I've been raised, to be fair. And if you look at it but yeah, I'd say.","c":107,"n":1,"i":"family_influence","s":0},{"id":"Ellis-003735-079","p":"Ellis","t":"00:37:35","q":"It's all good.","c":8,"n":7,"i":"procedural","s":33},{"id":"Ellis-003741-080","p":"Ellis","t":"00:37:41","q":"Very traditional, very like my dad's a high school principal, like so yeah, that's actually some of the most work I've done throughout my career is coming in with what I thought made me successful, to what will the mindset and the approach to working with other people and how to have sustained performance over time, because that negative, and heaps pressure on yourself mindset, you can achieve that for a short period of time, right? It's not sustainable. And it also piss people off and. Yeah.","c":26,"n":16,"i":"values_fit","s":79},{"id":"Ellis-003823-081","p":"Ellis","t":"00:38:23","q":"In terms of, I think I've always got stuff done, I think the process by which I've had to go through to get stuff done, I go through periods of basically getting bugger all sleep because I couldn't turn my brain off that sort of stuff. And to be honest, I've probably gone through one of those periods nearly every year. I'm now b***** used to not having much sleep because I've got two young children.","c":3,"n":4,"i":"work_content","s":76},{"id":"Ellis-003844-082","p":"Ellis","t":"00:38:44","q":"There's that. I wouldn't say I've really there's never been like, a trigger in my career where I've really ****** something up or something that let people down. Which is good. But I think also, I kind of need to have that as well to realise that the world didn't stop spinning.","c":3,"n":4,"i":"work_content","s":59},{"id":"Ellis-003906-083","p":"Ellis","t":"00:39:06","q":"Zoom out. Zoom out. Can see like we don't always go like this [straight up gesture]. There's ups and downs, like, look at the stock market. It's like it's gone up over time, but it's gone [down] there.","c":1,"n":4,"i":"work_content","s":44},{"id":"Ellis-003929-084","p":"Ellis","t":"00:39:29","q":"I think the only time, and I actually said this, the entire organization at a summit on a SLT panel recently, like one of my lowest points in my career and like, ****, I'm pretty fortunate if this is the low point, is... It wasn't long after I, it was within my first year here because we just had Charlie and I'd come back to work, and he was a month old and he, we didn't know it at the time, but had silent reflux, which means he didn't sleep. So I just remember being like, up all night, up all weekend. Exhausted, getting like three hours sleep, coming into work. And then I was talking to [name], who's the CEO, and I was like, I'm just about at breaking point here. What the best thing was that, I still remember wife's mum came round and I took half a sleeping pill and slept like ten hours one night, and then came in to work on the Monday. And I was feeling human again, and I was like to [CEO] I was like, I almost sent you an email over the weekend, calling you an asshole and telling you why you need to have a little bit more empathy for what I'm going through and stuff like that. I feel a little bit more human today. I suppose that's the first, only time I've really thought s*** I can't I can't cope at work because of what's going on in my personal life.","c":74,"n":20,"i":"somatic","s":91},{"id":"Ellis-004047-085","p":"Ellis","t":"00:40:47","q":"Yeah, well, I think I was. I just get... My biggest driver and my biggest thing that I need to keep on developing is that I don't want to let other people down or what will other people think of me?","c":42,"n":17,"i":"learning","s":68},{"id":"Ellis-004100-086","p":"Ellis","t":"00:41:00","q":"It's externally, and worrying about that, right? I want to look good. I want to look like I'm succeeding. I want to look like I'm successful. And I think that's and from my perspective, the expectations of others, were still going up and up and up and up. Whereas from my perspective, I thought they needed to have a little bit more empathy because like, expect less of me. And what actually needed to happen was just a mature conversation like, hey, I'm struggling a little bit here. But also, I was probably putting heaps of pressure on myself in terms of the false deadlines I was setting for myself.","c":108,"n":11,"i":"status","s":100},{"id":"Ellis-004144-087","p":"Ellis","t":"00:41:44","q":"Yeah and also I was given a piece of work and I think was around agile transformation of ways of working here, which is a great piece of work and good to, I'm glad I got it in hindsight, but it was one of the unknowns and I was at a place in my life where I wanted [certainty]. Yeah, because when you're under pressure or stress, you revert to your absolute core. Yeah. And my call was a... a want, a need for certainty. Or a desire for certainty.","c":10,"n":13,"i":"wellbeing","s":100},{"id":"Ellis-004212-088","p":"Ellis","t":"00:42:12","q":"It's good to reflect on actually.","c":1,"n":4,"i":"work_content","s":16},{"id":"Ellis-004219-089","p":"Ellis","t":"00:42:19","q":"I was just, I don't think anger is the word, I think frustrated.","c":0,"n":4,"i":"work_content","s":66},{"id":"Ellis-004226-090","p":"Ellis","t":"00:42:26","q":"And being like, how can you possibly expect that when this is going on?","c":2,"n":4,"i":"work_content","s":57},{"id":"Ellis-004246-091","p":"Ellis","t":"00:42:46","q":"Yeah, I suppose I'd been there for four years and I got to the point where [prior org]... I'm so glad I went there because s*** I made great progression, and it was a great place to learn your trade.","c":4,"n":6,"i":"pay","s":80},{"id":"Ellis-004300-092","p":"Ellis","t":"00:43:00","q":"Yeah. Well, yeah. And those CRIs, like they're kind of public sector. There's no limit to the opportunity, they invested in internal OD, well they did, and yeah, like it was one of the ones, if you were, it was not... You could shine there because there's a lot of people just clipping the ticket and cruising in the public sector and doing the bare minimum. But if you're hungry and you want to do more and take on more work, there's room. There's room to shine, room to stand out, room to take on interesting projects. So I'm really stoked with what I achieved there for that four years.","c":1,"n":4,"i":"work_content","s":52},{"id":"Ellis-004334-093","p":"Ellis","t":"00:43:34","q":"I'd say for that last... And we had such a cool team there, like because it was quite a big HR team and OD team and health and safety. So there was probably about 15 to 20 of us. So you're learning from other people. You've got a great I love being part of a team. So I loved it, I learnt heaps,","c":4,"n":6,"i":"pay","s":93},{"id":"Ellis-004334-094","p":"Ellis","t":"00:43:34","q":"But then I think... People were leaving like there were, there's that natural attrition, right? If you say everyone's on average stays in a role for two and a half to three years or something. We had probably 18 months of this brilliant team instead of dropping off. [name] Our [executive level role (HR)] left. And. Yeah, yeah. And a couple of more people my age left as well, like [friend]. And because she ended up coming to work there as well. And so, yeah, I was looking for a new job, but I was also in a position where I was in a in a good job. I was very well thought of there. Yeah. And I, I actually almost left a year before, I think I got an offer at [big org], and the CFO, which was random at the time, took me out to coffee and convinced me to stay, and which is quite cool because he's about four levels above in the organisation.","c":13,"n":19,"i":"leaving","s":40},{"id":"Ellis-004437-095","p":"Ellis","t":"00:44:37","q":"Yeah yeah, and so but then I knew it was time to leave, and I was really opened with [name] who was the [EXECUTIVE LEVEL ROLE (HR)], She was the OD manager. Moved up to the [EXECUTIVE LEVEL ROLE (HR)] there. And I'd sort of moved up in her [path], And we had a really good relationship. So I said, look, [name], I think my time will be coming to an end here, and was really transparent with her, and I wanted her support because I wanted, When these opportunities came up, I wanted to talk to her about them because this is the first time I'd ever moved jobs.","c":2,"n":4,"i":"work_content","s":82},{"id":"Ellis-004511-096","p":"Ellis","t":"00:45:11","q":"Yeah, and I'd rather be transparent about it. And so, yeah, there was a couple of opportunities that came up at exact same time as OD managers, one at [other org] and one here, and ended up with this one.","c":89,"n":22,"i":"drift","s":0},{"id":"Ellis-004531-097","p":"Ellis","t":"00:45:31","q":"The cons for [current org] was that it is quite a small business. I suppose.","c":12,"n":19,"i":"leaving","s":57},{"id":"Ellis-004539-098","p":"Ellis","t":"00:45:39","q":"Yeah, yeah, no it's not. Actually, it's still about the same amount of people. But it's the... We're either going from an organization of seven, 800 people to one of 120. Yeah.","c":0,"n":4,"i":"work_content","s":56},{"id":"Ellis-004550-099","p":"Ellis","t":"00:45:50","q":"Yeah. Pros. I didn't think it at the time because we didn't know we were pregnant, but in hindsight, I'm b***** happy with Christchurch because I don't need to travel.","c":2,"n":4,"i":"work_content","s":93},{"id":"Ellis-004602-100","p":"Ellis","t":"00:46:02","q":"Yeah. I think pro, I was probably taking a step up in REM here. Working in the central city and the new office was was very exciting was a thing. I can't actually remember. I think it, I can't actually remember, in hindsight a new role and the opportunity to set up a function. Because I can't remember if I was actually scared of that at the time or it was a pro. I probably convinced myself it was a pro. But the thing is, when you come in and do... Into an environment like this, you can do the most simple and basic things and it's easy progress. If you're coming in to a polished and well oiled machine. you're just turning the wheel. And you might.... But I was like, I could bring in talent management stuff. I could bring in leadership development program. And it was really obvious that things had changed. I could change the way we're doing L&D Budgets, I could go and sit in people's team meetings, that sort of stuff.","c":15,"n":9,"i":"mentor_good","s":74},{"id":"Ellis-004706-101","p":"Ellis","t":"00:47:06","q":"Even more freedom, considering the fact that my boss [left].","c":18,"n":9,"i":"mentor_good","s":28},{"id":"Ellis-004717-102","p":"Ellis","t":"00:47:17","q":"Maybe not like creative, I think, I don't know if I'm good at at creating something from scratch. I like being... I'm really good at working within a framework and maximising that.","c":0,"n":4,"i":"work_content","s":62},{"id":"Ellis-004730-103","p":"Ellis","t":"00:47:30","q":"AI actually really helps me with that. Yeah. Like.","c":56,"n":8,"i":"ai_tech","s":11},{"id":"Ellis-004735-104","p":"Ellis","t":"00:47:35","q":"Tell me about some stuff I hadn't thought of? Sort of like. You know what I mean?","c":1,"n":4,"i":"work_content","s":44},{"id":"Ellis-004827-107","p":"Ellis","t":"00:48:27","q":"Do the... Follow the things that you have the most passion or interest for, because then you would, you're more likely to show that discretionary effort to go from good to great in that area. Don't just follow something because on paper you want to do it. Sometimes there's always elements of things we don't want to do. Like, you might want to be an architect and you don't love physics or something like that, or there's always elements of it, but if it's the core thing, you don't really like it. If you're wanting to be an engineer and you don't like maths and science, don't do it. Yeah. You can be successful and financially, whatever and anything. But it usually is only the top 10% of people that do that. So give yourself the best chance to be in the top 10% or something.","c":4,"n":6,"i":"pay","s":50},{"id":"Ellis-004914-108","p":"Ellis","t":"00:49:14","q":"And then the key skill that you learn at uni is how to learn and realise that as soon as you walk into an organisation, you need to basically... It's good to have that knowledge in your back pocket, but you also need to learn context, commercials, how the business works, that sort of stuff. Yeah. Don't think you just because you've studied at uni, you know how to do it.","c":4,"n":6,"i":"pay","s":57},{"id":"Ellis-004954-109","p":"Ellis","t":"00:49:54","q":"How to work in a corporate environment?","c":2,"n":4,"i":"work_content","s":36},{"id":"Ellis-005007-110","p":"Ellis","t":"00:50:07","q":"I think that a couple of years in the UK really helped with that because that was pretty unstructured. And then I came back in this mindset. Right. Like I've had my fun. Yeah. I've I've explored it's time to lock in. So.","c":0,"n":4,"i":"work_content","s":69},{"id":"Ellis-005024-111","p":"Ellis","t":"00:50:24","q":"Not really. Not for cricket. Just because cricket. Well, I guess you've got to turn up to training at certain times.","c":0,"n":4,"i":"work_content","s":66},{"id":"Ellis-005034-112","p":"Ellis","t":"00:50:34","q":"I suppose so, but there were still skills I had to learn. I don't actually look back on them and think s***, I had to learn that. But having a shirt ready for work the next day and all that.","c":4,"n":6,"i":"pay","s":87},{"id":"Ellis-005046-
